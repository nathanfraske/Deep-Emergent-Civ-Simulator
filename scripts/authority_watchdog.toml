description = "Closed inventory of authority-bearing mechanisms and explicitly non-authoritative diagnostics."

[[mechanism]]
id = "core.deterministic-math-kernels"
kind = "authority"
domain = "scientific"
status = "blocked"
claim = "The CPU fixed-point math implementation and its GPU transcendental copy implement one complete deterministic Q32.32 function table with identical coefficients, domains, rails, rounding, and output bits."
producer_path = "crates/core/src/fixed.rs"
refusal_path = "crates/gpu/src/transcendental.rs"
activation_guard = "The constant table now has an independent exact receipt, but sampled bit-identity tests do not prove approximation error, domain edges, saturation rails, iteration semantics, or whole-domain CPU and GPU output identity."
open_cross_checker_requirements = ["independent certified approximation bound for every kernel and declared domain", "independent derivation and verification of every iteration count, domain edge, saturation rail, and rounding rule", "whole-domain proof or exhaustive partition receipt over every Q32.32 input and output contract", "CPU and GPU implementation digests plus vendor execution evidence bound to the same receipt", "mutation canaries for domain, rail, iteration, rounding, adapter, and backend implementation drift"]
owner_boundary = "The pair may prove deterministic equivalence and approximation bounds over the declared table. The owner reviews whether each mathematical approximation and domain is physically sufficient for its consumers."
semantic_closure = ["crates/core/src/fixed.rs", "crates/core/src/lib.rs", "crates/core/tests/transcendentals.rs", "crates/gpu/src/transcendental.rs", "crates/gpu/src/prim.rs", "crates/gpu/src/stage0.rs", "crates/gpu/src/lib.rs", "crates/gpu/tests/transcendental_gate.rs", "scripts/fixed_math_authority_gate.py", "scripts/fixed_math_authority_watchdog.py", "crates/units/data/fixed_math_authority_receipt.json"]

