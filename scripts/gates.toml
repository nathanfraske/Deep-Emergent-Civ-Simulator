[inventory]
schema = 1
tiers = ["canonical", "doctor", "pr", "full", "nightly", "stop", "legacy"]
description = "Ordered structural gate authority for canonical and parked work."
remaining_non_inventory = [
  "Cargo format, Clippy, test, and Rustdoc commands remain in justfile.",
  "Native Stone 0 credential and tombstone scans remain in civsim-stone0.",
  "Pushed-history credential scanning remains in the tracked pre-push and CI scripts.",
  "Parked crate compilation, tests, and ignored tests remain in justfile and CI.",
]

# Every command is an argument array. The runner never passes these values to a
# shell parser. `{python}` resolves to the interpreter running gate_runner.py.

[[gate]]
id = "docs.legacy-archive"
order = 10
description = "Verify the maintained parked design and audit documents."
tiers = ["doctor", "pr", "full", "nightly", "stop"]
phase = "pre"
command = ["bash", "scripts/verify.sh"]
timeout_seconds = 60
no_self_test_reason = "The script reports independent checks over the maintained documents and has no synthetic fixture mode."
cache = "never"
no_cache_reason = "The maintained-document verifier dispatches POSIX text utilities whose complete executable closure is outside the repository."
inputs = ["scripts/verify.sh", "parked/docs/design.md", "parked/docs/audit.md"]
path_triggers = ["scripts/verify.sh", "parked/docs/design.md", "parked/docs/audit.md"]

[[gate]]
id = "canonical.constructor-boundary"
order = 20
description = "Reject new unaudited value constructors in active source."
tiers = ["canonical", "doctor", "pr", "full", "nightly", "stop"]
phase = "provenance"
command = ["{python}", "scripts/constructor_gate.py"]
self_test = ["{python}", "scripts/constructor_gate.py", "--self-test"]
timeout_seconds = 120
cache = "content-hash"
inputs = ["scripts/constructor_gate.py", "scripts/constructor_baseline.tsv", "crates"]
path_triggers = ["scripts/constructor_gate.py", "scripts/constructor_baseline.tsv", "crates/**"]

[[gate]]
id = "canonical.floor-provenance"
order = 30
description = "Verify the candidate provenance census and seven accounting marks."
tiers = ["canonical", "doctor", "pr", "full", "nightly", "stop"]
phase = "provenance"
command = ["{python}", "scripts/floor_provenance_gate.py"]
self_test = ["{python}", "scripts/floor_provenance_gate.py", "--self-test"]
timeout_seconds = 120
cache = "content-hash"
inputs = ["scripts/floor_provenance_gate.py", "crates/physics/data", "crates/physics/src"]
path_triggers = ["scripts/floor_provenance_gate.py", "crates/physics/data/**", "crates/physics/src/**"]

[[gate]]
id = "canonical.determinism"
order = 40
description = "Reject nondeterministic APIs outside the audited baseline."
tiers = ["canonical", "doctor", "pr", "full", "nightly", "stop"]
phase = "provenance"
command = ["{python}", "scripts/determinism_gate.py"]
self_test = ["{python}", "scripts/determinism_gate.py", "--self-test"]
timeout_seconds = 120
cache = "content-hash"
inputs = ["scripts/determinism_gate.py", "scripts/determinism_baseline.tsv", "crates"]
path_triggers = ["scripts/determinism_gate.py", "scripts/determinism_baseline.tsv", "crates/**"]

[[gate]]
id = "canonical.planet-boundary"
order = 50
description = "Enforce floor ingress, typed adapters, package ownership, and observer-only viewing."
tiers = ["canonical", "doctor", "pr", "full", "nightly", "stop"]
phase = "provenance"
command = ["{python}", "scripts/planet_boundary_gate.py"]
self_test = ["{python}", "scripts/planet_boundary_gate.py", "--self-test"]
timeout_seconds = 180
cache = "never"
no_cache_reason = "The boundary verifier dispatches the Cargo executable selected by its environment, so repository bytes alone do not close execution identity."
inputs = [
  "scripts/planet_boundary_gate.py",
  "Cargo.toml",
  "Cargo.lock",
  "crates",
  "parked/Cargo.toml",
  "parked/Cargo.lock",
  "parked/crates",
]
path_triggers = [
  "scripts/planet_boundary_gate.py",
  "Cargo.toml",
  "Cargo.lock",
  "crates/**",
  "parked/Cargo.toml",
  "parked/Cargo.lock",
  "parked/crates/**",
]

[[gate]]
id = "canonical.source-custody"
order = 60
description = "Verify source coverage, checksums, anchors, licences, and custody rules."
tiers = ["canonical", "doctor", "pr", "full", "nightly", "stop"]
phase = "provenance"
command = ["{python}", "scripts/sources_gate.py"]
self_test = ["{python}", "scripts/sources_gate.py", "--self-test"]
timeout_seconds = 180
cache = "never"
no_cache_reason = "The gate can inspect restricted custody outside the repository, so repository content alone is not a complete cache key."
inputs = ["scripts/sources_gate.py", "scripts/sources_baseline.tsv", "sources", "docs/SOURCES.md", "crates/physics/data"]
path_triggers = ["scripts/sources_gate.py", "scripts/sources_baseline.tsv", "sources/**", "docs/SOURCES.md", "crates/physics/data/**"]

[[gate]]
id = "canonical.source-registry"
order = 70
description = "Check generated source documentation against the source registry."
tiers = ["canonical", "doctor", "pr", "full", "nightly", "stop"]
phase = "provenance"
command = ["{python}", "scripts/gen_sources.py", "--check"]
self_test = ["{python}", "scripts/gen_sources.py", "--self-test"]
timeout_seconds = 120
cache = "never"
no_cache_reason = "Generated custody output depends on the existence of held paths outside the declared repository input closure."
inputs = ["scripts/gen_sources.py", "sources", "docs/SOURCES.md", "crates/*/data/*/manifest.toml"]
path_triggers = ["scripts/gen_sources.py", "sources/**", "docs/SOURCES.md", "crates/*/data/*/manifest.toml"]

[[gate]]
id = "canonical.derivation-annotations"
order = 80
description = "Verify deriving-substrate annotations against the audited baseline."
tiers = ["canonical", "doctor", "pr", "full", "nightly", "stop"]
phase = "provenance"
command = ["{python}", "scripts/derives_gate.py"]
self_test = ["{python}", "scripts/derives_gate.py", "--self-test"]
timeout_seconds = 120
cache = "content-hash"
inputs = ["scripts/derives_gate.py", "scripts/derives_baseline.tsv", "crates"]
path_triggers = ["scripts/derives_gate.py", "scripts/derives_baseline.tsv", "crates/**"]

[[gate]]
id = "canonical.diamond-single-provider"
order = 90
description = "Require one provider or an explicit arbitration for each derived quantity."
tiers = ["canonical", "doctor", "pr", "full", "nightly", "stop"]
phase = "provenance"
command = ["{python}", "scripts/diamond_gate.py", "--strict"]
self_test = ["{python}", "scripts/diamond_gate.py", "--self-test"]
timeout_seconds = 120
cache = "never"
no_cache_reason = "The provider verifier dispatches the host grep executable, so repository bytes alone do not close execution identity."
inputs = ["scripts/diamond_gate.py", "crates"]
path_triggers = ["scripts/diamond_gate.py", "crates/**"]

