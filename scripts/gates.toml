no_self_test_reason = "Check mode regenerates the inventory from the repository-owned catalog and compares the committed artifact."
cache = "never"
no_cache_reason = "The planet build script runs Stone 0 across repository, Git-index, and external-secret state that this gate cannot seal in a content receipt."
