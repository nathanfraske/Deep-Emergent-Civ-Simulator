command = ["{python}", "scripts/gen_floor_registry.py", "--check"]
timeout_seconds = 120
no_self_test_reason = "Check mode compares a fresh rendering with the committed artifact; the generator has no separate synthetic fixture mode."
cache = "content-hash"
inputs = ["scripts/gen_floor_registry.py", "crates", "docs/working/PHYSICS_FLOOR_REGISTRY.md"]
path_triggers = ["scripts/gen_floor_registry.py", "crates/**", "docs/working/PHYSICS_FLOOR_REGISTRY.md"]

