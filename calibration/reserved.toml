# --- Scenario direction siblings (docs/working/TEST_WORLDS.md) ---
#
# A test-world scenario pushes each change-and-extremes dial in a direction (real, high, low),
# and the magnitude behind a pushed direction is a reserved end of its own, distinct from the
# baseline. These are those ends: the `.high` and `.low` siblings the Tempest and Arcanum stress
# worlds resolve to (scenarios/*.toml, crates/sim/src/scenario.rs). A `real` dial resolves to its
# baseline entry above; only the pushed directions need a sibling. Every one stays reserved: the
# stress-world extremes are the owner's to set, surfaced here rather than fabricated, each basis
# naming the direction and the useful bound the scenario is meant to find.

[[reserved]]
id = "genome.mutation_rates.high"
basis = "the volatile structural-mutation end Tempest and Arcanum push toward, above the baseline so genomes churn and schemes drift fast; its upper bound is where legibility or a determinism replay breaks; the baseline is genome.mutation_rates"
status = "set"
value = "0.02"
set_by = "Nathan M. Fraske"
set_date = "2026-07-03"
unit = "per_genome_per_generation"
source = "Part 25 genome model; record 62.5; the high end per docs/working/TEST_WORLDS.md (Tempest, Arcanum)"

