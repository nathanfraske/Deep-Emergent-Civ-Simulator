id = "genome.mutation_rates.low"
basis = "the placid structural-mutation end Europa pulls, below the baseline so rearrangements are rarer still and schemes barely drift, the thermally-buffered slow-change world; the baseline is genome.mutation_rates"
status = "reserved"
value = ""
