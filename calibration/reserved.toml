# Calibration manifest (RUNBOOK section 4; design Principle 11).
#
# Every reserved value the resolved mechanisms need is one entry here, surfaced
# from the design document rather than invented. A mechanism is fixed Rust; these
# numbers are the owner's to set. While status = "reserved" the loader treats the
# entry as a fail-loud sentinel: any system that reads it unset errors rather than
# running on a fabricated default (crates/sim/src/calibration.rs).
#
# Each `basis` is copied from the matching "Decided and reserved" blockquote in
# docs/design.md, condensed, so the manifest and the document say the same thing.
# `source` points back to the mechanism so a reviewer can read the full context.
#
# This seeds the review queue for the nine resolved systems. More entries are added
# as later systems are built and reach the numbers they need (RUNBOOK section 3,
# step 6). No value here is decided by the agent; graduation to status = "set" is
# the owner's, through the reserved-values panel.

