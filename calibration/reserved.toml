# evidence.trace_decay_curves RETIRED (worksheet §13b, derive audit): a trace's persistence over
# time is no longer an authored per-kind curve. It DERIVES through trace::organic_salience and
# trace::corroding_salience (crates/sim/src/trace.rs): the organic path gates decomposition on the
# physics reaction kernel (laws::reaction, thermal-activation barrier) and then decays exponentially
# (Fixed::exp) at the kind's decomposition rate scaled by the race's own decay_multiplier; the
# corroding path integrates the physics corrosion kernel (laws::corrosion) linearly against elapsed
# time. "Blood days, bone years" was terran organic chemistry a silicate or dispersing race has no
# analogue for; the exponential-at-rate shape is kept. The reserved inputs (each trace kind's
# TransformKind parameters: barrier, decomposition_rate, material_potential, susceptibility, acidity,
# corrosion_max; each race's decay_multiplier) live as typed data on the trace-kind and
# race-base-rate registries (labelled dev fixtures), not as a manifest entry. Removed rather than
# left a fail-loud sentinel for a value the engine no longer authors.

# evidence.absence_windows RETIRED (worksheet §13b, derive audit): the presumed-dead window is no
# longer an authored per-race number. It DERIVES through absence::absence_window
# (crates/sim/src/absence.rs) from the race's own visibility (a less visible race's absence takes
# longer to confirm, so the window is longer), capped against absence::characteristic_lifespan of
# the race's own natural-mortality curve (no one is presumed merely absent for longer than their own
# lifespan allows). The seven-year Anglo-American death-in-absentia window was a human legal anchor
# scaled to a human lifespan; the scaled-by-visibility mechanism is kept. The reserved inputs (each
# race's visibility and natural_mortality, the universal absence-stage multipliers) live as typed
# data on the race-base-rate registry and the AbsenceScheduleDef (labelled dev fixtures), not as a
# manifest entry. The characteristic-lifespan cap uses the LIFESPAN_HAZARD_THRESHOLD percentile
# convention (a scale definition, not an authored biology value). Removed rather than left a
# fail-loud sentinel for a value the engine no longer authors.

# decompose.* (decomposition-as-emergence, Principle 8; crates/sim/src/decompose.rs, record deferred
# to the design-doc consolidation): the authored "all warm matter rots" law is replaced by a per-cell
# decomposition ACTIVITY (DecomposerDriverRegistry::activity_at) that a world derives from its own
# decomposer LIFE and CONDITIONS, so the substance rate is now a maximum susceptibility and a sterile,
# dry, or airless cell preserves its matter. Following the sibling matter-cycle and trace convention
# above, the reserved parameters live as typed data on the DecomposerDriver rows (labelled dev
# fixtures DecomposerDriverRegistry::dev_fixture), not as fail-loud manifest entries, because the
# registry is constructed in code by the world-builder rather than loaded from this manifest; they are
# surfaced here with their bases so the owner can set them when the biosphere slice wires worldgen.
# The four reserved values and their bases:
#   decompose.conditions.moisture_saturation: the per-cell moisture (EnvironFields moisture units) at or
#     above which moisture no longer limits decomposition, the field-capacity moisture of soil-decay
#     kinetics (a CENTURY/Rothamsted-style moisture response), owner-set per world.
#   decompose.conditions.oxygen_reference: the respirable content (the same fluid.respirable_content
#     units the combustion beat reads) at or above which decomposition is fully aerobic, naturally the
#     open-air full concentration the medium substrate already treats as ONE, so only submerged or
#     sealed cells throttle.
#   decompose.conditions.warmth_span: the temperature span (K) above the substance's OWN thermal
#     barrier over which activity rises from zero to full, a linear surrogate for the Q10 temperature
#     sensitivity of microbial respiration; the zero-point is the substance's physics barrier, so only
#     the span is reserved.
#   decompose.life.biomass_reference: the per-cell standing decomposer biomass at which decomposition
#     proceeds at the substance's full susceptibility rate (activity ONE), so the mechanism reduces to
#     the unconditional rate at full colonisation and to zero at sterility; the reference standing crop
#     of decomposition ecology, owner-set per world. Named biomass_reference, not half_saturation: the
#     response reaches ONE at this biomass (a Michaelis-Menten half-saturation constant would only reach
#     one half there and never saturate).

