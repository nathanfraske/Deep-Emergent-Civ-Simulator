# Calibration manifest (RUNBOOK section 4; design Principle 11).
#
# Every reserved value the resolved mechanisms need is one entry here, surfaced
# from the design document rather than invented. A mechanism is fixed Rust; these
# numbers are the owner's to set. While status = "reserved" the loader treats the
# entry as a fail-loud sentinel: any system that reads it unset errors rather than
# running on a fabricated default (crates/sim/src/calibration.rs).
#
# Each `basis` is copied from the matching "Decided and reserved" blockquote in
# docs/design.md, condensed, so the manifest and the document say the same thing.
# `source` points back to the mechanism so a reviewer can read the full context.
#
# Each `category` is the entry's three-way-test category (AGENTIC_ADDENDUM section 9): one of
# "fundamental" (a universal constant on the closed fundamentals list), "per_world" (a per-world /
# per-substance / per-race datum), "derivable" (computable from the fundamentals and the situation,
# never stored once its substrate lands), or "defect" (a value fitting none of the three, a bug flagged
# not laundered). The field is machine-checked (crates/sim/src/calibration.rs): a non-empty value that is
# not one of the four fails the build, so every entry is born categorized. An absent field reads as
# UNCLASSIFIED, the additive-migration default for an in-flight entry not yet categorized. The categories
# below were set by the gate-confirmed census (docs/working/CALIBRATION_CENSUS.md).
#
# This seeds the review queue for the nine resolved systems. More entries are added
# as later systems are built and reach the numbers they need (RUNBOOK section 3,
# step 6). No value here is decided by the agent; graduation to status = "set" is
# the owner's, through the reserved-values panel.
#
# Unit convention: every value with unit = "log_odds" is in natural log-odds (nats),
# where a total L maps to probability p = 1 / (1 + e^-L). This is the occupancy-grid /
# Probabilistic Robotics convention the evidence engine inherits (Elfes 1989; Thrun,
# Burgard, Fox 2005).
#
# Tuneable levers: a value with status = "set" below is the owner's decision, recorded
# with set_by and set_date. Set values stay tuneable levers, revisable later on the
# owner's sign-off; they are calibrations, not constants frozen forever.
#
# Provisional by principle (owner's standing instruction): nothing chosen here is final,
# and neither is any of the method forks surfaced alongside these numbers (the drift
# sampler, the distance measure, the speciation rule, the pre-dawn tier, and their kin).
# The working assumption is that a setting will not survive scale unchanged. Every dial
# rides a sliding scale between fidelity and cost: where a system eats the compute budget
# we tune its detail down (fewer loci, a coarser sampler, a shorter pre-dawn, an
# approximation for an exact sum), and where there is headroom we add detail back. A value
# set today is a hypothesis awaiting a playtest, not a commitment. The canonical scenarios
# that exercise these dials at their extremes live in scenarios/ (docs/working/TEST_WORLDS.md).

# --- R-EVIDENCE: belief formation from the world (Part 9, record 62.6) ---

# evidence.implication_weights RETIRED (worksheet §13b, derive audit): the belief weight a trace
# implies about its cause is no longer an authored per-kind number. It DERIVES through
# trace::mortality_implication_weight (crates/sim/src/trace.rs), which is I.J. Good's weight of
# evidence (evidence::good_weight, ln(P(E|H)/P(E|not H))) with the trace kind's own reliability as
# the numerator and the race's own natural-mortality base rate as the denominator, so a race that
# dies of natural causes constantly finds a corpse less diagnostic. "Fresh corpse 5, stale stain 1"
# was a human forensic table a hive or dispersing-body race has no analogue for. The reserved inputs
# (each trace kind's reliability, each race's natural_mortality curve) now live as typed data on the
# trace-kind and race-base-rate registries (labelled dev fixtures TraceKindRegistry::dev_default and
# RaceBaseRateRegistry::dev_default), not as a manifest entry. Removed rather than left a fail-loud
# sentinel for a value the engine no longer authors, the same treatment as
# physiology.reserve_capacity_per_mass and physiology.intake_yield below.

