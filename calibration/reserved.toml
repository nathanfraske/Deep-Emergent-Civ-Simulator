# --- R-TOM-UPDATE: recursive theory of mind (Part 37, record 62.11) ---
# The access-channel set is data (the registry in crates/sim/src/tom.rs); these are the
# weights and meta thresholds the nested update reads. The hard constraint from the
# blockquote: the witnessed weight must be set strictly above the told and said weights,
# and no meta-observation weight above the same observation taken first-hand. The
# remaining reserved values in the Part 37 blockquote (lie-discount, common-ground
# prior, projection-fallback, depth bound, level-of-detail policy, conserved projection,
# meta-facet decay, trust update) are added here as their consumers are built.

[[reserved]]
id = "tom.access_weight.witnessed"
basis = "the weight-of-evidence that a target witnessed a trace; must be set strictly above told and said so a witnessed access out-ranks a contrary assertion and lies are seen through; weight of evidence in nats (Good 1950; Jaynes 2003); >= the meta commit threshold so one clear witnessing attributes a belief"
status = "set"
value = "5"
set_by = "Nathan M. Fraske"
set_date = "2026-06-30"
unit = "log_odds"
source = "Part 37 theory of mind; record 62.11; audit section 1m"

[[reserved]]
id = "tom.access_weight.told"
basis = "the weight that a target was told a value, trust- and hop-scaled; below witnessed; set to the meta commit threshold so one clear telling attributes a belief"
status = "set"
value = "4"
set_by = "Nathan M. Fraske"
set_date = "2026-06-30"
unit = "log_odds"
source = "Part 37 theory of mind; record 62.11; audit section 1m"

[[reserved]]
id = "tom.access_weight.said"
basis = "the weight of a target's own utterance, the channel deception attacks, lie-discounted; below witnessed and below the meta commit threshold, so a bare assertion alone does not fix a model of another's belief"
status = "set"
value = "3"
set_by = "Nathan M. Fraske"
set_date = "2026-06-30"
unit = "log_odds"
source = "Part 37 theory of mind; record 62.11; audit section 1m"

[[reserved]]
id = "tom.access_weight.reachable"
basis = "the weak weight that an accessible fact gets, with an inaccessible one negative toward unknown or the stale value"
status = "set"
value = "2"
set_by = "Nathan M. Fraske"
set_date = "2026-06-30"
unit = "log_odds"
source = "Part 37 theory of mind; record 62.11; audit section 1m"

[[reserved]]
id = "tom.access_weight.absence"
basis = "the negative weight of seeing a target NOT have access, the engine that keeps a false belief stable in Sally-Anne; magnitude, applied negatively in the mechanism; matched to the witnessed weight so an absence offsets a prior access"
status = "set"
value = "4"
set_by = "Nathan M. Fraske"
set_date = "2026-06-30"
unit = "log_odds"
source = "Part 37 theory of mind; record 62.11; audit section 1m"

[[reserved]]
id = "tom.access_weight.denied"
basis = "the negative weight of having starved a target of an input (meta-concealment); magnitude, applied negatively in the mechanism"
status = "set"
value = "4"
set_by = "Nathan M. Fraske"
set_date = "2026-06-30"
unit = "log_odds"
source = "Part 37 theory of mind; record 62.11; audit section 1m"

[[reserved]]
