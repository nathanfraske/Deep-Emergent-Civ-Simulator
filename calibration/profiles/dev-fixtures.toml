# --- the world-build path (the production dawn->Runner assembly, worldbuild::build_dawn_runner) ---
# These let a development world assemble a whole Runner from a resolved scenario: the field
# calibration derives from the selected medium's k/(rho*c) (FieldCalib::from_resolution), and the
# dawn evidence rings size from expressed memory (RingCapacityLaw::from_manifest). FIXTURE
# placeholders, not owner canon; the reserved fail-loud entries live in calibration/reserved.toml.

[[reserved]]
id = "medium.air"
basis = "FIXTURE placeholder, not the owner's value; the temperate-air medium profile, a require_map bundle of the medium Substance axes. Density, respirable content, toxicity, and in-medium exchange follow the reserved.toml recommended set; the thermal axes (conductivity 0.0262 W/m/K, specific_heat 1005 J/kg/K, density 1.2 kg/m^3) are Incropera and DeWitt dry air near 300 K, so field.diffusion derives from a real k/(rho*c) rather than a fabricated scalar"
