# ============================================================================
# DEVELOPMENT FIXTURES, NOT THE OWNER'S CALIBRATION. DO NOT TREAT AS DECIDED.
# ============================================================================
#
# These are placeholder numbers that exist only so the engine can RUN in
# development and tests before the real calibrations are set. They are NOT the
# owner's values and carry no authority. The authoritative manifest is
# calibration/reserved.toml, where every one of these is status = "reserved" and
# fails loud until Nathan M. Fraske sets it through the reserved-values review.
#
# A production run uses Profile::Calibrated against reserved.toml and refuses to
# start while anything it needs is reserved. A development run may load this file
# under Profile::Development to exercise the mechanisms end to end. When a value
# here matters to behaviour, it is the signal to take that reserved item to the
# owner, not to keep the fixture. Nothing in this file graduates a reserved value;
# the two files are kept deliberately separate so a fixture is never mistaken for
# a decision.
#
# Phase 1 needs only the cognition calibrations (the evidence engine and theory of
# mind). More fixtures are added here as later phases reach the numbers they need.

