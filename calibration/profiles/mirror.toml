unit = "saturation_index"
source = "Clausius-Clapeyron saturation vapour pressures e_s(288 K)=1.70 kPa, e_s(315 K)=8.50 kPa (L=2.5e6 J/kg, Rv=461.5 J/(kg*K)); crates/sim/src/environ.rs"
