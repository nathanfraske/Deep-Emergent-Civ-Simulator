[[reserved]]
id = "hydrology.saturation_e_ref"
basis = "MIRROR Earth calibration (Clausius-Clapeyron, in moisture-index units): the saturation index e_s_index at the reference temperature 288 K, i.e. e_s(288 K)/e_s(T_source) where T_source is the world's warm vapour source (the equatorial day-side, ~315 K where moisture=1 means saturated warm air). By Clausius-Clapeyron e_s(288 K)=1.70 kPa and e_s(315 K)=8.50 kPa, so e_ref = 1.70/8.50 = 0.20. This lands e_s in the same [0,1] band the [0,1] worldgen moisture (mean 0.43) sits in, so cool and mid cells cross saturation and rain while hot cells evaporate, a balanced cycle. The moisture-index-to-vapour-pressure interpretation (moisture=1 = saturation at the warm source) is a stated modeling choice surfaced for the owner, not a derived constant; the e_ref VALUE derives from Clausius-Clapeyron once that reference is fixed"
status = "set"
