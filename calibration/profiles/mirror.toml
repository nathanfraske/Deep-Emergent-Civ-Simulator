# --- MIRROR tissue energy densities (biology floor bio.energy_density, in kJ/g): the real Atwater gross
# energy densities of the three energy-bearing organ tissues, read by the Mirror organ registry
# (run_world.rs mirror_organs) to replace the abstract dev-fixture placeholder fractions (fat-body 1.0,
# glycogen-store 0.75, generalist-viscera 0.5) that were never on a real kJ/g scale. Only the Mirror/living
# path reads these; the four canonical pins use the hardcoded dev_default registry, so they are untouched.
# The Atwater general factor system: fat 9 kcal/g, carbohydrate 4 kcal/g, protein 4 kcal/g, at 4.184 kJ/kcal.
# Water-store (0) and muscle (no energy tissue) are unchanged; mana-sac is fantasy and absent from Mirror. ---

[[reserved]]
id = "biology.tissue_energy_density.adipose"
basis = "MIRROR Earth calibration: the gross energy density of adipose (fat-body) tissue, the being's dense energy store. 9 kcal/g * 4.184 kJ/kcal = 37.7 kJ/g, rounded to 37"
status = "set"
value = "37"
unit = "kilojoule_per_gram"
source = "Atwater general factor system, fat 9 kcal/g (Merrill & Watt 1955/1973, USDA Agriculture Handbook No. 74, 'Energy Value of Foods'); crates/sim/src/anatomy.rs fat-body organ bio.energy_density"
category = "per_world"

[[reserved]]
id = "biology.tissue_energy_density.glycogen"
basis = "MIRROR Earth calibration: the gross energy density of glycogen/carbohydrate (glycogen-store) tissue. 4 kcal/g * 4.184 kJ/kcal = 16.7 kJ/g, rounded to 17. The real carbohydrate-to-fat ratio 17/37 = 0.46, not the placeholder 0.75"
status = "set"
value = "17"
unit = "kilojoule_per_gram"
source = "Atwater general factor system, carbohydrate 4 kcal/g (Merrill & Watt 1955/1973, USDA Agriculture Handbook No. 74); crates/sim/src/anatomy.rs glycogen-store organ bio.energy_density"
category = "per_world"

[[reserved]]
id = "biology.tissue_energy_density.lean"
basis = "MIRROR Earth calibration: the gross energy density of lean (generalist-viscera) tissue, mostly protein and water. Protein 4 kcal/g * 4.184 = 16.7 kJ/g on a dry basis, diluted by a lean organ's ~75 percent water fraction to about 4 kJ/g whole-tissue"
status = "set"
value = "4"
unit = "kilojoule_per_gram"
source = "Atwater protein 4 kcal/g (Merrill & Watt 1955/1973, USDA Agriculture Handbook No. 74) diluted by USDA lean-tissue composition water fraction; crates/sim/src/anatomy.rs generalist-viscera organ bio.energy_density"
category = "per_world"
