[[reserved]]
id = "hydrology.saturation_slope"
basis = "MIRROR Earth calibration (Clausius-Clapeyron tangent at 288 K, in moisture-index units): the affine slope d(e_s_index)/dT of the saturation curve at the reference temperature, so the Kelvin field's cold cells drop below the advected ambient vapour and rain. The saturation index e_s_index(T) = e_s(T)/e_s(T_source) is the local saturation vapour pressure as a fraction of the world's warm vapour-source saturation (the equatorial day-side, ~315 K), the same dimensionless scale the [0,1] worldgen moisture is read on. Its fractional slope is the Clausius-Clapeyron sensitivity beta = L/(Rv*T^2) times e_ref: at 288 K, beta = 2.5e6/(461.5*288^2) = 0.0653 per K, times e_ref 0.20 gives 0.0131 per K"
status = "set"
value = "0.0131"
unit = "index_per_kelvin"
source = "Clausius-Clapeyron relation, latent heat of vaporization L=2.5e6 J/kg, water vapour gas constant Rv=461.5 J/(kg*K) (standard thermodynamic constants); crates/sim/src/environ.rs, crates/physics/src/laws.rs saturation_vapor_pressure"
category = "per_world"

