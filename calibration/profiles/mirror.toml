status = "set"
value = "0.0000004"
unit = "kg_water_per_joule"
source = "latent heat of vaporization of water L_vap ~2.43e6 J/kg at ~30 C (standard steam tables / CRC Handbook); 1/L_vap = 4.1e-7 kg/J; crates/sim/src/physiology.rs derive_water_loss. Respiratory insensible-loss cross-check ~0.9 kg/day at ~90 W BMR (human physiology) ~1.2e-7 kg/J"
