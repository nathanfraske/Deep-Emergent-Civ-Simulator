grade = "theory"
anchor = "eq. (11) the creep law eps_dot_i = A_i sigma^n_i d^-m_i exp(-(E_i + P V_i)/(R T)), which is the engine's own admitted Hirth & Kohlstedt form; Table 1 (printed page 21) the dry-olivine parameters after Hirth & Kohlstedt 2003, dislocation E = 530 kJ/mol, V = 17e-6 m^3/mol, n = 3.5, m = 0 and diffusion E = 375 kJ/mol, V = 8.2e-6 m^3/mol, n = 1, m = 3, with delta_T = 2000 K, D = 1700 km, g = 3.7 m/s^2, rho = 3500 kg/m^3, T_0 = 250 K; eq. (21) the effective viscosity, whose Arrhenius term is divided by the stress exponent, exp(-(E_i + z V_i) / (n_i (T + T_0))); eq. (28) Nu = alpha theta^gamma Ra_i^beta; eq. (29) (printed page 23, read by text extraction AND by a 300 dpi render) theta = |delta_T d(ln eta)/dT| = delta_T (E + P_i V) / (R T_i^2) - P_i V / (R T_i), with P_i the pressure at the base of the top thermal boundary layer and T_i the internal mantle temperature; eq. (34) Nu = 0.278 theta^-0.4 Ra_i^0.203, maximal deviation 6.7 per cent and standard deviation 0.093; eq. (35) Nu = 0.219 theta^-0.581 Ra_har^0.262, maximal deviation 4.2 per cent and standard deviation 0.06; eq. (36) Nu = 0.370 L^-0.666 Ra_har^0.071, the lid-thickness form; section 4.5.2 the dislocation worked example Ra_har,dis = 2.89e6 and theta_dis = 12.73 giving Nu_predicted = 2.499 against a measured 2.507; section 4.5.1 the reported theta ranges, 24.2 to 27.6 for the diffusion-creep runs, 6.89 to 11.07 for the reduced-activation-enthalpy runs, 11.4 to 12.8 for the dislocation runs."
scope = "2-D Cartesian box of aspect ratio one, free-slip, reflective side walls, isothermal top and bottom so the models are BOTTOM-HEATED with no internal heating, 200 x 200 uniform grid, Mars-like parameters. eqs. (34) and (35) are fitted over the DIFFUSION-CREEP and reduced-activation-enthalpy runs in the one-convection-cell regime, so they are NEWTONIAN fits, and the source states its own limit: 'since the scaling parameters are predicted as functions of the lid shape (flat versus steep) and dislocation creep is different in this respect from the simulations used to derive eqs (34)-(35), care should be taken upon using these relations for dislocation creep'. The source also states that the fit 'is only valid for the specific parameters given in Table 1'."
extract = "The two fitted conventions, verbatim: eq. (34) 'Nu = 0.278 theta^-0.4 Ra_i^0.203' with 'The maximal deviation of the calculated Nusselt numbers compared to the measured ones is 6.7 per cent where the standard deviation is 0.093', and eq. (35) 'Nu = 0.219 theta^-0.581 Ra_har^0.262' with a maximal deviation of 4.2 per cent and a standard deviation of 0.06. The theta definition, eq. (29) verbatim (read by text extraction and confirmed against a 300 dpi render of printed page 23): 'theta = |delta_T d(ln eta)/dT| = delta_T (E + P_i V) / (R T_i^2) - P_i V / (R T_i), where P_i is the pressure at the base of the top thermal boundary layer and T_i the internal mantle temperature'. Table 1 (printed page 21) cells, verbatim: 'Activation energy (dislocation) E2 530 kJ mol-1', 'Activation volume (dislocation) V2 17 x 10-6 m3 mol-1', 'Stress exponent (dislocation) n2 3.5', 'Activation energy (diffusion) E1 375 kJ mol-1', 'Activation volume (diffusion) V1 8.2 x 10-6 m3 mol-1', 'Stress exponent (diffusion) n1 1.0', 'Mantle thickness D 1700 km', 'Gravitational acceleration g 3.7 m s-2', 'Temperature drop across the mantle delta_T 2000 K', 'Surface temperature T0 250 K', 'Reference density rho 3.5 x 10^3 kg m-3'. The worked example, section 4.5.2 verbatim: 'the effective Rayleigh is Rahar,dis = 2.89 x 10^6 and the generalized Frank-Kamenetskii parameter is theta_dis = 12.73. Using the above values for example into eq. (35) yields Nu_dis,predicted = 2.499, which compares well with the value of 2.507 obtained from the numerical dislocation creep simulation.' The reported theta ranges, section 4.5.1 and 4.5.2 verbatim: 'varies only slightly between theta = 24.2 and theta = 27.6 for the diffusion creep simulations ... and between theta = 6.89 and theta = 11.07 for the models with reduced activation enthalpy', and 'We calculated the Frank-Kamentskii parameter based on the activation parameters of dislocation creep ... We found theta to be in the range of 11.4-12.8.' The prior-consensus exponents this study departs from, verbatim: 'both the above studies predicted beta to be 1/5 ... Both theory and numerical models have so far predicted a value for gamma of -1, while we found a considerably smaller gamma = -0.4, which is likely due to the fact that, in contrast to previous studies, we also took into account the pressure dependence of the viscosity.'"
