# Held-source manifest for the convection-scaling cited column (../convection_scaling.toml). The vendored-primary
# idiom: file / receipt / anchors. The load-bearing constants (the boundary-layer prefactor and the critical
# Rayleigh numbers) are theory values whose true primaries are books and journal papers with no byte-identical
# data table (Chandrasekhar 1961; Rayleigh 1916; Turcotte & Oxburgh 1967), so this follows the Lodders
# TRANSCRIPTION idiom: cite the primary, hold downloadable WITNESS bytes that reproduce each value, record the
# sha256 receipt of those bytes. ARCHIVE-THEN-SLIM (owner ruling 2026-07-18): the witness bytes are NOT held in
# the repo (9.7 MB does not belong here); each carries a live Internet Archive snapshot (archived_url) and a
# receipt, with the bytes in the local store. scripts/convection_scaling_provenance_test.py re-checks the receipts,
# the archive coverage, and the pre-registered fingerprints offline. SHA256 is the receipt (VENDORING_CHECKLIST.md, primary since
# 2026-07-17). Each source below carries the anchor (page / section / equation) for every value read from it.
#
# BLOCK KIND [[source]], a receipt-and-archive vendored artifact (the Lodders transcription idiom), NOT a reserved
# floor kind: these witnesses do not participate in the floor real/fantasy authorship axis.

