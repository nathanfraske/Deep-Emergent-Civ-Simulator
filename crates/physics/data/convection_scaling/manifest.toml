anchor = "Nusselt prefactor C1 of order 0.1 and boundary-layer thickness prefactor C2 ~ 2-3 (delta_l = d C2 Ra_eff^(-1/3)), citing Turcotte & Schubert 2002 and Solomatov 1995; supports nu_ra_bare_coefficient_C band. ALSO section 4.1, re-read 2026-07-19 for the stagnant-lid rows: the rheological temperature scale delta_T_rh = delta_T a_rh / theta after Solomatov 1995, with a_rh ~ 2 attributed to Solomatov & Moresi 2000 and Korenaga 2009; the lid thickness delta_l = d C3 (theta / a_rh)^(4/3) Ra_eff^(-1/3) (eq. 27), which is the (theta^-4/3, Ra^1/3) structure the nu_stag_time_dependent_C1 row carries; and the source's own statement of the disagreement, that steady-state boundary-layer theory gives delta_l ~ theta Ra_eff^(1/5) (Morris & Canright 1984; Reese et al. 1998) while eq. 27 is the correct scaling for time-dependent convection (Solomatov & Moresi 2000; Korenaga 2009). Its C3 = 4.24 and a_rh = 1.3 are fitted to ITS grain-damage models, so no coefficient is read from it into a stagnant-lid row; it witnesses the STRUCTURE and the disagreement, not a number."

