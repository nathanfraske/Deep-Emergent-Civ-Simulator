grade = "theory"
anchor = "eq. (5) the Frank-Kamenetskii viscosity mu = exp(theta (1 - T)); eq. (6) theta = E_v delta_T / (R (T_s + delta_T)^2); eq. (8) the one-parameter family Nu = C* theta^-(1+beta) Ra_i^beta; eq. (9) Nu = C2 theta^(-6/5) Ra_i^(1/5) for STEADY convection; eq. (10) Nu = C1 theta^(-4/3) Ra_i^(1/3) for TIME-DEPENDENT convection; section 4.2 'we find C1 = 0.48 and C2 = 2.95, nearly identical to the scaling laws from Dumoulin et al. (1999)', restated in the Table 2 variable list as 'C1 = 0.48' against eq. (10) and 'C2 = 2.95' against eq. (9) and drawn on the Figure 10 fit lines as 0.48 Ra_i^(1/3) theta^(-4/3) and 2.95 Ra_i^(1/5) theta^(-6/5), a three-channel read; eq. (11) Nu = max(eq. 9, eq. 10), with the transition at their crossing; section 5 'C1 is nearly unchanged: we find C1 ~ 0.48 for our bottom heated models, while Solomatov & Moresi (2000) and Korenaga (2009) find C1 ~ 0.5 - 0.55 for their purely internally heated models', which is the band's high edge and is a REPORT inside this witness rather than a reading at those primaries; section 5 the internally heated conventions Ra_i = rho g alpha (T_i - T_s) d^3 / (kappa mu(T_i)) and theta = E_v (T_i - T_s) / (R T_i^2)."
scope = "2-D Cartesian, free-slip top and bottom, periodic sides, temperature fixed at the top and bottom so the models are BOTTOM-HEATED with no internal heating. Frank-Kamenetskii LINEARIZED viscosity (eq. 5), so temperature-dependent, NEWTONIAN, and with NO activation volume and NO pressure dependence. theta was sampled at two values only, 13.82 and 16.12 (viscosity contrasts 1e6 and 1e7), over reference Rayleigh numbers 1e6 to 1e8."
extract = "Section 4.2, verbatim: 'We fit our numerical models where a steady-state convection pattern develops to Eq. (9), and our models where convection is time-dependent to Eq. (10). From this, we find C1 = 0.48 and C2 = 2.95, nearly identical to the scaling laws from Dumoulin et al. (1999).' The two equations those coefficients belong to, verbatim: eq. (9) 'Nu = C2 theta^(-6/5) Ra_i^(1/5)' and eq. (10) 'Nu = C1 theta^(-4/3) Ra_i^(1/3)', both instances of eq. (8) 'Nu = C* theta^-(1+beta) Ra_i^beta' where 'C* is a constant found empirically, beta is the Nu-Ra scaling law exponent, Ra_i = Ra_0 / mu_i is the internal Rayleigh number, and mu_i is the average mantle interior viscosity, just beneath the stagnant lid'. The band's high edge, verbatim from section 5: 'Even the constant C1 is nearly unchanged: we find C1 ~ 0.48 for our bottom heated models, while Solomatov & Moresi (2000) and Korenaga (2009) find C1 ~ 0.5 - 0.55 for their purely internally heated models.' The internally heated definitions, verbatim from the same section: 'The internal Rayleigh number, Ra_i, is therefore defined as rho g alpha (T_i - T_s) d^3 / (kappa mu(T_i)), and theta = E_v (T_i - T_s) / (R T_i^2).'"

