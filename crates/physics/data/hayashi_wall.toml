# The Hayashi-wall effective temperature grid: the top-of-the-track T_eff a pre-main-sequence star sits at as a
# function of its mass, the anchor the pre-MS luminosity and convective-turnover reads rest on.
#
# BLOCK KIND: [[wall]], the cited-data-COLUMN idiom (matching the optical-constants [[species]] and the ionic-radii
# [[radius]] columns), NOT a reserved floor kind: an immutable transcription of the cited values from the vendored
# BHAC15 source, out of the floor real/fantasy authorship axis. WITNESS: the held source bytes at
# bhac15/BHAC15_tracks+structure (sha256 in bhac15/manifest.toml); scripts/bhac15_provenance_test.py re-derives
# THIS grid from those bytes offline, so a drifted transcription fails the build.
#
# CITATION: Baraffe, Homeier, Allard, Chabrier 2015 (BHAC15), A&A 577 A42, DOI 10.1051/0004-6361/201425481.
# GRADE: theory (stellar-evolution model tracks), solar composition [M/H]=0; the Siess-class metallicity
# conditioning is a scoped follow-on. Source sha256: b95474c5d4284373a2fed3f06d969a44bcd925ac0e5b226cc0235acb7e068d2a
#
# EPOCH CONVENTION (the chord): wall_teff_k is the Teff at the EARLIEST tabulated age (the top of the Hayashi track,
# ~0.49 Myr), and the drift band [drift_lo_k, drift_hi_k] is the min and max Teff over the first 2 Myr of the
# descent, so a consumer reads the wall with the age uncertainty it actually carries, never a bare number.
# DOMAIN: 0.010 to 1.400 Msun (the table's own range); a read outside it refuses BY NAME, the high side pointing at
# the planned radiative-branch dispatch. The grid is monotonic in mass, so a read interpolates in the table's own
# spacing (never snaps to the nearest mass row).

source = "Baraffe, Homeier, Allard, Chabrier 2015 (BHAC15), A&A 577 A42, DOI 10.1051/0004-6361/201425481"
grade = "theory"
composition = "solar [M/H]=0"
epoch = "top of the Hayashi track, earliest tabulated age ~0.49 Myr; drift band over the first 2 Myr"

