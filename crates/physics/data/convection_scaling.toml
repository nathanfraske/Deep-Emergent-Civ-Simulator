# Parameterized mantle-convection surface heat-flow scaling constants: the prefactor and critical Rayleigh
# numbers for the boundary-layer Nusselt-Rayleigh law Nu = a * (Ra / Ra_crit)^beta, the isoviscous /
# infinite-Prandtl regime. These set how vigorously a convecting mantle carries heat to the surface once the
# Rayleigh number is known.
#
# BLOCK KIND [[constant]], the cited-data-COLUMN idiom (matching the optical-constants [[species]], the ionic
# radii [[radius]], and the condensation [[condensation]] columns), NOT a reserved floor kind ([[element]] /
# [[axis]] / [[substance]]): an immutable transcription of cited theoretical values, out of the floor
# real/fantasy authorship axis and out of floor-Element policing (the floor-provenance gate keys only on
# axis/substance/element). PROVENANCE: header citation. GRADE: theory. Two of these are derived hydrodynamic
# stability eigenvalues (the critical Rayleigh numbers) and two are boundary-layer-theory coefficients; none is
# a lab measurement, so the grade is "theory" throughout (the BHAC15 / Landin idiom for model-derived anchors).
#
# WITNESSES (held bytes, sha256 in convection_scaling/manifest.toml): scripts/convection_scaling_provenance_test.py
# re-checks every receipt offline, recomputes the two closed-form eigenvalues, and asserts the pre-registered
# fingerprints against this column, so a drifted source or a drifted transcription fails the build.
#
# THE SCALING FORM (the chord every value is scoped to): Nu = a * (Ra / Ra_crit)^beta, where Nu is the surface
# heat flux normalized by the flux pure conduction would carry, Ra is the layer Rayleigh number, and Ra_crit is
# the onset eigenvalue for the layer's boundary conditions. beta = 1/3 is the boundary-layer-theory exponent for
# an isoviscous, infinite-Prandtl fluid (Turcotte & Oxburgh 1967); numerical and laboratory fits return a
# slightly shallower beta ~= 0.30 (Schubert 1979; Christensen 1984; Jarvis 1997 measured a spherical-shell
# gradient of 0.24). A consumer that wants the un-normalized law Nu = C * Ra^beta converts by C = a * Ra_crit^beta.
#
# THE PREFACTOR a IS CONVENTION-DEPENDENT, O(1), NOT a single universal number, and this is the honest seam.
# In the single-boundary-layer (peel-away) form the whole temperature drop delta-T sits across one conducting
# lid: the lid thickens until its local Rayleigh number reaches Ra_crit, giving delta = D (Ra_crit/Ra)^(1/3) and
# Nu = D/delta = (Ra/Ra_crit)^(1/3), so a = 1 exactly (Stevenson, Spohn & Schubert 1983; McGovern & Schubert
# 1989; Schubert, Turcotte & Olson 2001; Komacek & Abbot 2016 eqs 5-7; Vazan et al. 2018 eq 5). In the symmetric
# two-boundary-layer form (a fluid heated below and cooled above, each layer spanning delta-T/2) the same
# criterion gives Nu = 2^(-4/3) (Ra/Ra_crit)^(1/3), so a = 2^(-4/3) = 0.397. The value field carries the
# single-boundary-layer a = 1.0 (the standard planetary parameterized-convection choice, and the one the held
# Komacek & Abbot and Vazan witnesses use); band_lo = 0.397 to band_hi = 1.0 spans the two conventions. Which
# point applies is set by the engine's heating mode (basal / single-lid -> 1.0; internal / symmetric -> ~0.40),
# a modeling choice surfaced here rather than buried. Do NOT confuse a with the bare-form coefficient C below:
# Turcotte & Oxburgh's 0.294 multiplies Ra^(1/3) directly, and maps to a normalized a of ~2.6 to ~3.5, so it is
# a different quantity in a different normalization, kept as its own row.
#
# THE CRITICAL RAYLEIGH NUMBERS are the marginal-stability eigenvalues for a plane Boussinesq layer, conditioned
# on the mechanical boundary condition. Free-free is the analytic Rayleigh (1916) result 27*pi^4/4; rigid-rigid
# and rigid-free are the transcendental eigenvalues tabulated by Chandrasekhar (1961) (the rigorous rigid-rigid
# solution is Pellew & Southwell 1940). They are Prandtl-number-independent. HONEST LIMIT: these are the
# Cartesian plane-layer values; spherical-shell geometry and internal heating shift Ra_crit (Schubert, Turcotte
# & Olson 2001), and a consumer keying a planetary mantle off a free surface over a ~rigid base uses the
# rigid-free 1100.65 row, which is why it is carried alongside the two the task named.
#
# FINGERPRINTS (owner spot-check, re-asserted in the provenance test): a = 1.0 (band 0.397 to 1.0);
# C = 0.294; Ra_crit free-free = 657.511 (= 27*pi^4/4), k = 2.2214 (= pi/sqrt(2)); Ra_crit rigid-rigid = 1707.762,
# k = 3.117; Ra_crit rigid-free = 1100.65, k = 2.682; beta = 1/3 (theory), beta_fit = 0.30.

scaling_form = "Nu = a * (Ra / Ra_crit)^beta"
grade = "theory"
regime = "isoviscous, infinite-Prandtl-number boundary-layer convection"

# The boundary-layer heat-transport prefactor in the NORMALIZED form Nu = a (Ra/Ra_crit)^beta. Value is the
# single-boundary-layer (peel-away) coefficient; the band spans to the symmetric two-boundary-layer coefficient.
[[constant]]
name = "nu_ra_prefactor_a"
symbol = "a"
value = "1.0"
band_lo = "0.397"
band_hi = "1.0"
beta = "0.333333333333"
beta_fit = "0.30"
scaling_form = "Nu = a * (Ra / Ra_crit)^beta"
regime = "isoviscous, infinite-Prandtl, marginal-stability boundary layer"
convention = "value 1.0 = single-boundary-layer form Nu=(Ra/Ra_crit)^(1/3) (full delta-T across one lid); band_lo 0.397 = 2^(-4/3), the symmetric two-boundary-layer form (each layer spans delta-T/2)"
citation = "Single-boundary-layer a=1: Stevenson, Spohn & Schubert 1983, Icarus 54, 466-489, eq. for delta; McGovern & Schubert 1989, Earth Planet. Sci. Lett. 96, 27-37; Schubert, Turcotte & Olson 2001, Mantle Convection in the Earth and Planets, Cambridge Univ. Press, ch. 13; Komacek & Abbot 2016, ApJ 832, 54, eqs. 3-7 (held witness); Vazan, Ormel, Noack & Dominik 2018, ApJ 869, 163, eq. 5. Symmetric two-boundary-layer a=2^(-4/3): Howard 1966; Turcotte & Oxburgh 1967, J. Fluid Mech. 28, 29-42; Schubert, Turcotte & Olson 2001 boundary-layer analysis."

# The boundary-layer heat-transport coefficient in the UN-NORMALIZED form Nu = C * Ra^beta. Separate row, a
# different normalization from a above (relates by a = C * Ra_crit^beta). Do not read this into the a slot.
[[constant]]
name = "nu_ra_bare_coefficient_C"
symbol = "C"
value = "0.294"
band_lo = "0.1"
band_hi = "0.294"
beta = "0.333333333333"
scaling_form = "Nu = C * Ra^beta"
regime = "isoviscous, infinite-Prandtl, bottom-heated cellular convection"
citation = "Turcotte & Oxburgh 1967, J. Fluid Mech. 28, 29-42 (theoretical isoviscous infinite-Prandtl coefficient C=0.294, beta=1/3); order-of-magnitude C~0.1 in Turcotte & Schubert 2002, Geodynamics, 2nd ed., and Solomatov 1995, Phys. Fluids 7, 266."

# Critical Rayleigh number, both boundaries stress-free (free-free). Analytic eigenvalue, exact.
[[constant]]
name = "ra_crit_free_free"
symbol = "Ra_crit"
boundary_condition = "free-free (both boundaries stress-free / free-slip)"
value = "657.511"
closed_form = "27*pi^4/4"
critical_wavenumber = "2.2214"
wavenumber_closed_form = "pi/sqrt(2)"
citation = "Rayleigh, Lord (1916), Phil. Mag. 32, 529-546 (analytic 27*pi^4/4, k=pi/sqrt(2)); reproduced Chandrasekhar 1961, Hydrodynamic and Hydromagnetic Stability, Oxford, Chapter II (thermal instability of a layer heated from below). Held witness: Ricard geodynamics notes (27/4 pi^4 ~ 657, k=pi/sqrt(2))."

# Critical Rayleigh number, both boundaries rigid (no-slip). Transcendental eigenvalue.
[[constant]]
name = "ra_crit_rigid_rigid"
symbol = "Ra_crit"
boundary_condition = "rigid-rigid (both boundaries no-slip)"
value = "1707.762"
critical_wavenumber = "3.117"
citation = "Pellew & Southwell 1940, Proc. R. Soc. A 176, 312-343 (rigorous solution); tabulated Chandrasekhar 1961, Hydrodynamic and Hydromagnetic Stability, Oxford, Chapter II. Held witness: Bodenschatz, Pesch & Ahlers 2000, Annu. Rev. Fluid Mech. 32, 709-778 (Rc=1708, ac=3.117, citing Chandrasekhar 1961)."

# Critical Rayleigh number, one boundary rigid one free (rigid-free). The physically relevant case for a
# planetary mantle: a free upper surface over a ~rigid base. Carried alongside the two named cases because the
# single-boundary-layer prefactor examples (Komacek & Abbot; Vazan et al.) key their Ra_crit near this value.
[[constant]]
name = "ra_crit_rigid_free"
symbol = "Ra_crit"
boundary_condition = "rigid-free (one no-slip, one stress-free)"
value = "1100.65"
critical_wavenumber = "2.682"
citation = "Chandrasekhar 1961, Hydrodynamic and Hydromagnetic Stability, Oxford, Chapter II (the rigid-free case; Ra=1100.65, a=2.682); high-precision recomputation Glomski & Johnson 2012, Appl. Math. Sci. 6, 5097-5108 (Rc=1100.6496068877..., kc=2.6823217577...). Held witness: the Glomski & Johnson PDF."
