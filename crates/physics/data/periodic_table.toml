# The basal periodic-table floor: the per-element standard atomic weights, the primitive that lets any
# molecule's molar mass be DERIVED from its formula (crates/physics/src/periodic.rs) rather than a per-
# substance molar mass being authored. It is a NEW floor datum, sibling to the chemistry and optics floor,
# read by the molar-mass kernel; no consumer is wired to it yet (a pure addition, byte-neutral).
#
# THE THREE-WAY TEST CLASSIFICATION (AGENTIC_ADDENDUM section 9). A standard atomic weight is NOT a
# universal fundamental constant. It is the ISOTOPE-ABUNDANCE-WEIGHTED AVERAGE of the masses of an
# element's isotopes, and that abundance mix is a property of a PARTICULAR WORLD's material history
# (Earth's, here). So an atomic weight is PER-WORLD DATA, Mirror-calibrated to Earth's terrestrial isotope
# mix. Two things live below it and are more nearly universal: the individual isotope masses (nuclear
# physics: proton and neutron count, binding energy) and the molar mass constant that carries the g/mol
# unit (fundamentals: the atomic mass constant and the Avogadro constant N_A). Those are the deeper layer;
# what a chemist measures and tabulates for THIS planet, and what this file carries, is the abundance-
# averaged Ar. An alien world whose ores formed under a different stellar-nucleosynthesis and radiogenic
# history has a different isotope mix, hence a different atomic-weight row: the alien is a DATA ROW here,
# not a rewrite (admit-the-alien). A world may override any row with its own calibrated mix.
#
# THE INTERVAL ELEMENTS. For fourteen elements, terrestrial isotopic composition varies enough between
# natural materials (ocean vs. groundwater hydrogen, marine vs. plant carbon, and so on) that CIAAW
# publishes an INTERVAL [a, b] rather than a single figure, and a single "conventional" value for use when
# the material's provenance is unknown. Those rows carry both the conventional value (the stored weight)
# and the interval bounds (interval_lo / interval_hi), so a world that models isotope-fractionating
# processes has the terrestrial variation window on hand. The interval elements are H, Li, B, C, N, O, Mg,
# Si, S, Cl, Ar, Br, Tl, and Pb. Every other element has a single characteristic terrestrial composition,
# so one value with a measurement uncertainty (not modelled here) suffices.
#
# THE RADIOACTIVE-ONLY ELEMENTS. Eight elements in this range (Tc, Pm, Po, At, Rn, Fr, Ra, Ac) have no
# stable isotope and no characteristic terrestrial isotopic composition, so CIAAW assigns them NO standard
# atomic weight. Their stored value is the relative atomic mass of the longest-lived or reference isotope
# (a single-isotope mass, the bracketed convention), flagged has_standard_weight = false so a consumer can
# tell an abundance-average from a reference mass. Molar mass derived through such a row is the molar mass
# of that isotope, correct as a mass but not a per-world abundance average.
#
# VALUES: CIAAW / IUPAC Standard Atomic Weights 2021 (the abridged conventional values, four to five
# significant figures), the recommended terrestrial standard. Stored as decimal strings parsed to fixed-
# point by integer arithmetic, the same discipline as every other floor file (no floating point reaches
# canonical state). Every row is real-with-source; the source is CIAAW 2021 unless a row's note says
# otherwise.
#
# DERIVATION: molar mass M of a molecule with formula {element: count} is sum(count * Ar) times the molar
# mass constant M_u. M_u = 1 g/mol to within its CODATA uncertainty (M_u = 0.99999999965 g/mol, CODATA
# 2018, itself derived from N_A and the atomic mass constant, not authored), so M in g/mol is numerically
# the Ar-weighted sum. The kernel is fixed Rust (crates/physics/src/periodic.rs); the membership below is
# data and grows with the world (a heavier element, or an alien isotope mix, is a new or edited row).

# --- The naturally occurring elements, hydrogen (Z=1) through uranium (Z=92) ---

