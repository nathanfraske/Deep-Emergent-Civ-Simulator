# The Shannon (1976) CRYSTAL ionic radii: per (ion, oxidation state, coordination, and spin state where it
# splits) the effective size of the ion in a crystal, in Angstrom. A NEW floor datum, sibling to the periodic
# table and the phase registry, read by the materials substrate's coordination and lattice-energy stages; no
# consumer is wired to it yet (a pure addition, byte-neutral).
#
# THE CONVENTION, MADE EXPLICIT (the derive-observables discipline). An ionic radius is NOT the observable: the
# observable is the cation-anion INTERATOMIC DISTANCE (and the coordination number), and the split of that
# distance into two radii is a CONVENTION. Shannon 1976 published two sets that reproduce the SAME distances:
# CRYSTAL radii (anchored to r(O2-) = 1.26 Angstrom) and EFFECTIVE ionic radii (anchored to r(O2-) = 1.40), the
# two related by a definitional shift of 0.14 Angstrom (crystal cation = effective cation + 0.14, crystal anion
# = effective anion - 0.14). This file carries the CRYSTAL set, and it is a CORRECTNESS choice, not a
# preference: Pauling's radius-ratio window is pure geometry (0.225 is the tetrahedral-hole bound, 0.414 the
# octahedral), convention-free, so the radii must be the convention whose ratios MATCH that geometry. Crystal
# radii do (Si4+/O2- = 0.40/1.26 = 0.317, correctly in the tetrahedral window; the effective ratio 0.26/1.40 =
# 0.186 wrongly falls below it). The `convention` and its `anchor_radius` are stored below so the
# representation-dependence is explicit and a consumer reading a ratio against the wrong window is a detectable
# mismatch, not a silent one.
#
# THE THREE-WAY / SEVEN-TAG CLASSIFICATION. A crystal radius is MEASURED [M]: Shannon derived it from a
# least-squares analysis of over a thousand observed interatomic distances in real crystal structures, and a
# laboratory refutes it by diffraction without running the sim. The radius RATIO computed from these radii is a
# derived ESTIMATOR [E] (a representation-dependent geometric pre-filter for coordination), NOT the authority:
# the disposer's free-energy minimization decides coordination, and the ratio only nominates cheaply and
# escalates at the boundary cases the window mis-calls (the resolution ladder). So the radii here are the [M]
# supporting data; the [E] ratio pre-filter is a later slice that reads them.
#
# ADMIT THE ALIEN. Each radius is a per-ion data row keyed by (symbol, oxidation state, coordination, spin), so
# an alien chemistry (a different network-former, a different oxidation state) is a data row, not a rewrite: the
# materials disposer reads whichever ion the composition provides, and the coordination the energy selects.
#
# GROWING REGISTRY. This file starts with the major rock-forming ions (Si, Al, Mg, Fe, Ca, Na, K, O), each
# value cited to Shannon 1976 and verified against the primary source. It grows per the registry pattern: more
# ions, oxidation states, coordinations, and spin states are added as the world needs them, each cited [M].

convention = "crystal"
anchor_symbol = "O"
anchor_oxidation_state = -2
anchor_coordination = 6
anchor_radius = "1.26"
source = "Shannon, R. D. (1976), Revised effective ionic radii, Acta Crystallographica A32, 751-767: crystal radii set, anchored to r(O2-) = 1.26 Angstrom"

# The convention anchor: O2- in 6-coordination, the reference the whole crystal set is built on.
[[radius]]
symbol = "O"
oxidation_state = -2
coordination = 6
crystal_radius = "1.26"
source = "Shannon 1976, Acta Cryst A32, 751 (O2- [6] crystal radius, the convention anchor r(O2-) = 1.26)"

# Silicon, the tetrahedral network-former: Si4+ [4], ratio 0.40/1.26 = 0.317, in the tetrahedral window.
[[radius]]
symbol = "Si"
oxidation_state = 4
coordination = 4
crystal_radius = "0.40"
source = "Shannon 1976, Acta Cryst A32 (Si4+ [4] crystal radius)"

# Aluminium in octahedral coordination: Al3+ [6], ratio 0.675/1.26 = 0.536, in the octahedral window.
[[radius]]
symbol = "Al"
oxidation_state = 3
coordination = 6
crystal_radius = "0.675"
source = "Shannon 1976, Acta Cryst A32 (Al3+ [6] crystal radius)"

# Magnesium, a network modifier: Mg2+ [6], ratio 0.86/1.26 = 0.683, in the octahedral window.
[[radius]]
symbol = "Mg"
oxidation_state = 2
coordination = 6
crystal_radius = "0.86"
source = "Shannon 1976, Acta Cryst A32 (Mg2+ [6] crystal radius)"

# Iron(II), high spin, the common ferrous silicate cation: Fe2+ [6] HS.
[[radius]]
symbol = "Fe"
oxidation_state = 2
coordination = 6
spin = "high"
crystal_radius = "0.92"
source = "Shannon 1976, Acta Cryst A32 (Fe2+ [6] high-spin crystal radius; effective 0.78 + 0.14)"

# Calcium: Ca2+ [6].
[[radius]]
symbol = "Ca"
oxidation_state = 2
coordination = 6
crystal_radius = "1.14"
source = "Shannon 1976, Acta Cryst A32 (Ca2+ [6] crystal radius; effective 1.00 + 0.14)"

# Sodium: Na+ [6].
[[radius]]
symbol = "Na"
oxidation_state = 1
coordination = 6
crystal_radius = "1.16"
source = "Shannon 1976, Acta Cryst A32 (Na+ [6] crystal radius)"

# Potassium: K+ [6].
[[radius]]
symbol = "K"
oxidation_state = 1
coordination = 6
crystal_radius = "1.52"
source = "Shannon 1976, Acta Cryst A32 (K+ [6] crystal radius; effective 1.38 + 0.14)"

# Rubidium: Rb+ [6]. A rock-salt alkali (RbCl is rock-salt), the near-neighbour of K+ in the alkali-chloride
# series: KCl and RbCl are the closest-spaced rock-salt binaries with noble-gas Born cores, the disposer's
# within-ionic-class near-degenerate pair (their lattice energies fall inside the estimator's measured band).
[[radius]]
symbol = "Rb"
oxidation_state = 1
coordination = 6
crystal_radius = "1.66"
source = "Shannon 1976, Acta Cryst A32 (Rb+ [6] crystal radius; effective 1.52 + 0.14)"

# Chloride, the alkali-halide validation anion (NaCl): Cl- [6]. An ANION, so the crystal radius is the effective
# minus 0.14 (the anion side of the matched pair), the mirror of the cation convention.
[[radius]]
symbol = "Cl"
oxidation_state = -1
coordination = 6
crystal_radius = "1.67"
source = "Shannon 1976, Acta Cryst A32 (Cl- [6] crystal radius; effective 1.81 - 0.14)"
