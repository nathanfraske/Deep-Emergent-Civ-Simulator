# The fluids floor (wave 2 of the physics substrate, R-PHYS-W2; design Part 41, Part 58,
# record 62.21). Extends the registry with the fluid.* and therm.temperature
# state axes, and the closed-form fixed-point laws over them (kernels in crates/physics/src/laws.rs).
# The axis ranges below are SET to the owner's confirmed values (2026-07-02), ratified from the cited
# physical bound in each axis's real field; every value a tunable lever revisable on the owner's
# signoff. Ranges are held inside the Q32.32 representable window (epsilon ~2.3e-10 to ceiling
# ~2.1e9).

# --- The temperature state axis, owned by the energy sub-domain, read cross-domain (unification 2.2) ---

[[axis]]
id = "therm.temperature"
measures = "absolute temperature state (the field convection, reactions, and radiant emission read)"
unit = "K"
dimension = "temperature"
scale = "K"
tier = 0
range_lo = "1"
range_hi = "100000"
real = "the K envelope from cryogenic to stellar/forge; grounds the wave-1 conduction and combustion temperature inputs"

# --- Critical-point axes (the measured phase-behaviour primitives the transport-property derivations read) ---
# The critical point (T_c, P_c) and the acentric factor are directly-observed substance constants, not derivable
# without the many-body Hamiltonian, so they are the hunt-cleared irreducible primitives from which the
# Lennard-Jones pair (and hence the Chapman-Enskog diffusivity) DERIVES by corresponding states. Only these are
# authored; an alien gas is a data row carrying its own critical point.

[[axis]]
id = "chem.critical_temperature"
measures = "the critical temperature T_c, the phase-behaviour endpoint above which no liquid-vapour distinction exists (the corresponding-states anchor the LJ well depth derives from)"
unit = "K"
dimension = "temperature"
scale = "K"
tier = 0
range_lo = "1"
range_hi = "100000"
real = "Poling, Prausnitz and O'Connell, The Properties of Gases and Liquids (water 647.1, air pseudo-critical 132.5, helium 5.2)"

[[axis]]
id = "chem.critical_pressure"
measures = "the critical pressure P_c at the critical point (the second corresponding-states anchor, for the LJ collision diameter)"
unit = "MPa"
dimension = "pressure"
scale = "MPa"
tier = 0
range_lo = "0.01"
range_hi = "1000"
real = "Poling, Prausnitz and O'Connell (water 22.06, air 3.77, helium 0.227)"

[[axis]]
id = "chem.acentric_factor"
measures = "Pitzer's acentric factor omega, the deviation of the vapour-pressure curve from the simple-fluid spherical reference (an equation-of-state and polarity input)"
unit = "1"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "-1"
range_hi = "2"
real = "Poling, Prausnitz and O'Connell (water 0.344, air 0.035, argon 0)"

# The volatile-thermodynamics primitives (design VOLATILE_THERMODYNAMICS_DESIGN_ANCHOR). A measured volatile's
# saturation curve derives from these four alone; everything else (delta_cp, the Rankine-Kirchhoff constants, the
# triple-point pressure) is theorem. The two latent heats are per MOLE (the first per-mole axes in the floor;
# mole is a dimensionless count, so the dimension is plain energy, the unit carries the /mol, matching how
# R = N_A*k_B carries J/K). The curve reads L in molar units against the molar R, so the mole cancels.

[[axis]]
id = "chem.boiling_point"
measures = "the normal boiling point T_b, the temperature at which the saturation vapour pressure reaches one standard atmosphere (the in-regime anchor of the Rankine-Kirchhoff saturation curve)"
unit = "K"
dimension = "temperature"
scale = "K"
tier = 0
range_lo = "1"
range_hi = "10000"
real = "NIST Chemistry WebBook / CRC Handbook normal boiling points (water 373.15, ethanol 351.4, ammonia 239.8)"

[[axis]]
id = "chem.vaporization_enthalpy"
measures = "the molar enthalpy of vaporization L_b at the normal boiling point (the boiling-point latent heat, the saturation curve's energy primitive; per mole, mole a dimensionless count)"
unit = "kJ/mol"
dimension = "2,1,-2,0"
scale = "kJ/mol"
tier = 0
range_lo = "1"
range_hi = "1000"
real = "NIST Chemistry WebBook / CRC Handbook enthalpy of vaporization at T_b (water 40.66, ethanol 38.6, ammonia 23.4)"

[[axis]]
id = "chem.fusion_enthalpy"
measures = "the molar enthalpy of fusion L_fus (the solid-liquid enthalpy gap Dulong-Petit discards; adds to L_vap by Hess's law for the sublimation branch; per mole)"
unit = "kJ/mol"
dimension = "2,1,-2,0"
scale = "kJ/mol"
tier = 0
range_lo = "0.1"
range_hi = "1000"
real = "NIST Chemistry WebBook / CRC Handbook enthalpy of fusion (water 6.01, ethanol 4.9, ammonia 5.66)"

[[axis]]
id = "chem.triple_point_temperature"
measures = "the triple-point temperature T_triple, the solid-liquid-gas coexistence temperature (the low-temperature regime boundary between the sublimation and mid-range branches)"
unit = "K"
dimension = "temperature"
scale = "K"
tier = 0
range_lo = "1"
range_hi = "10000"
real = "NIST / CRC triple-point temperatures (water 273.16, exact under the pre-2019 Kelvin definition; CO2 216.6; ammonia 195.4)"

# --- Fluid axes ---

[[axis]]
id = "fluid.dynamic_viscosity"
measures = "shear viscosity mu, the flow-rate and Reynolds lever"
unit = "Pa*s"
dimension = "-1,1,-1,0"
scale = "Pa*s (per-quantity scale reserved, R-UNITS-PIN)"
tier = 0
range_lo = "0.00001"
range_hi = "100"
real = "CRC viscosity tables; White, Viscous Fluid Flow (air 1.8e-5, water 1e-3, blood 3.5e-3, lava ~1e2); the full gas-to-glass envelope spans ~16 orders and reserves a per-quantity scale"

[[axis]]
id = "fluid.surface_tension"
measures = "surface tension gamma of a liquid-gas interface"
unit = "N/m"
dimension = "0,1,-2,0"
scale = "N/m"
tier = 0
range_lo = "0.01"
range_hi = "2.0"
real = "CRC surface-tension tables (ethanol 0.022, water 0.0728, molten iron ~1.8)"

[[axis]]
id = "fluid.bulk_modulus"
measures = "isentropic bulk modulus K (inverse compressibility), and the sound-speed lever"
unit = "MPa"
dimension = "pressure"
scale = "MPa"
tier = 0
range_lo = "0.1"
range_hi = "300000"
real = "CRC; Batchelor (gas ~0.1, water ~2200, dense liquids to ~3e5)"

[[axis]]
id = "fluid.drag_coefficient"
measures = "dimensionless drag shape factor Cd"
unit = "ratio"
dimension = "dimensionless"
scale = "ratio"
tier = 0
range_lo = "0.01"
range_hi = "2.5"
real = "Hoerner; White (streamlined 0.04, sphere 0.47, plate 1.28, parachute 2.0); a lumped shape factor, the steering seam kept as cited per-shape data"

[[axis]]
id = "fluid.lift_coefficient"
measures = "dimensionless lift shape factor CL"
unit = "ratio"
dimension = "dimensionless"
scale = "ratio"
tier = 0
range_lo = "0"
range_hi = "2.5"
real = "Anderson, Fundamentals of Aerodynamics; Abbott and von Doenhoff (flat plate ~0, cambered airfoil ~1.2, near stall ~1.5, high-lift to 2.5)"

[[axis]]
id = "fluid.convective_coefficient"
measures = "convective heat-transfer coefficient h of a surface-fluid-flow triple"
unit = "W/(m^2*K)"
dimension = "0,1,-3,-1"
scale = "W/(m^2*K)"
tier = 0
range_lo = "1"
range_hi = "100000"
real = "Incropera and DeWitt Table 1.1 (free-gas 2-25, forced-liquid 50-20000, boiling to 1e5)"

[[axis]]
id = "fluid.channel_radius"
measures = "internal radius of a flow channel (vessel, capillary, pipe)"
unit = "m"
dimension = "length"
scale = "m (per-quantity scale reserved, R-UNITS-PIN)"
tier = 0
range_lo = "0.000001"
range_hi = "0.1"
real = "Fung, Biomechanics: Circulation; the Poiseuille r^4 across capillary-to-aorta underflows Q32.32, reserving a per-quantity radius scale"

[[axis]]
id = "fluid.immersed_volume"
measures = "volume of fluid displaced by an immersed body (buoyancy)"
unit = "m^3"
dimension = "volume"
scale = "m^3"
tier = 0
range_lo = "0.000001"
range_hi = "100000"
real = "definitional (Archimedes); droplet to large hull"

[[axis]]
id = "fluid.column_height"
measures = "vertical height of a fluid column (hydrostatic, capillary rise)"
unit = "m"
dimension = "length"
scale = "m"
tier = 0
range_lo = "0.001"
range_hi = "11000"
real = "definitional (hydrostatics); a body column ~2 to Challenger Deep ~10935"

[[axis]]
id = "fluid.driving_pressure"
measures = "imposed delta-P driving a flow, or the local absolute pressure the gas law reads"
unit = "MPa"
dimension = "pressure"
scale = "MPa"
tier = 0
range_lo = "0.0001"
range_hi = "100"
real = "Fung; Munson (arterial ~0.016 = 120 mmHg, industrial heads to ~100)"

[[axis]]
id = "fluid.vapor_pressure"
measures = "partial pressure of the vapour phase, the moisture state the water cycle transports"
unit = "MPa"
dimension = "pressure"
scale = "MPa"
tier = 0
range_lo = "0"
range_hi = "0.01"
real = "psychrometric saturation tables (saturation ~7.4 kPa at 40C); a resident moisture state sibling to therm.temperature"

[[axis]]
# The floor identity for the terrain wetness field used by surface hydrology and transport
# (crates/world worldgen `moisture`, previously unmoored fractal noise with no floor axis).
# NOT a reuse of fluid.vapor_pressure above: that is a partial PRESSURE in MPa (the vapour phase the water
# cycle transports), a physically distinct quantity from this DIMENSIONLESS volumetric water-content fraction
# (how wet the ground is). The two coexist as the water cycle's transport state (vapor_pressure) and its
# stored state (moisture_content). range_hi is a physics-FLOOR authored bound (Principle 9), set with basis,
# owner may refine: the saturation volumetric water content of soil.
id = "fluid.moisture_content"
measures = "volumetric water content of the ground, the dimensionless wetness fraction terrain hydrology reads"
unit = "m^3/m^3"
dimension = "0,0,0,0"
scale = "1"
tier = 0
range_lo = "0"
range_hi = "0.5"
real = "Hillel, Environmental Soil Physics: field capacity ~0.3 and saturation ~0.5 volumetric water content for a loam; a bone-dry soil reads 0, a saturated soil ~0.5; a world with a different solvent or no water declares its own wetness axis as data"

# --- Fluid laws (metadata; kernels in laws.rs) ---

[[law]]
id = "law.hydrostatic_pressure"
kernel = "hydrostatic_pressure"
ports = [
  { role = "density", axis = "mat.density" },
  { role = "gravity", axis = "mech.gravitational_acceleration" },
  { role = "height", axis = "fluid.column_height" },
]
output_measure = "hydrostatic pressure"
dimension = "pressure"
interval_bound = "[0, P_MAX]"
tier = 0

[[law]]
id = "law.buoyant_force"
kernel = "buoyant_force"
ports = [
  { role = "density", axis = "mat.density" },
  { role = "gravity", axis = "mech.gravitational_acceleration" },
  { role = "volume", axis = "fluid.immersed_volume" },
]
output_measure = "buoyant force"
dimension = "force"
interval_bound = "[0, F_MAX]"
tier = 0

[[law]]
id = "law.dynamic_pressure"
kernel = "dynamic_pressure"
ports = [
  { role = "density", axis = "mat.density" },
  { role = "velocity", axis = "mech.velocity" },
]
output_measure = "dynamic pressure"
dimension = "pressure"
interval_bound = "[0, P_MAX]"
tier = 0

[[law]]
id = "law.drag_force"
kernel = "drag_force"
ports = [
  { role = "drag_coefficient", axis = "fluid.drag_coefficient" },
  { role = "density", axis = "mat.density" },
  { role = "area", axis = "mech.contact_area" },
  { role = "velocity", axis = "mech.velocity" },
]
output_measure = "drag force"
dimension = "force"
interval_bound = "[0, F_MAX]"
tier = 0

[[law]]
id = "law.aerodynamic_lift"
kernel = "aerodynamic_lift"
ports = [
  { role = "lift_coefficient", axis = "fluid.lift_coefficient" },
  { role = "density", axis = "mat.density" },
  { role = "area", axis = "mech.contact_area" },
  { role = "velocity", axis = "mech.velocity" },
]
output_measure = "lift force"
dimension = "force"
interval_bound = "[0, F_MAX]"
tier = 0

[[law]]
id = "law.reynolds_number"
kernel = "reynolds_number"
ports = [
  { role = "density", axis = "mat.density" },
  { role = "velocity", axis = "mech.velocity" },
  { role = "length", axis = "mech.arm_length" },
  { role = "viscosity", axis = "fluid.dynamic_viscosity" },
]
output_measure = "Reynolds number (a laminar/turbulent regime gate)"
dimension = "dimensionless"
interval_bound = "[0, RE_MAX]"
tier = 0

[[law]]
id = "law.laplace_pressure"
kernel = "laplace_pressure"
ports = [
  { role = "surface_tension", axis = "fluid.surface_tension" },
  { role = "radius", axis = "fluid.channel_radius" },
]
output_measure = "Laplace curvature pressure"
dimension = "pressure"
interval_bound = "[0, P_MAX]"
tier = 0

[[law]]
id = "law.compressibility"
kernel = "compressibility"
ports = [
  { role = "pressure", axis = "fluid.driving_pressure" },
  { role = "bulk_modulus", axis = "fluid.bulk_modulus" },
]
output_measure = "volumetric strain"
dimension = "dimensionless"
interval_bound = "[0, STRAIN_MAX]"
tier = 0

[[law]]
id = "law.convective_flux"
kernel = "convective_flux"
ports = [
  { role = "h", axis = "fluid.convective_coefficient" },
  { role = "area", axis = "mech.contact_area" },
  { role = "hot", axis = "therm.temperature" },
  { role = "cold", axis = "therm.temperature" },
]
output_measure = "convective heat flux (Newton cooling), a power (explicit-rate convention)"
dimension = "2,1,-3,0"
interval_bound = "[0, FLUX_MAX]"
tier = 0

[[law]]
id = "law.poiseuille_flow"
kernel = "poiseuille_flow"
ports = [
  { role = "dp", axis = "fluid.driving_pressure" },
  { role = "radius", axis = "fluid.channel_radius" },
  { role = "viscosity", axis = "fluid.dynamic_viscosity" },
  { role = "length", axis = "mech.arm_length" },
]
output_measure = "laminar volumetric flow rate (volume/time)"
dimension = "3,0,-1,0"
interval_bound = "[0, Q_MAX]"
tier = 0

[[law]]
id = "law.speed_of_sound"
kernel = "speed_of_sound"
ports = [
  { role = "bulk_modulus", axis = "fluid.bulk_modulus" },
  { role = "density", axis = "mat.density" },
]
output_measure = "speed of sound in the medium"
dimension = "velocity"
interval_bound = "[0, C_SOUND_MAX]"
tier = 0

[[law]]
id = "law.ideal_gas_density"
kernel = "ideal_gas_density"
ports = [
  { role = "pressure", axis = "fluid.driving_pressure" },
  { role = "temperature", axis = "therm.temperature" },
]
output_measure = "gas density (couples temperature to the density field)"
dimension = "-3,1,0,0"
interval_bound = "[RHO_MIN, RHO_MAX]"
tier = 0

[[law]]
id = "law.thermal_buoyancy"
kernel = "thermal_buoyancy"
ports = [
  { role = "t_parcel", axis = "therm.temperature" },
  { role = "t_ambient", axis = "therm.temperature" },
  { role = "gravity", axis = "mech.gravitational_acceleration" },
]
output_measure = "signed buoyant acceleration (natural convection)"
dimension = "1,0,-2,0"
interval_bound = "[-A_MAX, A_MAX]"
tier = 0

[[law]]
id = "law.saturation_vapor_pressure"
kernel = "saturation_vapor_pressure"
ports = [
  { role = "temperature", axis = "therm.temperature" },
]
output_measure = "saturation vapour pressure (affine Clausius-Clapeyron proxy)"
dimension = "pressure"
interval_bound = "[0, ES_CAP]"
tier = 0

[[law]]
id = "law.evaporation_rate"
kernel = "evaporation_rate"
ports = [
  { role = "e_ambient", axis = "fluid.vapor_pressure" },
  { role = "e_saturation", axis = "fluid.vapor_pressure" },
  { role = "wind", axis = "mech.velocity" },
]
output_measure = "bidirectional evaporation/condensation mass flux (mass per area per time)"
dimension = "-2,1,-1,0"
interval_bound = "[0, E_MAX]"
tier = 0

# --- Substances (fluids as vectors over the axes) ---

[[substance]]
id = "air"
participates_in = ["law.dynamic_pressure", "law.drag_force", "law.aerodynamic_lift", "law.ideal_gas_density", "law.speed_of_sound", "law.convective_flux"]
real = "CRC (dry air at 15C, 1 atm)"
values = [
  { axis = "mat.density", value = "1.225" },
  { axis = "fluid.dynamic_viscosity", value = "0.0000178" },
  { axis = "fluid.bulk_modulus", value = "0.142" },
  # Pseudo-critical point and acentric factor of dry air (Poling, Prausnitz and O'Connell), the second
  # substance the Chapman-Enskog vapour-in-air diffusivity reads for its LJ pair.
  { axis = "chem.critical_temperature", value = "132.5" },
  { axis = "chem.critical_pressure", value = "3.77" },
  { axis = "chem.acentric_factor", value = "0.035" },
]

[[substance]]
id = "water"
# The molecular identity (the volatile-thermodynamics arc): the molar mass and atom count derive from the formula
# plus the periodic table (never an authored molar mass). An irreducible layer-2 identity datum, cited: NIST / CRC
# (water is H2O). The rotational class for the gas heat capacity is held pending the derivation hunt (likely VSEPR
# from the formula plus the periodic-table valence counts).
formula = "H2O"
participates_in = ["law.hydrostatic_pressure", "law.buoyant_force", "law.poiseuille_flow", "law.speed_of_sound", "law.laplace_pressure"]
real = "CRC (liquid water at 20C)"
values = [
  { axis = "mat.density", value = "998" },
  { axis = "fluid.dynamic_viscosity", value = "0.001" },
  { axis = "fluid.bulk_modulus", value = "2200" },
  { axis = "fluid.surface_tension", value = "0.0728" },
  # Latent heat of VAPORIZATION at 20C (CRC), consistent with this substance's 20C characterization. The generic
  # therm.latent_heat axis spans a substance's phase transitions (fusion 334 to metal vaporization ~1e4); water
  # carries its vaporization value here, the surface energy balance's evaporative cooling reads it. A distinct
  # latent-heat-of-fusion axis (for the melt) is the deeper substrate follow-on for a world that needs both.
  { axis = "therm.latent_heat", value = "2454" },
  # Critical point and acentric factor (Poling, Prausnitz and O'Connell), the corresponding-states primitives
  # the Chapman-Enskog vapour diffusivity derives its LJ pair from. The polar acentric factor (0.344) is the
  # datum a Stockmayer/Brokaw polar correction would key on (the owner's polarity decision), not yet consumed.
  { axis = "chem.critical_temperature", value = "647.1" },
  { axis = "chem.critical_pressure", value = "22.06" },
  { axis = "chem.acentric_factor", value = "0.344" },
  # The volatile-thermodynamics primitives (the four measured observables the saturation curve derives from,
  # each hunter-cleared as irreducible). T_b and L_b anchor the mid-range Rankine-Kirchhoff curve; L_fus adds to
  # L_vap by Hess for the sublimation branch; T_triple is the low-temperature regime boundary. Held (unread)
  # until the wiring slice retires the affine tangent and therm.latent_heat for the derived molar L(T).
  { axis = "chem.boiling_point", value = "373.15" },
  { axis = "chem.vaporization_enthalpy", value = "40.66" },
  { axis = "chem.fusion_enthalpy", value = "6.01" },
  { axis = "chem.triple_point_temperature", value = "273.16" },
]
