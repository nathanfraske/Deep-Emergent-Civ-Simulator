source = "Yoneda 1990, J. Phys. Earth 38:19. K_S: Table 10 present work 197.9(2) GPa (for cubic this is the exact aggregate bulk (C11+2C12)/3); dual-channel Chang & Barsch 1973 197.4. G: Table 12 isotropic-aggregate shear mu, Reuss 98.5 / Voigt 118.4 GPa -> Hill 108.5, band = V-R half-gap 9.9 (wide because spinel shear is anisotropic, A_Z~2.4; the Hill value itself matches the ~108-109 consensus)."
