# Pyykko covalent radii (single / double / triple bond, picometres), the covalent bond-length substrate the
# Badger force-constant column sums (r_e = r_a + r_b at the bond order). CITED: Pyykko 2015 (J. Phys. Chem. A 119,
# 2326) consolidation, over Pyykko & Atsumi 2009 (Chem. Eur. J. 15, 186 single-bond; 15, 12770 double-bond) and
# Pyykko, Riedel & Patzschke 2005 (Chem. Eur. J. 11, 3511 triple-bond). Machine-readable conduit: mendeleev 1.1.0.
# QUALITY BAND: single-bond fit mean-square deviation < 3 pm (~400 primary distances per set); the CO triple-bond
# sum 60+53 = 113 pm against the measured 112.8 pm is the closure check.
# SCOPE TAG (definition, verbatim intent): agreement is good provided the bond is NOT too ionic and the coordination
# numbers are near the fit's input data; transition-metal halides are excluded from the single-bond set for partial
# multiple-bond character. IONIC bonds route through the Shannon ionic-radius column instead (the ionic-dispatch
# line), never through this covalent set.
# TETRAHEDRAL set: tetrahedral_pm is the tetrahedral covalent radius for tetrahedrally-bonded crystals (zincblende/
# wurtzite/diamond), Pyykko 2015 Figure 2 (ref 4, APS 2012 refit), read from the primary. Additive for tetrahedral
# crystals (SiC ~195 pm vs measured 188); a polar bond (silicate Si-O) needs an ionicity correction, so the battery
# reads such lengths from the measured crystal structure. Only ~30 elements form tetrahedral crystals (others absent).
#
# BLOCK KIND: [[radius]], the cited-data-column idiom (matching the Shannon ionic-radius column in ionic_radii.toml),
# NOT the reserved floor [[element]] kind. This file is an IMMUTABLE transcription of Pyykko 2015; it does not
# participate in the floor's real/fantasy authorship axis, and procgen radii for an authored element come from the
# estimator tier at runtime, NEVER written here (inserting computed rows into a file whose header cites Pyykko 2015
# would be laundering by co-location). The column's provenance is this header citation, not a per-row real/fantasy tag.
#
# GRADE BOUNDARY (mixed-grade citation, FLAGGED until sourced): Pyykko's light-element radii are FITS to measured
# bond distances; the heavy, actinide-and-beyond radii are RELATIVISTIC COMPUTED estimates (a compute-once cited
# grade, not measured [M]). The exact atomic number where the fit gives way to the computed values is a data-
# provenance fact to be read from Pyykko 2015's own data-source notes, FLAGGED until sourced (a vendoring-checklist
# classification item, not a world-content reserved value). The force-constant chain and grain lattices read only
# light rows today, so the loader guard (CovalentRadii::bond_length_measured_grade) takes the boundary from its
# caller, costs nothing now, and fails loud the day a consumer reads the computed region.

