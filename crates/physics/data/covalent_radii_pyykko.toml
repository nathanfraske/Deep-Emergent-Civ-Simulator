# Pyykko covalent radii (single / double / triple bond, picometres), the covalent bond-length substrate the
# Badger force-constant column sums (r_e = r_a + r_b at the bond order). CITED: Pyykko 2015 (J. Phys. Chem. A 119,
# 2326) consolidation, over Pyykko & Atsumi 2009 (Chem. Eur. J. 15, 186 single-bond; 15, 12770 double-bond) and
# Pyykko, Riedel & Patzschke 2005 (Chem. Eur. J. 11, 3511 triple-bond). Machine-readable conduit: mendeleev 1.1.0.
# QUALITY BAND: single-bond fit mean-square deviation < 3 pm (~400 primary distances per set); the CO triple-bond
# sum 60+53 = 113 pm against the measured 112.8 pm is the closure check.
# SCOPE TAG (definition, verbatim intent): agreement is good provided the bond is NOT too ionic and the coordination
# numbers are near the fit's input data; transition-metal halides are excluded from the single-bond set for partial
# multiple-bond character. IONIC bonds route through the Shannon ionic-radius column instead (the ionic-dispatch
# line), never through this covalent set.
# REFINEMENT FLAG: these are MOLECULAR bond radii. The tetrahedral-CRYSTAL covalent radii (Pyykko 2015, 30 elements
# in 48 crystals) that fit solid lattices (SiC, the silicates) to subpicometre accuracy are the preferred input for
# grain-lattice omega_TO and are a pending SI fetch; the molecular radii are the first-cut input until then.

