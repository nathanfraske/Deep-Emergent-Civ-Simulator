# Herschbach-Laurie generalized Badger parameters (n = 2, the quadratic STRETCHING force constant), Table III of
# Herschbach & Laurie, "Table of Vibrational Force Constants", UCRL-9694 (1961). Cited [M].
#
# The rule: k [mdyn/Angstrom] = 10^((a2 - r_e[Angstrom]) / b2), i.e. r_e = a2 - b2 * log10(k). k is the stretching
# force constant, r_e the equilibrium bond length. The parameters key on the ROW-PAIR (i, j) where a row is a
# periodic-table period: row 0 = hydrogen (special), row 1 = period 2 (Li-Ne), row 2 = period 3 (Na-Ar), row 3 =
# period 4 (K-Kr), row 4 = period 5 (Rb-Xe), row 5 = period 6 (Cs-Rn). Transition metals bonded to hydrogen or a
# first-row (period-2) atom take the tm = true parameters (partial multiple-bond character), listed separately in
# the source. Closures: CO (row pair 1-1) at r_e = 1.128 A gives 19.1 mdyn/A (measured ~19.0); SiO (1-2) at 1.510 A
# gives 9.16 (measured ~9.24); N2 (1-1) at 1.098 A gives ~22 (measured ~22.4).

