# NIST-JANAF thermochemical tables fixture manifest (the mu-standard total [M] top rung: name / formula /
# phase / janaf_code / citation / md5). Each per-species table is header-cited to Chase 1998 and fetched
# verbatim from janaf.nist.gov/tables/<code>.txt (the artifact-native machine-readable form). The tabulated
# columns give the standard chemical potential mu-standard(T) as a MEASURED total: the Gibbs energy function
# -[G(T)-H(Tr)]/T, the standard entropy S(T), the enthalpy increment H(T)-H(Tr), and the formation delta-f H and
# delta-f G. BLOCK KIND: [[species]], the cited-data-column idiom (matching the optical-constants column), NOT the
# reserved floor [[element]]/[[substance]] kind: this is an immutable transcription of Chase 1998 and does not
# participate in the floor real/fantasy authorship axis; an authored species draws its mu from the estimator tier
# at runtime, never written here (co-location laundering). PROVENANCE: header citation (out of floor-Element
# policing). GRADE: single-grade, all rows are the JANAF 4th-ed critically-evaluated compilation (Chase 1998).
# The md5 is the receipt of the fetched source bytes; the dry-run battery (janaf_provenance_test.py) re-checks it.

