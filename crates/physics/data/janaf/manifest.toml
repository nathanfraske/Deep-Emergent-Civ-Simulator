# --- Aluminium and calcium gas-phase carriers (added for the refractory condensates). A gas-phase
# element-potential condensation solver can include an element only if that element has at least one gas
# species to balance the gas equilibrium against; the set above carried Mg, Fe, Si, Ti, Na, K gas but no Al
# or Ca gas, so Al and Ca (and their refractory condensates corundum Al2O3, spinel MgAl2O4, anorthite
# CaAl2Si2O8, gehlenite, perovskite CaTiO3) were excluded. The rows below add the dominant Al and Ca gas
# carriers in a cooling solar-composition gas: monatomic Al(g)/Ca(g) (the load-bearing pair, endothermic
# vapours, positive delta-f H), the hydroxides AlOH(g)/CaOH(g)/Ca(OH)2(g) and sub-oxide Al2O(g) (bound, the
# species that dominate at solar C/O), and the radicals AlO(g)/CaO(g) and hydride AlH(g). The set is
# NON-EXHAUSTIVE and extensible: a new gas carrier (for another element, or an alien chemistry) is one more
# [[species]] row, same idiom, no code change. All rows are NIST-JANAF (Chase 1998), same single grade as
# the set above. Phase-trap check performed at fetch: Al(g) delta-f H298 = +329.699, Ca(g) = +177.800
# kJ/mol (positive, the endothermic monatomic vapour, NOT the condensed metal reference at 0). NOTE on the
# AlOH isomer: JANAF carries two Al1H1O1 gas species at the same formula, Al-057 "Aluminum Hydride Oxide"
# (the HAlO hydride-oxide, delta-f H298 = +33.472) and Al-058 "Aluminum Hydroxide" (AlOH proper, the Al-O-H
# carrier, delta-f H298 = -179.912); the dominant solar-gas Al carrier is AlOH, so Al-058 is vendored here.

