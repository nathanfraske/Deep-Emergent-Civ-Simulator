# Lodders (2003) Table 8: equilibrium 50% condensation temperatures for a solar-system composition gas at
# 1e-4 bar total pressure. The pre-registered condensation battery for the disk-condensation arc: the
# temperature at which 50% of an element has condensed out of the gas is the ground truth a Gibbs-minimization
# over the JANAF potentials must reproduce. CITED: Lodders, K. (2003), ApJ 591, 1220, Table 8 (pp. 1240-1241).
# Transcribed from the primary reprint PDF (the Pyykko-figure protocol: transcribe the table, fingerprint-check
# spot rows). SOURCE PDF (the receipt): https://solarsystem.wustl.edu/wp-content/uploads/reprints/2003/
# Lodders%202003%20ApJ%20Elemental%20abundances.pdf , md5 6c5c71656907b2d3abab01b5e7178c8f .
#
# COLUMNS: t_first_k = col (2) TC, the temperature of the element's first condensate (absent for a trace
# element that only dissolves into a host, and for He/H where 50% is never reached in range); initial_phase =
# col (3), the first-condensate or {dissolving} phase; t50_k = col (4) 50% TC, the load-bearing value; host =
# col (5) major host phase(s). Where col (2) lists two onsets (Mg first solid spinel then forsterite; Si first
# gehlenite then forsterite), t_first_k is the FIRST onset and host is the 50% reservoir. Water ice's onset is
# H/O t_first_k = 182 K (the water-ice line). FINGERPRINTS (owner spot-check, in the loader #[test]): Al 1653,
# Ca 1517, Ti 1582, Fe 1334, Mg 1336, Si 1310, S 664, water ice 182.
#
# BLOCK KIND [[condensation]], the cited-data-column idiom, NOT the reserved floor [[element]] kind: an immutable
# transcription of Lodders 2003 Table 8, out of the floor real/fantasy authorship axis. PROVENANCE: header
# citation. GRADE: single (one table, one composition, one pressure). HONEST LIMITS: this is the solar-system
# composition gas (Table 8); the solar-photosphere variant (Table 9) differs by a few K and is not vendored; the
# phase/host strings are descriptive annotation (the load-bearing checksummed values are the temperatures).

