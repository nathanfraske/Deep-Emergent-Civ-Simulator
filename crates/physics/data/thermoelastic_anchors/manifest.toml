anchor = "PDF page 30, 'Table 1. Properties of mantle species' (the paper's own text calls it Table A1), q column: periclase (MgO) 1.5 (2); corundum (AlAlO3) 1.3 (2); spinel ((Mg3Al)(Al7Mg)O16) 2.8 (6); forsterite (Mg2SiO4) 2.1 (2); fayalite (Fe2SiO4) 3.6 (10); enstatite (Mg4Si4O12) 7.8 (11). All six cells Times-Roman, that is fit rather than systematics. The companion gamma_0 column on the same rows is the source of gruneisen.toml's gamma_eos_debye: 1.50(2), 1.32(4), 1.02(4), 0.99(3), 1.06(7), 0.67(4)."
extract = "Table 1 footnote: 'Italicized entries are from systematics.' Table 1 rows, columns V0 / K0 / K0' / theta0 / gamma0 / q: 'magnesiowustite (mw)  periclase  MgO  11.24  161 (3)  3.9 (2)  773 (9)  1.50 (2)  1.5 (2)'; 'akimotoite  corundum  AlAlO3  25.58  253 (5)  4.3 (2)  933 (3)  1.32 (4)  1.3 (2)'; 'spinel (sp)  spinel  (Mg3Al)(Al7Mg)O16  159.05  197 (1)  5.7 (2)  900 (3)  1.02 (4)  2.8 (6)'; 'olivine (ol)  forsterite  Mg2SiO4  43.60  128 (2)  4.2 (2)  809 (1)  0.99 (3)  2.1 (2)'; 'olivine  fayalite  Fe2SiO4  46.29  135 (2)  4.2 (10)  619 (2)  1.06 (7)  3.6 (10)'; 'orhopyroxene (opx)  enstatite  Mg4Si4O12  125.35  107 (2)  7.1 (4)  810 (8)  0.67 (4)  7.8 (11)'. Section A: 'We have estimated unknown parameters on the basis of systematics. We assume that K0', gamma0, q0, K0, and G0' are approximately constant across isostructural series so that if constraints exist for one end-member of a phase, but not the others, we assume that the same values apply to all end-members of that phase.' Section A on how q is determined: 'q0 is determined by a least squares fit to measurements of the bulk modulus at high temperature, via eq. (32), or if these are not available to measurements of the pressure-volume-temperature equation of state, via eq. (21).'"
