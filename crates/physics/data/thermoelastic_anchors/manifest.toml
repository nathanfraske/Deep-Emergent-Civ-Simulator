# NOT RETRIEVED / NOT TRANSCRIBABLE, recorded rather than paraphrased from memory, so the next fetch does
# not repeat the search. HEMATITE (Fe2O3) has NO q row in ../thermoelastic_anchors.toml.
#
#   Zerilli, F.J. & Jones, H.D., 1995, "High Pressure Equation of State for Fe2O3", MRS Online Proceedings
#   Library 418, 421, DOI 10.1557/PROC-418-421. The one source found that states a Debye-Gruneisen EoS for
#   hematite. CLOSED ACCESS (OpenAlex oa_status "closed", no repository copy; Springer and Cambridge Core
#   landing pages only). No free legitimate copy was found, so no cell of it can be quoted and the
#   citation-plus-witness route is unavailable: a witness entry requires an `extract` of the text the value
#   came from, and an unread paper cannot supply one. NOT USED.
#
#   Dorogokupets, P.I., Sokolova, T.S., Dymshits, A.M. & Litasov, K.D., 2016, "Thermodynamic properties of
#   rock-forming oxides, alpha-Al2O3, Cr2O3, alpha-Fe2O3 and Fe3O4 at high temperatures and pressures",
#   Geodynamics & Tectonophysics 7(3), 459-476, DOI 10.5800/GT-2016-7-3-0217. Open access (diamond),
#   retrieved and read (6925854 bytes via the Wayback capture of gt-crust.ru, the live host timing out).
#   It gives a modern optimized thermal EoS for hematite, and it has NO CONSTANT q TO TRANSCRIBE: the
#   vibrational term is TWO EINSTEIN oscillators (Theta_01, Theta_02) rather than a Debye model, and the
#   Gruneisen parameter takes the Al'tshuler form of its eq. (10.2), gamma = gamma_inf + (gamma_0 -
#   gamma_inf) x^beta, under which q is a VOLUME-DEPENDENT FUNCTION, its eq. (10.3), q = beta x^beta
#   (gamma_0 - gamma_inf) / gamma. Evaluating that function at ambient volume and writing the result into
#   the MGD q slot would launder one model's parameter into another's and would carry no band the source
#   states, so it is NOT USED. Recorded here because it is the right source to revisit if the consumer is
#   ever generalized past the constant-q power law.
#
#   Hematite is unserved by the derivation route as well: its bulk and shear moduli are recorded UNSOURCED
#   in ../mineral_moduli.toml, so no elastic Debye temperature can be derived for it either.
# ---------------------------------------------------------------------------------------------------
