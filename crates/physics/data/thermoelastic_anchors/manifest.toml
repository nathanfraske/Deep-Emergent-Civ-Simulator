# Held-source manifest for the Gruneisen volume-exponent q cited column (../thermoelastic_anchors.toml).
# The vendored-primary idiom: file / receipt / anchors, in the shape of the sibling gruneisen manifest.
#
# BOTH SOURCES ARE CITATION-PLUS-WITNESS (custody = "witness"), and the paywall question was asked FIRST.
# Both papers are Geophysical Journal International, and both are "bronze" open access: free to read at the
# publisher with NO open licence attached, which is free-to-read rather than free-to-redistribute. Their
# bytes are therefore NOT held in this repository. They sit in local custody
# (~/.claude/vendored-sources/thermoelastic_anchors/ for the 2011 paper,
# ~/.claude/vendored-sources/gruneisen/ for the 2005 paper, which the gruneisen fetch already retrieved),
# sha256-verifiable, with a retrievable Internet Archive snapshot recorded as archived_url. Each archived
# snapshot was RE-FETCHED AND HASHED on 2026-07-19 and is byte-identical to the receipt below, so the
# public witness holds exactly the bytes the values were read from. The redistribution finding for each id
# lives in sources/licences.toml, which the gate merges on at load time.
#
# BLOCK KIND [[source]], a vendored-artifact receipt (the JANAF / convection-scaling / gruneisen held-source
# idiom), NOT a reserved floor kind: these witnesses do not participate in the floor real/fantasy
# authorship axis.
#
# THE TWO SOURCES ARE NOT INDEPENDENT WITNESSES, and the [[claim]] blocks below say so rather than filling
# the secondary slot with a copy. The 2011 paper is the same two authors' later global inversion, drawing
# on an overlapping experimental corpus, so it is a SUCCESSOR to the 2005 fit rather than a second opinion
# from a separate group. Where they agree that is a consistency check on the transcription; where they
# disagree (periclase, enstatite) it is a revision, and the manifest records which.
#
# WHY THE 2005 PAPER IS THE PRIMARY FOR SIX ROWS. q and gamma_0 are correlated parameters of one
# least-squares inversion, so they must be read from the same fit. The banked gamma_0 (gruneisen.toml
# gamma_eos_debye) is transcribed from the 2005 Table 1, so the 2005 q is the one that pairs with it.
# Quartz is the exception: it exists only in the 2011 table, its q there is from systematics, and its
# companion gamma_0 is both assumed and absent from the bank.
#
# THE 2005 HELD PDF IS AN ACCEPTED-MANUSCRIPT PREPRINT, not the publisher's version of record. It is
# typeset from the authors' LaTeX with the journal class file ("This paper has been produced using the
# Blackwell Publishing GJI LATEX2e class file"), runs 43 pages with its own 1-based pagination and running
# heads reading "Mantle Thermodynamics", and does NOT carry the GJI pagination 610-632. Page anchors below
# are therefore in the PREPRINT's pagination, and its parameter table prints as "Table 1" while the paper's
# own text refers to it as "Table A1". The sibling gruneisen manifest cites the same bytes without
# recording the preprint status; that gap is closed here rather than repeated.
#
# THE 2011 HELD PDF IS THE PUBLISHER'S VERSION OF RECORD: 34 pages, GJI running heads, printed pagination
# 1180-1213, produced through the publisher's typesetting chain (pdfinfo Creator "dvips(k) 5.95a",
# Producer "PDFlib PLOP 2.0.0p6 (SunOS)/Acrobat Distiller 7.0.5 for Macintosh", CreationDate 2011-01-31).
# Page anchors for it are PRINTED page numbers.
#
# THE FIT-VERSUS-SYSTEMATICS GRADE WAS READ THROUGH A SECOND CHANNEL, because the first one cannot see it.
# Both tables carry the footnote "Italicized entries are from systematics", and `pdftotext` discards
# italics, so a text-only read would have transcribed an assumed cell as a fitted one. Every q cell was
# therefore additionally read from the PDF FONT METADATA (`pdftohtml -xml`, mapping each glyph span to its
# font subset), with a known-italic neighbour row used as the control in each table to prove the read
# discriminates. This is the dual channel for these artifacts, and it is the reason quartz's q is graded
# unverified_measurement_candidate rather than measured.

