# ---------------------------------------------------------------------------------------------------
# CLAIMS: one per value carried in ../thermoelastic_anchors.toml, each naming the fit its q came from and
# whether that fit's gamma_0 reproduces the banked gruneisen.toml gamma_eos_debye. The secondary slot is
# left empty WITH A STATED REASON rather than filled with the sibling compilation, because the two papers
# share authors and an overlapping experimental corpus and so are one witness heard twice.
# ---------------------------------------------------------------------------------------------------

[[claim]]
id = "q.periclase"
value = "1.5 +/- 0.2"
primary = ["thermoelastic_anchors.slb_2005_mantle_minerals_i"]
single_witness_reason = "One witness. The only other compilation reporting a constant q for this phase is the same authors' 2011 successor inversion, which is a revision rather than an independent determination, and it disagrees: q_0 = 1.7 (2) with gamma_0 moved from 1.50 (2) to 1.36 (5). GAMMA_0 PAIRING: the 2005 fit's gamma_0 = 1.50 (2) matches the banked gruneisen.toml gamma_eos_debye exactly, and the 2011 fit's does NOT, so the primary is the gamma_0-consistent one and the disagreement is reported rather than reconciled."

[[claim]]
id = "q.corundum"
value = "1.3 +/- 0.2"
primary = ["thermoelastic_anchors.slb_2005_mantle_minerals_i"]
single_witness_reason = "One witness, and the cleanest row: the 2011 successor reproduces q_0 = 1.3 (2) and gamma_0 = 1.32 (4) unchanged, which is a transcription check rather than an independent confirmation because the authors and corpus overlap. GAMMA_0 PAIRING: matches the banked gruneisen.toml gamma_eos_debye exactly in both compilations."

[[claim]]
id = "q.spinel"
value = "2.8 +/- 0.6"
primary = ["thermoelastic_anchors.slb_2005_mantle_minerals_i"]
single_witness_reason = "One witness. The 2011 successor gives q_0 = 2.7 (6), a shift of 0.1 against a band of 0.6, so the two agree within uncertainty; they are the same authors' successive inversions rather than independent witnesses. GAMMA_0 PAIRING: gamma_0 = 1.02 (4) in both, matching the banked gruneisen.toml gamma_eos_debye exactly. Scope caveat: this is the DISORDERED spinel model, not an ordered single crystal."

[[claim]]
id = "q.forsterite"
value = "2.1 +/- 0.2"
primary = ["thermoelastic_anchors.slb_2005_mantle_minerals_i"]
single_witness_reason = "One witness. The 2011 successor reproduces q_0 = 2.1 (2) unchanged; same authors, overlapping corpus, so a transcription check rather than a second determination. GAMMA_0 PAIRING: gamma_0 = 0.99 (3) in both, matching the banked gruneisen.toml gamma_eos_debye exactly."

[[claim]]
id = "q.fayalite"
value = "3.6 +/- 1.0"
primary = ["thermoelastic_anchors.slb_2005_mantle_minerals_i"]
single_witness_reason = "One witness. The 2011 successor reproduces q_0 = 3.6 (10) unchanged; same authors, overlapping corpus. GAMMA_0 PAIRING: gamma_0 = 1.06 (7) in both, matching the banked gruneisen.toml gamma_eos_debye exactly. The band is 28 percent of the value, the loosest fitted q in the column, and the underlying entropy assumes R ln 5 magnetic entropy per Fe."

[[claim]]
id = "q.enstatite"
value = "7.8 +/- 1.1"
primary = ["thermoelastic_anchors.slb_2005_mantle_minerals_i"]
single_witness_reason = "One witness, and THE MOST UNSETTLED ROW IN THIS COLUMN. The same authors' 2011 successor inversion gives q_0 = 3.4 (4), a factor of 2.3 lower and far outside either band, with gamma_0 moved from 0.67 (4) to 0.78 (4) while K_0' stayed at 7.0 (4) against 7.1 (4). GAMMA_0 PAIRING: the 2005 gamma_0 = 0.67 (4) matches the banked gruneisen.toml gamma_eos_debye exactly and the 2011 value does not, so the banked-consistent q is also the one the later work retracted. The disagreement is reported rather than reconciled and this row needs the owner's ruling. Same phase gruneisen.toml flags as the Slater-inapplicable chain-silicate anomaly."

[[claim]]
id = "q.quartz"
value = "1.0 +/- 1.0, ASSUMED (unverified_measurement_candidate), not usable as an anchor"
primary = ["thermoelastic_anchors.slb_2011_mantle_minerals_ii"]
single_witness_reason = "One witness and one that does not measure the quantity. Quartz appears in no other compilation read here: the 2005 mantle table carries only stishovite among the SiO2 polymorphs, and stishovite is a different phase. The 2011 q_0 = 1.0 (10) is set in ITALIC, which the table's own footnote defines as from systematics, so it is the authors' assumed default with a band equal to the value rather than a determination; it is graded unverified_measurement_candidate for that reason. GAMMA_0 PAIRING FAILS TWICE: the companion gamma_0 = 0.00 (5) is likewise italic and assumed, and gruneisen.toml carries no gamma for quartz at all, so there is no banked gamma_0 to pair with. gamma_0 = 0 also makes the MGD thermal pressure identically zero whatever q is."

