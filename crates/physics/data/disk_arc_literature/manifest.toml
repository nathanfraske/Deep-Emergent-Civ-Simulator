# ==================== Giant-planet accretion termination: gap opening ====================

[[source]]
name = "crida_2006"
url = "https://arxiv.org/pdf/astro-ph/0511082"
archive_url = "https://web.archive.org/web/20260718231028/https://arxiv.org/pdf/astro-ph/0511082"
citation = "Crida, A., Morbidelli, A. and Masset, F. 2006, On the width and shape of gaps in protoplanetary disks, Icarus 181, 587. arXiv:astro-ph/0511082."
sha256 = "d3eb42e01a27db10945d97aef30efd6e9e5bbc76edcde42eadffacd819582f3b"
bytes = 492399
grade = "theory"
extract = "The gap-opening criterion for giant-planet accretion termination. Eq. 15 (p.17, Sec. 6): a gap is open when P = (3/4)(H/R_H) + 50/(q R) <= 1, with q = M_p/M_star the planet-to-star mass ratio, R = r_p^2 Omega_p / nu the Reynolds number, R_H = r_p (q/3)^(1/3) the Hill radius (so H/R_H = (H/r_p)/(q/3)^(1/3)). Coefficients 3/4 and 50 and the threshold P=1 confirmed dual-channel (OCR plus visual; the Fig. 12 caption restates P=1 as a second in-source channel for the threshold). THERMAL asymptote, self-anchored in the held bytes: R_H >= H (Sec. 2.3, Lin and Papaloizou 1993) which with the Hill definition gives q = 3(H/r)^3. VISCOUS asymptote: Eq. 3, nu < 0.0887 q^2 ... (equivalent to Bryden 1999). SCOPE: fit to Fig. 12 gap-depth-threshold curves (a gap is central surface density <= 10 percent of unperturbed) over q = 1e-4 to 3e-3, H/r up to ~0.12, constant kinematic nu; 2D vertically-isothermal non-migrating giant planet, q << 1. CHANNEL-RELAYED CAVEAT, NOT from Crida: the paper uses a CONSTANT kinematic viscosity nu and never mentions the Shakura-Sunyaev alpha; the link R = 1/(alpha (H/r)^2) via nu = alpha c_s H is the standard alpha-disk substitution (Shakura and Sunyaev 1973), a derivation the caller applies, not a Crida claim. MODELING-ASSUMPTION CAVEAT, NOT from Crida: identifying gap-opening (P<=1) with the HALT of runaway gas accretion is the caller's standard modeling assumption, not a claim Crida makes. LICENSE: OPEN (arXiv accepted preprint, public-tree); the ScienceDirect journal version is paywalled but carries the same equations. The archive_url snapshot re-hashes byte-identical to the fetched bytes, a real witness. CROSS-REFERENCE not-yet-vendored: the thermal R_H >= H traces to Lin and Papaloizou 1993 (a book chapter, no free PDF) and the Hill radius to Ward 1997 (the ADS scan timed out); the thermal asymptote is self-anchored in Crida's own bytes, so neither blocks the primary."
used_by = "giants::gap_opening_mass_earth; giants::GapOpeningModel::crida_2006"

