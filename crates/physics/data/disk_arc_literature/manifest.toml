grade = "theory"
extract = "The prestellar-core dust-heating attenuation form, the test of whether the V-band flux law 10^(-A_V/2.5) is the right proxy for chi. It is NOT: the dust-heating attenuation is broadband and much shallower. ATTENUATION FORM (Sec. 4 analytic approximation, Eq. 7, p.5): the mean ISRF intensity at the core centre is J_nu(0) = J_nu^is exp(-tau_nu,c) = J_nu^is exp(-tau_a (nu/nu_a)^alpha_a), a PER-FREQUENCY exponential attenuation of the interstellar radiation field, tau_a the centre-to-edge optical depth at the absorption frequency nu_a, NOT a single V-band magnitude flux factor. The heating ISRF (Black 1994; Mathis, Mezger and Panagia 1983 = MMP) is a sum of four components: optical-NIR peaking at 1 micron (disk stars), diffuse FIR peaking at 100 micron (dust), a variable MIR power law 5 to 100 micron, and the 1 mm cosmic background; each is attenuated at its own frequency, so redder photons penetrate deeper. OPTICAL-DEPTH-TO-EXTINCTION (p.6): A_V = 1.086 tau_V, and the core is 'optically thin to V-NIR radiation for A_V << 3, to FIR radiation for A_V << 700, and to the cosmic background radiation for A_V << 6e4'. So in a dark core (A_V about 30 to 50) the optical/1 micron field is deeply attenuated but the FIR and MIR components pass nearly unattenuated; the dust heating 'comes from frequencies where the optical depth is of order unity (i.e. at a wavelength of roughly 20 micron for A_V = 30 ... at A_V about 414)'. Effective dust-heating attenuation is therefore FAR SHALLOWER than the V-band 10^(-A_V/2.5): analytic thin-limit central temperatures (p.6) Td(V-NIR, thin) about 16.5 - 3.6 A_V (the optical term dies fast), Td(FIR, thin) about 6.2 - 0.0031 A_V (the FIR term barely falls with A_V); the numerical models give T_dust about 6 to 7 K at the L1544 nucleus at A_V about 50 mag, well above the near-zero a V-band chi would force. IMPLICATION FOR chi (the caller's read, not a Zucconi claim): 10^(-A_V/2.5) is the V-band flux attenuation, which at A_V = 50 gives about 1e-20 and grossly over-attenuates; the physical dark-core dust-heating scaling stays at chi about 1e-4 to 1e-5 (the Goldsmith 2001 value) because FIR and MIR photons carry the heating, so a V-band A_V of only about 10 to 12 reproduces Goldsmith's chi while real cores reach A_V about 30 to 100. The V-band proxy and the broadband dust-heating attenuation diverge by many orders of magnitude in a dark core. SCOPE: prestellar (pre-protostellar) cores optically thin to their own FIR emission, spherical and disk-like isothermal-envelope models, centre-to-edge extinction up to a few hundred magnitudes A_V, solar-neighbourhood ISRF (Black 1994), Ossenkopf and Henning 1994 thin-ice grain opacities coagulated 1e5 yr; comparison object L1544. DUAL-CHANNEL: pdftotext text layer and a visual read of Eq. 7 and the A_V-threshold passage (p.6) agree. LICENSE: OPEN (arXiv astro-ph/0107055, public-tree), held bytes; the archive_url snapshot is to be re-hashed byte-identical once the IA capture finishes playback (submitted 2026-07-19, IA transiently offline during re-fetch)."
used_by = "astro::ExtinctionChiEstimator (grounds the broadband dust-heating k RANGE about 0.05 to 0.13 per mag the chi ESTIMATOR carries; it does NOT source a single k, and the chi map is graded a Layer-3 estimator, not a derivation)"

