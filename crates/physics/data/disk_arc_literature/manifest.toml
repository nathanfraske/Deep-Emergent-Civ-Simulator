citation = "Papaloizou, J. and Pringle, J. E. 1977, Tidal torques on accretion discs in close binary systems, MNRAS 181, 441. DOI 10.1093/mnras/181.3.441."
sha256 = "80c9d0cf3bfa38c5510979aa4c50d418dc4aa96d33cff4462491d68f5dc45658"
bytes = 727600
grade = "theory"
extract = "The EARLIER analytic tidal-truncation foundation AL94 builds on, and the source of the commonly-quoted f about 0.9. MASS-RATIO CONVENTION (Table 1 header, verbatim): q = M2/M1, the companion-to-host ratio (equal mass q = 1), the SAME convention as the caller (M1 is the accretor hosting the disc, M2 the companion), DISTINCT from the AL94/Pichardo mass fraction. LOAD-BEARING TABLE (Table 1, p.445): a_s, 'the radius outside which tidal torques dominate', and a_L, 'the mean Roche-lobe radius', both in units of the binary separation a, tabulated versus q = M2/M1. Values: q=0.2 a_s=0.45 a_L=0.52; q=0.4 0.41/0.46; q=0.6 0.37/0.42; q=0.8 0.35/0.40; q=1.0 0.33/0.38; q=2.0 0.28/0.32; q=4.0 0.23/0.26; q=6.0 0.21/0.23; q=8.0 0.19/0.22; q=10.0 0.18/0.20. So a_s (the tidal-dominance radius) is about 0.18 to 0.45 of the separation. The a_L column is an independent CONSISTENCY CHECK on the shipped Eggleton Roche lobe: q=1 gives a_L/a = 0.38, matching Eggleton's 0.379 for q=1. TRUNCATION FRACTION (Discussion, p.446 to 447, verbatim): with shear viscosity present, 'the additional tidal-induced dissipation becomes comparable to that due to the mean flow at a radius a_s which is about 0.85 to 0.9 of the mean Roche lobe radius a_L (Table 1)'. So f = a_s/a_L approx 0.85 to 0.9, the HIGH-VISCOSITY limit in which the disc nearly fills the Roche lobe. VISCOSITY: the resulting tidal truncation, where the tidal and viscous stresses balance, is 'formally independent of' the amount of viscosity (Sec. 3, p.443 to 444), the truncation radius being set by the torque balance not the viscosity magnitude. IMPORTANT CAVEAT, verbatim (p.447): 'There is no a priori reason to associate the radius a_s with the outside edge of the disc (contrary to the suggestion by Paczynski 1977) since even an infinitesimal amount of viscosity ensures that the flow streamlines do not intersect'; a_s marks where tidal torques begin to dominate, not the physical disc edge (which the AL94 SPH resonant calculation places smaller, at r/a about 0.3 to 0.5). SCOPE: circular binary only; circumprimary disc; shear-viscous, gas-pressure-dominated, optically thick isothermal disc; angular-momentum transfer between disc and orbit computed to linear (and, in Appendix 2, non-linear) order. LICENSE: OPEN (NASA ADS scanned full text, RAS, public-tree), held bytes; the scan carries an OCR text layer. DUAL-CHANNEL: the pdftotext OCR layer and a visual read of Table 1 and the Sec. 4 Discussion agree on the a_s, a_L values and the 0.85 to 0.9 fraction."
used_by = "astro::roche_lobe_radius_au (VALIDATION only: the a_L column is an independent consistency check on the shipped Eggleton Roche lobe, q=1 giving 0.38 versus Eggleton 0.379); astro::TruncationModality::TidalTorqueBalance (the high-viscosity sibling rung, f about 0.85 to 0.9, NOT a coefficient source for the Pichardo function)"

