extract = "ERRATA BACKING, not a physics source: the held witness for the pichardo_2005 wrong-arXiv-id catch. The arXiv id astro-ph/0502330, a plausible seed for Pichardo, Sparke and Aguilar 2005 (MNRAS 359, 521), in fact resolves to THIS paper (Rajguru et al. 2005, a CBI/VSA cosmic-microwave-background map-comparison and parameter-estimation paper), verified from its PDF page-1 title and the arXiv id printed on the page (astro-ph/0502330v2, 4 Nov 2005). HELD FACT: astro-ph/0502330 = Rajguru et al. 2005 (CMB), NOT Pichardo, Sparke and Aguilar 2005. Pichardo 2005 was therefore vendored from the NASA ADS scan (articles.adsabs.harvard.edu/pdf/2005MNRAS.359..521P, sha256 62d6b402), whose page-1 title and author line confirm the intended paper. This entry makes the id-misattribution provenance-complete so a later fetch does not repeat the wrong seed."
