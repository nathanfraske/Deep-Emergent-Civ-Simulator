extract = "The X-ray cross-reference channel for N_H/A_V, keyed on A_V directly. BEST-FIT RELATION (Sec. 3 fit equation, and Abstract): N_H (cm^-2) = (2.21 +/- 0.09) x 10^21 A_V (mag), the errors 1-sigma statistical; the same fit also written N_H (cm^-2) = (6.86 +/- 0.27) x 10^21 E(B-V), the two forms linked by the paper's adopted A_V = 3.1 E(B-V) (Fitzpatrick 2004; Savage and Mathis 1979). SCOPE: X-ray-derived N_H from high-resolution Chandra, XMM-Newton and Suzaku spectra toward 22 Galactic supernova remnants with independent optical A_V; the X-ray absorption samples total metal column (O, Fe and other heavy elements), so this is a metals-traced N_H per A_V, a different physical channel from Bohlin's UV L-alpha atomic-hydrogen column. PRIOR X-RAY RELATIONS (Sec. 1) span 1.79e21 (Predehl and Schmitt 1995, ROSAT) to 2.22e21 (Gorenstein 1975, SNRs) and 1.85e21 (Reina and Tarenghi 1973). BAND: this 2.21e21 sits about 18 percent above Bohlin's UV-derived 1.87e21 (equivalently 6.86e21 versus 5.8e21 per E(B-V)); the two together define the real N_H/A_V band 1.87e21 (UV, atomic + molecular) to 2.21e21 (X-ray, metals) atoms cm^-2 mag^-1 the chi derivation reads across. DUAL-CHANNEL: pdftotext text layer and a visual read agree on 2.21 +/- 0.09 at both the abstract and the Sec. 3 fit-equation site. LICENSE: OPEN (arXiv 0903.2057, public-tree), held bytes; the archive_url snapshot is to be re-hashed byte-identical once the IA capture finishes playback (submitted 2026-07-19, IA transiently offline during re-fetch)."
