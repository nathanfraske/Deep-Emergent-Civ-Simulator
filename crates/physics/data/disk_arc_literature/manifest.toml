# ================ EUV photoevaporation wind mass-loss rate (radiative-envelope branch) ================
# The Herbig Ae/Be radiative-photosphere disk-dispersal clock: an EUV-bright ionizing luminosity drives a
# thermally-driven 1e4 K photoevaporative wind off the disk. HJLS94 is the TRUE ORIGIN of the Mdot ~ Phi^(1/2)
# M^(1/2) normalization; Alexander et al. 2006 II restates it (4.4e-10) and Font et al. 2004 is the independent
# hydrodynamic-correction channel. Load-bearing number, triple-channel.

[[source]]
name = "hollenbach_1994"
url = "https://articles.adsabs.harvard.edu/pdf/1994ApJ...428..654H"
archive_url = "https://web.archive.org/web/20260719050023/https://articles.adsabs.harvard.edu/pdf/1994ApJ...428..654H"
citation = "Hollenbach, D., Johnstone, D., Lizano, S., Shu, F. 1994, Photoevaporation of disks around massive stars and application to ultracompact HII regions, ApJ 428, 654. DOI 10.1086/174276."
sha256 = "58787a2405f9b64301ca4050446a52cb68c0538a1452082f62f91e8faa233bd7"
bytes = 292118
grade = "theory"
extract = "The TRUE ORIGIN of the EUV weak-wind photoevaporation rate normalization. WEAK-WIND CLOSED FORM (Eq. 3.14, p.661): Mdot_dw = 1.3e-5 Phi_49^(1/2) M_1^(1/2) M_sun/yr, where Phi_49 = Phi_i/1e49 s^-1 is the stellar ionizing (Lyman continuum) photon LUMINOSITY in photons per second and M_1 = M_*/10 M_sun. Derived from the analytic prefactor Eq. 3.13: Mdot_dw = [(12 pi)^(1/2)/(gamma-2)] m_H a (Phi_i r_g/alpha_2)^(1/2), with a the ionized-gas sound speed, alpha_2 the case-B recombination coefficient, gamma the density power-law index (numerically gamma ~ 2.5). RESCALED to the T Tauri normalization (derived arithmetic, not a source read): 1.3e-5 * (1e41/1e49)^(1/2) * (1/10)^(1/2) = 4.1e-10, so Mdot ~ 4.1e-10 (Phi/1e41 s^-1)^(1/2) (M_*/M_sun)^(1/2) M_sun/yr, matching the commonly-quoted 4e-10 to a rounding. GRAVITATIONAL RADIUS (Eq. 2.1): r_g = G M_*/a^2 ~ 1e15 M_1 cm = 1e14 (M_*/M_sun) cm. THERMODYNAMIC INPUT (Sec. 2.3, 3): T ~ 1e4 K (10,000 K photoionized plasma), sound speed a ~ 10 km/s, mean mass per particle m_H = 1.13e-24 g; evaporative flow velocity v = a ~ 10 km/s for r > r_g. DENSITY STRUCTURE (Eq. 3.8): n_0 = 1.2e10 M_1^(1/4) h_11^(1/2) Phi_49^(1/2) r_13^(-9/4) cm^-3 for r_* < r < r_g, steepening to n_0 ~ r^(-5/2) for r > r_g (Eq. 3.12); mass loss dominated near r ~ r_g. SCOPE: EUV (hydrogen-ionizing Lyman continuum) driven thermal 1e4 K wind, NOT X-ray and NOT FUV; the DIFFUSE (recombination) field dominates, the direct stellar field being strongly attenuated by the disc atmosphere (the WEAK-WIND branch). Phi_i is taken DIRECTLY as the photon rate (Maeder and Meynet 1987 stellar atmosphere models), so NO mean-photon-energy conversion of an energy luminosity appears in the primary; the EUV-luminosity-to-Phi step is the caller's, needing a mean EUV photon energy (of order 20 eV above the 13.6 eV threshold) that these bytes do not fix. RANGE CAVEAT: HJLS94's own numerical models (Table 1, Table 2) span MASSIVE stars M_* = 15 to 65 M_sun, Phi_i = 3e47 to 3e49 s^-1 (ultracompact HII regions); the T Tauri application (M_* = 0.1 to 2 M_sun, Phi = 1e40 to 1e42 s^-1) is the analytic scaling extended by Font et al. 2004 and Alexander et al. 2006. LICENSE: OPEN (NASA ADS scanned full text, AAS, public-tree). The Wayback snapshot was re-downloaded and re-hashed BYTE-IDENTICAL to the fetched bytes (sha256 58787a24, 292118 bytes), a real held witness. DUAL-CHANNEL: no OCR text layer (image scan); Eq. 3.14 read visually and cross-confirmed by Alexander et al. 2006 Eq. 2 (4.4e-10) and by Font et al. 2004 (n_g ~ Phi^(1/2) M^(-3/2), integrating to Mdot ~ Phi^(1/2) M^(1/2))."
used_by = "astro::EuvWindFit; astro::radiative_euv_photoevaporation_wind_rate_msun_myr"

[[source]]
name = "alexander_2006_ii"
url = "https://arxiv.org/pdf/astro-ph/0603254"
archive_url = "https://web.archive.org/web/20260719050034/https://arxiv.org/pdf/astro-ph/0603254"
citation = "Alexander, R. D., Clarke, C. J., Pringle, J. E. 2006, Photoevaporation of protoplanetary discs II: evolutionary models and observable properties, MNRAS 369, 229. DOI 10.1111/j.1365-2966.2006.10294.x. arXiv:astro-ph/0603254."
sha256 = "bc8ccd9f86f5fbe86d91eca6e22e835c6b5b462913efa6b6488d43871f437e39"
bytes = 705341
grade = "theory"
extract = "CROSS-REFERENCE CHANNEL restating the HJLS94 rate and giving the Phi^(1/2) scaling plus the direct-field extension. Eq. 2 (p.2) verbatim: Mdot_wind ~ 4.4e-10 (Phi/1e41 s^-1)^(1/2) (M_*/1 M_sun)^(1/2) M_sun/yr, attributed to Hollenbach et al. 1994, 'where Phi is the ionizing flux produced by the star'. GRAVITATIONAL RADIUS (Eq. 1): R_g = G M_*/cs^2 = 8.9 (M_*/M_sun) AU, cs the ionized-gas sound speed typically 10 km/s. SCALING (Eq. 14): in BOTH the diffuse and direct cases Mdot ~ Phi^(1/2). DIRECT-FIELD RATE (Eq. 3, from Paper I, MNRAS 369, 216): Mdot(<R_out) = 1.73e-9 (CD/mu) (Phi/1e41 s^-1)^(1/2) (H/R / 0.05)^(-1/2) times a radial factor in (Rin, Rout) M_sun/yr, with fitted scaling constants (CD) = 0.235 +/- 0.02 and a = 2.42 +/- 0.09 for H/R = 0.05; the base density is nin = [Phi/(4 pi alpha_B (H/R) Rin^3)]^(1/2) (Eq. 16, 17). The direct rate exceeds the diffuse rate by a factor 8.8 at M_* = 1 M_sun. HYDRO CORRECTION noted in text: the effective R_g is reduced by a factor ~5 and the mass-loss rate by a factor ~3 (Font et al. 2004, Liffman 2003) relative to the HJLS94 analytic weak-wind value, qualitative behaviour unchanged. SCOPE: EUV Lyman-continuum thermal wind; the diffuse (recombination) field dominates in the optically-thick weak-wind branch (profile Sigma_dot ~ (R/R_g)^(-5/2), integrated Mdot ~ R^(-1/2)); the direct field dominates once the inner disc drains and turns optically thin (Sigma_dot ~ R^(-a), integrated Mdot ~ R^(1/2)); the transition set at optical depth tau = 4.61, i.e. exp(-tau) = 0.01 (Eq. 15). T Tauri fluxes Phi ~ 1e41 to 1e43 s^-1. DISCREPANCY FLAG: the quoted 4.4e-10 sits about 7 percent above the HJLS94 Eq. 3.14 rescaled value 4.1e-10 and above the commonly-quoted 4e-10; the exponents (Phi^(1/2), M^(1/2)) agree exactly across all three channels. LICENSE: OPEN (arXiv astro-ph/0603254, public-tree). The Wayback snapshot re-hashes BYTE-IDENTICAL (sha256 bc8ccd9f, 705341 bytes), a real held witness. DUAL-CHANNEL: pdftotext text layer and a visual equation cross-read agree."
used_by = "astro::EuvWindFit; astro::radiative_euv_photoevaporation_wind_rate_msun_myr"

