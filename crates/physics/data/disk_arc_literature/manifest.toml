extract = "The deuterium-burning minimum mass, the giant-planet / brown-dwarf line. FIDUCIAL (Abstract): 50 percent of initial deuterium burns at ~13.0 +/- 0.8 M_Jup (= 0.012 M_sun) for most proto-brown-dwarf conditions. FULL RANGE (Abstract; Table 1/3): 11.0 M_Jup (3x solar metallicity, 10 percent burn) to 16.3 M_Jup (zero metallicity, 90 percent burn). Definition: NO single criterion; the mass at which a chosen fraction (10/50/90 percent) of initial D combusts within 10 Gyr (each fraction a different edge; 10 to 50 to 90 percent each adds ~0.8-0.9 M_Jup). DEPENDENCE (Table 1, M(50%) in M_Jup): helium Y higher lowers it (Y=0.22 -> 14.08, 0.25 -> 13.55, 0.30 -> 12.42, 0.32 -> 12.05); initial deuterium higher lowers it; metallicity Z higher lowers it (Z0 -> 15.40, Z0.01 -> 14.56). COOLTLUSTY metallicity track (T-sequence, Table 1 rows T0.3/T1/T3, fiducial Y=0.25, 50 percent burn): M_D = 13.77 / 13.48 / 13.13 M_Jup at 0.316 / 1 / 3.16 solar metallicity, the track the paper uses to build its Table 3 metallicity-dependent limit, consumed source-verbatim by the metallicity kernel. NARROWED realistic band (Sec.4): 12.2 to 13.7 M_Jup for Y in 0.25-0.30, y_D,i in 1e-5 to 2e-5, Z in 0.5-2 solar, 50 percent burn. SCOPE: cloud-free high-initial-entropy (hot-start) models; metallicity enters via atmospheric opacity. LICENSE: OPEN (arXiv), public-tree; the archive_url snapshot re-hashes byte-identical. DUAL-CHANNEL: abstract prose and Table 1 grid agree on the endpoints. Id verified against held bytes (title, authors)."
