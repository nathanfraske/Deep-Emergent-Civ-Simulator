extract = "The primary UV gas-to-reddening ratio. VALUE (Table 2 Observational Averages, p.136; restated Sec. IIIa Interpretation and Abstract): the mean total-hydrogen to color-excess ratio <N(HI+H2)/E(B-V)> = 5.8e21 atoms cm^-2 mag^-1 for all 75 stars (30 intercloud f<0.01 give 5.0e21, 45 cloud f>0.01 give 5.9e21), where N(HI+H2) = N(HI)+2N(H2) counts total hydrogen nuclei. ATOMIC-ONLY channel (same Table 2): <N(HI)/E(B-V)> = 4.8e21 for all 75 stars (5.0e21 intercloud, 4.8e21 cloud). Abstract verbatim: 'A definitive value is found (N(HI+H2)/E(B-V)) = 5.8 x 10^21 atoms cm^-2 mag^-1'; for stars with accurate E(B-V) the deviations from this mean are generally less than a factor of 1.5. DERIVED CONVERSION to N_H/A_V (the caller's arithmetic, not a Bohlin read): with the standard total-to-selective ratio R_V = A_V/E(B-V) = 3.1 (Savage and Mathis 1979), N_H/A_V = 5.8e21/3.1 = 1.87e21 atoms cm^-2 mag^-1; Bohlin reports the ratio per E(B-V) only and applies no R_V. SCOPE: Copernicus L-alpha (Lyman-alpha) absorption toward bright OB stars within about 1 kpc, E(B-V) up to 0.5 mag, mean distance about 770 pc; no correction for the ionized component in HII regions (Jenkins 1976 estimates about 4 percent of the gas ionized for this sample). DUAL-CHANNEL: the ADS-scan OCR text layer and a visual read of the Table 2 image (p.136) agree on 5.8e21 (total) and 4.8e21 (atomic), no digit flip. LICENSE: OPEN (NASA ADS scanned full text, AAS, public-tree), held bytes; the archive_url snapshot is to be re-hashed byte-identical once the Internet Archive capture finishes playback (submitted 2026-07-19, IA was in a transient Temporarily-Offline window during re-fetch)."
