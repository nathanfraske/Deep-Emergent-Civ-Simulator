# ============ Circumstellar disk resonant truncation fraction (R_t/a, f = R_t/R_L) ============
# The disk-radius cap narrowed from the conservative Eggleton Roche-lobe edge (R_L, already shipped) to the real
# resonant truncation radius R_t = f R_L inside the lobe. Artymowicz and Lubow 1994 is the standard SPH
# determination (R_t/a versus mass parameter, eccentricity, and Reynolds number); Pichardo, Sparke and Aguilar
# 2005 is the dissipationless invariant-loop cross-reference (gives f = R_t/R_L as a closed fit); Papaloizou and
# Pringle 1977 is the earlier analytic tidal-truncation foundation (f about 0.85 to 0.9, high-viscosity limit).
# MASS-RATIO CONVENTION differs across the three and is stated per entry: AL94 and Pichardo key on the mass
# FRACTION mu = q_frac = M2/(M1+M2) (equal mass = 0.5); PP77 and the caller key on q = M2/M1 (equal mass = 1);
# the two link by q = mu/(1-mu).

[[source]]
name = "artymowicz_lubow_1994"
url = "https://articles.adsabs.harvard.edu/pdf/1994ApJ...421..651A"
archive_pending = "Internet Archive service-wide outage at vendoring time (2026-07-19; the availability endpoint reset the connection). The held bytes are confirmed byte-identical to the LIVE primary source: a fresh re-download of https://articles.adsabs.harvard.edu/pdf/1994ApJ...421..651A cmp-matched the held file (sha256 c76e1673, 437789 bytes), the source-of-truth witness. A Wayback byte-identical snapshot is a pending re-save once IA recovers."
citation = "Artymowicz, P. and Lubow, S. H. 1994, Dynamics of Binary-Disk Interaction. I. Resonances and Disk Gap Sizes, ApJ 421, 651. DOI 10.1086/173679."
sha256 = "c76e1673d9796f23f32ce5cc18f8d013abbdae431ed6bd2eb728c03e66ebcc9e"
bytes = 437789
grade = "theory"
extract = "THE STANDARD SPH determination of disk truncation by resonant (Lindblad) torques in an eccentric binary, giving the truncation radius r/a directly. MASS-PARAMETER CONVENTION (Eq. 16, p.655, verbatim): mu_pm equals 1-mu, mu, and 1 for circumprimary, circumsecondary, and circumbinary disks respectively, so mu is the SECONDARY mass FRACTION mu = M2/(M1+M2) (equal mass mu = 0.5), the restricted-three-body mass parameter; the primary carries fraction 1-mu. Link to the caller's q = M2/M1: q = mu/(1-mu), so mu = 0.3 is q = 0.43, mu = 0.1 is q = 0.11, mu = 0.5 is q = 1. LOAD-BEARING CIRCUMSTELLAR TABLE (Table 3, p.663, 'SPH Model Parameters and Approximate Disk Edge Locations', columns Number, mu, e, c/(Omega_B a), N, Disk Type, r/a Gap Size, log R; note 'Prim, sec, bin refer to circumprimary, circumsecondary, circumbinary'). CIRCUMPRIMARY (prim, disk around the more massive star): mu=0.3 e=0.00 gives r/a = 0.38 +/- 0.03 (log R 4.0); mu=0.3 e=0.30 gives 0.28 +/- 0.03 (log R 4.3); mu=0.1 e=0.00 gives 0.47 +/- 0.04 (log R 4.1); mu=0.1 e=0.30 gives 0.36 +/- 0.03 (log R 4.2). CIRCUMSECONDARY (sec): mu=0.3 e=0.00 gives 0.24 +/- 0.02 (log R 4.4); mu=0.3 e=0.30 gives 0.18 +/- 0.02 (log R 4.4); mu=0.1 e=0.00 gives 0.17 +/- 0.03 (log R 4.4); mu=0.1 e=0.30 gives 0.14 +/- 0.02 (log R 4.5). So the circumstellar OUTER truncation is r/a about 0.14 to 0.47 (roughly 0.3 to 0.5 for circumprimary), and it SHRINKS with eccentricity (circumprimary mu=0.3: 0.38 at e=0 to 0.28 at e=0.3; circumsecondary mu=0.3: 0.24 to 0.18). CIRCUMBINARY INNER edge (bin, same Table 3), which moves the OPPOSITE way, OUTWARD with e: mu=0.3 gives r/a = 1.80 (e=0.00), 1.92 (0.02), 2.15 (0.05), 2.35 to 2.40 (0.10), 2.72 (0.30), 2.88 (0.50), 3.10 (0.70); mu=0.1 gives 1.80 (e=0), 2.10 (0.10), 2.73 (0.50); log R 3.7 to 4.2. ABSTRACT (p.651, verbatim on the circumbinary edge): 'the inner edge location of a circumbinary disk varies from 1.8a to 2.6a with binary eccentricity increasing from 0 to 0.25'; 'For eccentricities 0 < e < 0.75, the minimum separation between a component star and the circumbinary disk inner edge is greater than a'; and standard SPH codes 'can adequately represent the dynamics of disks with moderate viscosity, Reynolds number R ~ 10^3.' RESONANT-TRUNCATION VISCOSITY DEPENDENCE (p.652, verbatim): the resonant torque 'is independent of disk parameters such as the soundspeed, viscosity, and self-gravity', but the disk EDGE sits at the resonance the viscous torque cannot overflow, so 'a changing viscosity displaces the disk edge freely from one resonance to another, especially in high-eccentricity systems where many resonances are available'; higher viscosity therefore pushes the circumstellar edge OUTWARD (and the circumbinary inner edge inward) by overpowering successive resonances, a discrete resonance-to-resonance shift rather than a smooth one. NONRESONANT (tidal) truncation, the Papaloizou and Pringle 1977 mechanism used for circumbinary estimates (p.656): 'the truncation radius, where the torques are equal, is therefore formally independent of viscosity'. REYNOLDS NUMBER (Eq. 34, R^-1 = q_z alpha_sph (c/Omega_B a)^2 (r/a); Table 2 SPH viscosities log R 3.55 to 4.30; Table 3 disk-edge log R 3.7 to 4.5): SPH runs sit at R about 10^4, the standard analytic gap-opening choice is R about 10^5. EDGE DEFINITION (p.660): the half-maximum surface-density location, with the uncertainty set equal to the half-maximum minus quarter-maximum radial difference. CIRCUMBINARY ANALYTIC TIDAL RADII (Table 1, p.656, circular binary, Papaloizou and Pringle approach, r/a vs mu): 0.5 -> 1.68, 0.4 -> 1.72, 0.3 -> 1.75, 0.2 -> 1.76, 0.1 -> 1.74, 0.05 -> 1.71. DERIVED f = R_t/R_L (the CALLER's arithmetic, dividing the tabulated R_t/a by the shipped Eggleton R_L/a at the same q, NOT an AL94 read): circumprimary f about 0.75 to 0.80 for circular, falling with e; consistent with Pichardo 0.733 and PP77 0.85 to 0.9 within their differing definitions. SCOPE: coplanar, geometrically thin, non-self-gravitating, isothermal (H/r <~ 0.1) disks; SPH at mu = 0.1 and 0.3, analytic gap criteria at mu = 0.05 to 0.5; eccentricity to e = 0.75 (analytic) and tabulated to e = 0.7 (circumbinary SPH), e = 0.3 (circumstellar SPH); Reynolds number R about 10^3 to 10^4 (SPH), 10^5 (analytic standard); the binary orbit held fixed (no back-reaction), a prescribed elliptic orbit, quasi-stationary gap. LICENSE: OPEN (NASA ADS scanned full text, AAS, public-tree), held bytes; the scan is IMAGE-ONLY (no OCR text layer). DUAL-CHANNEL: values read VISUALLY page by page from Table 3, Table 1, Table 2 and Eq. 16, cross-confirmed by the abstract prose and the section text (Sec. 2, 3, 4); no OCR digit-flip channel available, the visual read is the sole channel and was taken from the high-resolution page crops."
used_by = "astro::TruncationModality::ViscousSphResonant (the SIBLING rung, a validation and context channel, NOT a coefficient source for the Pichardo function: AL94's viscous SPH edge sits below the Pichardo dissipationless bound and is its own model, not yet a built kernel)"

