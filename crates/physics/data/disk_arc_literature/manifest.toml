# ==================== Cloud-core temperature: thermal balance (route two) ====================

[[source]]
name = "goldsmith_2001"
url = "https://iopscience.iop.org/article/10.1086/322255/pdf"
archive_url = "https://web.archive.org/web/20260718222407/https://iopscience.iop.org/article/10.1086/322255/pdf"
citation = "Goldsmith, P. F. 2001, Molecular Depletion and Thermal Balance in Dark Cloud Cores, ApJ 557, 736. DOI 10.1086/322255."
sha256 = "d0598ff54e0ef06911b338cb7cd1125382598172e70b4b7da7181cdf59e644ed"
bytes = 205437
grade = "theory"
extract = "The dark-core gas-temperature thermal balance, the derive-first route two for the cloud-core temperature. HEATING (eq. 3, p.741): Gamma_gas,cr = 1e-27 * n(H2) erg cm^-3 s^-1, the form zeta*dQ*n with zeta = 2 to 7e-17 s^-1 and dQ ~ 20 eV, the coefficient 1e-27 intermediate between the two ionization rates; linear in density, no temperature dependence. GAS-DUST COUPLING (eq. 15, p.742): Lambda_gd = 2e-33 * n(H2)^2 * (T_gas - T_dust) * (T_gas/10)^0.5 erg cm^-3 s^-1 (accommodation alpha=0.3, eq. 14), the n^2 term negligible below n~1e4 and driving T_gas -> T_dust for n >= 1e6. DUST BALANCE (for the co-solve, p.741-742): external dust heating (eq. 7) Gamma_dust,ext = 3.9e-24 * n(H2) * chi with chi the attenuated-ISRF flux scaling (1e-4 to 1e-5 for dark cores, F_0 = 5.3e-3 erg cm^-2 s^-1 unattenuated); dust cooling (eq. 13) Lambda_dust = 6.8e-33 * (T_d/K)^6 * n(H2); dust balance (eq. 18) Gamma_dust,ext - Lambda_dust + Lambda_gd = 0. These read against the licenced witness for the coupled solve. LINE COOLING (eq. 1, p.739): Lambda_gas = a*(T_gas/10)^b, tabulated not closed-form; dominant coolant 12CO (fractional abundance 5.62e-5), then 13CO; Table 2 undepleted (log n -> a, b): 3.0->(1.1e-24, 2.4), 4.0->(5.6e-24, 2.7), 5.0->(2.3e-23, 3.0), 6.0->(4.9e-23, 3.4). Depletion (Table 4) is optical-depth moderated: at 10 K a 100-fold abundance drop cuts cooling only ~4-fold at n=1e5, ~2-fold at n=1e6. EQUILIBRIUM (Table 5, flux-scaling chi=1e-4, T_gas/T_dust in K, undepleted): n=1e3 9.77/6.18, 1e4 11.4/6.53, 1e5 10.7/7.37, 1e6 8.14/7.63, T_dust co-solved from the dust balance not assumed. SCOPE: n(H2) = 1e3 to 1e6 cm^-3, well-shielded quiescent cores, photoelectric heating dropped, LVG dv/dr=1 km/s/pc, T_dust ~ 6 to 10 K at chi=1e-4 to 1e-3. LICENCE FINDING (owner ruling 2026-07-19, a licence test not a paywall test): copyright 2001 AAS, all rights reserved; no preprint exists; the AAS 2022 open-access transition made back content free to READ but did NOT relicense it for redistribution. So this entry is CITATION-PLUS-WITNESS form: the bytes are NOT held in any repo store (neither the public tree nor a restricted store); the archive_url Internet Archive snapshot is the public WITNESS (byte-identical to the fetched bytes, same sha256 re-verified), and the sha256 records the witnessed identity, not a held redistribution. INPUT-AUDIT: the arXiv id astro-ph/0104273 is NOT this paper (it resolves to Malzac 2001, an AGN accretion-flow paper); Goldsmith 2001 has no preprint, the IOP publisher PDF is the source. Source-internal typo noted: the printed grain radius 1.7e-7 cm should read 1.7e-5 cm per the paper's own eq. 6, peripheral since none of the consumed coefficients derive through it."
used_by = "astro::cloud_core_thermal_balance_temperature_k; astro::cloud_core_coupled_temperatures; astro::GoldsmithThermalModel::goldsmith_2001; calibration reserved disk_clock.cloud_core_temperature_k route two"

[[source]]
name = "burke_hollenbach_1983"
url = "https://articles.adsabs.harvard.edu/pdf/1983ApJ...265..223B"
archive_url = "https://web.archive.org/web/20260718224054/https://articles.adsabs.harvard.edu/pdf/1983ApJ...265..223B"
citation = "Burke, J. R. and Hollenbach, D. J. 1983, The gas-grain interaction in the interstellar medium: thermal accommodation and trapping, ApJ 265, 223. DOI 10.1086/160667."
sha256 = "8478ebcd4742a99792b30e714f9459657809debc6ca83fb85a8de4dbc494f767"
bytes = 1146599
grade = "theory"
extract = "The INDEPENDENT CROSS-REFERENCE for the Goldsmith gas-dust coupling (the primary Goldsmith eq. 14 cites). Eq. 9 p.230: Lambda_g-gr = n_gr * n_H * sigma_gr * (8 k T_g / (pi m_H))^0.5 * alpha_T * (2 k T_g - 2 k T_gr). Confirms the Goldsmith form term by term: the (8 k T_g / pi m_H)^0.5 mean thermal speed IS the sqrt(T_gas) factor of Goldsmith eq. 15; the (2 k T_g - 2 k T_gr) IS the linear (T_gas - T_dust); the bilinear n_gr*n_H becomes n(H2)^2 under a fixed dust-to-gas ratio and grain size (Goldsmith's imposed assumption, not read from this paper). Accommodation coefficient alpha_T from Fig. 4b (molecular H2 on silicate grains), at T_g = 10 K: 0.30 to 0.35 across T_s = 10 to 100 K, so Goldsmith's adopted alpha = 0.3 is SUPPORTED. PROVENANCE CAVEAT: Goldsmith's numeric coefficient 2e-33 and the n^2 collapse come from grain assumptions (radius, cross-section, dust-to-gas) Goldsmith supplies; Burke and Hollenbach leave n_gr and sigma_gr as free inputs. SCOPE: 10 K < T_g < 1e4 K, 5 K < T_s < 1e3 K, 0.1 < n < 1e6 cm^-3; silicate, ice, graphite grains. LICENSE: OPEN (NASA ADS scanned full text), public-tree. The archive_url snapshot was re-downloaded and re-hashed byte-identical to the fetched bytes, a real held witness not a bot-wall page. DUAL-CHANNEL: OCR text and a visual read of eq. 9 and Fig. 4b agree; the Fig. 4b alpha readings are graph-crop estimates good to ~0.03, the alpha ~ 0.3 conclusion robust to that read error."
used_by = "astro::GoldsmithThermalModel (independent cross-reference: the gas-dust coupling form and alpha = 0.3)"

