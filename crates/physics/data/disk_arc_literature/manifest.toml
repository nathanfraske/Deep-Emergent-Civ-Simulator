extract = "Structural-evolution model grid (STAREVOL torques), three masses M = 0.7, 1.0, 1.3 M_sun, six metallicities [Fe/H] = -1.0, -0.5, -0.3, 0.0, +0.3, +0.5. SIGN of the Kraft-break metallicity dependence, source-verbatim (Sec 4.3): 'metallicity affects the mass at which the Kraft break occurs, and our most massive and lowest metallicity models are near or beyond the Kraft break. Indeed, for [Fe/H]=-1.0, even the solar-mass model appears to be near the Kraft break.' The 1.3 M_sun model at solar metallicity is 'very close to the so-called Kraft break'. Mechanism (Sec 3 to 4): 'a metal-enriched star bears a deeper convective envelope with a longer turnover timescale'; the break moves via 'the rapid shrinking of the convective envelope (and thus decrease in tau_cz) as one considers stars with higher mass or lower metallicity.' ANCHORED MAGNITUDE is a MASS shift, not a T_eff slope: the break mass falls from about 1.3 M_sun at [Fe/H]=0.0 to about 1.0 M_sun at [Fe/H]=-1.0, near +0.3 M_sun per dex toward higher mass as [Fe/H] rises. The convective turnover timescale tau_cz spans a factor of about 7 (0.7 M_sun) to about 5 orders of magnitude (1.3 M_sun) across the metallicity range (Sec 3, Fig 1). The paper gives NO T_eff-of-break versus [Fe/H] slope in K per dex; any kelvin-per-dex value is an inference from the mass shift plus a mass-T_eff relation, not a measured quantity. Direction: metal-rich sustains surface convection to higher mass, so the break shifts UP in T_eff with [Fe/H]. SCOPE: 0.7 to 1.3 M_sun main-sequence models, [Fe/H] -1.0 to +0.5, solar-scaled abundances. LICENSE: OPEN (arXiv 2001.10404, public-tree), held bytes. DUAL-CHANNEL: pdftotext layer and a visual read of the Sec 4.3 text agree."
