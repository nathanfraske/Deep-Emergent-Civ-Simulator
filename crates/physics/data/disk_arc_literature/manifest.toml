url = "https://articles.adsabs.harvard.edu/pdf/2005MNRAS.359..521P"
archive_pending = "Internet Archive service-wide outage at vendoring time (2026-07-19; the availability endpoint reset the connection). The held bytes are confirmed byte-identical to the LIVE primary source: a fresh re-download of https://articles.adsabs.harvard.edu/pdf/2005MNRAS.359..521P cmp-matched the held file (sha256 62d6b402, 768345 bytes). A Wayback byte-identical snapshot is a pending re-save once IA recovers. ID CATCH: the arXiv id astro-ph/0502330, a plausible fetch-spec seed, does NOT resolve to this paper (it resolves to Rajguru et al. 2005, a CBI/VSA CMB paper); this entry is vendored from the ADS scan 2005MNRAS.359..521P, and the wrong-id witness is held as the rajguru_2005_errata_backing entry."
citation = "Pichardo, B., Sparke, L. S. and Aguilar, L. A. 2005, Circumstellar and circumbinary discs in eccentric stellar binaries, MNRAS 359, 521. DOI 10.1111/j.1365-2966.2005.08905.x."
sha256 = "62d6b4022c8cd6031cd125a5268a5505f8d9053b60c6f5aede402f510761e92e"
bytes = 768345
grade = "theory"
extract = "CROSS-REFERENCE giving f = R_t/R_L as a closed fit: dissipationless test-particle 'invariant loops' (closed non-intersecting curves in the time-periodic binary potential) set an UPPER bound on circumstellar disc size (weak-dissipation limit), the outermost non-crossing loop taken as the disc edge at binary periastron. MASS-RATIO CONVENTION (Fig. 3 caption, verbatim): q = m2/(m1+m2), the SECONDARY mass FRACTION (equal mass q = 0.5), the same parameter as Artymowicz and Lubow's mu, DISTINCT from the caller's q = M2/M1. LOAD-BEARING FIT (Eq. 6, p.524, verbatim): R_d approx R_d,Egg x 0.733 (1-e)^1.20 q^0.07, where R_d,Egg is Eggleton's Roche-lobe average-radius estimate (the paper's Eq. 5, the same Eggleton 1983 formula the engine ships); fitted over eccentricities [0.00, 0.90] and mass fractions q [0.01, 0.99], accurate to +/- 6.5 per cent (the exponent is 0.07, NOT the 0.01 an initial read of both the OCR layer and a low-resolution visual reported; a superscript misread of BOTH channels, caught in the derive-first audit and corrected against the held page image, p.524). This IS f = R_t/R_L directly: f = 0.733 (1-e)^1.20 q^0.07, so at e = 0 the truncation is f approx 0.733 of the Roche-lobe radius at the companion-dominated limit and WEAKLY mass-fraction dependent (q exponent 0.07, about 17.5 percent per decade, so f runs about 0.53 to 0.73 over q [0.01, 0.99]); at e = 0.5, f approx 0.733 x 0.435 = 0.32; at e = 0.9, f approx 0.733 x 0.063 = 0.046. SECONDARY-DISC RULE (p.526, verbatim): 'For all mass ratios and [e] < 0.8, the size of the disc around the secondary star is well predicted as 0.4 +/- 0.03 of the Lagrange radius times (1 - e)', the Lagrange radius being the L1 (Jacobi) distance at pericentre. TABLE 1 (p.527, averaged radius of the disc around star 2 in units of the semimajor axis a, rows = mass fraction m2 = 0.1 to 0.9, columns = e = 0.0, 0.2, 0.4, 0.6, 0.8): equal mass m2 = 0.5 gives R/a = 0.257 (e=0.0), 0.213 (e=0.2); the circular column runs m2=0.1 -> 0.125, 0.2 -> 0.162, 0.3 -> 0.195, 0.4 -> 0.228, 0.5 -> 0.257, 0.6 -> 0.317, 0.7 -> 0.350, 0.8 -> 0.387, 0.9 -> 0.426. ECCENTRICITY (Abstract, verbatim): 'circumstellar discs are sharply reduced as the eccentricity of the binary grows'; in high-eccentricity cases (e > 0.4) the discs are nearly circular, at lower e elongated perpendicular to the star-star line. AGREEMENT: the circular-case sizes match Rudak and Paczynski 1981, and the method agrees with AL94 and with the alpha Centauri and L1551 observations (Abstract, Sec. 4). VISCOSITY: NONE modeled; this is the ballistic weak-dissipation UPPER bound, so it predicts LARGER radii than the viscous SPH of AL94, and carries no Reynolds-number dependence. SCOPE: coplanar test-particle orbits in the binary orbital plane; mass fraction q = 0.001 to 0.5 computed (Table 1 extends the disc-2 fraction to 0.9), eccentricity to e = 0.9; radii measured at periastron from the outermost non-intersecting loop; no gas pressure, no viscosity, no self-gravity. LICENSE: OPEN (NASA ADS scanned full text, RAS, public-tree), held bytes; the scan carries an OCR text layer. DUAL-CHANNEL: the pdftotext OCR layer and a visual read of Eq. 6 and Table 1 agree on the coefficient 0.733 and the eccentricity exponent 1.20 and the tabulated radii; the mass-fraction exponent 0.07 was misread as 0.01 by both channels (a scanned superscript) and corrected against the held page image in the audit, the case that motivates reading the page image for a load-bearing superscript rather than trusting an OCR-plus-thumbnail agreement."
used_by = "astro::DiskTruncationFit; astro::resonant_truncation_fraction; astro::pichardo_truncation_evaluation; astro::tidally_capped_scale_radius_au (the DIRECT coefficient source for the circumprimary invariant-loop fraction; it does NOT source roche_lobe_radius_au, which is Eggleton's, though it references R_d,Egg as the reference radius)"

