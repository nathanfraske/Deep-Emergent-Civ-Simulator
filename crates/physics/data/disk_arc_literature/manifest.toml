extract = "WM-basic NLTE, hydrodynamic, metal line-blocked and line-blanketed radiation-driven wind atmospheres, solar metallicity, Teff 25000 to 55000 K, log g 3 to 4 (abstract; Sec 1). Dual channel per model (Eq 5, Sec 4): qH is the Lyman-continuum (>13.6 eV) SURFACE photon flux (cm^-2 s^-1), the integral of f_nu/(h nu) above nu_L; QH = 4 pi R_star^2 qH is the total Lyc photon RATE (s^-1). Tabulated real log qH vs Teff and log g (Tables 1 to 3, Vacca et al parameters): class V dwarfs log qH from 23.12 at B0.5 (Teff 32060 K, log g 3.914) to 24.84 at O3 (Teff 51230 K, log g 4.149); class III giants 22.93 (B0.5, 30160 K) to 24.83 (O3, 50960 K); class I supergiants 23.44 (O9.5, 31240 K) to 24.82 (O3, 50680 K). log qH is nearly luminosity-class independent at fixed Teff per unit area. log QH: V from 47.71 (B0.5) to 49.87 (O3); III 48.06 to 49.98; I 49.04 to 50.10. DEPARTURE from blackbody (Fig 4a, dotted curve = blackbody surface flux pi B_nu(Teff), solid = models): real qH is SUPPRESSED below the same-Teff blackbody at low Teff, the suppression deepening toward cooler Teff and higher log g; at high Teff and low log g the ionization edges vanish and qH approaches the blackbody. Read from Fig 4a (approximate, order of magnitude; the blackbody dotted reference is drawn only over Teff about 26 to 40 kK): the departure below blackbody is within about 0.1 to 0.2 dex for Teff above about 45 kK, widening to of order 1 dex suppression at the cool grid edge Teff about 26 to 30 kK, deepest at log g = 4. Cross-check vs Lanz and Hubeny 2003 (TLUSTY NLTE, ApJS 146, 417): agree at high Teff where both approach blackbody, Sternberg lower for Teff below 40 kK with the model-to-model difference growing to about 0.5 dex below 30 kK (Sec 4). SCOPE and LIMITS: solar metallicity; grid floor Teff 25000 K, so the deeper suppression expected for cooler B and A stars (15000 to 25000 K, Herbig Ae/Be) is NOT constrained here. The exact per-Teff departure is formed by the caller as log qH(tabulated) minus log qH_blackbody(Teff), the blackbody surface Lyc flux being a pure Wien-tail integral of Teff (the same object as f_BB); the ratio is not tabulated in the source and is not fabricated here. LICENSE: OPEN (arXiv astro-ph/0312232, public-tree), held bytes CONFIRMED byte-identical to the live arXiv primary source (2026-07-19 retry); the Wayback snapshot byte-identical re-verify stays pending the continuing IA service outage (see archive_pending). DUAL-CHANNEL: pdftotext layer and a visual read of Tables 1 to 3 and Fig 4a agree."
