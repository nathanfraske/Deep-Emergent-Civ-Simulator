citation = "Zucconi, A., Walmsley, C. M., Galli, D. 2001, The dust temperature distribution in prestellar cores, A&A 376, 650. DOI 10.1051/0004-6361:20010778. arXiv:astro-ph/0107055."
sha256 = "c0dc3f6e52f63a47868438517068e08429a0d6633d7d8789bf6a5dc5d5f2dbf7"
