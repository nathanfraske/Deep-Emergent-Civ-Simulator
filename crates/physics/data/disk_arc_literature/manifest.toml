# ============ Gas-to-extinction ratio + ISRF attenuation (chi = 10^(-A_V/2.5) derivation) ============
# The load-bearing constants for astro::radiation_field_chi_from_extinction: the hydrogen column per magnitude
# of visual extinction (N_H/A_V), which converts a core's own N_H into A_V to the centre, and the ISRF
# dust-heating attenuation form, which tests whether the simple V-band flux law 10^(-A_V/2.5) is the right proxy
# for the field that heats dust deep in a core. Bohlin+1978 (UV) and Guver+Ozel 2009 (X-ray) bracket the real
# N_H/A_V band 1.87e21 to 2.21e21. Zucconi+2001 supplies the dust-heating attenuation and shows it is broadband
# and much shallower than the V-band law.

