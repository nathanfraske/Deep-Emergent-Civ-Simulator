# Disk-evolution and layer-4 literature: the vendored-source manifest (the receipt ledger).
#
# LANDED IN THIS LANE by the disk arc (2026-07-18) because the physics lane was down (ephemeral WSL
# issue); this is the physics-lane vendoring landing done here, disk-arc-scoped so it does not collide with
# the coordinator's existing crates/physics/data files when that lane recovers.
#
# BLOCK KIND: [[source]], the HELD-RECEIPT vendored idiom (the JANAF / AESOPUS / BHAC15 held-source family),
# NOT a reserved floor kind. Each entry is an immutable transcription-receipt of a primary paper: citation,
# recipe (url), sha256 of the fetched bytes, byte count, grade, and the SLIMMED verbatim EXTRACT (the exact
# value or passage the code and docs consume). PROVENANCE: header citation, out of floor-Element policing.
#
# SLIMMED, and honest about it: the full source PDFs (about 82 MB across these entries) are NOT committed, the
# repo's standing practice for paper sources (only extractable DATA files are byte-held, as BHAC15 does). The
# sha256 here is the RE-FETCH RECEIPT: the recipe url plus the sha256 reproduce and verify the bytes offline of
# this repo. The verbatim extract is the slimmed held data; scripts/disk_arc_literature_provenance_test.py
# re-checks the manifest's completeness and receipt format so a receipt cannot go missing or malform quietly.
# When the physics lane recovers, this manifest is ready to graduate into the coordinator's held-bytes idiom
# (a data-column extraction plus an offline byte re-checksum) for any entry whose values become a run-path
# data column; the layer-4 demographics are the first candidates.
#
# ARCHIVE CAPTURE (a URL is not provenance, a link rots): each recipe url was submitted to the Internet
# Archive Wayback save-crawler on 2026-07-18; the resulting web.archive.org snapshot is carried as archive_url
# so the fetch recipe survives the source host rotting or moving. 23 of 25 captured cleanly. The two IOP-hosted
# entries (jijina_1999, hartmann_1998) sit behind a Radware perfdrive bot-wall that served the challenge page to
# the crawler for both the direct URL and the ADS-scan facsimile; they carry archive_pending with the reason
# instead, and their vendored bytes (the sha256 receipt) remain the held witness until an unwalled mirror
# captures. scripts/disk_arc_literature_provenance_test.py validates the archive_url format where present and
# requires each entry to carry either archive_url or archive_pending.
#
# ERRATA BACKING (the errata pipeline is itself held): when a fetch catches a WRONG id, the wrong-id target is
# vendored as its own [[source]] (see the errata-backing section at the tail), so 'the relayed id is misattributed'
# is a held fact rather than a claim. A source-internal typo needs no separate entry: it is anchored to the
# equation or table in the same held source whose own arithmetic contradicts the printed value.
#
# The reasoning consolidated here also lives in prose at docs/working/DISK_ARC_FETCH_VALUES.md,
# docs/working/LAYER4_ROOT_CENSUS.md, and the calibration/reserved.toml disk_clock.cloud_core_temperature_k
# basis; this file is the structured, machine-checkable receipt ledger for the same reads.

