extract = "APOGEE-TESS plus Kepler main-sequence sample, log g 3 to 5 dex, T_eff 5600 to 8000 K. Empirical Kraft-break location, source-verbatim (Sec 1): 'Hot stars (Teff > 6250 K) typically experience little to no angular momentum loss due to the presence of vanishingly thin convective zones that cannot sufficiently support a magnetized wind. Cool stars (Teff < 6250 K) typically experience substantial angular momentum loss due to the presence of large convection zones that can sustain a magnetized wind.' So the observed break sits near T_eff = 6250 K. Metallicity dependence, source-verbatim (Sec 5.2, Fig 12): 'Our sample, however, shows no correlation between rotation and metallicity. A Kolmogorov-Smirnov test supports that the metallicity-binned Prot / sin i distributions in Figure 12 are drawn from the same distribution', for bins both above and below the Kraft break split into low, solar, and high [Fe/H]. Below T_eff < 6000 K they report 'suggestions of a correlation between rotation and metallicity' that are 'not statistically significant.' Physical direction confirmed (Sec 5.2): 'higher metallicity causes deeper convection zones at fixed mass (van Saders and Pinsonneault 2013).' This is an empirical NULL or upper bound: no measured kelvin-per-dex shift of the break; any metallicity effect on rotation near the break is below detection in this hot sample. SCOPE: main-sequence, T_eff 5600 to 8000 K, [Fe/H] binned low/solar/high. LICENSE: OPEN (arXiv 2203.15116, public-tree), held bytes. DUAL-CHANNEL: pdftotext layer and a visual read of Sec 1 and Sec 5.2 agree."
