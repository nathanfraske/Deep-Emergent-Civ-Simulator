extract = "INDEPENDENT HYDRODYNAMIC CHANNEL: 2D hydrodynamic photoevaporation simulations quantifying the correction to the HJLS94 analytic weak-wind rate. RATE INTEGRAND (Eq. 8): dMdot_dw/dr = 4 pi r n_0(r) cs m_II, with m_II = 1.35 m_H the mean mass per hydrogen atom. BASE DENSITY (Eq. 13): n_g ~ 4e4 (M_*/M_sun)^(-3/2) (Phi_*/1e41 s^-1)^(1/2) cm^-3, so the integrated rate carries the same Phi^(1/2) M^(1/2) scaling (n_g cs r_g^2 with r_g ~ M cancels the M^(-3/2) to M^(1/2)). GRAVITATIONAL RADIUS (Eq. 12): r_g ~ 1.3e14 (M_*/M_sun) cm for cs ~ 10 km/s. HYDRO CORRECTION (Sec. 3.2.2, and comparison section): the simulated total mass-loss rate is LOWER than the SJH93/HJLS94 analytic result by a factor of about 2.7, because the launch velocity off the disk is about 0.3 to 0.4 cs rather than the analytic assumption v = cs; the models are within a factor 2 to 3 of HJLS94 overall (a check with v = cs recovers the analytic rate to within 10 percent). THERMODYNAMIC INPUT (Sec. 4.1): solar abundance, T = 1e4 K, sound speed cs ~ 10 km/s. SCOPE: EUV Lyman-continuum driven thermal wind; T Tauri regime M_* = 0.1 to 2 M_sun, Phi_* = 1e40 to 1e42 s^-1; the mass-loss integral runs from 0.1 r_g outward and shows non-zero mass loss inside r_g (unlike the analytic model); the simulation fixes the base density to the HJLS94 value, so this channel corrects the launch VELOCITY, not the density normalization. LICENSE: OPEN (arXiv astro-ph/0402241, public-tree). The Wayback snapshot re-hashes BYTE-IDENTICAL (sha256 17a9bcd7, 473307 bytes), a real held witness. DUAL-CHANNEL: pdftotext text layer and a visual equation cross-read agree; the factor 2.7 reduction is stated in prose and confirmed by the vtheta ~ 0.3 to 0.4 cs finding."
