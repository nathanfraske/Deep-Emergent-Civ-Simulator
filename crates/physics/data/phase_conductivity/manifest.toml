# The READ RECORD for the phase-conductivity cited column (../phase_conductivity.toml): what was read,
# out of which table, and which two independent sources back each claim.
#
# WHY THIS FILE CARRIES NO [[source]] BLOCKS, unlike the gruneisen manifest it otherwise mirrors. The
# source registry has two halves and an id lives in exactly one of them: sources/mirrored.toml is
# GENERATED from per-directory [[source]] blocks, and sources/registry.toml is hand-maintained and is
# where a NEW fetch lands (its own header says so). Writing [[source]] blocks here as well would carry
# every source under two ids, which is the duplication defect the pipeline plan records as D8 and which
# already caused a licence finding to miss its twin. So the SOURCES for this fetch are registered once,
# in sources/registry.toml (ids nsrds_nbs8, usgs_ofr88690, cod_phase_crystallography,
# touloukian_1966_oxides, msa_structure_determinations, mixing_henke2016, and from the 2026-07-20
# hematite fetch akiyama_1992_isij_iron_oxides, akiyama_1991_tetsu_dense_iron_oxides and
# tprc_vol2_nonmetallic_solids), and this file carries the
# CLAIMS, which is the shape docs/working/FETCH_PIPELINE_PLAN.md section 2 designed for exactly this:
# "Claims live beside their values in the per-directory manifests, not in the central registry, because
# a claim is about a value and the value's file is where a reader looks."
#
# EVERY CLAIM CARRIES A PRIMARY AND A SECONDARY, per the owner's rule 5, so each value has two
# independent witnesses and a transcription error in either is visible as a disagreement rather than
# invisible as a lone number.
#
# HELD BYTES IN THIS DIRECTORY (receipts below in [[holding]] blocks):
#   nsrds_nbs8_SLIM.pdf     9 pages cut from NSRDS-NBS 8, the recommended-value table and its accuracies
#   diment_pratt_1988.pdf   USGS Open-File Report 88-690 whole, the cross-check and the context values
#   cod/*.cif               11 Crystallography Open Database records, each public domain by its own header
#
# NO BYTES ARE HELD FOR THE THREE SOURCES ADDED ON 2026-07-20, and the reason is a licence conflict rather
# than a paywall. Both Akiyama papers carry CC BY-NC-ND 4.0, which permits non-commercial redistribution;
# this repository ships under Apache-2.0, which grants commercial use, and sources/licences.toml already
# records that exact clash for its MIT OpenCourseWare file and calls shipping such a file under a blanket
# Apache-2.0 statement an overclaim. Repeating a convicted defect to gain a local copy is a bad trade, so
# both are citation-plus-witness against Wayback captures re-fetched and confirmed BYTE-IDENTICAL to the
# publisher fetch. The NoDerivatives term separately forbids the slim a held copy would have been cut to,
# so the choice was whole-or-nothing. TPRC Volume 2 is withheld on the Purdue Research Foundation
# copyright the touloukian_1966_oxides entry already established, and at 85 MB it would dwarf the tree.
#
# THE ONE METHOD FINDING WORTH CARRYING TO THE NEXT FETCH: on BOTH scanned compilations the text layer
# corrupts digits, and on both the corruption is silent and plausible. The USGS scan renders quartz as
# 21.3 and 11.7 where the page prints 24.3 and 14.7, and corundum as 10.8 and 11.2 where the page prints
# 40.8 and 41.2. The NBS Table 14 is a rotated landscape scan whose extracted text is unusable. Every
# value in this column was read from a page render, and the quartz pair then agreed with an independent
# source to within 2 percent, which is what confirms the read rather than merely asserting it.

# =====================================================================================================
# CLAIMS: Column 1, atoms per primitive cell (all eight phases)
# =====================================================================================================
#
# Each of these is a CRYSTALLOGRAPHIC count, reconstructed by the loader from the space group, Z, the
# atoms per formula unit and the lattice centring, so the claim below is really a claim about those four
# fields. The reconstruction is asserted in code
# (crates/physics/src/phase_conductivity.rs, a_cell_count_that_contradicts_its_own_crystallography_is_refused).

[[claim]]
id = "cell.atoms_per_primitive_cell.quartz"
quantity = "9"
primary = ["cod_phase_crystallography"]
secondary = ["msa_structure_determinations"]
anchor = "COD 1011172 and 1011097, both 'P 31 2 1' with _cell_formula_units_Z 3, a = 4.913, c = 5.404. Trigonal P is uncentred, so 3 formula units x 3 atoms = 9. The enantiomorph P3(2)21 has the same lattice and the same Z. SECONDARY confirms the cell only: Levien, Prewitt and Weidner 1980 prints 'a = 4.916(1) and c = 5.4054(4) A at 1 atm' and NO space group and NO Z, which is recorded rather than glossed."
channel = "TF"
scope = "ambient alpha-quartz"

[[claim]]
id = "cell.atoms_per_primitive_cell.corundum"
quantity = "10"
primary = ["cod_phase_crystallography"]
single_witness_reason = "ONE WITNESS, and the second check is structural rather than bibliographic. The cell count is not a measured quantity but a RECONSTRUCTION from the space group, Z, formula content and lattice centring, and the loader recomputes it and REFUSES the row on mismatch (CellCountMismatch). That internal recomputation is the cross-check; a second crystallographic database would restate the same structural determination rather than test it. A genuinely independent witness would be a different structure solution of the same phase, which is not vendored."
anchor = "COD 1000032 (Lutterotti and Scardi 1990), 'R -3 c :H' with Z = 6 in the hexagonal setting: 6 x 5 / 3 = 10. THE SECONDARY IS A DIFFERENT SETTING OF THE SAME STRUCTURE AND IT STATES THE PRIMITIVE CONTENT DIRECTLY, which is stronger than a second hexagonal record: COD 1010914 (Pauling and Hendricks 1925, 'Crystal Structures of Hematite and Corundum') gives 'R -3 c :R' with Z = 2 and a rhombohedral cell volume of 84.5 against the hexagonal 254.8, a ratio of 3.01 that IS the R-centring factor. 2 x 5 = 10 with no division needed."
channel = "TF"
scope = "ambient alpha-Al2O3"

[[claim]]
id = "cell.atoms_per_primitive_cell.periclase"
quantity = "2"
primary = ["cod_phase_crystallography"]
secondary = ["msa_structure_determinations"]
anchor = "COD 1000053 (Sasaki, Fujino and Takeuchi 1979), 'F m -3 m' with Z = 4 and a = 4.217. F-centring puts four primitive cells in the conventional cell, so 4 x 2 / 4 = 2. SECONDARY confirms the structure type and the cell only: Hazen 1976 prints 'The cubic NaCl-type structure of periclase was first suggested by Hull (1919)' with a = 4.2121(1) A, and prints NEITHER the space-group symbol NOR Z. This is the ladder's only simple-class phase and therefore its only overlap sentinel."
channel = "TF"
scope = "ambient MgO"

[[claim]]
id = "cell.atoms_per_primitive_cell.hematite"
quantity = "10"
primary = ["msa_structure_determinations"]
secondary = ["cod_phase_crystallography"]
anchor = "Blake, Hessevick, Zoltai and Finger 1966, Am. Min. 51, 123-129, Table I, read from a 400 dpi render: 'Hexagonal unit cell: a = 5.038 +/- 0.002 A, c = 13.772 +/- .012 A, c/a = 2.733 +/- 0.015, Z = 6' with 'Space Group = R3c' printed beneath. THIS IS THE ONE PHASE OF THE EIGHT WHOSE Z IS PRINTED IN A PUBLISHED PAPER THIS PROJECT HAS READ; for the other seven Z comes from the COD records. 6 x 5 / 3 = 10. SECONDARY states the primitive content directly: COD 1011267 (Zachariasen 1928), 'R -3 c :R' with Z = 2, so 2 x 5 = 10."
channel = "TF"
scope = "ambient alpha-Fe2O3"

[[claim]]
id = "cell.atoms_per_primitive_cell.forsterite"
quantity = "28"
primary = ["cod_phase_crystallography"]
secondary = ["msa_structure_determinations"]
anchor = "COD 1544615, 'P b n m' with Z = 4, a = 4.756(1), b = 10.208(3), c = 5.988(2), composition Mg1.985Si0.993O4 with 0.06 H. Orthorhombic P is uncentred, so 4 x 7 = 28 and the conventional cell IS the primitive cell. SECONDARY, the space group only: Birle, Gibbs, Moore and Smith 1968 prints 'it seems safe to assume that all olivine crystals obey the symmetry of Pbnm and have the normal cell size' and NO Z. Its samples are NATURAL olivines rather than the pure end-member, which is recorded because a reader would otherwise take it as a forsterite refinement."
channel = "TF"
scope = "ambient Mg2SiO4 olivine; NOT the Fd-3m ringwoodite polymorph of the same formula"

[[claim]]
id = "cell.atoms_per_primitive_cell.fayalite"
quantity = "28"
primary = ["cod_phase_crystallography"]
secondary = ["msa_structure_determinations"]
anchor = "COD 1000064 (Fujino, Sasaki, Takeuchi and Sadanaga 1981, Acta Cryst. B37, 513), formula Fe2O4Si, 'P b n m' with Z = 4, a = 4.8195(6), b = 10.4788, c = 6.0873(8). Uncentred, so 4 x 7 = 28. SECONDARY: Birle et al. 1968, whose refined set includes a fayalite and whose Pbnm conclusion covers all four olivines studied."
channel = "TF"
scope = "ambient Fe2SiO4 olivine"

[[claim]]
id = "cell.atoms_per_primitive_cell.spinel"
quantity = "14"
primary = ["cod_phase_crystallography"]
single_witness_reason = "ONE WITNESS, same structural argument as corundum: the count is reconstructed from space group, Z and centring and rechecked at load, so the cross-check is the recomputation rather than a second bibliography entry."
anchor = "COD 1010129 (Passerini 1930), formula Al2MgO4, 'F d -3 m :1' with Z = 8, a = 8.050. The conventional cubic cell holds 8 x 7 = 56 atoms (8 Mg, 16 Al, 32 O) and F-centring puts four primitive cells in it, so 56 / 4 = 14 (2 Mg, 4 Al, 8 O). SECONDARY, cited and not held because its COD record carries an AMCSD attribution condition rather than the public-domain dedication: COD 9001364 (Peterson, Lager and Hitterman 1991, Am. Min. 76, 1455), 'F d -3 m :2' with Z = 8 and a = 8.08435. The two differ only in origin convention. THE WEAKEST CLAIM IN COLUMN 1 AND IT IS FLAGGED AS SUCH: no source read here states spinel's PRIMITIVE content directly, unlike corundum and hematite, so the 14 rests on the F-centring division plus the density check. The lattice-dynamics literature's independent statement that a cubic AB2O4 spinel has 42 phonon branches (3 x 14) is consistent with it but was not read at a primary."
channel = "TF"
scope = "ambient MgAl2O4"

[[claim]]
id = "cell.atoms_per_primitive_cell.enstatite"
quantity = "80"
primary = ["cod_phase_crystallography"]
secondary = ["msa_structure_determinations"]
anchor = "TWO COD RECORDS THAT DISAGREE ON Z AND AGREE ON THE CELL, which is the reason this column carries atoms_per_formula_unit beside Z rather than Z alone: COD 1000047 (Yang and Ghose 1995, Phys. Chem. Minerals 22, 300) states 'P b c a' with Z = 8 for a formula unit written Mg2O6Si2 (10 atoms), and COD 1011018 (Takane 1932) states 'P b c a' with Z = 16 for a formula unit written MgO3Si (5 atoms). Both give 80 atoms in the conventional cell, and Pbca is uncentred, so 80 is also the primitive content. SECONDARY: Hugh-Jones and Angel 1994 prints 'confirming that the crystal used in our experiments has Pbca symmetry' and NO Z."
channel = "TF"
scope = "ambient orthoenstatite MgSiO3; NOT the P2(1)/c clinoenstatite, Pbcn protoenstatite or Pbnm bridgmanite polymorphs of the same formula"

# =====================================================================================================
# CLAIMS: Column 2, kappa_298 (seven of eight phases)
# =====================================================================================================

[[claim]]
id = "conductivity.kappa_298.quartz"
quantity = "10.4 parallel to c and 6.21 perpendicular, W/(m*K) at 300 K; the ladder reads the derived Voigt-Reuss-Hill aggregate 7.390"
primary = ["nsrds_nbs8"]
secondary = ["usgs_ofr88690"]
anchor = "NSRDS-NBS 8 Table 14, printed page 72, 300 K row, Quartz (Single Crystal) columns: 0.104 and 0.0621 Watt cm^-1 K^-1, neither parenthesized so neither extrapolated. Stated accuracy 'within +/-5% at temperatures from 300 to 500 K'. SECONDARY, and it is a real independent check rather than a restatement: USGS OFR 88-690 Table 1, printed page 4, alpha-quartz 24.3 mcal/(cm*s*C) parallel and 14.7 perpendicular at 30 C, which at the 0.4184 conversion give 10.17 and 6.15 W/(m*K), agreeing to 2 and 1 percent. THE SECONDARY ONLY AGREES WHEN READ VISUALLY: the USGS text layer gives 21.3 and 11.7 for those two cells, which would have disagreed by 13 percent and looked like a real discrepancy."
channel = "F"
scope = "ambient single-crystal alpha-quartz"

[[claim]]
id = "conductivity.kappa_298.corundum"
quantity = "36.0 W/(m*K) at 300 K"
primary = ["nsrds_nbs8"]
secondary = ["usgs_ofr88690"]
anchor = "NSRDS-NBS 8 Table 14, 300 K row, Al2O3 column: 0.360 Watt cm^-1 K^-1, unparenthesized, on a specimen the table's footnote declares '99.5% pure, 98% dense, polycrystalline'. Band from the source's own statement for aluminum oxide, 'within +/-8% at temperatures from 500 to 1000 K and increases to about +/-15% below 250 K'; 300 K sits in the unresolved transition, so the wider bound is taken. SECONDARY IS A DISAGREEMENT AND IS RECORDED AS ONE: USGS OFR 88-690 printed page 9 gives an impurity-bearing natural Transvaal crystal at 40.8, 41.2, 36.4 mcal parallel and 36.8, 37.3 perpendicular, converting to 15.2 to 17.2 W/(m*K), roughly HALF the NBS value. The explanation is specimen purity rather than measurement error (a coloured natural corundum carries impurity phonon scattering), which is why the pure-phase recommendation is the anchor and the natural crystal is not."
channel = "F"
scope = "ambient dense polycrystalline Al2O3"

[[claim]]
id = "conductivity.kappa_298.periclase"
quantity = "48.4 W/(m*K) at 300 K, band 11.6"
primary = ["nsrds_nbs8"]
secondary = ["touloukian_1966_oxides"]
anchor = "NSRDS-NBS 8 Table 14, 300 K row, MgO column: 0.484 Watt cm^-1 K^-1, unparenthesized, and 300 K is the LOWEST unparenthesized entry in that column (250 K and 273 K are both parenthesized, so the source does not stand behind them). Specimen '99.5% pure, 98% dense, polycrystalline'. SECONDARY: Touloukian 1966 Table I-27, printed page 66, MgO SINGLE CRYSTAL with impurity concentration 2e19 atoms per cubic centimetre, 300 K = 0.60 Watt cm^-1 K^-1 = 60.0 W/(m*K), unasterisked, traced by its own remark to Slack (1962). THE 24 PERCENT GAP IS A SPECIMEN-FORM DIFFERENCE, NOT SCATTER, and the band is set to it rather than to the narrower stated accuracy of +/-15 percent, because a width that excluded a second measured determination would claim more than the evidence supports. This row is what makes the ladder's overlap sentinel live: periclase is the only simple-class phase, so it is the only row where both rungs evaluate and rung_disagreement_ratio has anything to report."
channel = "F"
scope = "ambient MgO; the anchor is a dense polycrystal and the band reaches the single-crystal value"

[[claim]]
id = "conductivity.kappa_298.forsterite"
quantity = "5.158 W/(m*K) at 300 K, band 0.197"
primary = ["mixing_henke2016"]
single_witness_reason = "ONE WITNESS. The Horai and Simmons 1969 needle-probe determination reaches this manifest through Henke et al. 2016; no second independent determination of forsterite kappa_298 is vendored. Recorded as single-witness rather than by naming Henke twice, which would have claimed an independence that does not exist."
anchor = "Henke, Gail and Trieloff 2016 Table 2 ('The pure mineral species ... and thermal conductivity at 300 K'), row 'forsterite Mg2SiO4, A 140.69, rho 3.22, K 5.158', note (a) = Horai and Simmons 1969, EPSL 6, 359-368, the measurement primary. THE SECONDARY IS AN INDEPENDENT DETERMINATION INSIDE THE SAME PAPER, from a different measurement source: equation (8), 'K(x) = 5.3548 - 5.7704 x + 3.6216 x^2' with x the mole fraction of fayalite, fitted to Horai and Baldridge (1972) at room temperature, which at x = 0 gives K(Fo100) = 5.3548. The band 0.197 is the gap between the two, so the interval covers both determinations. Both sit apart from Table 3's 4.349, which is the Fo80 SOLID SOLUTION and is deliberately not used."
channel = "T"
scope = "ambient pure end-member Mg2SiO4, needle-probe measurement on a finely ground sample"

[[claim]]
id = "conductivity.kappa_298.fayalite"
