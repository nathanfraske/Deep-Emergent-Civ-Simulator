# The atomic term-value column (crate::term_values), the Harrison sp bond-orbital gap estimator's polar-energy
# input. Per element the s and p orbital term values in eV (negative, a bound orbital sits below vacuum). The gap
# estimator reads eps_s/eps_p to form the sp3 hybrid term value eps_h = (eps_s + 3*eps_p)/4 and the polar energy
# V_3 = (eps_h_A - eps_h_B)/2.
#
# PROVENANCE (owner-delivered primary, the Slack-loop closed): the values are Herman & Skillman (1963) Hartree-
# Fock-Slater (Xalpha) atomic term values as tabulated in W. A. Harrison, "Electronic Structure and the Properties
# of Solids" (Freeman 1980; Dover 1989), Table 2-2 (the Solid State Table generation), delivered by the owner from
# the primary source. This is the SAME generation as the pinned eta quartet (rider 1), so the co-conventioned pair
# is single-provenance. Tag: [Herman-Skillman 1963 via Harrison 1980 Table 2-2, cited].
#
# KOOPMANS DEFINITION TAG: these are HF-class Koopmans-compatible (Hartree-Fock-Slater / Xalpha), so eps_p ~ -IE_1
# holds. Herman-Skillman being HFS rather than pure HF, the p-block residual sits at ~18-20% (Si eps_p -6.52 vs
# -IE_1 -8.15 = 20%), at the ~20% Koopmans gate boundary (HF ~10% pass, LDA 30-50% fail), NOT the ~7-10% a pure-HF
# column would give. A Kohn-Sham LDA/PBE eigenvalue (NIST DFT) is barred from this column (the PPLB rule).

[[term_value]]
symbol = "C"
eps_s_ev = "-17.52"
eps_p_ev = "-8.97"
source = "Herman & Skillman 1963 (HFS) via Harrison 1980 Table 2-2 (Solid State Table)"

