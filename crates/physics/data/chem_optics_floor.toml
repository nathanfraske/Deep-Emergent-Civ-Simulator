# The chemistry and optics floors (wave 2 of the physics substrate, R-PHYS-W2; design Part 41,
# record 62.21). Extends the registry with the chem.* and opt.* axes and the closed-form kernels over
# them (in crates/physics/src/laws.rs). Loads onto the mechanical and fluids floors (it reads
# mech.contact_area, mech.arm_length, and the fluids therm.temperature). The axis ranges below are
# SET to the owner's confirmed values (2026-07-02), ratified from the cited physical bound in each
# axis's real field; every value a tunable lever revisable on the owner's signoff. Ranges stay in the
# Q32.32 window; opt.source_power keeps a per-quantity scale reserved (R-UNITS-PIN) for its full
# envelope, the set range being the representable working subset.

# --- Chemistry axes ---

[[axis]]
id = "chem.formation_enthalpy"
measures = "standard enthalpy of formation per unit mass (the reaction-energy substrate)"
unit = "kJ/kg"
dimension = "2,0,-2,0"
scale = "kJ/kg"
tier = 0
range_lo = "-50000"
range_hi = "50000"
real = "CRC thermochemical tables; Atkins, Physical Chemistry (fuel and oxide enthalpies, tens of MJ/kg)"

[[axis]]
id = "chem.standard_potential"
measures = "standard electrode potential, the reduction potential relative to the standard hydrogen electrode (promoted to the volt by wave 3, unified with elec.potential and elec.emf)"
unit = "V"
dimension = "voltage"
scale = "V (the volt, wave-3 promotion, dimension-and-scale only, no numeric re-fit; unified with elec.potential and elec.emf)"
tier = 0
range_lo = "-5"
range_hi = "5"
real = "CRC standard electrode-potential (electromotive) series"

[[axis]]
id = "chem.acidity"
measures = "acidity pH of a solution (the corrosion aggressiveness lever)"
unit = "pH"
dimension = "dimensionless"
scale = "pH"
tier = 0
range_lo = "0"
range_hi = "14"
real = "definitional pH scale (CRC)"

[[axis]]
id = "chem.corrosion_susceptibility"
measures = "a material's susceptibility to corrosive attack"
unit = "ratio"
dimension = "dimensionless"
scale = "ratio"
tier = 0
range_lo = "0"
range_hi = "1"
real = "relative corrosion-rate ordering (Fontana, Corrosion Engineering); a per-material reserved datum"

[[axis]]
id = "chem.activation_energy"
measures = "the reaction activation barrier per unit mass (threshold-gated at Tier 0; the Arrhenius rate deferred)"
unit = "kJ/kg"
dimension = "2,0,-2,0"
scale = "kJ/kg"
tier = 0
range_lo = "0"
range_hi = "50000"
real = "Atkins (activation energies); its quantitative Arrhenius use is deferred to R-GPU-CANON-PIN"

[[axis]]
id = "chem.solute_affinity"
measures = "affinity of a solute for a solvent (the leach fraction lever)"
unit = "ratio"
dimension = "dimensionless"
scale = "ratio"
tier = 0
range_lo = "0"
range_hi = "1"
real = "relative solubility ordering (CRC solubility tables); a per-pair reserved datum"

# --- Optics axes ---

[[axis]]
id = "opt.emissivity"
measures = "surface emissivity (and absorptance by Kirchhoff), the radiant-exchange fraction"
unit = "ratio"
dimension = "dimensionless"
scale = "ratio"
tier = 0
range_lo = "0"
range_hi = "1"
real = "CRC emissivity tables (Incropera Table A.11)"

[[axis]]
id = "opt.reflectance"
measures = "broadband reflectance (albedo), the reflected fraction of incident flux"
unit = "ratio"
dimension = "dimensionless"
scale = "ratio"
tier = 0
range_lo = "0"
range_hi = "1"
real = "CRC optical-constants and albedo tables"

[[axis]]
id = "opt.transmittance"
measures = "broadband transmittance, the transmitted fraction of incident flux"
unit = "ratio"
dimension = "dimensionless"
scale = "ratio"
tier = 0
range_lo = "0"
range_hi = "1"
real = "CRC optical-constants tables"

[[axis]]
id = "opt.absorption_coefficient"
measures = "medium absorption per unit path (the optical-depth lever)"
unit = "1/m"
dimension = "-1,0,0,0"
scale = "1/m"
tier = 0
range_lo = "0"
range_hi = "1000000"
real = "Beer-Lambert absorption coefficients (Hecht); the exp transform deferred to R-GPU-CANON-PIN"

[[axis]]
id = "opt.refractive_index"
measures = "refractive index n of a medium (the refraction and total-internal-reflection lever)"
unit = "ratio"
dimension = "dimensionless"
scale = "ratio"
tier = 0
range_lo = "1"
range_hi = "5"
real = "CRC refractive-index tables (vacuum 1, water 1.33, diamond 2.42)"

[[axis]]
id = "opt.source_power"
measures = "radiant or luminous source power (the inverse-square reach lever)"
unit = "W"
dimension = "2,1,-3,0"
scale = "W"
tier = 0
range_lo = "0.000001"
range_hi = "1000000"
real = "Boyd, Radiometry and the Detection of Optical Radiation; IES Lighting Handbook; CRC. Anchor magnitudes over [1e-6, 1e6] W: a bioluminescent organism ~1e-6 W, a candle ~1 W radiant, a 100 W lamp, an industrial searchlight ~1e6 W. The sub-microwatt to megawatt span derives a fine per-quantity scale from the declared decimal envelope (R-UNITS-PIN)"

[[axis]]
id = "opt.spectral_band"
measures = "per-band reflectance or emitted power over a data-defined band basis (colour, not a hardcoded RGB triple)"
unit = "ratio"
dimension = "dimensionless"
scale = "ratio (per band)"
tier = 0
range_lo = "0"
range_hi = "1"
real = "CIE tristimulus partition and reflectance spectra (Wyszecki and Stiles; Hecht Ch 4); the band edges and per-race receptor sensitivities are reserved data"

[[axis]]
id = "opt.scattering_coefficient"
measures = "medium scattering per unit path (sky brightness, twilight, diffuse ambient)"
unit = "1/m"
dimension = "-1,0,0,0"
scale = "1/m"
tier = 0
range_lo = "0"
range_hi = "1000000"
real = "atmospheric scattering coefficients; the Rayleigh lambda^-4 spectral shape is reserved data, deferred as a computed transcendental"

# --- Chemistry and optics laws (metadata; kernels in laws.rs) ---

[[law]]
id = "law.reaction"
kernel = "reaction"
ports = [
  { role = "products_sum", axis = "chem.formation_enthalpy" },
  { role = "reactants_sum", axis = "chem.formation_enthalpy" },
  { role = "temperature", axis = "therm.temperature" },
]
output_measure = "reaction enthalpy per kg and the barrier-crossed condition"
dimension = "2,0,-2,0"
interval_bound = "[-E_RXN_MAX, E_RXN_MAX]"
tier = 0

[[law]]
id = "law.corrosion"
kernel = "corrosion"
ports = [
  { role = "fluid_potential", axis = "chem.standard_potential" },
  { role = "material_potential", axis = "chem.standard_potential" },
  { role = "susceptibility", axis = "chem.corrosion_susceptibility" },
  { role = "acidity_factor", axis = "chem.acidity" },
]
output_measure = "corrosion driving margin (a rate proxy)"
dimension = "dimensionless"
interval_bound = "[0, CORROSION_MAX]"
tier = 0

[[law]]
id = "law.carnot_limit"
kernel = "carnot_limit"
ports = [
  { role = "hot", axis = "therm.temperature" },
  { role = "cold", axis = "therm.temperature" },
]
output_measure = "ideal heat-to-work efficiency"
dimension = "dimensionless"
interval_bound = "[0, 1]"
tier = 0

[[law]]
id = "law.dissolution"
kernel = "dissolution"
ports = [
  { role = "solute_affinity", axis = "chem.solute_affinity" },
]
output_measure = "leached fraction of a solute"
dimension = "dimensionless"
interval_bound = "[0, 1]"
tier = 0

[[law]]
id = "law.radiant_emission"
kernel = "radiant_emission"
ports = [
  { role = "emissivity", axis = "opt.emissivity" },
  { role = "area", axis = "mech.contact_area" },
  { role = "t_hot", axis = "therm.temperature" },
  { role = "t_cold", axis = "therm.temperature" },
]
output_measure = "radiant heat exchange (Stefan-Boltzmann), a radiant power (explicit-rate convention)"
dimension = "2,1,-3,0"
interval_bound = "[0, FLUX_MAX]"
tier = 0

[[law]]
id = "law.wien_peak"
kernel = "wien_peak"
ports = [
  { role = "temperature", axis = "therm.temperature" },
]
output_measure = "peak emission wavelength (Wien)"
dimension = "length"
interval_bound = "[0, WAVELENGTH_MAX]"
tier = 0

[[law]]
id = "law.inverse_square_falloff"
kernel = "inverse_square_falloff"
ports = [
  { role = "power", axis = "opt.source_power" },
  { role = "distance", axis = "mech.arm_length" },
]
output_measure = "irradiance at a distance (geometric spreading)"
dimension = "0,1,-3,0"
interval_bound = "[0, IRRAD_MAX]"
tier = 0

[[law]]
id = "law.interface_split"
kernel = "interface_split"
ports = [
  { role = "reflectance", axis = "opt.reflectance" },
  { role = "transmittance", axis = "opt.transmittance" },
]
output_measure = "the reflected, absorbed, and transmitted flux triple"
dimension = "energy"
interval_bound = "[0, incident]"
tier = 0

[[law]]
id = "law.optical_depth"
kernel = "optical_depth"
ports = [
  { role = "absorption_coefficient", axis = "opt.absorption_coefficient" },
  { role = "path", axis = "mech.arm_length" },
]
output_measure = "optical depth tau (the exp transform deferred)"
dimension = "dimensionless"
interval_bound = "[0, TAU_MAX]"
tier = 0

[[law]]
id = "law.refractive_contrast"
kernel = "refractive_contrast"
ports = [
  { role = "n1", axis = "opt.refractive_index" },
  { role = "n2", axis = "opt.refractive_index" },
]
output_measure = "the refractive contrast ratio and the total-internal-reflection condition"
dimension = "dimensionless"
interval_bound = "[0, CONTRAST_MAX]"
tier = 0

[[law]]
id = "law.radiative_equilibrium"
kernel = "radiative_equilibrium"
ports = [
  { role = "emissivity", axis = "opt.emissivity" },
]
output_measure = "the equilibrium temperature absorbed irradiance sets (inverse Stefan-Boltzmann)"
dimension = "temperature"
interval_bound = "[0, T_MAX]"
tier = 0
