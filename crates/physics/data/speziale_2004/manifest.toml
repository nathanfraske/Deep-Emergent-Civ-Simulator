# Speziale, Duffy & Angel 2004 "Single-crystal elasticity of fayalite to 12 GPa" source manifest
# (the vendored-primary idiom: file / receipt / anchors). Single-crystal elasticity primary for
# FAYALITE (Fe2SiO4, Fe-olivine end-member) in crates/physics/data/mineral_moduli.toml. Open PDF
# (Duffy group, Princeton), vendored into the public tree. SHA256 is the primary receipt.
# Ambient 298 K, 1 bar (zero-pressure fit of Brillouin scattering to 12.1 GPa).
# SAMPLE CAVEAT: the crystal is (Fe0.94Mn0.06)2SiO4, a near-end-member with 6% Mn, not pure Fe2SiO4.

