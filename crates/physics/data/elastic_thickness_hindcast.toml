# ============================================================================================================
# VENUS, ONE-PLATE LITHOSPHERE. Smrekar & Anderson 2005 (LPSC XXXVI abstract 1804). PRESENT-DAY T_e inferred
# from a global gravity/topography admittance inversion (360x180 grid, 35 spectral classes); there is no load
# age, so the conditioning variable is "present-day inference". The distribution is TRIMODAL (three common T_e
# ranges) and the thin mode dominates: 47% of the planet has T_e < 20 km, indistinguishable from isostasy. The
# loading-mechanism split (context, same abstract): best-fit classes are 15 top-loading = 39% of surface, 7
# bottom-loading = 35%, 4 hot-spot = 15% (89% fit); the remaining 9 classes = 11% are large-amplitude top-loading
# and unfit. These distribution rows are the deliverable; there is no per-region Venus T_e table in the source.
# ============================================================================================================

[[row]]
body = "Venus"
environment = "venus_global"
feature = "T_e inversion search range"
descriptor = "search_range"
age_convention = "present_day"
t_e_km = "0-120"
t_e_lo_km = "0"
t_e_hi_km = "120"
crustal_thickness_search_km = "0-100"
note = "T_e constrained to 0-120 km and crustal thickness Zc to 0-100 km in the admittance inversion."
citation = "smrekar_anderson_2005_lpsc (Results)"

[[row]]
body = "Venus"
environment = "venus_global"
feature = "T_e distribution mode, thin (dominant)"
descriptor = "mode_thin"
age_convention = "present_day"
t_e_km = "<20"
t_e_limit = "upper"
t_e_hi_km = "20"
fraction_percent = "47"
note = "47% of the planet has T_e < 20 km, for which T_e cannot be distinguished from isostasy, suggesting these regions are tectonically inactive. The dominant mode of the trimodal distribution."
citation = "smrekar_anderson_2005_lpsc (Results, Fig.1)"

[[row]]
body = "Venus"
environment = "venus_global"
feature = "T_e distribution mode, intermediate"
descriptor = "mode_intermediate"
age_convention = "present_day"
t_e_km = "40-70"
t_e_limit = "range"
t_e_lo_km = "40"
t_e_hi_km = "70"
note = "Second common range of the trimodal distribution (T_e values between 40 and 70 km)."
citation = "smrekar_anderson_2005_lpsc (Results, Fig.1)"

[[row]]
