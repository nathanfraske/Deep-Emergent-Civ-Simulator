# Measured effective elastic thickness (T_e) of planetary lithospheres versus their state: the HINDCAST
# dataset that referees the engine's DERIVED T_e (the mountain arc's un-eyeballed referee, per the geotherm
# arc ruling in docs/working/GEOTHERM_ARC_SCOPE.md). The engine derives T_e from its geotherm and yield-strength
# envelope, evaluates it at its own volcanic edifices (seamount-class loads), and checks the derived value
# against these measured T_e-versus-state rows: the engine's seamounts against Earth's seamounts, like against
# like.
#
# BLOCK KIND [[row]], the cited-data-COLUMN idiom (matching the convection-scaling [[constant]], the condensation
# [[condensation]], the optical [[species]], and the radii [[radius]] columns), NOT a reserved floor kind
# ([[element]] / [[axis]] / [[substance]]): an immutable transcription of cited MEASURED estimates, out of the
# floor real/fantasy authorship axis and out of floor-Element policing. PROVENANCE: per-row citation (this column
# mixes several primaries, so every row names its source and anchor) plus this header and the held-source manifest
# (elastic_thickness_hindcast/manifest.toml). GRADE: measured (observationally-derived T_e estimates throughout;
# no theory or estimator rows). WITNESSES (held bytes, sha256 in the manifest): scripts/
# elastic_thickness_hindcast_provenance_test.py re-checks every receipt offline and asserts the pre-registered
# fingerprints against this column, so a drifted source or a drifted transcription fails the build.
#
# THE CORE FINDING THIS DATASET EXISTS TO CARRY (the geotherm ruling's load-bearing result): A T_E IS NOT A
# PROPERTY OF THE LITHOSPHERE ALONE. It is a property of the lithosphere JOINED TO A CONDITIONING VARIABLE, and a
# T_e quoted without its conditioning is a statistic with a hidden variable. Two conditioning fields are therefore
# MANDATORY on every row, never optional:
#   (1) the LOADING ENVIRONMENT (`environment`): oceanic interior seamount/island loads are the PRIMARY set;
#       TRENCH / outer-rise loads are a SEPARATE tagged environment (their high curvature yields the plate, so
#       trench T_e is lower than the same plate would show under an interior load); Mars and Venus are their own
#       one-plate environments. Interior and trench are NEVER mixed in one bin.
#   (2) the AGE CONVENTION (`age_convention`): for the oceans the SAME T_e measurements imply DIFFERENT lithosphere
#       states depending on whether the load-age is read as an ISOCHRON age (seafloor-spreading age from magnetic
#       anomalies) or a THERMAL (bathymetric) age (McNutt 1984, via Calmant, Francheteau & Cazenave 1990). Mars is
#       conditioned on a STRATIGRAPHIC EPOCH (crater-count age, Hartmann & Neukum 2001), Venus on a PRESENT-DAY
#       inference (gravity/topography admittance, no age at all). Each row carries which one it is.
#
# THE AGE-CONVENTION BAND (the spread the referee must carry, verified at Calmant et al. 1990 pp.62-63). Calmant's
# global regression of the oceanic-interior rows below, in the ISOCHRON convention, is T_e (km) = 2.70 * sqrt(dt)
# with dt the load age in Ma and a rate standard deviation sigma = 0.15. That isochron-age rate (about 2.5 to 3
# km per sqrt-Ma) corresponds to a limiting isotherm of 350 to 450 C. Read against a THERMAL (bathymetric) age the
# same estimates fit the 550 to 600 C isotherm at a rate near 4 km per sqrt-Ma (olivine rheology: Bodine, Steckler
# & Watts 1981 give 3.3 for wet and 4.3 for dry olivine). So at a fixed plate age the thermal convention predicts a
# T_e roughly 4.0/2.70 ~ 1.5 times (up to 4.3/2.70 ~ 1.6 times) the isochron prediction, and the implied limiting
# isotherm spans about 200 C (350-450 C isochron versus 550-600 C thermal). This factor ~1.5 in T_e, equivalently
# the ~200 C isotherm spread, IS the band. Calmant note plainly that "no estimate is close to the 600 C isotherm"
# (except zero-age lithosphere), which is why the observed isochron rate sits below the thermal-model prediction:
# the difference is read as thermal rejuvenation by intraplate volcanism.
#
# THE CLASSICAL ISOTHERM BOUND IS PROSE COMMENTARY ONLY, NEVER A DATA ROW (owner ruling). The classical oceanic
# limiting isotherm 450 +/- 150 C (that is 300 to 600 C, in Celsius) appears here only in this comment, with its
# convention rider: 300-600 C spans both the isochron (350-450 C) and thermal (550-600 C) readings, so it is a
# statistic born under an unstated convention and could never have been a numeric target. It is recorded for
# context and is deliberately absent from the rows.
#
# TWO DELIBERATE EXCLUSIONS (audit-the-input catches, so contaminated rows never enter the referee set):
#   - Calmant's Table 3 (inferred plate/volcano ages for the Trindade chain and Louisville Ridge) is NOT
#     transcribed: those ages are BACK-SOLVED from T_e through the very relation T_e = 2.70 sqrt(dt) the referee
#     tests, so plotting them would be circular. Only Table 2 (T_e measured by geoid fit, ages independent) is here.
#   - The SOUTH-CENTRAL PACIFIC is the region Calmant EXCLUDE from the global fit (6): a superswell whose
#     lithosphere is thermally rejuvenated, so its T_e is anomalously low for the plate age with no clear age trend
#     (Calmant p.62-63, p.66; Fig.3 full triangles). Those rows are KEPT here (they are real measurements); the
#     exclusion is DOCUMENTED rather than stamped per row, because the paper's exact per-volcano membership cannot
#     be read from the reprint's figure, and a per-row anomaly flag would encode a judgment the source does not
#     hand over cleanly. The region is centred on the south-central Pacific and Darwin Rise and may include the
#     Nazca plate; its low-for-age chains are the Austral (Cook-Austral), Society, Marquesas and Pitcairn superswell
#     chains. The `chain` field carries each row's grouping, so a referee applies fit (6) as the trend of the
#     non-superswell oceans and holds those chains out, as Calmant did. Two riders keep that referee honest: the
#     very young Easter and Sala y Gomez rows (load age near 4 Ma, T_e < 6) are thin-plate NORMAL rather than
#     superswell anomalies, and Samoa (T_e 24 at load age 100) sits on the trend, so neither is a low-for-age outlier.
#
# CONVENTION NOTE ON T_e VALUES: `t_e_km` carries the source value VERBATIM as a quoted string. Oceanic-interior
# rows give a central value with the +/- magnitude in `t_e_band_km`; an unresolved small value is the source's own
# upper limit "<6". Mars rows carry the source's one-sided limits (">300", "<20") or two-sided ranges ("38-65")
# verbatim, with `t_e_lo_km` / `t_e_hi_km` parsed where two-sided. `load_age_myr` on oceanic rows is the DERIVED
# abscissa dt = age_plate_myr - age_volcano_myr (Calmant's age of the plate at the time of loading), carried for
# the referee's convenience and asserted for self-consistency by the provenance test; the measured quantities are
# age_plate_myr, age_volcano_myr and t_e_km.
#
# FINGERPRINTS (owner spot-check, re-asserted in the provenance test): Earth/Bermuda t_e 32.5 (tp 117, tv 30);
# Earth/Great Meteor t_e 19 (tp 80, tv 14); Earth/Mayotte t_e 40.5 (tp 150, tv 5); Earth/Kauai t_e 32.5 (tp 93.5,
# tv 5); Earth/Tahiti t_e 20 (tp 71, tv 1); Earth/Mangaia t_e 7 (tp 88, tv 17.7, the tagged sc-Pacific anomaly);
# Calmant rate 2.70, sigma 0.15; Mars/Olympus Mons t_e ">70" epoch A; Mars/Isidis Planitia t_e "100-180" epoch H;
# Mars/Coracis Fossae t_e "10.3-12.5" epoch H-N; Mars/North Pole t_e ">300" epoch Current; Venus fraction below
# 20 km = 47, trimodal modes "<20" / "40-70" / ">90", inversion range "0-120".
#
# SOURCES (full bibliography; per-row `citation` gives the short key + anchor):
#   calmant_1990_gji   = Calmant, S., Francheteau, J., Cazenave, A. (1990), Elastic layer thickening with age of
#                        the oceanic lithosphere, Geophys. J. Int. 100, 59-67. Table 2 (p.62) is the measured
#                        oceanic-interior set; the isochron/thermal isotherm discussion is pp.62-63. HELD.
#   ruiz_2011_icarus   = Ruiz, J., McGovern, P.J., Jimenez-Diaz, A., Lopez, V., Williams, J.-P., Hahn, B.C.,
#                        Tejero, R. (2011), The thermal evolution of Mars as constrained by paleo-heat flows,
#                        Icarus 215, 508-517. Table 1 (the T_e-derived regions) is transcribed below. The T_e
#                        values are a compilation: McGovern et al. 2004 (admittance) for most rows, Phillips et al.
#                        2008 (North Pole), Ritzer & Hauck 2009 (Isidis Planitia), Grott et al. 2005 (Coracis
#                        Fossae); `te_primary` names the underlying source per row. HELD.
#   smrekar_anderson_2005_lpsc = Smrekar, S.E., Anderson, F.S. (2005), Global admittance estimates of elastic and
#                        crustal thickness of Venus: results from top, hot spot, and bottom loading models, Lunar
#                        and Planetary Science XXXVI, abstract 1804. The trimodal T_e distribution summary. HELD.
#   watts_burov_2003_epsl = Watts, A.B., Burov, E.B. (2003), Lithospheric strength and its relationship to the
#                        elastic and seismogenic layer thickness, Earth Planet. Sci. Lett. 213, 113-131. The
#                        oceanic-TRENCH row (Northern Chile, p.116) and the aggregate oceanic distribution (Fig.1a,
#                        N=186), the latter compiled from Watts 2001 tables 6.1/6.2. HELD.
#   watts_2001 (book)  = Watts, A.B. (2001), Isostasy and Flexure of the Lithosphere, Cambridge Univ. Press. The
#                        canonical T_e/T_s compilation (tables 6.1 oceanic, 6.2 continental). RECEIPT-ONLY, reached
#                        via the held Watts & Burov 2003 witness (its Fig.1 and Fig.3 reproduce those tables); the
#                        book itself is not vendored (large, not open access). Named in the manifest as a reference.
#   watts_zhong_2000   = Watts, A.B., Zhong, S. (2000), Observations of flexure and the rheology of oceanic
#                        lithosphere, Geophys. J. Int. 142, 855-875. The load-age + thermal-age rheology (best-fit
#                        activation energy 120 kJ/mol). NOT HELD: no open full text was reachable (Wiley paywall,
#                        Oxford ORA access-restricted); cited in prose only, its load-age/thermal-age result
#                        corroborated by the held Calmant 1990 and Watts & Burov 2003. Flagged, no values transcribed.
#
# REFERENCE-SLIP FLAGGED FOR THE OWNER: GEOTHERM_ARC_SCOPE.md and the task name the Mars source as "Ruiz 2014 Table
# 1 (13 regions)". The verified primary is Ruiz et al. 2011 (Icarus 215, 508-517), whose Table 1 lists 19 T_e-derived
# features (22 regions total once the 3 brittle-ductile / faulting-depth regions of its Table 2 are added). No
# separate "Ruiz 2014, 13-region" paper exists (the 2014 Ruiz item is a single-author Scientific Reports modeling
# paper reusing the same 22-region compilation). The full Table 1 is transcribed below; the year and count are
# reconciled to the actual primary and surfaced here for ratification.

dataset = "elastic_thickness_hindcast"
quantity = "effective elastic thickness T_e of the lithosphere"
grade = "measured"
oceanic_isochron_fit = "T_e_km = 2.70 * sqrt(load_age_Ma)"
oceanic_isochron_fit_sigma = "0.15"
oceanic_isochron_isotherm_C = "350 to 450"
oceanic_thermal_isotherm_C = "550 to 600"
classical_bound_C_prose_only = "450 +/- 150 (300 to 600); convention-spanning, commentary only, never a row"

# ============================================================================================================
# EARTH, OCEANIC INTERIOR (seamount / island loads). PRIMARY SET. Calmant, Francheteau & Cazenave 1990, Table 2
# (p.62). age_plate = tp (isochron age of the seafloor, from magnetic isochrons interpolated by Larson et al.
# 1985); age_volcano = tv (radiometric); load_age = tp - tv (Calmant's age of the plate at loading); t_e from a
# 3-D flexure fit to SEASAT geoid heights. Feature names and locations are transcribed best-effort from the 1990
# reprint scan; the load-bearing (t_e, tp, tv) triples are the verified, spot-fingerprinted values.
# ============================================================================================================

