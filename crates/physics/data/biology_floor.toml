# The wave-0 biology-and-composition substrate floor (R-PHYS-BIO), expressed as data
# over the QuantityAxis / InteractionLaw registry. The axis ranges below are SET to the
# owner's confirmed values (2026-06-30, select-confirm), each the cited food-composition
# or toxicology bound, every value a tunable lever revisable on the owner's signoff. One
# axis stays reserved: the consumer reference_tolerance, whose pg/kg-to-g/kg envelope
# exceeds one Q32.32 scale, so its scale is per toxin class (settled under R-UNITS-PIN).
# The floor carries axes and laws only; the substances (the generated species) are
# R-BIOSPHERE's output over this floor. Mechanism: design Part 41 (R-PHYS-BIO), record
# 62.16, and docs/working/BIOSPHERE_SUBSTRATE_SCOPED_PROPOSAL.md. The energy_density axis
# stores gross bomb-calorimetry energy (the owner's Decision 5); consumer-available
# energy is a per-consumer derived measure over the assimilable axes.

# --- Tier-0 gross composition axes (food-side, mass fractions of fresh tissue) ---

[[axis]]
id = "bio.water_fraction"
measures = "the water mass fraction of fresh tissue (perishability and energy dilution)"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "0"
range_hi = "1.0"
real = "USDA FoodData Central; FAO/INFOODS (water-rich tissues to ~0.96, definitional ceiling 1.0)"

[[axis]]
id = "bio.energy_density"
measures = "gross energy per gram fresh (stored gross, bomb-calorimetry)"
unit = "kJ/g"
dimension = "2,0,-2,0"
scale = "kJ/g"
tier = 0
range_lo = "0"
range_hi = "38"
real = "Atwater, Merrill and Watt, USDA Agriculture Handbook 74 (pure-lipid gross ~38.9 kJ/g)"

[[axis]]
id = "bio.protein_fraction"
measures = "the protein mass fraction (a partial lump with a residual child for exact additivity)"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "0"
range_hi = "0.9"
real = "USDA FoodData Central; WHO/FAO TRS 935 (lean-dried isolates ~0.9)"

[[axis]]
id = "bio.lipid_fraction"
measures = "the lipid mass fraction"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "0"
range_hi = "1.0"
real = "USDA FoodData Central (rendered fats and pressed oils ~1.0)"

[[axis]]
id = "bio.nonstructural_carbohydrate_fraction"
measures = "the storage and soluble carbohydrate mass fraction (chemistry-keyed, not eater-keyed)"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "0"
range_hi = "1.0"
real = "FAO Food and Nutrition Paper 66; USDA FoodData Central (refined sugar and starch ~1.0)"

[[axis]]
id = "bio.structural_carbohydrate_fraction"
measures = "the fiber, cellulose, and lignin fraction (energy to a fermenter, ballast otherwise)"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "0"
range_hi = "0.9"
real = "Van Soest et al. (1991) (wood lignocellulose ~0.9 by NDF plus lignin)"

[[axis]]
id = "bio.mineral_ash_fraction"
measures = "the mineral ash mass fraction"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "0"
range_hi = "1.0"
real = "Greenfield and Southgate, Food Composition Data (FAO 2003) (mineral salts and bone ash ~1.0)"

[[axis]]
id = "bio.toxin_load_coarse"
measures = "the Tier-0 total toxin mass, the saturating sum of the Tier-1 toxin-class concentrations"
unit = "mg/kg"
dimension = "dimensionless"
scale = "mg/kg"
tier = 0
range_lo = "0"
range_hi = "59000"
real = "Casarett and Doull's Toxicology; the ceiling is the sum of the registered per-class maxima (engine-derived as the registry grows)"

# --- Tier-1 toxin-class concentration axes (a terran-chemistry starting registry; the
# membership grows by demand-closure, the registry-population audit is R-BIO-REGISTRY) ---

[[axis]]
id = "bio.toxin.alkaloid"
measures = "alkaloid concentration in the shared mg/kg scale"
unit = "mg/kg"
dimension = "dimensionless"
scale = "mg/kg"
tier = 1
range_lo = "0"
range_hi = "50000"
real = "Wink (2003), Phytochemistry; Casarett and Doull's Toxicology (leaf and seed alkaloids to ~5 percent dry weight)"

[[axis]]
id = "bio.toxin.cyanogenic"
measures = "cyanogenic and hydrolytic-release HCN-releasable concentration (preparation detoxifies)"
unit = "mg/kg"
dimension = "dimensionless"
scale = "mg/kg"
tier = 1
range_lo = "0"
range_hi = "4000"
real = "Noonan and Savage (1999) (bitter cassava and almond ~1000 to 4000 mg HCN/kg)"

[[axis]]
id = "bio.toxin.cardiac_glycoside"
measures = "cardiac and steroidal glycoside concentration (Na/K-ATPase, the narrow-window exemplar)"
unit = "mg/kg"
dimension = "dimensionless"
scale = "mg/kg"
tier = 1
range_lo = "0"
range_hi = "5000"
real = "Casarett and Doull's Toxicology, mechanism-tagged (foxglove cardenolides ~1500 to 4000 mg/kg)"

# --- Consumer physiology axes (per-race, heritable under Part 25; an extensible
# relation-kind registry, not a closed enum) ---

[[axis]]
id = "bio.consumer.requirement"
measures = "the per-nutrient-class deficiency floor (a not-required sentinel distinct from zero; trace classes warrant a finer per-quantity scale)"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "0"
range_hi = "1.0"
real = "WHO/FAO TRS 935 (2007); WHO/FAO vitamin and mineral requirements (2004); an anchoring taxon scaled allometrically, never a human default"

[[axis]]
id = "bio.consumer.assimilation"
measures = "the absorbed fraction of a class present (carries digestibility consumer-side, zero where no pathway)"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "0"
range_hi = "1.0"
real = "Stevens and Hume, Comparative Physiology of the Vertebrate Digestive System (definitional efficiency)"

[[axis]]
id = "bio.consumer.fermentation"
measures = "the fermentation capacity converting structural carbohydrate to available energy"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "0"
range_hi = "0.85"
real = "Stevens and Hume (ruminant NDF digestibility ~0.8 to 0.85, symbiont-dependent)"

[[axis]]
id = "bio.consumer.reference_tolerance"
measures = "the per-toxin-class reference dose harm is measured against (a not-applicable sentinel distinct from zero)"
unit = "mg/kg-body"
dimension = "dimensionless"
scale = "per-class (ng/kg-body to mg/kg-body)"
tier = 0
range_reserved = "the published tolerance for an anchoring taxon; reserved because the pg/kg-to-g/kg envelope exceeds one Q32.32 scale, so the scale is per toxin class (R-UNITS-PIN)"
real = "Casarett and Doull's Toxicology; Wilderman et al. (woodrat P450)"

[[axis]]
id = "bio.consumer.hill_exponent"
measures = "the per-(toxin-class, consumer) integer dose-response steepness (1 hyperbolic, 2 or 3 sigmoid)"
unit = "integer"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "1"
range_hi = "3"
real = "the Hill equation (Alon, Appendix A); the small-integer set is engine-imposed, the specific n the owner's per-class call"

# --- The three interaction laws (the kernels are fixed Rust in laws.rs) ---

[[law]]
id = "law.net_nutrition"
inputs = ["bio.protein_fraction", "bio.lipid_fraction", "bio.nonstructural_carbohydrate_fraction", "bio.consumer.requirement", "bio.consumer.assimilation", "bio.consumer.fermentation"]
output_measure = "net nutrition by the Liebig minimum over per-class satisfaction"
dimension = "dimensionless"
interval_bound = "[0, 1]"
tier = 0

[[law]]
id = "law.harm"
inputs = ["bio.toxin.alkaloid", "bio.toxin.cyanogenic", "bio.toxin.cardiac_glycoside", "bio.consumer.reference_tolerance", "bio.consumer.hill_exponent"]
output_measure = "net harm by the per-(class, consumer) integer-Hill dose response"
dimension = "dimensionless"
interval_bound = "[0, harm_cap]"
tier = 0

[[law]]
id = "law.edibility"
inputs = ["bio.consumer.requirement", "bio.consumer.reference_tolerance"]
output_measure = "the measured edibility tuple (net nutrition, net harm, margin); the valuation lives in the agent layer"
dimension = "dimensionless"
interval_bound = "[-1, 1] read-time band over the tuple"
tier = 0
