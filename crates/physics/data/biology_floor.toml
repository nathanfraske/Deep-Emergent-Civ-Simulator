# The wave-0 biology-and-composition substrate floor (R-PHYS-BIO), expressed as data
# over the QuantityAxis / InteractionLaw registry. Every axis range is reserved-with-basis
# (the owner sets the bound; reading it unset fails loud). The floor carries axes and
# laws only; the substances (the generated species) are R-BIOSPHERE's output over this
# floor, never authored here. Source: design Part 41 (R-PHYS-BIO), record 62.16, and
# docs/working/BIOSPHERE_SUBSTRATE_SCOPED_PROPOSAL.md.

# --- Tier-0 gross composition axes (food-side, mass fractions of fresh tissue) ---

[[axis]]
id = "bio.water_fraction"
measures = "the water mass fraction of fresh tissue (perishability and energy dilution)"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_reserved = "the closed [0, 1] mass-fraction interval"
real = "USDA FoodData Central; FAO/INFOODS"

[[axis]]
id = "bio.energy_density"
measures = "gross energy per gram fresh (stored gross, bomb-calorimetry)"
unit = "kJ/g"
dimension = "2,0,-2,0"
scale = "kJ/g"
tier = 0
range_reserved = "the lipid ceiling ~38 kJ/g"
real = "Atwater, Merrill and Watt, USDA Handbook 74"

[[axis]]
id = "bio.protein_fraction"
measures = "the protein mass fraction (a partial lump with a residual child for exact additivity)"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_reserved = "the lean-dried ceiling ~0.9"
real = "USDA FoodData Central; WHO/FAO TRS 935"

[[axis]]
id = "bio.lipid_fraction"
measures = "the lipid mass fraction"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_reserved = "the fat ceiling ~1.0"
real = "USDA FoodData Central"

[[axis]]
id = "bio.nonstructural_carbohydrate_fraction"
measures = "the storage and soluble carbohydrate mass fraction (chemistry-keyed, not eater-keyed)"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_reserved = "the starch and sugar ceiling ~1.0"
real = "FAO carbohydrate paper 66; Van Soest et al. (1991)"

[[axis]]
id = "bio.structural_carbohydrate_fraction"
measures = "the fiber, cellulose, and lignin fraction (energy to a fermenter, ballast otherwise)"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_reserved = "the wood ceiling ~0.9"
real = "Van Soest et al. (1991)"

[[axis]]
id = "bio.mineral_ash_fraction"
measures = "the mineral ash mass fraction"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_reserved = "the bone ceiling ~1.0"
real = "Greenfield and Southgate, Food Composition Data (FAO 2003)"

[[axis]]
id = "bio.toxin_load_coarse"
measures = "the Tier-0 total toxin mass, the saturating sum of the Tier-1 toxin-class concentrations in their shared scale"
unit = "mg/kg"
dimension = "dimensionless"
scale = "mg/kg"
tier = 0
range_reserved = "the sum of the documented per-class concentration maxima"
real = "Casarett and Doull's Toxicology (Klaassen ed.)"

# --- Tier-1 toxin-class concentration axes (a terran-chemistry starting registry; the
# membership grows by demand-closure, the registry-population audit is R-BIO-REGISTRY) ---

[[axis]]
id = "bio.toxin.alkaloid"
measures = "alkaloid concentration in the shared mg/kg scale"
unit = "mg/kg"
dimension = "dimensionless"
scale = "mg/kg"
tier = 1
range_reserved = "the documented alkaloid concentration envelope"
real = "Wink (2003); Casarett and Doull's Toxicology"

[[axis]]
id = "bio.toxin.cyanogenic"
measures = "cyanogenic and hydrolytic-release precursor concentration (preparation detoxifies)"
unit = "mg/kg"
dimension = "dimensionless"
scale = "mg/kg"
tier = 1
range_reserved = "the documented cyanogenic-glycoside concentration envelope"
real = "Noonan and Savage (1999)"

[[axis]]
id = "bio.toxin.cardiac_glycoside"
measures = "cardiac and steroidal glycoside concentration (Na/K-ATPase, the narrow-window exemplar)"
unit = "mg/kg"
dimension = "dimensionless"
scale = "mg/kg"
tier = 1
range_reserved = "the documented cardiac-glycoside concentration envelope"
real = "Casarett and Doull's Toxicology, mechanism-tagged"

# --- Consumer physiology axes (per-race, heritable under Part 25; an extensible
# relation-kind registry, not a closed enum) ---

[[axis]]
id = "bio.consumer.requirement"
measures = "the per-nutrient-class deficiency floor (a not-required sentinel distinct from zero)"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_reserved = "the published requirement for an anchoring taxon scaled allometrically, never a human default"
real = "WHO/FAO requirements (TRS 935; 2004)"

[[axis]]
id = "bio.consumer.assimilation"
measures = "the absorbed fraction of a class present (carries digestibility consumer-side, zero where no pathway)"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_reserved = "the closed [0, 1] interval"
real = "Stevens and Hume, Comparative Physiology of the Vertebrate Digestive System"

[[axis]]
id = "bio.consumer.fermentation"
measures = "the fermentation capacity converting structural carbohydrate to available energy"
unit = "fraction"
dimension = "dimensionless"
scale = "1"
tier = 0
range_reserved = "the symbiont-dependent extraction envelope"
real = "Stevens and Hume"

[[axis]]
id = "bio.consumer.reference_tolerance"
measures = "the per-toxin-class reference dose harm is measured against (a not-applicable sentinel distinct from zero)"
unit = "mg/kg-body"
dimension = "dimensionless"
scale = "ng/kg-capable"
tier = 0
range_reserved = "the published tolerance for an anchoring taxon, on a per-quantity scale resolving the ng/kg extreme"
real = "Casarett and Doull's Toxicology; Wilderman et al. (woodrat P450)"

[[axis]]
id = "bio.consumer.hill_exponent"
measures = "the per-(toxin-class, consumer) integer dose-response steepness (1 hyperbolic, 2 or 3 sigmoid)"
unit = "integer"
dimension = "dimensionless"
scale = "1"
tier = 0
range_reserved = "the small integer matching the observed sigmoidicity for the class and consumer"
real = "the Hill equation (Alon, An Introduction to Systems Biology, Appendix A)"

# --- The three interaction laws (the kernels are fixed Rust in laws.rs) ---

[[law]]
id = "law.net_nutrition"
inputs = ["bio.protein_fraction", "bio.lipid_fraction", "bio.nonstructural_carbohydrate_fraction", "bio.consumer.requirement", "bio.consumer.assimilation", "bio.consumer.fermentation"]
output_measure = "net nutrition by the Liebig minimum over per-class satisfaction"
dimension = "dimensionless"
interval_bound = "[0, 1]"
tier = 0

[[law]]
id = "law.harm"
inputs = ["bio.toxin.alkaloid", "bio.toxin.cyanogenic", "bio.toxin.cardiac_glycoside", "bio.consumer.reference_tolerance", "bio.consumer.hill_exponent"]
output_measure = "net harm by the per-(class, consumer) integer-Hill dose response"
dimension = "dimensionless"
interval_bound = "[0, harm_cap]"
tier = 0

[[law]]
id = "law.edibility"
inputs = ["bio.consumer.requirement", "bio.consumer.reference_tolerance"]
output_measure = "the measured edibility tuple (net nutrition, net harm, margin); the valuation lives in the agent layer"
dimension = "dimensionless"
interval_bound = "[-1, 1] read-time band over the tuple"
tier = 0
