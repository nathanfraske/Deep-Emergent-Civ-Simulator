# CaO lime, standard Gibbs energy of formation from the elements, 298.15 to 1800 K. Oxide end-member (no fO2 buffer).
# PRIMARY: Robie & Hemingway (1995), USGS Bull. 2131, LIME high-T table p.182 (298.15 K anchor also in the oxide
# summary p.15). Transcribed from the primary USGS PDF (md5 08c3cc7c2d823667c8efadfebcef02de). SECOND WITNESS: NIST
# WebBook condensed-phase, delta_f H298 = -635.09 (Chase 1998) and -634.92 +/- 0.90 (Cox, Wagman et al. 1984, CODATA);
# S298 = 38.19 (Chase) / 38.1 +/- 0.4 (CODATA); agrees with Robie (-635.1, 38.10) within rounding; Barin pending (see
# manifest.toml). BLOCK KIND [[point]], cited-data-column idiom, header-cited. COLUMNS: t_k (K); delta_f_g_kj /
# delta_f_h_kj (kJ/mol); s_j / cp_j (J/mol/K) on the 298.15 K anchor only. FINGERPRINT: delta_f G298 = -603.1, delta_f
# H298 = -635.1. HONEST LIMITS: delta_f H steps at 1200 K (Ca melts ~1115 K) and at 1800 K (Ca boils ~1757 K) as the
# calcium reference state changes; reference-element features, delta_f G stays smooth. Melting T(CaO) = 3200 K.

substance = "CaO"
mineral = "lime"
phase = "cr"
formula_wt = "56.077"
reference = "formation-from-elements"
melting_t_k = "3200"

[[point]]
t_k = "298.15"
delta_f_g_kj = "-603.1"
delta_f_h_kj = "-635.1"
s_j = "38.10"
cp_j = "42.07"

