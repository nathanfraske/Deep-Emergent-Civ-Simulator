# SiO2 alpha-quartz, standard Gibbs energy of formation from the elements, 298.15 to 1800 K. Quartz component of the
# QFM/FMQ (quartz-fayalite-magnetite) oxygen buffer. PRIMARY: Robie & Hemingway (1995), USGS Bull. 2131, QUARTZ high-T
# table p.214 (298.15 K anchor also in the oxide summary p.18). Transcribed from the primary USGS PDF (md5
# 08c3cc7c2d823667c8efadfebcef02de). SECOND WITNESS: NIST-JANAF (Chase 1998) table O-037 SiO2(cr) quartz, delta_f G298
# = -856.443 (Robie -856.3), delta_f H298 = -910.857 (Robie -910.7), agrees within rounding; Barin pending (see
# manifest.toml). POLYMORPH: alpha-quartz (the reference silica phase; cristobalite and amorphous SiO2 are separate
# phases, not vendored here). BLOCK KIND [[point]], cited-data-column idiom, header-cited. COLUMNS: t_k (K);
# delta_f_g_kj / delta_f_h_kj (kJ/mol); s_j / cp_j (J/mol/K) on the 298.15 K anchor only. FINGERPRINT: delta_f G298 =
# -856.3, delta_f H298 = -910.7. HONEST LIMITS: alpha-beta quartz transition at 844 K (a Cp feature between the 800 and
# 900 K rows); melting point estimated 1700 K, so the 1700 K row and the liquid 1800 K row carry the delta_f H
# reference step (-949.6, -938.5) of the silica reference-phase change; delta_f G stays smooth.

substance = "SiO2"
mineral = "quartz"
polymorph = "alpha-quartz"
phase = "cr"
formula_wt = "60.084"
reference = "formation-from-elements"
alpha_beta_transition_k = "844"
melting_t_k = "1700 (estimated)"

[[point]]
t_k = "298.15"
delta_f_g_kj = "-856.3"
delta_f_h_kj = "-910.7"
s_j = "41.46"
cp_j = "44.59"

