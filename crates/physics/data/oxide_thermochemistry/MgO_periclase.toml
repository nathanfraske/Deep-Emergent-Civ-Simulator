# MgO periclase, standard Gibbs energy of formation from the elements, 298.15 to 1800 K. Refractory oxide end-member
# (no fO2 buffer). PRIMARY: Robie & Hemingway (1995), USGS Bull. 2131, PERICLASE high-T table p.197 (298.15 K anchor
# also in the oxide summary p.17). Transcribed from the primary USGS PDF (md5 08c3cc7c2d823667c8efadfebcef02de). SECOND
# WITNESS: NIST-JANAF (Chase 1998) table Mg-008, delta_f G298 = -568.945 (Robie -569.3), agrees within rounding; Barin
# pending (see manifest.toml). BLOCK KIND [[point]], cited-data-column idiom, header-cited, out of the floor
# authorship axis. COLUMNS: t_k (K); delta_f_g_kj / delta_f_h_kj (kJ/mol, formation from elements); s_j / cp_j
# (J/mol/K) on the 298.15 K anchor only. FINGERPRINT (spot-check): delta_f G298 = -569.3, rising smoothly to -361.1 at
# 1800 K; delta_f H298 = -601.6. HONEST LIMITS: delta_f H steps at 1000 K (Mg melts ~923 K) and again at 1400 K (Mg
# boils ~1363 K) as the magnesium reference state changes; these are reference-element features, delta_f G stays
# smooth. Melting T(MgO) = 3125 K.

substance = "MgO"
mineral = "periclase"
phase = "cr"
formula_wt = "40.304"
reference = "formation-from-elements"
melting_t_k = "3125"

[[point]]
t_k = "298.15"
delta_f_g_kj = "-569.3"
delta_f_h_kj = "-601.6"
s_j = "26.90"
cp_j = "37.26"

