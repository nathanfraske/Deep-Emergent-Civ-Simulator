# Fe3O4 magnetite, standard Gibbs energy of formation from the elements, 298.15 to 1800 K. Magnetite of the QFM/FMQ
# (quartz-fayalite-magnetite), MH (magnetite-hematite), and WM (wustite-magnetite) oxygen buffers. PRIMARY: Robie &
# Hemingway (1995), USGS Bull. 2131, MAGNETITE high-T table p.193 (298.15 K anchor also in the oxide summary p.16).
# Transcribed from the primary USGS PDF (md5 08c3cc7c2d823667c8efadfebcef02de). SECOND WITNESS (DISCREPANCY, both
# recorded): NIST-JANAF (Chase 1998) table Fe-032 Fe3O4(cr): delta_f H298 = -1120.894, S298 = 145.266, delta_f G298 =
# -1017.438. JANAF is 4.7 kJ/mol MORE NEGATIVE than Robie on delta_f G298 (-1017.4 vs -1012.7) and 5.2 kJ/mol more
# negative on delta_f H298 (-1120.9 vs -1115.7); this is BEYOND rounding, a known magnetite reconciliation difference,
# recorded not averaged. The pinned primary here is Robie; the owner should decide which compilation the buffer ladder
# keys off, and verify against Barin (see manifest.toml). BLOCK KIND [[point]], cited-data-column idiom, header-cited.
# COLUMNS: t_k (K); delta_f_g_kj / delta_f_h_kj (kJ/mol); s_j / cp_j (J/mol/K) on the 298.15 K anchor only.
# FINGERPRINT: delta_f G298 = -1012.7, delta_f H298 = -1115.7, S298 = 146.14. HONEST LIMITS: Neel (ferrimagnetic to
# paramagnetic) transition at 845.5 K, printed as its own row (the Cp spikes there). Melting T = 1870 K.

substance = "Fe3O4"
mineral = "magnetite"
phase = "cr"
formula_wt = "231.539"
reference = "formation-from-elements"
neel_transition_k = "845.5"
melting_t_k = "1870"

[[point]]
t_k = "298.15"
delta_f_g_kj = "-1012.7"
delta_f_h_kj = "-1115.7"
s_j = "146.14"
cp_j = "150.90"

