# FeO stoichiometric, the FICTIVE (hypothetical) ideal ferrous oxide end-member. Robie & Hemingway label this
# 'FERROUS OXIDE (STOICHIOMETRIC)' in the summary and 'FERROUS OXIDE (Fictive)' in the high-T section; it is a
# hypothetical stoichiometric FeO, NOT the real mineral. The real iron monoxide is wustite Fe0.947O (see
# FeO_wustite.toml). This row is vendored because NIST-JANAF and many buffer formulations use ideal stoichiometric
# FeO; it must NOT be substituted for wustite in an IW/WM buffer that is meant to track the real mineral. PRIMARY:
# Robie & Hemingway (1995), USGS Bull. 2131, FERROUS OXIDE (Fictive) high-T table p.191 (298.15 K anchor also in the
# oxide summary p.16). Transcribed from the primary USGS PDF (md5 08c3cc7c2d823667c8efadfebcef02de). SECOND WITNESS:
# NIST-JANAF (Chase 1998) / NIST WebBook FeO(cr): delta_f H298 = -272.04, S298 = 60.75; agrees with Robie's
# stoichiometric FeO within rounding; Barin pending (see manifest.toml). BLOCK KIND [[point]], cited-data-column
# idiom, header-cited. COLUMNS: t_k (K); delta_f_g_kj / delta_f_h_kj (kJ/mol); s_j / cp_j (J/mol/K) on the 298.15 K
# anchor only. FINGERPRINT: delta_f G298 = -251.4, delta_f H298 = -272.0. HONEST LIMITS: this is a fictive end-member,
# a computational reference, not a phase that exists at equilibrium; the real wustite row is the one for a real-mineral
# buffer.

substance = "FeO"
mineral = "ferrous oxide (stoichiometric, fictive end-member)"
stoichiometry = "ideal FeO (hypothetical; Robie label: fictive)"
phase = "cr"
formula_wt = "71.846"
reference = "formation-from-elements"

[[point]]
t_k = "298.15"
delta_f_g_kj = "-251.4"
delta_f_h_kj = "-272.0"
s_j = "60.60"
