# MnO manganosite, standard Gibbs energy of formation from the elements, 298.15 to 1800 K. MnO of manganese oxygen
# buffers (MnO-Mn, and the MnO/Mn3O4 pair); oxide end-member for Mn-silicate activities. PRIMARY: Robie & Hemingway
# (1995), USGS Bull. 2131, MANGANOSITE high-T table p.199 (298.15 K anchor also in the oxide summary p.17).
# Transcribed from the primary USGS PDF (md5 08c3cc7c2d823667c8efadfebcef02de). SECOND WITNESS: PENDING. The NIST
# WebBook has no condensed-phase thermochemistry page for MnO (gas-phase ion data only), and the JANAF condensed
# MnO(cr) table code was not locatable via web retrieval; the owner's Barin volume is the second witness (widely cited
# literature anchor delta_f H298 ~ -385.2, consistent with Robie, but NOT recorded as a sourced witness here pending
# retrieval). See manifest.toml. BLOCK KIND [[point]], cited-data-column idiom, header-cited. COLUMNS: t_k (K);
# delta_f_g_kj / delta_f_h_kj (kJ/mol); s_j / cp_j (J/mol/K) on the 298.15 K anchor only. FINGERPRINT: delta_f G298 =
# -362.9, delta_f H298 = -385.2. HONEST LIMITS: delta_f H steps near 1400-1600 K (Mn reference-state changes: Mn has
# several solid allotropes and melts ~1519 K); reference-element features, delta_f G stays smooth. Melting T(MnO) =
# 2054 K.

substance = "MnO"
mineral = "manganosite"
phase = "cr"
formula_wt = "70.937"
reference = "formation-from-elements"
melting_t_k = "2054"

[[point]]
t_k = "298.15"
delta_f_g_kj = "-362.9"
delta_f_h_kj = "-385.2"
s_j = "59.71"
cp_j = "44.10"

