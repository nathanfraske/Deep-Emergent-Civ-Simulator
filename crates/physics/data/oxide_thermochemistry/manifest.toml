# Simple-oxide thermochemistry [M]-data column: the standard Gibbs free energies of formation (formation from the
# elements) of the rock-forming and buffer-forming simple oxides, over ~298 to ~2000 K. These curves ARE the
# oxygen-buffer ladder (IW iron-wustite, WM wustite-magnetite, QFM/FMQ quartz-fayalite-magnetite, MH
# magnetite-hematite, NNO nickel-nickel-oxide, Cr-Cr2O3 eskolaite) that the redox machinery consumes across three
# consumers (the protoplanetary disk, mantle differentiation, and the atmosphere). Landing them cited upgrades that
# ladder from estimator-grade to [M]-pinned.
#
# PRIMARY, owner-pinned (public domain): Robie, R.A. & Hemingway, B.S. (1995), Thermodynamic Properties of Minerals
# and Related Substances at 298.15 K and 1 Bar Pressure and at Higher Temperatures, USGS Bulletin 2131. Each species'
# full temperature progression is transcribed per-file from the primary USGS PDF (the Lodders/perovskite protocol:
# transcribe the table, fingerprint-check spot rows). SOURCE PDF (the receipt): https://pubs.usgs.gov/bul/2131/report.pdf ,
# md5 08c3cc7c2d823667c8efadfebcef02de (byte-identical to the receipt already pinned in perovskite_robie1995.toml, so
# this vendoring shares that verified artifact). The 298.15 K anchors come from the Robie oxide-and-hydroxide summary
# table (pp. 15-18); the T-progressions come from the individual high-temperature phase tables (page per species below).
#
# SECOND WITNESS (the standing pair rule, two independent sources per load-bearing value): the owner-named second
# witness is Barin, "Thermochemical Data of Pure Substances". The Barin volume is NOT in hand here, so for each species
# the interim independent cross-check recorded below is NIST-JANAF (Chase 1998) and/or the NIST WebBook / CODATA, each
# retrieved and cited at the species row. Where that cross-check agrees with Robie within rounding it is noted as
# agreeing; where it disagrees beyond rounding (magnetite) BOTH values are recorded and the discrepancy is called out,
# never averaged. Three rows carry NO retrievable independent second witness (the nonstoichiometric wustite Fe0.947O,
# bunsenite NiO, and manganosite MnO): these are FLAGGED "second_witness = pending" and require the owner's Barin
# volume before the pair rule is satisfied. The named Barin verification against the primary book is the owner's step
# for EVERY row; the cross-checks below are the interim witness, not a substitute for it.
#
# WUSTITE CONVENTION (tagged, per the task): wustite is nonstoichiometric, Fe(1-x)O. Robie & Hemingway tabulate it as
# Fe0.947O (their "WUSTITE" entry, p.190, formula weight 68.887), and that is the FeO the iron-wustite (IW) and
# wustite-magnetite (WM) buffers are built on. Robie ALSO tabulate a separate hypothetical stoichiometric FeO, which
# they label "FERROUS OXIDE (STOICHIOMETRIC)" in the summary and "FERROUS OXIDE (Fictive)" in the high-T section
# (p.191, formula weight 71.846). Both are vendored as distinct rows and tagged; the ideal stoichiometric FeO is the
# "fictive" end-member, never silently substituted for the real wustite. NIST-JANAF/WebBook FeO(cr) (-272.04 kJ/mol,
# S 60.75) matches Robie's STOICHIOMETRIC FeO, not the wustite Fe0.947O; so the stoichiometric row has a second
# witness while the wustite row's second witness is pending (Barin tabulates wustite separately).
#
# BLOCK KIND [[species]], the cited-data-column idiom (matching the janaf/ and optical_constants_aesopus/ manifests),
# NOT the reserved floor [[element]]/[[substance]] kind: an immutable transcription of the Robie-Hemingway tables, out
# of the floor real/fantasy authorship axis. An authored/fantasy oxide draws its formation energy from the estimator
# tier at runtime, never written here (co-location laundering). PROVENANCE: header citation. GRADE: single-grade
# primary (one compilation, Robie 1995) plus an interim second-witness annotation per row.
#
# EXTENSIBLE BY DATA, admit the alien: this set is NON-EXHAUSTIVE by design. A new oxide (any element, any world,
# including one with no Terran analogue) is a NEW ROW here plus a NEW per-species file, never a code change. The loader
# (built separately) keys off the per-species data, so the membership grows with the world while the mechanism stays
# fixed Rust.
#
# COLUMNS per species file: t_k = temperature (K); delta_f_g_kj = standard Gibbs energy of formation from the elements
# (kJ/mol), the load-bearing value the buffer consumes; delta_f_h_kj = standard enthalpy of formation from the elements
# (kJ/mol); s_j / cp_j = standard entropy and heat capacity (J/mol/K) on the 298.15 K anchor row. The mid-table steps
# in delta_f_H (Mg boil, Ca melt, Ni melt, and similar) are reference-element phase-change features of "formation from
# the elements", not errors; delta_f_G stays smooth through them.

reference = "formation-from-elements"
temperature_range_k = "298.15 to 1600-2000 (per species; see melting_t)"
source_pdf_md5 = "08c3cc7c2d823667c8efadfebcef02de"

