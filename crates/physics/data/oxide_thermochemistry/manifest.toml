name = "MgO(cr,periclase)"
formula = "MgO"
mineral = "periclase"
phase = "cr"
formula_wt = "40.304"
file = "MgO_periclase.toml"
buffers = []
buffer_note = "not an fO2 buffer; refractory oxide end-member (activity of MgO in silicate/oxide solutions)"
primary = "Robie & Hemingway (1995), USGS Bull. 2131: summary p.17, high-T table p.197. delta_f H298 = -601.6 kJ/mol, S298 = 26.9 J/mol/K, delta_f G298 = -569.3 kJ/mol."
second_witness = "NIST-JANAF (Chase 1998), table Mg-008, MgO(cr): delta_f H298 = -601.241 kJ/mol, S298 = 26.924 J/mol/K, delta_f G298 = -568.945 kJ/mol. AGREES with Robie within rounding (~0.3 kJ/mol). Barin verification pending (owner)."

