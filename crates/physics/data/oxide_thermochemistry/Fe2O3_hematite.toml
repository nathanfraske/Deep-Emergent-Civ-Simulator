# Fe2O3 hematite, standard Gibbs energy of formation from the elements, 298.15 to 1800 K. Hematite of the
# magnetite-hematite (MH) oxygen buffer (needs Fe3O4 + this Fe2O3). PRIMARY: Robie & Hemingway (1995), USGS Bull. 2131,
# HEMATITE high-T table p.192 (298.15 K anchor also in the oxide summary p.16). Transcribed from the primary USGS PDF
# (md5 08c3cc7c2d823667c8efadfebcef02de). SECOND WITNESS: NIST WebBook / NIST-JANAF (Chase 1998) Fe2O3(cr): delta_f
# H298 = -825.503, S298 = 87.28; agrees with Robie (-826.2, 87.4) within rounding (~0.7 kJ/mol); Barin pending (see
# manifest.toml). BLOCK KIND [[point]], cited-data-column idiom, header-cited. COLUMNS: t_k (K); delta_f_g_kj /
# delta_f_h_kj (kJ/mol); s_j / cp_j (J/mol/K) on the 298.15 K anchor only. FINGERPRINT: delta_f G298 = -744.4, delta_f
# H298 = -826.2. HONEST LIMITS: Neel (magnetic) transition at 950 K, where Robie prints two rows (rhombohedral and
# hexagonal); the 950 K row here carries both delta_f H values in its note (delta_f G is -575.3 on both sides). Rhomb
# below 950 K, hexagonal 950 to 1800 K. Melting T = 1895 K.

substance = "Fe2O3"
mineral = "hematite"
phase = "cr"
formula_wt = "159.692"
reference = "formation-from-elements"
neel_transition_k = "950"
melting_t_k = "1895"

[[point]]
t_k = "298.15"
delta_f_g_kj = "-744.4"
delta_f_h_kj = "-826.2"
s_j = "87.40"
cp_j = "104.05"

