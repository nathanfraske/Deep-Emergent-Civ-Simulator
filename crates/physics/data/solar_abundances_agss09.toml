# AGSS09 present-day solar abundances (Asplund, Grevesse, Sauval & Scott 2009, ARA&A 47, 481), Table 1: the
# photospheric and CI-carbonaceous-chondrite (meteoritic) elemental abundances on the log-epsilon(H)=12 scale, the
# [M]-tier SOLAR CROSS-CHECKER (the reference the solar case is VALIDATED against, NOT the disk-composition input for
# every world; the disk composition is a PER-WORLD input, the star's own abundance pattern, admit-the-alien, and
# these values are the Sun's data row plus the cross-check). AGSS09 is the project's pinned solar anchor. CITED: Asplund, M., Grevesse,
# N., Sauval, A.J. & Scott, P. (2009), Ann. Rev. Astron. Astrophys. 47, 481, Table 1 (p.43); meteoritic column from
# Lodders, Palme & Gail (2009). Transcribed from the primary arXiv reprint PDF (the Lodders/Pyykko protocol:
# transcribe the table, fingerprint-check spot rows). SOURCE PDF (the receipt): https://arxiv.org/pdf/0909.0948 ,
# md5 cfd962fecf59e21b951664d91b1e42eb .
#
# COLUMNS: log_eps_photosphere / sigma_photosphere = the photospheric abundance and its 1-sigma (dex); absent for
# As, Se, Br (no photospheric determination). log_eps_meteorite / sigma_meteorite = the CI-chondrite value and its
# sigma (the noble-gas meteoritic values carry no sigma, being the depleted residue). photosphere_indirect = true
# for the noble gases He, Ne, Ar, Kr, whose photospheric values are indirect estimates (AGSS09 Sect. 3.9, bracketed
# in the source). source = the preferred present-day solar value: "photospheric" where a direct or indirect
# photospheric determination exists (AGSS09's Z is computed from the photosphere), "meteoritic" only where none
# does. HONEST LIMITS on the recommendation: AGSS09 report the photospheric and CI values agree to a mean 0.00 +/-
# 0.05 dex over the 45 non-volatile elements, so a condensation consumer may substitute the lower-sigma CI value for
# a rock-forming refractory; where the two differ by > 0.1 dex AGSS09 attribute it to uncertain photospheric
# analyses (so meteoritic is the more reliable there); all volatiles are depleted in meteorites and Li is depleted
# in the photosphere, so those two columns are not interchangeable. Recommended present-day photospheric mass
# fractions (AGSS09 Table 4, "Present work"): X = 0.7381, Y = 0.2485, Z = 0.0134, Z/X = 0.0181.
#
# SCOPE: every element AGSS09 Table 1 lists from Z=1 (H) through Z=42 (Mo), gapless (Z=43 Tc has no stable isotope
# and is absent from the source), the abundant-and-refractory span that drives the condensation sequence (it carries
# every rock-former, every abundant volatile, and the ultrarefractory Zr); the heavier trace elements (Z>=44) are
# condensation-negligible and are not vendored (a consumer re-fetches them from the same primary).
#
# BLOCK KIND [[abundance]], the cited-data-column idiom, NOT the reserved floor [[element]] kind: an immutable
# transcription of AGSS09 Table 1, out of the floor real/fantasy authorship axis. PROVENANCE: header citation.
# GRADE: single-grade for each column (photospheric = the AGSS09 3D-model determination; meteoritic = the Lodders-
# Palme-Gail 2009 CI compilation); the two grades are kept in distinct columns so a consumer never reads one as the
# other. FINGERPRINTS (owner spot-check, in the loader #[test], photospheric within 0.05 dex): O 8.69, C 8.43,
# Fe 7.50, Mg 7.60, Si 7.51, Ca 6.34, Al 6.45, Ti 4.95, Na 6.24, Ni 6.22, S 7.12; H = 12.00 exactly (the scale
# definition).

scale = "log_eps_H12"
x_mass_fraction = "0.7381"
y_mass_fraction = "0.2485"
z_mass_fraction = "0.0134"
z_over_x = "0.0181"


[[abundance]]
symbol = "H"
z = 1
log_eps_photosphere = "12.00"
log_eps_meteorite = "8.22"
sigma_meteorite = "0.04"
source = "photospheric"

