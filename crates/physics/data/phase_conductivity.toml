crystallography_citation = "Orthoenstatite MgSiO3, space group Pbca (No. 61), Z = 16 counting the formula unit as MgSiO3. Primary: Hugh-Jones, D.A. & Angel, R.J., 1994, A compressional study of MgSiO3 orthoenstatite up to 8.5 GPa, American Mineralogist 79, 405-410, which records that the crystal used 'has Pbca' symmetry with no observed violations. Database records, AND THEY DISAGREE ON Z WHILE AGREEING ON THE CELL, which is why atoms_per_formula_unit is carried beside Z: COD 1000047 (Yang, H.X. & Ghose, S., 1995, Physics and Chemistry of Minerals 22, 300) states 'P b c a' with Z = 8 for a formula unit written Mg2O6Si2 (10 atoms), giving 80; COD 1011018 (Takane, 1932, Proc. Imperial Academy Tokyo 8, 308) states 'P b c a' with Z = 16 for a formula unit written MgO3Si (5 atoms), also giving 80. Orthorhombic P is uncentred, so 80 atoms is both the conventional and the primitive content. Density check: V = 832.18 A^3, M = 100.389, rho = 3.204 gives Z = 16.00."
kappa_citation = "kappa_298 = 4.961 W/(m*K) at 300 K: Henke, Gail & Trieloff 2016, A&A 589, A41, Table 2, row 'enstatite MgSiO3, A = 100.39, rho = 3.20, K = 4.961', note (a) = Horai & Simmons 1969, EPSL 6, 359-368 (the measurement primary). PURE end-member En100, corroborated inside the same paper: its Table 3 EH-chondrite column carries an orthopyroxene of composition En100 with K = 4.961 and rho = 3.20, the same pair, so the end-member value and the census value agree by construction. No uncertainty stated, so no band (reserved, basis in the header)."
