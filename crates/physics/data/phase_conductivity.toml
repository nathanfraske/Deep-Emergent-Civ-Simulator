kappa_298_parallel_c = "10.4"
kappa_298_perpendicular_c = "6.21"
kappa_298_relative_uncertainty = "0.05"
kappa_298_temperature_k = "300"
kappa_specimen_form = "high-purity (over 99 percent) single crystal, per-axis recommended values"
kappa_citation = "kappa_298 principal values at 300 K: Powell, R.W., Ho, C.Y. & Liley, P.E., 1966, Thermal Conductivity of Selected Materials, NSRDS-NBS 8, National Standard Reference Data Series, National Bureau of Standards, issued November 25, 1966, Table 14 'Recommended Thermal Conductivity of Nonmetallic Solids', units Watt cm^-1 K^-1, 300 K row (read from a 300 dpi render of the rotated printed page 72, because the scan's text layer is unreliable): Quartz (Single Crystal) column, 10.4 W/(m*K) parallel to the c-axis and 6.21 W/(m*K) perpendicular, neither in parentheses so neither is extrapolated (the table's footnote reserves parentheses for extrapolated values). Stated accuracy, quoted: the uncertainty for quartz single crystal 'is thought to be within +/-5% at temperatures from 300 to 500 K', which is exactly the anchor point. The single scalar the ladder consumes is the Voigt-Reuss-Hill orientational average the loader derives from this pair, 7.390 W/(m*K), which lands on the accepted polycrystalline quartz conductivity near 7.7 and is an independent magnitude check on the pair. CROSS-CHECKED against a second public-domain source: Diment, W.H. & Pratt, H.R., 1988, Thermal conductivity of some rock-forming minerals: a tabulation, USGS Open-File Report 88-690, Table 1 printed page 4, alpha-quartz 24.3 mcal/(cm*s*C) parallel and 14.7 perpendicular at 30 C, which convert at the 0.4184 factor to 10.17 and 6.15 W/(m*K), agreeing with the NBS recommendation to within 2 and 1 percent. THAT CROSS-CHECK REQUIRED A VISUAL READ: the USGS scan's text layer renders those two cells as 21.3 and 11.7, and the wrong digits would have moved the pair by 13 percent."
crystallography_citation = "alpha-quartz (low quartz), trigonal, space group P3(1)21 (No. 152) with Z = 3; the enantiomorph P3(2)21 (No. 154) is the same primitive trigonal lattice with the same Z, so the cell content is identical either way. Database record: Crystallography Open Database entry 1011172 (Brill, R., Hermann, C. & Peters, C., 1939, Naturwissenschaften 27, 676), _space_group_name_H-M_alt 'P 31 2 1', _cell_formula_units_Z 3, a = 4.913, c = 5.405 A; cross-checked against COD 1011097 (Wei, P.H., 1935, Z. Kristallogr. 92, 355), same space group and Z. Cell parameters confirmed at a modern primary: Levien, L., Prewitt, C.T. & Weidner, D.J., 1980, Structure and elastic properties of quartz at pressure, American Mineralogist 65, 920-930, abstract: 'Unit-cell parameters are a = 4.916(1) and c = 5.4054(4) A at 1 atm'. Trigonal P is uncentred, so the conventional cell IS the primitive cell: 3 x 3 = 9 atoms. Density check: V = 113.01 A^3, M = 60.084, rho = 2.648 gives Z = 3.00."

