crystallography_citation = "MgAl2O4, the spinel structure, space group Fd-3m (No. 227), Z = 8 in the conventional cubic cell (8 Mg + 16 Al + 32 O = 56 atoms). Database record HELD in cod/: COD 1010129 (Passerini, L., 1930, Gazzetta Chimica Italiana 60, 389), formula 'Al2 Mg O4', 'F d -3 m :1', _cell_formula_units_Z 8, a = 8.050 A. Corroborating record, CITED AND NOT HELD (AMCSD attribution condition): COD 9001364 (Peterson, R.C., Lager, G.A. & Hitterman, R.L., 1991, American Mineralogist 76, 1455), 'F d -3 m :2', Z = 8, a = 8.08435 A, the modern refinement whose cell parameter the density check below uses. The two differ only in the origin-choice convention (:1 against :2), which is a setting of the same group and does not move the cell content. F-CENTRING: the conventional cell holds 56 atoms but FOUR primitive cells, so the primitive rhombohedral cell holds 56 / 4 = 14 atoms (2 Mg + 4 Al + 8 O). That is the count the lattice-dynamics literature states independently as 3 x 14 = 42 phonon branches for a cubic AB2O4 spinel. Density check: V = 527.63 A^3, M = 142.266, rho = 3.582 gives Z = 8.00."

