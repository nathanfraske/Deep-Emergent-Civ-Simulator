crystallography_citation = "Mg2SiO4, the olivine structure, space group Pbnm (a non-standard setting of Pnma, No. 62), Z = 4. Primary: Birle, J.D., Gibbs, G.V., Moore, P.B. & Smith, J.V., 1968, Crystal structures of natural olivines, American Mineralogist 53, 807-824, which records that 'it seems safe to assume that all olivine crystals obey the symmetry of Pbnm'. Database record HELD in cod/: COD 1544615 (Journal of Mineralogical and Petrological Sciences, 2006), 'P b n m' with Z = 4, a = 4.756(1), b = 10.208(3), c = 5.988(2) A, composition Mg1.985Si0.993O4 with 0.06 H, a near-end-member synthetic forsterite. Corroborating records, CITED AND NOT HELD because their COD entries carry an AMCSD or IUCr attribution condition rather than the public-domain dedication: COD 9000319 (Smyth, J.R. & Hazen, R.M., 1973, American Mineralogist 58, 588), Pbnm, Z = 4, a = 4.756, b = 10.207, c = 5.980 A; and COD 1572966 (IUCrJ 11, 2024), Pbnm, Z = 4. The HELD fayalite record COD 1000064 is the same olivine structure type and carries the same Pbnm and Z = 4 independently. Orthorhombic P is uncentred, so the conventional cell IS primitive: 4 x 7 = 28 atoms. Density check: V = 290.30 A^3, M = 140.694, rho = 3.211 gives Z = 3.99."
kappa_citation = "kappa_298 = 5.158 W/(m*K) at 300 K: Henke, S., Gail, H.-P. & Trieloff, M., 2016, Thermal evolution and sintering of chondritic planetesimals. III, Astronomy and Astrophysics 589, A41, Table 2 'The pure mineral species considered for calculating the properties of chondrite material, their chemical composition, atomic weight A, mass-density rho and thermal conductivity at 300 K', row 'forsterite Mg2SiO4, A = 140.69, rho = 3.22, K = 5.158', carrying note (a) = Horai, K. & Simmons, G., 1969, Thermal conductivity of rock-forming minerals, Earth and Planetary Science Letters 6, 359-368, which is the measurement primary. This is the PURE end-member, not the Fo80 solid solution of the same paper's Table 3 (4.349). No uncertainty is stated at the source, so no band is carried (reserved, basis in the header)."

