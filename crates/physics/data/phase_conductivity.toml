crystallography_citation = "alpha-Fe2O3, isostructural with corundum, space group R-3c (No. 167), Z = 6 in the HEXAGONAL setting. Primary: Blake, R.L., Hessevick, R.E., Zoltai, T. & Finger, L.W., 1966, Refinement of the hematite structure, American Mineralogist 51, 123-129; the text records that 'the space group R3c of Pauling and Hendricks was confirmed', and Table I states for the hexagonal unit cell 'Space Group: R3c' with 'Z = 6'. Database record HELD in cod/: COD 1011267 (Zachariasen, W.H., 1928), which states the same structure in the RHOMBOHEDRAL setting, 'R -3 c :R' with Z = 2, and the rhombohedral cell IS the primitive cell, so 2 x 5 = 10 atoms directly, matching 6 x 5 / 3 = 10 from the hexagonal setting. Corroborating record, CITED AND NOT HELD because its COD entry carries an IUCr attribution condition rather than the public-domain dedication: COD 2101167 (Maslen, E.N., Streltsov, V.A., Streltsova, N.R. & Ishizawa, N., 1994, Acta Crystallographica B 50, 435), 'R -3 c :H', Z = 6, a = 5.0355(5), c = 13.7471(7) A. Density check: V = 301.80 A^3 (hex), M = 159.688, rho = 5.271 gives Z = 6.00."
kappa_citation = "kappa_298 = 18.20 W/(m*K) at 298 K: Akiyama, T., Ohta, H., Takahashi, R., Waseda, Y. & Yagi, J., 1992, Measurement and Modeling of Thermal Conductivity for Dense Iron Oxide and Porous Iron Ore Agglomerates in Stepwise Reduction, ISIJ International 32(7), 829-837, equation (2), printed page 831, read from a 300 dpi render. The source states its own measurements as a least-squares fit to thermal RESISTIVITY, and the row headed 'Fe2O3;' reads 'k = 1/(1.844 * 10^-4 T)' over the stated range '298 < T < 912', which at the lower bound of that range gives 1 / (1.844e-4 * 298) = 18.198 W/(m*K). THE VALUE IS THE SOURCE'S OWN FIT EVALUATED AT ITS OWN STATED ENDPOINT, not an extrapolation past it and not a digitised figure point, and that is the same pattern the forsterite and enstatite rows already use on Henke's equations (8) and (9) at their end-member compositions. THE ADJACENT BRANCH IS THE TRAP AND THE HEADINGS ARE WHAT AVOID IT: the next block, 'Fe3O4;', reads 'k = 1/(1.693 * 10^-4 T)' over '298 < T < 906', which differs in the third digit and would give 19.82; each branch was read under its printed compound heading rather than by position. SPECIMEN FORM, Table 1 printed page 830: density 5.20 x 10^3 kg/m^3, purity 99.9 percent, impurities Al 200, Co 20, Cr 40, Mn 400, Ni 100, Si 100 ppm, formed by Hot Isostatic Pressing from 1 micrometre powder at 1173 K and 150 MPa, with the paper stating 'The porosity of samples was found to be less than 0.1 %'. This is a dense POLYCRYSTAL rather than a single crystal, the same class of specimen as the corundum and periclase rows. NO BAND IS CARRIED, and the absence is the honest reading rather than an oversight: the paper states no measurement accuracy anywhere, and no independent determination of DENSE hematite at 300 K was retrieved to set a gap against. The two other determinations this project has read are both outside the frame and are recorded as context rather than used: Touloukian 1966 Table I-26 gives a Brazil single crystal at 300 K, but BOTH its entries are asterisked as extrapolated with the nearest measured points at 350 and 400 K; and Diment and Pratt 1988 gives 10.46, 12.09 and 14.69 W/(m*K) on natural samples, the first of them 22 percent porous, which are sample properties rather than the phase. DUAL CHANNEL on the value: the printed equation evaluated at 298 K gives 18.198, and the same paper's Fig. 3 plots dense pure hematite as open circles at about 0.055 m*K/W at 300 K, whose reciprocal is about 18. A DISCREPANCY INSIDE THE SOURCE, recorded rather than smoothed: the stated porosity below 0.1 percent does not sit with the same paper's tabulated density of 5.20 against the crystallographic 5.271 this row derives above, a 1.3 percent gap, so either that column is the material's true density rather than the compact's apparent density or the two statements disagree, and the paper does not say which. THIS ROW CLOSES THE CRITERION THE PREVIOUS FETCH WROTE FOR IT, which asked for a modern single-crystal or dense-polycrystal measurement at 300 K that is not an extrapolation."

