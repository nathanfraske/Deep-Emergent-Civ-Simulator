kappa_citation = "kappa_298 = 48.4 W/(m*K) at 300 K: Powell, R.W., Ho, C.Y. & Liley, P.E., 1966, Thermal Conductivity of Selected Materials, NSRDS-NBS 8, National Standard Reference Data Series, National Bureau of Standards, issued November 25, 1966, Table 14 'Recommended Thermal Conductivity of Nonmetallic Solids', units Watt cm^-1 K^-1, 300 K row (read from a 300 dpi render of the rotated printed page 72; the scan's text layer is unreliable): MgO column reads 0.484 Watt cm^-1 K^-1 at 300 K, not parenthesized so not extrapolated (the 250 K and 273 K entries above it ARE parenthesized, so 300 K is the lowest recommended value the source stands behind for MgO). SPECIMEN FORM: the MgO column wears the same '99.5% pure, 98% dense, polycrystalline' footnote. BAND BASIS: the source's own statement for magnesium oxide, that the uncertainty 'is thought to be within +/-8% at temperatures from 500 to 1000 K and increases to +/-15% below 300 K'; 300 K is the stated boundary, so the wider bound is taken. THIS ROW IS THE LADDER'S OVERLAP SENTINEL and is the reason it was worth chasing: periclase is the only one of the eight phases in the simple class (n = 2), so it is the phase where BOTH rungs evaluate and rung_disagreement_ratio has something to report. Slack's own docstring records its MgO estimate at about 110 W/(m*K); against this anchor the ratio is near 2.3, inside the roughly 3x band Slack declares for simple cells, so the sentinel now runs and reports agreement rather than sitting dormant. INDEPENDENT SECOND DETERMINATION, and it is what widens the band past the source's own stated accuracy: Touloukian, Y.S. (ed.), 1966, Recommended Values of the Thermophysical Properties of Eight Alloys, Major Constituents and Their Oxides, NBS Sub-Contract CST-7590 / NASA Order R-45, TEPIAC Purdue, Table I-27 printed page 66, 'Thermal Conductivity of Magnesium Oxide (single crystal) MgO, Selected Values for MgO Single Crystal with Impurity Concentration 2 x 10^19 atoms cm^-3', 300 K row = 0.60 Watt cm^-1 K^-1 = 60.0 W/(m*K), unasterisked so not extrapolated, whose remark records that values from 2 to 320 K are taken from Slack (1962). THE GAP IS A FRAME DIFFERENCE, NOT ONLY SCATTER: 60.0 is a single crystal and 48.4 is a 98 percent dense polycrystal, and porosity plus grain-boundary resistance is the expected direction and rough size of the 24 percent difference. The band is set to that gap, 11.6, rather than to the source's stated +/-15 percent (7.26), because a width that excluded a second measured determination of the same phase would be a narrower claim than the evidence supports."
