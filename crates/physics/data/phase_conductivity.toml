# The two per-phase columns the THERMAL-CONDUCTIVITY LADDER (crate::civsim_materials::conductivity)
# needs and that no data file in this repo carried, for the eight phases of phase_registry.toml.
# Sibling of mineral_moduli.toml (elastic) and gruneisen.toml (thermal-EoS): same eight phase keys,
# same cited-data-column idiom, same refusal rather than a default.
#
# WHY THIS FILE EXISTS. Both rungs of the ladder key on ATOMS PER PRIMITIVE CELL, which Slack's own
# docstring marks (DATA). It was a function parameter and a struct field and nothing else, so
# assemblage_conductivity had no production caller and a mantle column's conductivity could not be
# derived. This file supplies that column, and supplies the measured kappa_298 anchor for the phases
# where a citable primary reports one.
#
# BLOCK KIND [[conductivity]], the cited-data-COLUMN idiom (mirroring mineral_moduli.toml's [[mineral]],
# the gruneisen [[mineral]], the ionic radii [[radius]], the condensation [[condensation]]), NOT a
# reserved floor kind ([[element]] / [[axis]] / [[substance]]): an immutable transcription of cited
# values, out of the floor real/fantasy authorship axis and out of floor-Element policing. Values are
# QUOTED strings. Keyed by the phase name, matching the registry / moduli / gruneisen spelling exactly
# (the JANAF-decorated crust names such as MgSiO3(cr,enstatite) resolve through the same canonical
# bridge, mineral_moduli::canonical_phase_key).
#
# ===== COLUMN 1: atoms_per_primitive_cell (all eight phases) =====
#
# THIS IS A CRYSTALLOGRAPHIC COUNT, NOT A MEASUREMENT, and it is RECONSTRUCTIBLE rather than asserted.
# Each row carries the space group, the formula units per conventional cell Z, the atoms per formula
# unit, and the lattice points per conventional cell, and the loader RECOMPUTES
#
#     atoms_per_primitive_cell = Z * atoms_per_formula_unit / lattice_points_per_conventional_cell
#
# refusing the row when the stated count disagrees or the division is not exact. So a transcription
# slip in any one of the four fields fails the build rather than shipping a wrong cell count.
#
# THE CONVENTIONAL-VERSUS-PRIMITIVE TRAP, which is the whole reason the count is not simply Z times
# atoms per formula unit. A CENTRED lattice's conventional cell holds several primitive cells: an
# F-centred cell holds four, an I-centred two, and an R-centred cell in the hexagonal setting three.
# Three of these eight phases are centred (periclase and spinel are F, corundum and hematite are R),
# so for them the conventional content OVERSTATES the primitive content by that factor. The count
# enters Slack's magnitude as n^(-2/3), so the error would be silent and load-bearing.
#
# A SECOND TRAP, and the eight phases exhibit it: Z IS MEANINGLESS WITHOUT THE FORMULA UNIT IT COUNTS.
# The two independent enstatite records read here state Z = 8 for a formula unit written Mg2Si2O6 and
# Z = 16 for one written MgSiO3. Both give 80 atoms per conventional cell, which is the invariant, and
# that is why this file carries atoms_per_formula_unit beside Z rather than Z alone.
#
# THE COUNTS, and their check. Independent of every cited record, Z was recomputed for each phase from
# the published cell parameters, the molar mass and the measured density (Z = rho * N_A * V / M): all
# eight returned an integer within 0.3 percent, and every conventional content divided exactly by its
# centring multiplicity. The five counts the geodynamics blocker note already named (quartz 9,
# corundum 10, hematite 10, forsterite 28, enstatite 80) are reproduced; periclase 2, spinel 14 and
# fayalite 28 are the three it did not name. Periclase at n = 2 is the ladder's simple class and its
# permanent OVERLAP SENTINEL, which is the row that makes the two-rung comparison run at all.
#
# ===== COLUMN 2: kappa_298 (seven of eight phases, and the one absence is deliberate) =====
#
# The measured thermal conductivity at 300 K of the pure phase, W/(m*K). Present only where a citable
# primary reports a pure-phase value in the ambient frame. A phase with no value here is NOT defaulted:
# PhaseConductivity::kappa_298 is an Option, so the phase falls to Slack's estimator rung and
# AssemblageConductivity::measured_weight_fraction reports how much of a census resolved through a
# measured anchor. That is the ladder working as designed rather than a hole in it.
#
# AT 300 K A MEASURED TOTAL IS A LATTICE ANCHOR: the ladder's own radiative polynomial returns about
# 0.006 W/(m*K) at this temperature, so the radiative channel is below the reported precision of every
# value here and no lattice/radiative separation is needed at the anchor point.
#
# TWO VALUE SHAPES, and the loader derives the isotropic scalar rather than the data file asserting it.
# An ISOTROPIC row states kappa_298_w_per_m_k directly. An ANISOTROPIC row states the measured principal
# conductivities instead (quartz is the case: the source recommends per-axis values for a uniaxial
# crystal), and the loader forms the orientational average of a randomly oriented aggregate the same way
# mineral_moduli.toml forms its elastic values, by the VOIGT-REUSS-HILL convention:
#
#     voigt = (k_par + 2 k_perp) / 3        (parallel bound, the trace/3 of the conductivity tensor)
#     reuss = 3 / (1/k_par + 2/k_perp)      (series bound)
#     kappa_298 = (voigt + reuss) / 2       (Hill)
#
# so the stored facts stay the source's own numbers and the aggregation is code that can be tested.
#
# THE BAND IS DERIVED, NEVER INVENTED, and each row says which of the two bases produced it:
#   - kappa_298_relative_uncertainty, the SOURCE'S OWN stated accuracy at 300 K, times the value; or
#   - kappa_298_band, the absolute gap to an INDEPENDENT second determination of the same quantity, so
#     the interval covers both determinations rather than one.
# Where a row is anisotropic the band is widened to the orientational Voigt-Reuss bracket if that is the
# larger of the two, so an aggregate never reads a narrower width than the anisotropy it averaged away.
#
# HEMATITE WAS CLOSED ON 2026-07-20 and the row above now carries an anchor. It was closed against the
# criterion the earlier fetch wrote for it, a dense-polycrystal or single-crystal determination at 300 K
# that is not an extrapolation: Akiyama et al. 1992, ISIJ International 32(7), 829, measured HIP-densified
# 99.9 percent hematite of stated porosity below 0.1 percent by laser flash from room temperature, and
# printed the least-squares fit 'k = 1/(1.844e-4 T)' over '298 < T < 912'. The three values that made the
# old 2.3x spread are not scatter in one quantity and are no longer read as though they were: the low end
# is porous and natural samples, the high end is an EXTRAPOLATED single crystal, and this row is a dense
# polycrystal sitting between them, which is where a dense polycrystal belongs.
#
# WHY SPINEL STILL CARRIES NO ANCHOR, and the reason changed on 2026-07-20 from a missing fetch to a
# CORRECTION. This file used to record Slack (1962), Physical Review 126, 427, as the named follow-up that
# would close spinel once retrieved. It would not. TPRC Volume 2 (Touloukian, Powell, Ho and Klemens 1970)
# transcribes Slack's own specimens with their compositions, and all three of his spinels are
# off-composition: Data Table 58 is headed 'MAGNESIUM ALUMINATE MgO . 3.5 Al2O3', an alumina-rich Verneuil
# crystal of lattice constant 7.979 A against the stoichiometric 8.084 A, reading 13.3 W/(m*K) at 300.67 K;
# and Data Table 282's two Slack curves are IRON-BEARING natural pleonastes, (Ti,Mg0.75,Fe0.41,Al1.85)O4
# and (Ti,Mg,Fe0.33,Al1.93)O4, reading 5.9 and 6.4 W/(m*K) at 300 K. The other five curves under that table
# are powder beds and a pressed-and-fired compact of bulk density 0.92 to 1.79 g cm^-3, plus one 1949 curve
# recorded as 'No details reported.' The spread from 5.9 to 13.3 across those specimens is composition and
# porosity doing what they do to a phonon conductor, so none of them stands for the pure phase, and taking
# any of them would be reading a related composition rather than this one. Closing spinel needs a
# determination on STOICHIOMETRIC MgAl2O4. The manifest records every route already exhausted.
#
# THE TWO CANONICAL COMPILATIONS REMAIN UNRETRIEVED, stated plainly rather than paraphrased from memory.
# Horai 1971 (JGR 76, 1278-1308) returns HTTP 403 at the DOI and at the ADS scan, carries no Wayback
# capture, and reports as closed access with zero open locations. Clauser and Huenges 1995 (AGU
# Reference Shelf 3, 105-126) returns HTTP 403 at the DOI, has no repository copy, and the one
# retrievable copy is an unauthorized mirror printing "Copyright 1995 by the American Geophysical
# Union", so it is not vendorable. Neither was used. What replaced them is better for this purpose:
# two US Government publications whose recommended values are per-phase and carry stated accuracies.
#
# FRAME: 300 K, 1 bar, pure end-member composition. The ladder carries no pressure dependence, so an
# aggregate built from these anchors is an ambient-pressure quantity and a caller at depth is reading
# outside the frame. Each row states the SPECIMEN FORM it was measured on (single crystal, dense
# polycrystalline, or needle-probe aggregate), because that is the difference between a phase property
# and a sample property.
#
# WITNESSES: crates/physics/data/phase_conductivity/manifest.toml carries the receipt, the licence
# finding and the anchor for every source read. The crystallographic records and the NBS recommended
# values are held in-repo as bytes; the published structure determinations behind Column 1 and the
# chondrite paper behind three Column 2 rows are held as citation-plus-witness under the owner's
# ruling, because their licences do not permit redistribution.
#
# THE COD LICENCE IS NOT UNIFORM, AND THE SPLIT IS PER ENTRY RATHER THAN PER ID RANGE. A COD record
# whose data the contributors placed in the public domain carries the header 'All data on this site have
# been placed in the public domain by the contributors'. A record whose data came from a third party
# (the American Mineralogist Crystal Structure Database, or IUCr Journals) instead carries 'The file may
# be used within the scientific community so long as proper attribution is given to the journal article
# from which the data were obtained', which is an attribution-conditioned grant scoped to a community
# rather than a public-domain dedication. Every CIF HELD under cod/ was checked against its own header
# and every held one is public domain; the attribution-conditioned records are cited and not held.

frame = "300 K, 1 bar, pure end-member composition; atoms_per_primitive_cell is a crystallographic count and is frame-free"
grade = "atoms_per_primitive_cell: crystallographic (derived from space group, Z, formula content and lattice centring); kappa_298: measured (NBS recommended values for quartz, corundum and periclase; Horai and Simmons 1969 needle-probe via Henke et al. 2016 for forsterite, fayalite and enstatite; Akiyama et al. 1992 laser flash on a HIP-densified compact for hematite, taken from that paper's own least-squares fit at the 298 K lower bound of its stated range)"
primitive_cell_relation = "atoms_per_primitive_cell = Z * atoms_per_formula_unit / lattice_points_per_conventional_cell"

