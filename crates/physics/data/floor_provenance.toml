#
# The physics-floor provenance grade register (provenance register Phase 2, the floor unification).
# Sidecar to the floor manifests: each value entry's two-tag real/fantasy provenance refined into the
# owner's seven-tag register (docs/PROVENANCE_LEDGER.md). A `real` entry refines to [M] measured, [D]
# derived (with derived_from), or [E] estimator; a `fantasy` entry to [A] authored, [C] closure, [D]
# derived, or [X] contingency. The tag is DERIVED from the entry's own recorded ground, source-verified
# (the panel is a lead, source is the verdict), never re-authored. `derive_first_defect` marks a bulk
# material property stored on the substance rather than derived from its components: a generality defect
# (Principle 11, admit-the-alien) ORTHOGONAL to the refutability provenance, so the value stays [M] and
# the defect is separately countable for the materials buildout that resolves it (the gate's seam-2
# correction, verified at source). scripts/floor_provenance_gate.py enforces completeness and the
# real/fantasy-to-grade consistency; the honesty number is the closure-plus-authored query over this
# register unified with reserved.toml.

