#
# Candidate-provenance audit for the broad, pre-migration physics data population.
#
# This file is not the canonical absolute floor and cannot admit a value to the runpath. Canonical
# membership and the four-tier by seven-mark counts come only from civsim-ledger and the repository-owned
# absolute-floor catalog. The historical `[[grade]]` and `grade =` spellings remain for data compatibility.
# A row records one of the exact seven marks, [D] [M] [E] [C] [A] [W] [X], or the explicit
# `unverified_measurement_candidate` refusal sentinel. That sentinel is not an eighth mark and never
# renders [M]. A citation or a status here establishes evidence custody only.
#
# `derive_first_defect` marks a broad data row stored on a substance rather than derived from its
# constituents. It is an admit-the-alien migration defect orthogonal to the candidate's evidence status.
# `scripts/floor_provenance_gate.py` enforces completeness, known status vocabulary, and the older
# real/fantasy evidence-ground consistency. Admission still requires derive-first exhaustion, the
# Buckingham-Pi budget, Gap Law, Residual Law, a unique tier slot, and fail-closed behavior.

