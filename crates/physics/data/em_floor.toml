# The electricity-and-magnetism floor (wave 3 of the physics substrate, R-PHYS-W3; design Part 41,
# Part 55, Part 58). A discoverable deepening tier under R-DEEPTECH-PHYSICS, not a Tier-0 floor.
# Extends the registry with elec.* and mag.* axes and the closed-form kernels over them
# (crates/physics/src/laws.rs). Loads onto the mechanical, fluids, and chem/optics floors (it reads
# mech.arm_length, mech.contact_area, mech.velocity, and the volt-promoted chem.standard_potential).
# Electricity forces the fifth base dimension (electric current, the SI ampere); every axis is a
# five-base monomial "length,mass,time,temperature,current". The fourteen axis ranges are owner-set
# (ratified 2026-07-03), each basis and citation in its axis real field; every law constant remains
# reserved-with-basis. Each axis's per-quantity fixed-point scale derives from its declared decimal
# envelope (R-UNITS-PIN), so a sub-epsilon low end (the picofarad capacitance) keeps its magnitude.

# --- Electricity axes ---

[[axis]]
id = "elec.charge"
measures = "electric charge q, the Coulomb-force and capacitor source"
unit = "C"
dimension = "charge"
scale = "C"
tier = 2
range_lo = "0.000000001"
range_hi = "100000"
real = "Griffiths, Introduction to Electrodynamics Ch 2; NIST CODATA; window [1e-9, 1e5] C owner-ratified 2026-07-03, the microcoulomb low end deriving a fine per-quantity scale reconciled against the Coulomb coefficient (R-UNITS-PIN)"

[[axis]]
id = "elec.current"
measures = "electric current I, the fifth-base quantity (the ampere)"
unit = "A"
dimension = "current"
scale = "A"
tier = 2
range_lo = "0.000001"
range_hi = "100000"
real = "Griffiths Ch 7; Horowitz and Hill; window [1e-6, 1e5] A owner-ratified 2026-07-03 (nerve microamp to industrial kiloamp, R-UNITS-PIN)"

[[axis]]
id = "elec.potential"
measures = "electric potential difference V (the volt)"
unit = "V"
dimension = "voltage"
scale = "V"
tier = 2
range_lo = "-100000000"
range_hi = "100000000"
real = "Griffiths Ch 2; signed window [-1e8, 1e8] V owner-ratified 2026-07-03 (one scale unified with elec.emf and the promoted chem.standard_potential, signal millivolts to lightning hundred-megavolts, R-UNITS-PIN)"

[[axis]]
id = "elec.emf"
measures = "source electromotive force (the volt), the driving side of a circuit"
unit = "V"
dimension = "voltage"
scale = "V"
tier = 2
range_lo = "-100000000"
range_hi = "100000000"
real = "Griffiths Ch 7; signed window [-1e8, 1e8] V owner-ratified 2026-07-03, the same one-scale volt as elec.potential, kept role-distinct on the wave-2 fluid.driving_pressure precedent (S-ELEC-EMF, the owner may collapse; R-UNITS-PIN)"

[[axis]]
id = "elec.resistance"
measures = "resistance R of a circuit element, the Ohm lever; the element interface value law.resistance derives from resistivity and geometry"
unit = "Ohm"
dimension = "2,1,-3,0,-2"
scale = "Ohm"
tier = 2
range_lo = "0.001"
range_hi = "1000000000"
real = "Griffiths Ch 7; CRC; window [1e-3, 1e9] Ohm owner-ratified 2026-07-03 (milliohm contacts to gigaohm insulation, ~12 orders reconciled to a per-quantity scale, R-UNITS-PIN)"

[[axis]]
id = "elec.resistivity"
measures = "bulk electrical resistivity rho of a material (the geometry-independent conductor/insulator datum)"
unit = "Ohm*m"
dimension = "3,1,-3,0,-2"
scale = "Ohm*m"
tier = 2
range_lo = "0.00000001"
range_hi = "1000"
real = "CRC; Kittel, Introduction to Solid State Physics; window [1e-8, 1e3] Ohm*m owner-ratified 2026-07-03, regime-limited because the full conductor-to-insulator envelope spans ~24 orders (copper ~1.7e-8, glass ~1e12) and extreme insulators clamp; conductivity is the derived reciprocal rather than a second axis (S-ELEC-RECIP, R-UNITS-PIN)"

[[axis]]
id = "elec.capacitance"
measures = "capacitance C, charge stored per volt"
unit = "F"
dimension = "-2,-1,4,0,2"
scale = "F"
tier = 2
range_lo = "0.000000000001"
range_hi = "1000"
real = "Griffiths Ch 2; Horowitz and Hill; window [1e-12, 1e3] F owner-ratified 2026-07-03 (picofarad to supercapacitor kilofarad; the picofarad low end underflows the Q32.32 range, so capacitance derives a fine per-quantity scale from the declared decimal envelope, R-UNITS-PIN)"

[[axis]]
id = "elec.electric_field"
measures = "electric field strength E, and the dielectric-breakdown threshold"
unit = "V/m"
dimension = "1,1,-3,0,-1"
scale = "V/m"
tier = 2
range_lo = "100"
range_hi = "1000000000"
real = "Griffiths Ch 2; CRC dielectric-strength tables; window [1e2, 1e9] V/m owner-ratified 2026-07-03 (ambient fields to dielectric breakdown ~3e6 in air, higher in solids, R-UNITS-PIN)"

# --- Magnetism axes ---

[[axis]]
id = "mag.flux_density"
measures = "magnetic flux density B, the field state; a stored remanence or a law output"
unit = "T"
dimension = "0,1,-2,0,-1"
scale = "T"
tier = 2
range_lo = "0.00001"
range_hi = "50"
real = "Griffiths Ch 5; Purcell and Morin, Electricity and Magnetism; CRC; window [1e-5, 50] T owner-ratified 2026-07-03 (earth ~5e-5, MRI ~1.5 to 3, strong lab ~45; magnetar fields clamp, R-UNITS-PIN)"

[[axis]]
id = "mag.flux"
measures = "magnetic flux Phi through a loop, the resident induction state (sibling to therm.temperature)"
unit = "Wb"
dimension = "2,1,-2,0,-1"
scale = "Wb"
tier = 2
range_lo = "0.000001"
range_hi = "1000"
real = "Griffiths Ch 7; Fink and Beaty, Standard Handbook for Electrical Engineers; window [1e-6, 1e3] Wb owner-ratified 2026-07-03 (small-coil microweber to large-machine kiloweber, R-UNITS-PIN)"

[[axis]]
id = "mag.permeability"
measures = "relative permeability mu_r of a material (mu_0 rides as an engine constant, so no underflow)"
unit = "ratio"
dimension = "dimensionless"
scale = "ratio"
tier = 2
range_lo = "1"
range_hi = "250000"
real = "Kittel; CRC; Jiles, Magnetism and Magnetic Materials; window [1, 250000] owner-ratified 2026-07-03 (vacuum 1, iron ~5000, mu-metal ~2e5, R-UNITS-PIN)"

[[axis]]
id = "mag.magnetic_moment"
measures = "magnetic dipole moment m of a magnet or current loop"
unit = "A*m^2"
dimension = "2,0,0,0,1"
scale = "A*m^2"
tier = 2
range_lo = "0.0001"
range_hi = "1000"
real = "Griffiths Ch 6; CRC; magnet datasheets; window [1e-4, 1e3] A*m^2 owner-ratified 2026-07-03 (compass needle ~0.1, strong magnet to ~1e2; the Bohr magneton ~9e-24 is quantum and deferred, R-UNITS-PIN)"

[[axis]]
id = "mag.inductance"
measures = "inductance L (self, and mutual via the coupling coefficient), flux linkage per current"
unit = "H"
dimension = "2,1,-2,0,-2"
scale = "H"
tier = 2
range_lo = "0.000001"
range_hi = "100"
real = "Griffiths Ch 7; Fink and Beaty; Horowitz and Hill; window [1e-6, 1e2] H owner-ratified 2026-07-03 (~8 orders, radio microhenry to filter and transformer henries on a per-quantity scale, R-UNITS-PIN)"

[[axis]]
id = "mag.coupling_coefficient"
measures = "k, how tightly two coils share flux (the transformer coupling); mutual M = k*sqrt(L1*L2) is a derived read, not an axis"
unit = "ratio"
dimension = "dimensionless"
scale = "ratio"
tier = 2
range_lo = "0"
range_hi = "1"
real = "Fink and Beaty; Horowitz and Hill; window [0, 1] owner-ratified 2026-07-03 (loose air-cored coupling near 0, a tight iron-cored transformer near 1, R-UNITS-PIN)"

# --- Electricity laws (metadata; kernels in laws.rs) ---

[[law]]
id = "law.coulomb_force"
kernel = "coulomb_force"
ports = [
  { role = "q1", axis = "elec.charge" },
  { role = "q2", axis = "elec.charge" },
  { role = "r", axis = "mech.arm_length" },
]
output_measure = "electrostatic force and the attractive/repulsive condition"
dimension = "force"
interval_bound = "[0, F_MAX]"
tier = 2

[[law]]
id = "law.ohm_voltage"
kernel = "ohm_voltage"
ports = [
  { role = "current", axis = "elec.current" },
  { role = "resistance", axis = "elec.resistance" },
]
output_measure = "potential difference V = I*R"
dimension = "voltage"
interval_bound = "[0, V_MAX]"
tier = 2

[[law]]
id = "law.circuit_current"
kernel = "circuit_current"
ports = [
  { role = "emf", axis = "elec.emf" },
  { role = "r_total", axis = "elec.resistance" },
]
output_measure = "current I = emf/R_total (a short is the cap)"
dimension = "current"
interval_bound = "[0, I_MAX]"
tier = 2

[[law]]
id = "law.power_dissipation"
kernel = "power_dissipation"
ports = [
  { role = "current", axis = "elec.current" },
  { role = "voltage", axis = "elec.potential" },
]
output_measure = "Joule power P = I*V"
dimension = "2,1,-3,0,0"
interval_bound = "[0, POWER_MAX]"
tier = 2

[[law]]
id = "law.capacitor_energy"
kernel = "capacitor_energy"
ports = [
  { role = "capacitance", axis = "elec.capacitance" },
  { role = "voltage", axis = "elec.potential" },
]
output_measure = "stored electric-field energy U = (1/2)C*V^2"
dimension = "energy"
interval_bound = "[0, E_MAX]"
tier = 2

[[law]]
id = "law.battery_emf"
kernel = "battery_emf"
ports = [
  { role = "cathode", axis = "chem.standard_potential" },
  { role = "anode", axis = "chem.standard_potential" },
]
output_measure = "galvanic cell EMF = E_cathode - E_anode"
dimension = "voltage"
interval_bound = "[-10, 10]"
tier = 2

[[law]]
id = "law.resistance"
kernel = "resistance"
ports = [
  { role = "resistivity", axis = "elec.resistivity" },
  { role = "length", axis = "mech.arm_length" },
  { role = "area", axis = "mech.contact_area" },
]
output_measure = "element resistance R = rho*L/A (an open is the cap)"
dimension = "2,1,-3,0,-2"
interval_bound = "[0, R_MAX]"
tier = 2

# --- Magnetism laws ---

[[law]]
id = "law.solenoid_field"
kernel = "solenoid_field"
ports = [
  { role = "permeability", axis = "mag.permeability" },
  { role = "current", axis = "elec.current" },
]
produces = ["mag.flux_density"]
output_measure = "solenoid flux density B = mu_0*mu_r*n*I"
dimension = "0,1,-2,0,-1"
interval_bound = "[0, B_MAX]"
tier = 2

[[law]]
id = "law.flux_linkage"
kernel = "flux_linkage"
ports = [
  { role = "flux_density", axis = "mag.flux_density" },
  { role = "area", axis = "mech.contact_area" },
]
produces = ["mag.flux"]
output_measure = "magnetic flux Phi = B*A"
dimension = "2,1,-2,0,-1"
interval_bound = "[0, PHI_MAX]"
tier = 2

[[law]]
id = "law.motor_force"
kernel = "motor_force"
ports = [
  { role = "flux_density", axis = "mag.flux_density" },
  { role = "current", axis = "elec.current" },
  { role = "length", axis = "mech.arm_length" },
]
output_measure = "force on a current-carrying conductor F = B*I*L"
dimension = "force"
interval_bound = "[0, F_MAX]"
tier = 2

[[law]]
id = "law.lorentz_force"
kernel = "lorentz_force"
ports = [
  { role = "charge", axis = "elec.charge" },
  { role = "velocity", axis = "mech.velocity" },
  { role = "flux_density", axis = "mag.flux_density" },
]
output_measure = "force on a moving charge F = q*v*B"
dimension = "force"
interval_bound = "[0, F_MAX]"
tier = 2

[[law]]
id = "law.dipole_torque"
kernel = "dipole_torque"
ports = [
  { role = "moment", axis = "mag.magnetic_moment" },
  { role = "flux_density", axis = "mag.flux_density" },
]
output_measure = "maximum magnetic dipole torque tau = m*B (the sin theta factor deferred)"
dimension = "2,1,-2,0,0"
interval_bound = "[0, TORQUE_MAX]"
tier = 2

[[law]]
id = "law.faraday_emf"
kernel = "faraday_emf"
ports = [
  { role = "flux_now", axis = "mag.flux" },
  { role = "flux_prev", axis = "mag.flux", temporal = "prior" },
  { role = "dt", temporal = "dt" },
]
output_measure = "induced EMF = -N*dPhi/dt (the per-tick flux delta, signed by Lenz)"
dimension = "voltage"
interval_bound = "[-V_MAX, V_MAX]"
tier = 2

[[law]]
id = "law.inductive_emf"
kernel = "inductive_emf"
ports = [
  { role = "current_now", axis = "elec.current" },
  { role = "current_prev", axis = "elec.current", temporal = "prior" },
  { role = "dt", temporal = "dt" },
]
output_measure = "inductive EMF = -L*dI/dt (self back-EMF or mutual step-up)"
dimension = "voltage"
interval_bound = "[-V_MAX, V_MAX]"
tier = 2

[[law]]
id = "law.inductor_energy"
kernel = "inductor_energy"
ports = [
  { role = "inductance", axis = "mag.inductance" },
  { role = "current", axis = "elec.current" },
]
output_measure = "stored magnetic-field energy U = (1/2)L*I^2"
dimension = "energy"
interval_bound = "[0, E_MAX]"
tier = 2

# --- Substances ---

[[substance]]
id = "copper"
participates_in = ["law.resistance"]
real = "CRC (annealed copper at 20C)"
values = [
  { axis = "mat.density", value = "8960" },
  { axis = "elec.resistivity", value = "0.000000017" },
]

[[substance]]
id = "lodestone"
participates_in = ["law.dipole_torque"]
real = "CRC (magnetite permanent-magnet data, order of magnitude)"
values = [
  { axis = "mat.density", value = "5200" },
  { axis = "mag.magnetic_moment", value = "0.1" },
  { axis = "mag.permeability", value = "5" },
]
