# The electricity-and-magnetism floor (wave 3 of the physics substrate, R-PHYS-W3; design Part 41,
# Part 55, Part 58). A discoverable deepening tier under R-DEEPTECH-PHYSICS, not a Tier-0 floor.
# Extends the registry with elec.* and mag.* axes and the closed-form kernels over them
# (crates/physics/src/laws.rs). Loads onto the mechanical, fluids, and chem/optics floors (it reads
# mech.arm_length, mech.contact_area, mech.velocity, and the volt-promoted chem.standard_potential).
# Electricity forces the fifth base dimension (electric current, the SI ampere); every axis is a
# five-base monomial "length,mass,time,temperature,current". Every range is reserved-with-basis
# pending the owner's set; nothing here is an owner-set value.

# --- Electricity axes ---

[[axis]]
id = "elec.charge"
measures = "electric charge q, the Coulomb-force and capacitor source"
unit = "C"
dimension = "charge"
scale = "C (per-quantity scale reserved, R-UNITS-PIN)"
tier = 2
range_reserved = "proposed window [1e-9, 1e5] C; the microcoulomb low end underflows the Q32.32 floor at unit separation, reserving a per-quantity charge scale reconciled against the Coulomb coefficient. Basis: CRC; Griffiths Ch 2; NIST CODATA"
real = "Griffiths, Introduction to Electrodynamics Ch 2; NIST CODATA"

[[axis]]
id = "elec.current"
measures = "electric current I, the fifth-base quantity (the ampere)"
unit = "A"
dimension = "current"
scale = "A (per-quantity scale reserved, R-UNITS-PIN)"
tier = 2
range_reserved = "proposed window [1e-6, 1e5] A (nerve microamp to industrial kiloamp). Basis: CRC; Horowitz and Hill, The Art of Electronics"
real = "Griffiths Ch 7; Horowitz and Hill"

[[axis]]
id = "elec.potential"
measures = "electric potential difference V (the volt)"
unit = "V"
dimension = "voltage"
scale = "V (one scale, unified with elec.emf and the promoted chem.standard_potential)"
tier = 2
range_reserved = "proposed signed window [-1e8, 1e8] V (a single scale spans signal millivolts to lightning hundred-megavolts). Basis: CRC; Griffiths Ch 2"
real = "Griffiths Ch 2"

[[axis]]
id = "elec.emf"
measures = "source electromotive force (the volt), the driving side of a circuit"
unit = "V"
dimension = "voltage"
scale = "V (one scale, unified with elec.potential)"
tier = 2
range_reserved = "proposed signed window [-1e8, 1e8] V, the same one-scale volt as elec.potential. Kept role-distinct from elec.potential on the wave-2 fluid.driving_pressure precedent (S-ELEC-EMF, the owner may collapse). Basis: Griffiths Ch 7"
real = "Griffiths Ch 7"

[[axis]]
id = "elec.resistance"
measures = "resistance R of a circuit element, the Ohm lever; the element interface value law.resistance derives from resistivity and geometry"
unit = "Ohm"
dimension = "2,1,-3,0,-2"
scale = "Ohm (per-quantity scale reserved, R-UNITS-PIN)"
tier = 2
range_reserved = "proposed window [1e-3, 1e9] Ohm (milliohm contacts to gigaohm insulation, ~12 orders). Basis: CRC; component and wire datasheets"
real = "Griffiths Ch 7; CRC"

[[axis]]
id = "elec.resistivity"
measures = "bulk electrical resistivity rho of a material (the geometry-independent conductor/insulator datum)"
unit = "Ohm*m"
dimension = "3,1,-3,0,-2"
scale = "Ohm*m (per-quantity scale reserved, R-UNITS-PIN)"
tier = 2
range_reserved = "proposed window [1e-8, 1e3] Ohm*m, regime-windowed at the Tier because the full conductor-to-insulator envelope spans ~24 orders (copper ~1.7e-8, glass ~1e12); extreme insulators clamp or reserve a scale. Conductivity is not a second axis (the derived reciprocal, S-ELEC-RECIP). Basis: CRC resistivity tables; Kittel"
real = "CRC; Kittel, Introduction to Solid State Physics"

[[axis]]
id = "elec.capacitance"
measures = "capacitance C, charge stored per volt"
unit = "F"
dimension = "-2,-1,4,0,2"
scale = "F (per-quantity scale reserved, R-UNITS-PIN)"
tier = 2
range_reserved = "proposed window [1e-12, 1e3] F (picofarad to supercapacitor kilofarad). Basis: CRC; Horowitz and Hill"
real = "Griffiths Ch 2; Horowitz and Hill"

[[axis]]
id = "elec.electric_field"
measures = "electric field strength E, and the dielectric-breakdown threshold"
unit = "V/m"
dimension = "1,1,-3,0,-1"
scale = "V/m"
tier = 2
range_reserved = "proposed window [1e2, 1e9] V/m (ambient fields to dielectric breakdown ~3e6 in air, higher in solids). Basis: CRC; Griffiths Ch 2"
real = "Griffiths Ch 2; CRC dielectric-strength tables"

# --- Magnetism axes ---

[[axis]]
id = "mag.flux_density"
measures = "magnetic flux density B, the field state; a stored remanence or a law output"
unit = "T"
dimension = "0,1,-2,0,-1"
scale = "T"
tier = 2
range_reserved = "proposed window [1e-5, 50] T fits one scale (earth ~5e-5, MRI ~1.5 to 3, strong lab ~45); magnetar fields reserve or clamp. Basis: CRC magnetic-property tables; NIST"
real = "Griffiths Ch 5; Purcell and Morin, Electricity and Magnetism; CRC"

[[axis]]
id = "mag.flux"
measures = "magnetic flux Phi through a loop, the resident induction state (sibling to therm.temperature)"
unit = "Wb"
dimension = "2,1,-2,0,-1"
scale = "Wb"
tier = 2
range_reserved = "proposed window [1e-6, 1e3] Wb one scale (small-coil microweber to large-machine kiloweber). Basis: Griffiths Ch 7; Fink and Beaty, Standard Handbook for Electrical Engineers"
real = "Griffiths Ch 7; Fink and Beaty"

[[axis]]
id = "mag.permeability"
measures = "relative permeability mu_r of a material (mu_0 rides as an engine constant, so no underflow)"
unit = "ratio"
dimension = "dimensionless"
scale = "ratio"
tier = 2
range_reserved = "proposed [1, 250000] (vacuum 1, iron ~5000, mu-metal ~2e5). Basis: CRC and ferromagnetic-material permeability tables; Jiles, Magnetism and Magnetic Materials"
real = "Kittel; CRC; Jiles"

[[axis]]
id = "mag.magnetic_moment"
measures = "magnetic dipole moment m of a magnet or current loop"
unit = "A*m^2"
dimension = "2,0,0,0,1"
scale = "A*m^2 (per-quantity scale reserved, R-UNITS-PIN)"
tier = 2
range_reserved = "proposed window [1e-4, 1e3] A*m^2 one scale (compass needle ~0.1, strong magnet to ~1e2); the Bohr magneton ~9e-24 is quantum and deferred. Basis: CRC permanent-magnet data"
real = "Griffiths Ch 6; CRC; magnet datasheets"

[[axis]]
id = "mag.inductance"
measures = "inductance L (self, and mutual via the coupling coefficient), flux linkage per current"
unit = "H"
dimension = "2,1,-2,0,-2"
scale = "H (per-quantity scale reserved, R-UNITS-PIN)"
tier = 2
range_reserved = "proposed window [1e-6, 1e2] H one scale (~8 orders; radio microhenry to filter and transformer henries). Basis: CRC; inductor and transformer datasheets; Horowitz and Hill"
real = "Griffiths Ch 7; Fink and Beaty; Horowitz and Hill"

[[axis]]
id = "mag.coupling_coefficient"
measures = "k, how tightly two coils share flux (the transformer coupling); mutual M = k*sqrt(L1*L2) is a derived read, not an axis"
unit = "ratio"
dimension = "dimensionless"
scale = "ratio"
tier = 2
range_reserved = "proposed [0, 1] (loose air-cored coupling near 0, a tight iron-cored transformer near 1). Basis: transformer-design texts; Fink and Beaty"
real = "Fink and Beaty; Horowitz and Hill"

# --- Electricity laws (metadata; kernels in laws.rs) ---

[[law]]
id = "law.coulomb_force"
inputs = ["elec.charge", "mech.arm_length"]
output_measure = "electrostatic force and the attractive/repulsive condition"
dimension = "force"
interval_bound = "[0, F_MAX]"
tier = 2

[[law]]
id = "law.ohm_voltage"
inputs = ["elec.current", "elec.resistance"]
output_measure = "potential difference V = I*R"
dimension = "voltage"
interval_bound = "[0, V_MAX]"
tier = 2

[[law]]
id = "law.circuit_current"
inputs = ["elec.emf", "elec.resistance"]
output_measure = "current I = emf/R_total (a short is the cap)"
dimension = "current"
interval_bound = "[0, I_MAX]"
tier = 2

[[law]]
id = "law.power_dissipation"
inputs = ["elec.current", "elec.potential"]
output_measure = "Joule power P = I*V"
dimension = "2,1,-3,0,0"
interval_bound = "[0, POWER_MAX]"
tier = 2

[[law]]
id = "law.capacitor_energy"
inputs = ["elec.capacitance", "elec.potential"]
output_measure = "stored electric-field energy U = (1/2)C*V^2"
dimension = "energy"
interval_bound = "[0, E_MAX]"
tier = 2

[[law]]
id = "law.battery_emf"
inputs = ["chem.standard_potential"]
output_measure = "galvanic cell EMF = E_cathode - E_anode"
dimension = "voltage"
interval_bound = "[-10, 10]"
tier = 2

[[law]]
id = "law.resistance"
inputs = ["elec.resistivity", "mech.arm_length", "mech.contact_area"]
output_measure = "element resistance R = rho*L/A (an open is the cap)"
dimension = "2,1,-3,0,-2"
interval_bound = "[0, R_MAX]"
tier = 2

# --- Magnetism laws ---

[[law]]
id = "law.solenoid_field"
inputs = ["mag.permeability", "elec.current"]
output_measure = "solenoid flux density B = mu_0*mu_r*n*I"
dimension = "0,1,-2,0,-1"
interval_bound = "[0, B_MAX]"
tier = 2

[[law]]
id = "law.flux_linkage"
inputs = ["mag.flux_density", "mech.contact_area"]
output_measure = "magnetic flux Phi = B*A"
dimension = "2,1,-2,0,-1"
interval_bound = "[0, PHI_MAX]"
tier = 2

[[law]]
id = "law.motor_force"
inputs = ["mag.flux_density", "elec.current", "mech.arm_length"]
output_measure = "force on a current-carrying conductor F = B*I*L"
dimension = "force"
interval_bound = "[0, F_MAX]"
tier = 2

[[law]]
id = "law.lorentz_force"
inputs = ["elec.charge", "mech.velocity", "mag.flux_density"]
output_measure = "force on a moving charge F = q*v*B"
dimension = "force"
interval_bound = "[0, F_MAX]"
tier = 2

[[law]]
id = "law.dipole_torque"
inputs = ["mag.magnetic_moment", "mag.flux_density"]
output_measure = "maximum magnetic dipole torque tau = m*B (the sin theta factor deferred)"
dimension = "2,1,-2,0,0"
interval_bound = "[0, TORQUE_MAX]"
tier = 2

[[law]]
id = "law.faraday_emf"
inputs = ["mag.flux"]
output_measure = "induced EMF = -N*dPhi/dt (the per-tick flux delta, signed by Lenz)"
dimension = "voltage"
interval_bound = "[-V_MAX, V_MAX]"
tier = 2

[[law]]
id = "law.inductive_emf"
inputs = ["mag.inductance", "elec.current"]
output_measure = "inductive EMF = -L*dI/dt (self back-EMF or mutual step-up)"
dimension = "voltage"
interval_bound = "[-V_MAX, V_MAX]"
tier = 2

[[law]]
id = "law.inductor_energy"
inputs = ["mag.inductance", "elec.current"]
output_measure = "stored magnetic-field energy U = (1/2)L*I^2"
dimension = "energy"
interval_bound = "[0, E_MAX]"
tier = 2

# --- Substances ---

[[substance]]
id = "copper"
participates_in = ["law.resistance"]
real = "CRC (annealed copper at 20C)"
values = [
  { axis = "mat.density", value = "8960" },
  { axis = "elec.resistivity", value = "0.000000017" },
]

[[substance]]
id = "lodestone"
participates_in = ["law.dipole_torque"]
real = "CRC (magnetite permanent-magnet data, order of magnitude)"
values = [
  { axis = "mat.density", value = "5200" },
  { axis = "mag.magnetic_moment", value = "0.1" },
  { axis = "mag.permeability", value = "5" },
]
