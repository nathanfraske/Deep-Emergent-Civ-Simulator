# NIST), open, vendored into the public tree. SHA256 is the primary receipt
# (VENDORING_CHECKLIST.md). The held bytes ARE the reconstruction; the checksum is the integrity
# check. Room temperature, 1 atmosphere; resonant-ultrasound spectroscopy (RUS) on a quartz sphere.

