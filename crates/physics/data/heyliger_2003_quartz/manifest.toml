# Values read into mineral_moduli.toml, each with its anchor. Channel: T=text, F=figure, TF=both.
# The aggregate is stated by the source as "Quasi-isotropic polycrystalline elastic constants
# obtained by Voigt-Reuss-Hill averaging" (Table II sub-header).
[[value]]
name = "quartz_bulk_modulus_KS_gpa"
value = "37.7"
anchor = "Table II, 'B (GPa)' VRH row: Natural 37.67, Cultured-ordinary 37.74, Cultured-premium 37.69 (tight, ~37.7)"
channel = "T"

[[value]]
name = "quartz_shear_modulus_G_gpa"
value = "44.6"
anchor = "Table II, 'G (GPa)' VRH row: Cultured-ordinary 44.55 (matches classic McSkimin/Bass ~44.3), Natural 46.91, Cultured-premium 47.23. Reported value is the consensus end; band 2.7 covers the high specimens"
channel = "T"

[[value]]
name = "quartz_single_crystal_Cij_context_gpa"
value = "C11=87.26 C33=105.8 C44=57.15 C66=40.35 C12=6.57 C13=11.95 C14=-17.18; rho=2.6466 g/cm3 (natural)"
anchor = "Table II, Natural column (context for the VRH aggregate above)"
channel = "T"
