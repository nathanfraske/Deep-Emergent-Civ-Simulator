citation = "SLATER-INAPPLICABLE anomaly phase (chain silicate, orthoenstatite MgSiO3, Pbca). gamma_eos_debye 0.67(4) and K' 7.1(4): Stixrude & Lithgow-Bertelloni 2005, GJI 162, Table 1 (enstatite Mg4Si4O12 = 4x MgSiO3; K0'=7.1(4), gamma_0=0.67(4)), citing Jackson et al. 1999/2003, HughJones & Angel 1997, Frisillo & Barsch 1972. Orthoenstatite has the largest K' of the upper-mantle minerals (high-P XRD gives K_T0' ~ 8.5 to 10.2, HughJones & Angel 1997; Zhao et al. 1995), from soft chain-tilt modes that raise K' without raising the thermal gamma (direct gamma_th ~ 1.0 to 1.05 in the orthopyroxene thermoelastic literature). Slater(7.1)=3.38 vs measured gamma_0 0.67, ratio ~5.0: Slater INVALID here, so this row is the documented failure that keeps the measured anchor above the estimator. No gamma_thermodynamic carried: Anderson & Isaak 1995 has no orthopyroxene table, and no direct gamma_th was held at a primary."

