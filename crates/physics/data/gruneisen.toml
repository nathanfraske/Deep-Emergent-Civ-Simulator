citation = "SLATER-INAPPLICABLE, K'-ONLY anomaly phase (framework silicate, alpha-quartz SiO2). K' = 5.99(4): Angel, Allan, Miletich & Finger 1997, J. Appl. Cryst. 30:461-466, 'K_T0 = 37.12(9) GPa and K' = 5.99(4)' (third-order Birch-Murnaghan EoS, isothermal, X-ray compression to 8.9 GPa). No measured gamma carried: quartz is absent from the Anderson & Isaak 1995 mantle tables and from the Stixrude 2005 mantle compilation, and its thermal gamma is strongly T-dependent near the alpha-beta inversion. The well-known direct gamma_th at room T is ~0.66 to 0.72 (Boehler 1979 measured gamma = (K_S/T)(dT/dP)_S directly), so Slater(5.99)=2.83 over-estimates by ~4x: soft rigid-unit tilt modes raise K' while the thermal gamma stays low. Slater INVALID; the aggregator refuses quartz rather than applying it. This is the honest absent-gamma row (per the no-fabrication rule)."
