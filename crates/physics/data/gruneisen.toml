# Thermodynamic Gruneisen parameter of the rock-forming silicate and oxide mineral phases, the
# thermal-EoS sibling of mineral_moduli.toml (crate::petrology_data). One entry per phase, carrying a
# TWO-RUNG LADDER for the phase's ambient Gruneisen parameter gamma, exactly as the moduli file carries
# the ladder for K and G: a measured anchor above a derived estimator, per quantity. A rock-Gruneisen
# kernel aggregates these per-phase gammas over a world's OWN mineral census (by volume or mass fraction),
# so a mantle gamma is DERIVED from the assemblage and is never a floor datum: there is no reserved
# "mantle gamma", because a mantle is an aggregate, not a phase.
#
# WHY GAMMA IS NEEDED PER PHASE. The Gruneisen parameter sets the thermal pressure (P_thermal =
# gamma * E_thermal / V), the adiabatic gradient, and the coupling of a mineral's stiffness to its heat
# content. Like a modulus, a mineral's gamma is a FLOOR datum: it was measured in ignorance of any rock
# the mineral will sit in, so it cannot fit an outcome; the rock's gamma is the aggregate. An alien phase
# is a new row (Principle 11), and a phase with no gamma row is refused by the aggregator, never defaulted.
#
# BLOCK KIND [[mineral]], the cited-data-COLUMN idiom (mirroring mineral_moduli.toml's [[mineral]], the
# ionic radii [[radius]], the condensation [[condensation]], the convection-scaling [[constant]]), NOT a
# reserved floor kind ([[element]] / [[axis]] / [[substance]]): an immutable transcription of cited
# measured and compilation values, out of the floor real/fantasy authorship axis and out of floor-Element
# policing. Values are QUOTED strings; the engine parses fixed-point from strings, never floats. Keyed by
# the phase name, matching the phase-registry / moduli spelling exactly (the JANAF-decorated crust names
# such as MgSiO3(cr,enstatite) resolve to the plain key by the same canonical bridge the moduli file uses).
#
# THE TWO RUNGS (the ladder, measured anchor above estimator, per phase):
#   RUNG 1, ANCHOR (measured): gamma_thermodynamic, the direct thermodynamic Gruneisen parameter
#     gamma_th = alpha * K_S * V / C_P (equivalently alpha * K_T * V / C_V), a combination of separately
#     measured quantities. Sourced from Anderson & Isaak 1995 (the AGU Mineral Physics Handbook chapter,
#     held), Tables 15 to 20, at 300 K. This is the quantity the task names (forsterite ~1.2-1.3, MgO ~1.5).
#   RUNG 2, ESTIMATOR (Slater-class): where no measured gamma exists, the engine derives one from the
#     measured pressure derivative of the bulk modulus by the Slater (1939) relation
#     gamma_Slater = K' / 2 - 1/6, K' = (dK/dP). K' is itself a measured floor quantity (~4 to 6 for
#     silicates), carried here as bulk_modulus_pressure_derivative_kprime so the estimate is DERIVED, not
#     stored (the Slater value is recomputed by the consumer and by the provenance test, never written in).
#
# A THIRD, CROSS-CHANNEL COLUMN, gamma_eos_debye, carries the Mie-Gruneisen-Debye EoS parameter
# gamma_0 = -dln(theta_D)/dln(V) from the self-consistent Stixrude & Lithgow-Bertelloni 2005 compilation
# (held). It is a DIFFERENT average from the direct gamma_th: the two coincide for the dense cubic oxides
# (periclase, corundum) and run ~15 to 30 percent lower for the silicates, because a real mineral is not a
# Debye solid. It is carried so the definitional spread is visible rather than laundered, and it is the
# measured anchor for enstatite (where no direct gamma_th table exists). Do NOT read gamma_eos_debye into
# the gamma_thermodynamic slot: they are the same physics under two different weightings of the vibrational
# spectrum, and the row states which is which.
#
# THE SLATER ESTIMATOR IS BIASED HIGH, AND FAILS FOR CHAIN AND FRAMEWORK SILICATES (the honest limit).
# Slater assumes a volume-independent Poisson ratio and estimates the acoustic gamma; against the measured
# gamma_thermodynamic it over-estimates by ~1.2x (periclase) to ~1.9x (fayalite, spinel) for the dense
# oxides and orthosilicates, so it is a same-order estimate, not a precise one, and the measured anchor is
# preferred whenever present. For the chain silicate enstatite (K' ~ 7 to 10) and the framework silicate
# quartz (K' ~ 6) the soft polyhedral-tilt (rigid-unit) modes make K' anomalously large while the thermal
# gamma stays low (~1.0 and ~0.7), so Slater over-estimates by ~4 to 5x and is INVALID. Each row declares
# slater_gamma_applicable; the aggregator applies the Slater rung only where it is true, and refuses a
# phase that is Slater-inapplicable and has no measured gamma (the banded-refusal path), rather than
# writing in a value the physics does not support.
#
# S-VERSUS-T PRESSURE DERIVATIVE. The Slater relation formally uses the isothermal K_T'; the held single-
# crystal elasticity primaries report the adiabatic K_S' (forsterite, fayalite, periclase) and the held
# compression / EoS primaries report K_T' (quartz, and the Stixrude compilation K0'). At ambient the two
# differ by ~1 percent (fayalite: K_S' = 4.85, K_T' = 4.88), well inside the K' band, so each row carries
# the value its source reports and names which it is (kprime_type); the ~1 percent S/T offset is a dropped
# term the band already spans.
#
# WITNESSES (held bytes, sha256 in gruneisen/manifest.toml): scripts/gruneisen_provenance_test.py rechecks
# every receipt offline, asserts the pre-registered fingerprints against this column, and recomputes the
# Slater relation gamma = K'/2 - 1/6 for every row that carries both a measured gamma and a K' (the overlap
# sentinel: where both speak, a Slater-applicable phase agrees to same order and a Slater-inapplicable phase
# diverges, both asserted, so the documented failure is encoded and a drifted transcription fails the build).
#
# FINGERPRINTS (owner spot-check, re-asserted in the test): gamma_thermodynamic at 300 K (Anderson & Isaak
# 1995): periclase 1.54, corundum 1.32, spinel 1.51, forsterite 1.29, fayalite 1.21. gamma_eos_debye
# (Stixrude & Lithgow-Bertelloni 2005 Table 1): forsterite 0.99, fayalite 1.06, enstatite 0.67, corundum
# 1.32, periclase 1.50, spinel 1.02. K': forsterite 4.2 (Zha 1996), fayalite 4.85 (Speziale 2004), periclase
# 3.94 (Fan 2019), corundum 4.3 (Stixrude 2005), spinel 5.7 (Stixrude 2005), enstatite 7.1 (Stixrude 2005),
# quartz 5.99 (Angel 1997). Slater = K'/2 - 1/6: applicable phases in [1.1, 2.2]x the measured gamma;
# enstatite ~5.0x (inapplicable); quartz K'-only, Slater inapplicable.

frame = "ambient reference state ~298 to 300 K, 1 bar; gamma_thermodynamic = alpha*K_S*V/C_P at 300 K"
grade = "gamma_thermodynamic: measured-thermodynamic (Anderson & Isaak 1995); gamma_eos_debye: compilation, EoS-fit (Stixrude & Lithgow-Bertelloni 2005); kprime: measured; Slater gamma: derived (K'/2 - 1/6)"
slater_relation = "gamma_Slater = K'/2 - 1/6"

