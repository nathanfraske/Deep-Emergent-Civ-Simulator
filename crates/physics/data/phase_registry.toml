name = "corundum"
formula = "Al2O3"
enthalpy_formation = "-1675.70"
standard_entropy = "50.92"
molar_volume = "25.575"
prototype = "corundum"
source = "Robie & Hemingway 1995, USGS Bulletin 2131 (298.15 K, 1 bar)"

