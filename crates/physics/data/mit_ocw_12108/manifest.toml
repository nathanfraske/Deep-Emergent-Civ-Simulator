# MIT OpenCourseWare 12.108 (Structure of Earth Materials, Fall 2004), single-crystal elasticity
# lecture, source manifest (the vendored-secondary idiom: file / receipt / anchors). This is a
# SECONDARY teaching compilation, held as the ONLY available witness for the single-crystal
# tensor of HEMATITE (Fe2O3) in crates/physics/data/mineral_moduli.toml, and as a cross-check for
# the corundum and quartz tensors. It is NOT a primary measurement: its mineral table reproduces
# Simmons & Wang (1971) "Single crystal elastic constants and calculated aggregate properties"
# and Bass (1995), cited on the table's own "Sources:" line. It reports Cij only, not the VRH
# aggregate K_S,G, so hematite's aggregate is left UNSOURCED in mineral_moduli.toml (no primary
# reporting hematite's aggregate could be held; see that file's HEMATITE CAVEAT). Open, vendored
# into the public tree. SHA256 is the receipt.

