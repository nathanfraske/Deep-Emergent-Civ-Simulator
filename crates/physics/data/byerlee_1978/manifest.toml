# Byerlee 1978 "Friction of Rocks" source manifest (the vendored-primary idiom: file / receipt / anchors).
#
# This is a PAPER whose values enter as in-code cited constants (crates/physics/src/yield_envelope.rs,
# rock_friction_law), NOT a bulk data column, so the manifest holds the source's bytes with its receipt and records
# the page or figure anchor for every value read from it. SHA256 is the primary receipt (VENDORING_CHECKLIST.md,
# primary from 2026-07-17); md5 rides as a legacy secondary. This is the open USGS copy, vendored into the public
# tree. No provenance dry-run battery yet: the held bytes ARE the reconstruction, and the checksum below is the
# integrity check, pending the custody-runbook vault mechanism (AGENTIC_ADDENDUM.md section 12).

