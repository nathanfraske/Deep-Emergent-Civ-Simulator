# The Stoner column (crate::stoner), the itinerant magnetism criterion's input: per element the Stoner exchange
# parameter I and the NONMAGNETIC band density of states at the Fermi level N(E_F). The itinerant magnetic classifier
# reads I and N to form the Stoner product I * N(E_F); a value above 1 is the spontaneous-polarization (itinerant
# ferromagnet) threshold.
#
# UNITS (Janak's convention): I in rydberg (Ry), N in states per rydberg per atom (states/Ry/atom). The product
# I * N is DIMENSIONLESS and CONVENTION-INDEPENDENT (a per-spin / per-atom or Ry / eV rescaling of one factor
# rescales the other inversely), so the criterion compares I * N against 1 directly, in whatever matched convention
# the pair is tabulated.
#
# DEFINITION TAG on N: this is the CALCULATED NONMAGNETIC BAND DOS (from the paramagnetic band structure), NOT the
# calorimetric (1+lambda)-dressed exchange-split ground-state DOS a measured electronic specific-heat gamma produces.
# The criterion needs the bare nonmagnetic band DOS; a dressed gamma DOS understates it and gives false negatives
# (Fe, Co below 1). The consuming newtype is NonmagneticDos, so the wrong DOS cannot be wired.
#
# PROVENANCE (owner-delivered primary, admissible): J. F. Janak, "Uniform susceptibilities of metallic elements,"
# Physical Review B 16, 255 (1977), Table I. Delivered by the owner from the primary source, audited for internal
# consistency: every row's I * N reproduces Janak's tabulated Stoner product, and the exchange enhancement
# chi = 1 / (1 - I * N) reproduces the tabulated enhancement (to Janak's rounding). Fe (1.119) and Ni (2.055) exceed
# 1 (ferromagnetic); Co (0.842) and Pd (0.906) are the marginal near-misses; the simple metals (Cu 0.135, Ag 0.100,
# Al 0.335) are the deep paramagnets. This SUPERSEDES two earlier rendered compilations that the definition tag
# caught as mutually inconsistent (a per-spin / per-atom mis-scaling). Tag: [Janak 1977 Phys Rev B 16 255 Table I,
# cited]. The band edges for classification are the owner's calibration (reserved), not in this data file.

