# SOURCE-VARIANCE FLAG (never-fabricate): titanium's enthalpy of fusion is source-variable. WebElements gives
# 18.7 kJ/mol; the CRC/thermochemical family gives ~14-15 kJ/mol (Ti's hcp->bcc->melt sequence makes its melt
# enthalpy uncertain across tabulations). The WebElements value is used here for source-consistency
# with this row's molar-volume/bulk-modulus (also WebElements); a CRC value is a one-line reversible change. The
# other six metals agree across sources within ~2%.
[[metal]]
symbol = "Ti"
molar_volume = "10.64"
bulk_modulus_gpa = "110"
heat_of_fusion = "18.7"
source = "WebElements: molar volume 10.64 cm^3/mol, bulk modulus 110 GPa (titanium/physics.html); enthalpy of fusion 18.7 kJ/mol (titanium/thermochemistry.html; source-variable, CRC-family ~14-15, see flag above)"

