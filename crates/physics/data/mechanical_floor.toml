# The wave-1 mechanical-and-materials substrate floor (R-PHYS-MECH), expressed as data
# over the QuantityAxis / InteractionLaw registry. The axis ranges below are SET to the
# owner's confirmed values (2026-06-30, select-confirm), each the cited datasheet maximum
# with headroom or a theory-fixed interval, every value a tunable lever revisable on the
# owner's signoff. Two axes stay reserved because their per-quantity scale is unsettled
# (R-UNITS-PIN): second_moment_of_area (a small section underflows m^4) and the consumer
# reference_tolerance (its pg/kg-to-g/kg envelope exceeds one Q32.32 scale, so the scale
# is per toxin class). Pressure-class axes are on the pinned megapascal. The decimal
# substance values are cited real data. Mechanism: design Part 41 and the working proposal
# docs/working/MECHANICAL_MATERIALS_SUBSTRATE_PROPOSAL.md.

# --- Shared mechanical and kinematic axes ---

[[axis]]
id = "mech.force"
measures = "an applied force magnitude, read in role as effort, normal, tangential, or load"
unit = "N"
dimension = "force"
scale = "N"
tier = 0
range_lo = "0.01"
range_hi = "100000000"
real = "Ashby and Jones, Engineering Materials 1; biomechanics force tables (structural-load envelope)"

[[axis]]
id = "mech.mass"
measures = "the inertial mass of a striker or a loaded body"
unit = "kg"
dimension = "mass"
scale = "kg"
tier = 0
range_lo = "0.001"
range_hi = "100000"
real = "CRC Handbook of Chemistry and Physics, density tables (dense-body high end)"

[[axis]]
id = "mech.velocity"
measures = "a relative speed at contact or slip"
unit = "m/s"
dimension = "velocity"
scale = "m/s"
tier = 0
range_lo = "0.01"
range_hi = "1000"
real = "exterior-ballistics literature (muzzle velocities to ~1000 m/s); the engine squaring ceiling 46340 sits far above"

[[axis]]
id = "mech.contact_area"
measures = "the bearing area over which a force acts at an edge or tip"
unit = "m^2"
dimension = "area"
scale = "m^2"
tier = 0
range_lo = "0.00000001"
range_hi = "10"
real = "Johnson, Contact Mechanics (Hertz contact); jointly owned with the geometry domain"

[[axis]]
id = "mech.cross_section_area"
measures = "the load-bearing cross-sectional area of a member"
unit = "m^2"
dimension = "area"
scale = "m^2"
tier = 0
range_lo = "0.00000001"
range_hi = "100"
real = "Gere and Goodno, Mechanics of Materials; Roark's Formulas; jointly owned with geometry"

[[axis]]
id = "mech.section_modulus"
measures = "the geometric bending resistance of a cross-section"
unit = "m^3"
dimension = "volume"
scale = "m^3"
tier = 0
range_lo = "0.000000001"
range_hi = "1"
real = "Young and Budynas, Roark's Formulas for Stress and Strain; jointly owned with geometry"

[[axis]]
id = "mech.second_moment_of_area"
measures = "the second moment of area governing Euler buckling"
unit = "m^4"
dimension = "4,0,0,0"
scale = "m^4"
tier = 0
range_lo = "0.000000000001"
range_hi = "1"
real = "Timoshenko, Theory of Elastic Stability; window [1e-12, 1] m^4 owner-ratified 2026-07-03 (a fine structural wire's section ~1e-13 to 1e-12 to a large built-up girder ~1e-1 to 1, I = b*h^3/12 or pi*r^4/4); the small-section m^4 underflows Q32.32, so it derives a fine per-quantity scale from the declared decimal envelope (R-UNITS-PIN). Basis: Gere and Goodno, Mechanics of Materials; Roark's Formulas for Stress and Strain"

[[axis]]
id = "mech.arm_length"
measures = "a moment arm or form-segment length along the principal axis"
unit = "m"
dimension = "length"
scale = "m"
tier = 0
range_lo = "0.001"
range_hi = "100"
real = "classical statics and lever mechanics (Meriam and Kraige, Engineering Mechanics: Statics)"

[[axis]]
id = "mech.slide_distance"
measures = "the per-step sliding distance a rubbing contact travels"
unit = "m"
dimension = "length"
scale = "m"
tier = 0
range_lo = "0.000001"
range_hi = "10"
real = "Archard 1953; Rabinowicz, Friction and Wear of Materials"

[[axis]]
id = "mech.edge_radius"
measures = "the apex radius of a worked edge, the physics-grounded successor to sharpness"
unit = "m"
dimension = "length"
scale = "m"
tier = 0
range_lo = "0.00000005"
range_hi = "0.01"
real = "Atkins, The Science and Engineering of Cutting (2009); cutting-edge metrology"

[[axis]]
id = "mech.effective_length_factor"
measures = "the end-condition factor of a buckling column"
unit = "ratio"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "0.5"
range_hi = "2.0"
real = "Timoshenko, Theory of Elastic Stability (standard end-condition K, theory-fixed interval)"

[[axis]]
id = "mech.constraint_factor"
measures = "the degree of restraint of a thermally loaded member, 0 free to 1 fully restrained"
unit = "ratio"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "0"
range_hi = "1"
real = "Boley and Weiner, Theory of Thermal Stresses (definitional interval)"

[[axis]]
id = "mech.static_friction"
measures = "the ratio of maximum static friction force to normal force"
unit = "ratio"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "0"
range_hi = "2.0"
real = "Bowden and Tabor, The Friction and Lubrication of Solids"

[[axis]]
id = "mech.kinetic_friction"
measures = "the ratio of kinetic friction force to normal force"
unit = "ratio"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "0"
range_hi = "2.0"
real = "Bowden and Tabor (generally below the static value for the same pair)"

[[axis]]
id = "mech.restitution"
measures = "the ratio of separation to approach speed in a collision"
unit = "ratio"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "0"
range_hi = "1"
real = "Goldsmith, Impact (definitional interval, plastic to elastic)"

[[axis]]
id = "mech.gravitational_acceleration"
measures = "the local gravitational acceleration, the shared weight-law input (terran default 9.80665, per-world override under Part 40)"
unit = "m/s^2"
dimension = "1,0,-2,0"
scale = "m/s^2"
tier = 0
range_lo = "0.1"
range_hi = "30"
real = "NIST standard gravity g0 = 9.80665 m/s^2 (CGPM); planetary envelope ~1.6 lunar to ~25 jovian"

# --- Bulk material axes (the pressure-class axes share the pinned megapascal scale) ---

[[axis]]
id = "mat.density"
measures = "bulk mass per unit volume"
unit = "kg/m^3"
dimension = "-3,1,0,0"
scale = "kg/m^3"
tier = 0
range_lo = "0.08"
range_hi = "23000"
real = "CRC Handbook of Chemistry and Physics, density tables; the low bound widened to the lightest simulated gas (hydrogen ~0.0899) so atmospheric buoyancy, hydrostatics, and wind are expressible (wave-2 unification 2.1, owner-signed 2026-07-01), osmium ~22590 the high end"

[[axis]]
id = "mat.indentation_hardness"
measures = "the contact pressure a surface resists before plastic indentation"
unit = "MPa"
dimension = "pressure"
scale = "MPa"
tier = 0
range_lo = "1"
range_hi = "150000"
real = "Vickers and Brinell hardness tables; Ashby and Jones (diamond Vickers to ~150 GPa)"

[[axis]]
id = "mat.yield_strength"
measures = "the stress at the onset of permanent plastic deformation"
unit = "MPa"
dimension = "pressure"
scale = "MPa"
tier = 0
range_lo = "1"
range_hi = "10000"
real = "ASM Metals Handbook; Ashby strength chart (maraging steel ~2400 MPa, whisker headroom)"

[[axis]]
id = "mat.ultimate_tensile_strength"
measures = "the maximum tensile stress before tensile fracture"
unit = "MPa"
dimension = "pressure"
scale = "MPa"
tier = 0
range_lo = "1"
range_hi = "7000"
real = "ASM Metals Handbook; Ashby strength chart; Wood Handbook FPL-GTR-190 (carbon fibre ~7 GPa)"

[[axis]]
id = "mat.compressive_strength"
measures = "the maximum compressive stress before crushing"
unit = "MPa"
dimension = "pressure"
scale = "MPa"
tier = 0
range_lo = "1"
range_hi = "6000"
real = "ASM Metals Handbook; concrete and masonry standards (SiC and B4C ~6 GPa)"

[[axis]]
id = "mat.shear_strength"
measures = "the maximum shear stress before shear failure (independent for anisotropic and brittle substances)"
unit = "MPa"
dimension = "pressure"
scale = "MPa"
tier = 0
range_lo = "1"
range_hi = "2000"
real = "Wood Handbook FPL-GTR-190; ASM Metals Handbook; rock-mechanics shear data"

[[axis]]
id = "mat.fracture_strength"
measures = "the stress at which brittle fracture initiates (the shared thermal-fracture read)"
unit = "MPa"
dimension = "pressure"
scale = "MPa"
tier = 0
range_lo = "1"
range_hi = "10000"
real = "Ashby and Jones; brittle-fracture literature (whisker and theoretical headroom)"

# RETIREMENT TARGET (materials oracle, Stage-6 property emission). This authored per-material Young's modulus is
# the named-substance-floor anchor the oracle replaces. Young's modulus E is a mix of the bulk modulus B and the
# shear modulus G (E = 9BG/(3B+G)), and the two derive by different routes (owner research, #182): for the seed
# registry's ionic-covalent oxides B is LATTICE CURVATURE on the Shannon radius (crate::materials_oracle carries
# only the metallic/quick-screen E_coh/V scale today), and G is class-dispatched (Cauchy relation, a separate
# slice). So this row is retired by the principled B-derived-plus-G-class-dispatched route, NOT by the current
# quick-screen scale alone. The row STAYS while it still feeds its live consumer (compose elastic_recoil_energy);
# it is flagged authoring-to-be-retired. Not deleted here: the derivations land dormant (byte-neutral), and the
# swap is a separate wired slice once B and G are both derived.
[[axis]]
id = "mat.elastic_modulus"
measures = "Young's modulus, the stress per unit elastic strain"
unit = "MPa"
dimension = "pressure"
scale = "MPa"
tier = 0
range_lo = "1"
range_hi = "1200000"
real = "Ashby modulus chart; ASM Metals Handbook (diamond ~1200 GPa, in the pinned megapascal)"

[[axis]]
id = "mat.fracture_energy"
measures = "the critical strain-energy release rate to advance a crack"
unit = "J/m^2"
dimension = "0,1,-2,0"
scale = "J/m^2"
tier = 0
range_lo = "1"
range_hi = "1000000"
real = "Ashby fracture-toughness chart; Griffith (1921), Irwin (1957) (tough steel ~1e6 J/m^2)"

[[axis]]
id = "mat.ductility"
measures = "tensile strain to failure"
unit = "ratio"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "0.0001"
range_hi = "1.0"
real = "ASM Metals Handbook elongation data (brittle ceramic ~0.0001 to ductile metal ~1.0)"

[[axis]]
id = "mat.poisson_ratio"
measures = "the ratio of transverse contraction to axial extension under load"
unit = "ratio"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "-1.0"
range_hi = "0.5"
real = "ASM Metals Handbook; Landau and Lifshitz, Theory of Elasticity (isotropic stability bound)"

[[axis]]
id = "mat.wear_coefficient"
measures = "the Archard dimensionless wear coefficient, stored at scale x1e6 (the kernel divides it back out)"
unit = "ratio"
dimension = "dimensionless"
scale = "x1e6"
tier = 0
range_lo = "0.001"
range_hi = "1000"
real = "Archard 1953; Rabinowicz (severe adhesive 1e-3 to mild lubricated 1e-9, stored scaled per R-PHYS-WEAR-RANGE)"

[[axis]]
id = "mat.specific_cut_energy"
measures = "the energy to remove or part unit volume (energy density, reducing to pressure)"
unit = "MJ/m^3"
dimension = "pressure"
scale = "MJ/m^3"
tier = 0
range_lo = "1"
range_hi = "7000"
real = "Atkins, The Science and Engineering of Cutting (2009); soft-tissue low end a flagged extension"

# --- Energy-and-thermal axes (the energy sub-domain owns these) ---

[[axis]]
id = "therm.conductivity"
measures = "the conductive heat transfer rate per unit area per unit gradient"
unit = "W/(m*K)"
dimension = "1,1,-3,-1"
scale = "W/(m*K)"
tier = 0
range_lo = "0.01"
range_hi = "3000"
real = "CRC Handbook thermal data; Incropera and DeWitt (diamond ~2200 to 3300, cleared)"

[[axis]]
id = "therm.specific_heat"
measures = "the energy to raise unit mass by one degree"
unit = "J/(kg*K)"
dimension = "2,0,-2,-1"
scale = "J/(kg*K)"
tier = 0
range_lo = "100"
range_hi = "50000"
real = "CRC Handbook specific-heat tables (lead ~128 to gaseous hydrogen ~14300, exotic reserve)"

[[axis]]
id = "therm.melting_temperature"
measures = "the solid-to-liquid transition temperature"
unit = "K"
dimension = "temperature"
scale = "K"
tier = 0
range_lo = "100"
range_hi = "10000"
real = "CRC Handbook melting-point tables (tungsten 3695, Ta4HfC5 4215, forge and stellar headroom)"

[[axis]]
id = "therm.boiling_temperature"
measures = "the liquid-to-gas transition temperature at reference pressure"
unit = "K"
dimension = "temperature"
scale = "K"
tier = 0
range_lo = "100"
range_hi = "10000"
real = "CRC Handbook boiling-point tables (tungsten 5828; pressure-dependence deferred to fluids)"

[[axis]]
id = "therm.ignition_temperature"
measures = "the lowest temperature that sustains combustion without a spark"
unit = "K"
dimension = "temperature"
scale = "K"
tier = 0
range_lo = "350"
range_hi = "3000"
real = "Babrauskas, Ignition Handbook; NFPA data (CS2 363, wood 570; non-igniters above the source range)"

[[axis]]
id = "therm.expansion"
measures = "the fractional length change per degree, stored in ppm/K (the x1e6 scale)"
unit = "ppm/K"
dimension = "0,0,0,-1"
scale = "ppm/K"
tier = 0
range_lo = "0.5"
range_hi = "200"
real = "CRC Handbook; Ashby expansion charts (invar ~0.5 to polymers ~200; negative-expansion exotics signed)"

[[axis]]
id = "therm.latent_heat"
measures = "the energy per unit mass of a phase change, stored in kJ/kg"
unit = "kJ/kg"
dimension = "2,0,-2,0"
scale = "kJ/kg"
tier = 0
range_lo = "334"
range_hi = "10000"
real = "CRC Handbook enthalpy-of-transition tables (water fusion 334 to metal vaporization ~1e4)"

[[axis]]
id = "therm.fuel_value"
measures = "the chemical energy released per unit mass on complete combustion, stored in kJ/kg (the energy sub-domain owns this; Materials reads it cross-domain)"
unit = "kJ/kg"
dimension = "2,0,-2,0"
scale = "kJ/kg"
tier = 0
range_lo = "15000"
range_hi = "120000"
real = "Turns, An Introduction to Combustion (dry wood 1.5e4 to hydrogen 1.2e5; exotic reserved)"

[[axis]]
id = "therm.oxidiser_demand"
measures = "the stoichiometric oxidiser-to-fuel mass ratio (0 for a self-oxidiser)"
unit = "ratio"
dimension = "dimensionless"
scale = "1"
tier = 0
range_lo = "0"
range_hi = "20"
real = "Turns, An Introduction to Combustion, stoichiometry (wood 1.2, methane 4, hydrogen 8)"

# --- The interaction laws (the kernels are fixed Rust in laws.rs, keyed by these ids) ---

[[law]]
id = "law.contact_pressure"
kernel = "contact_pressure"
ports = [
  { role = "force", axis = "mech.force" },
  { role = "contact_area", axis = "mech.contact_area" },
]
output_measure = "contact pressure"
dimension = "pressure"
interval_bound = "[0, P_MAX]"
tier = 0

[[law]]
id = "law.cut_penetrate"
kernel = "cut_penetrate"
ports = [
  { role = "hardness", axis = "mat.indentation_hardness" },
  { role = "specific_cut_energy", axis = "mat.specific_cut_energy" },
  { role = "contact_area", axis = "mech.contact_area" },
]
output_measure = "cut depth"
dimension = "length"
interval_bound = "[0, D_MAX]"
tier = 0

[[law]]
id = "law.bend_stress"
kernel = "bend_stress"
ports = [
  { role = "force", axis = "mech.force" },
  { role = "span", axis = "mech.arm_length" },
  { role = "section_modulus", axis = "mech.section_modulus" },
  { role = "yield_strength", axis = "mat.yield_strength" },
]
output_measure = "bending stress and collapse margin"
dimension = "pressure"
interval_bound = "[0, STRESS_MAX]"
tier = 0

[[law]]
id = "law.axial_stress"
kernel = "axial_stress"
ports = [
  { role = "force", axis = "mech.force" },
  { role = "cross_section", axis = "mech.cross_section_area" },
  { role = "yield_strength", axis = "mat.yield_strength" },
]
output_measure = "axial stress and collapse margin"
dimension = "pressure"
interval_bound = "[0, STRESS_MAX]"
tier = 0

[[law]]
id = "law.fracture_onset"
kernel = "fracture_onset"
ports = [
  { role = "fracture_strength", axis = "mat.fracture_strength" },
  { role = "fracture_energy", axis = "mat.fracture_energy" },
  { role = "crack_area", axis = "mech.cross_section_area" },
]
output_measure = "stress margin and energy margin"
dimension = "pressure"
interval_bound = "[stress_floor, STRESS_MAX]"
tier = 0

# The impact compound is split into its two independent outputs, each a clean monomial the
# descriptor can bind and dimensionally check: the kinetic energy delivered and the reduced-mass
# impulse transferred. Splitting was the only descriptor-compatible resolution, since one kernel
# cannot take both output shapes without dropping an input. Both stay terminal (no produced axis):
# the impact-to-cut composition edge is the separate reserved modelling decision.
[[law]]
id = "law.kinetic_energy"
kernel = "kinetic_energy"
ports = [
  { role = "mass", axis = "mech.mass" },
  { role = "velocity", axis = "mech.velocity" },
]
output_measure = "delivered kinetic energy E = (1/2) m v^2"
dimension = "energy"
interval_bound = "[0, E_MAX]"
tier = 0

[[law]]
id = "law.impulse"
kernel = "impulse"
ports = [
  { role = "striker_mass", axis = "mech.mass" },
  { role = "target_mass", axis = "mech.mass" },
  { role = "velocity", axis = "mech.velocity" },
  { role = "restitution", axis = "mech.restitution" },
]
output_measure = "reduced-mass impulse J = mu*v*(1 + e), the two masses two participants on the mass axis"
dimension = "1,1,-1,0"
interval_bound = "[0, J_MAX]"
tier = 0

[[law]]
id = "law.lever"
kernel = "lever"
ports = [
  { role = "force", axis = "mech.force" },
  { role = "effort_arm", axis = "mech.arm_length" },
  { role = "load_arm", axis = "mech.arm_length" },
]
output_measure = "torque, mechanical advantage, and output force"
dimension = "1,1,-2,0"
interval_bound = "[0, TORQUE_MAX]"
tier = 0

[[law]]
id = "law.friction"
kernel = "friction"
ports = [
  { role = "static_coefficient", axis = "mech.static_friction" },
  { role = "kinetic_coefficient", axis = "mech.kinetic_friction" },
  { role = "normal", axis = "mech.force" },
  { role = "tangential", axis = "mech.force" },
  { role = "slip_velocity", axis = "mech.velocity" },
]
output_measure = "kinetic friction force, slip margin, power loss, and efficiency"
dimension = "force"
interval_bound = "[0, F_MAX]"
tier = 0

[[law]]
id = "law.reach"
kernel = "reach"
ports = [
  { role = "segments", axis = "mech.arm_length" },
]
output_measure = "the additive grip-to-tip extent"
dimension = "length"
interval_bound = "[0, the saturating-sum cap]"
tier = 0

[[law]]
id = "law.weight"
kernel = "weight"
ports = [
  { role = "mass", axis = "mech.mass" },
  { role = "gravity", axis = "mech.gravitational_acceleration" },
]
output_measure = "the load force from mass and gravity"
dimension = "force"
interval_bound = "[0, F_MAX]"
tier = 0

[[law]]
id = "law.power"
kernel = "power"
ports = [
  { role = "force", axis = "mech.force" },
  { role = "velocity", axis = "mech.velocity" },
]
output_measure = "mechanical power"
dimension = "2,1,-3,0"
interval_bound = "[0, P_POWER_MAX]"
tier = 0

[[law]]
id = "law.euler_buckle"
kernel = "euler_buckle"
ports = [
  { role = "modulus", axis = "mat.elastic_modulus" },
  { role = "second_moment", axis = "mech.second_moment_of_area" },
  { role = "effective_length_factor", axis = "mech.effective_length_factor" },
  { role = "length", axis = "mech.arm_length" },
]
output_measure = "the Euler critical buckling load"
dimension = "force"
interval_bound = "[0, F_MAX]"
tier = 0

[[law]]
id = "law.shear"
kernel = "shear"
ports = [
  { role = "shear_force", axis = "mech.force" },
  { role = "shear_area", axis = "mech.cross_section_area" },
  { role = "independent_shear_strength", axis = "mat.shear_strength" },
  { role = "yield_strength", axis = "mat.yield_strength" },
]
output_measure = "shear stress and the shear margin"
dimension = "pressure"
interval_bound = "[0, STRESS_MAX]"
tier = 0

[[law]]
id = "law.wear"
kernel = "wear"
ports = [
  { role = "wear_coefficient", axis = "mat.wear_coefficient" },
  { role = "force", axis = "mech.force" },
  { role = "distance", axis = "mech.slide_distance" },
  { role = "hardness", axis = "mat.indentation_hardness" },
]
output_measure = "Archard worn volume"
dimension = "volume"
interval_bound = "[0, WEAR_MAX]"
tier = 0

[[law]]
id = "law.conduction"
kernel = "conduction"
ports = [
  { role = "conductivity", axis = "therm.conductivity" },
  { role = "area", axis = "mech.contact_area" },
  { role = "path_length", axis = "mech.arm_length" },
]
output_measure = "steady conductive heat flux"
dimension = "2,1,-3,0"
interval_bound = "[0, MAX_FLUX]"
tier = 0

[[law]]
id = "law.sensible_heat"
kernel = "sensible_energy"
ports = [
  { role = "mass", axis = "mech.mass" },
  { role = "specific_heat", axis = "therm.specific_heat" },
]
output_measure = "the energy for a temperature change, Q = m*c*dT (the delivered-energy inverse is law.sensible_rise)"
dimension = "energy"
interval_bound = "[0, E_MAX]"
tier = 0

[[law]]
id = "law.sensible_rise"
kernel = "sensible_rise"
ports = [
  { role = "mass", axis = "mech.mass" },
  { role = "specific_heat", axis = "therm.specific_heat" },
]
output_measure = "the temperature rise from a delivered energy, dT = Q/(m*c) (the inverse of law.sensible_heat)"
dimension = "temperature"
interval_bound = "[0, RISE_MAX]"
tier = 0

[[law]]
id = "law.phase_change"
kernel = "phase_change_energy"
ports = [
  { role = "mass", axis = "mech.mass" },
  { role = "specific_heat", axis = "therm.specific_heat" },
  { role = "transition_temperature", axis = "therm.melting_temperature" },
  { role = "latent_heat", axis = "therm.latent_heat" },
]
output_measure = "the sensible-plus-latent energy of a phase transition"
dimension = "energy"
interval_bound = "[0, E_MAX]"
tier = 0

[[law]]
id = "law.combustion"
kernel = "combustion"
ports = [
  { role = "fuel_value", axis = "therm.fuel_value" },
  { role = "oxidiser_demand", axis = "therm.oxidiser_demand" },
  { role = "ignition_temperature", axis = "therm.ignition_temperature" },
  { role = "mass", axis = "mech.mass" },
]
output_measure = "released energy, the ignition crossing, and the limiting reactant"
dimension = "energy"
interval_bound = "[0, E_MAX]"
tier = 0

[[law]]
id = "law.thermal_stress"
kernel = "thermal_stress"
ports = [
  { role = "modulus", axis = "mat.elastic_modulus" },
  { role = "expansion", axis = "therm.expansion" },
  { role = "constraint", axis = "mech.constraint_factor" },
  { role = "fracture_strength", axis = "mat.fracture_strength" },
]
output_measure = "constrained thermal stress and the fracture crossing"
dimension = "pressure"
interval_bound = "[-STRESS_MAX, STRESS_MAX]"
tier = 0

