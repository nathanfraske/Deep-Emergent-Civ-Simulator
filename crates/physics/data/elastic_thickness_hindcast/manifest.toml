# Held-source manifest for the elastic-thickness hindcast cited column (../elastic_thickness_hindcast.toml). The
# vendored-primary idiom: file / receipt / anchors. Each [[source]] holds the actual bytes of a primary or witness,
# with its sha256 receipt (VENDORING_CHECKLIST.md, primary since 2026-07-17), the fetch recipe, and the page /
# table / figure anchor for every value read into the column. scripts/elastic_thickness_hindcast_provenance_test.py
# re-checks every receipt offline and asserts the pre-registered fingerprints against the column, so a drifted
# source or a drifted transcription fails the build.
#
# BLOCK KIND [[source]] (held bytes) and [[reference]] (not held, receipt-by-DOI only), NEITHER a reserved floor
# kind: these witnesses do not participate in the floor real/fantasy authorship axis. GRADE: measured throughout
# (observationally-derived T_e estimates and their compilations).
#
# All four held PDFs are open-access and under 1 MB each (2.7 MB total), so the bytes are held rather than
# receipt-only: the dry-run battery re-checks real bytes, the stronger provenance. Two further sources (the Watts
# 2001 book and Watts & Zhong 2000) are recorded as [[reference]] entries without bytes and explained below.

# --- Oceanic interior PRIMARY: the measured T_e-versus-age dataset (Table 2) and the isochron/thermal isotherm
#     finding (pp.62-63). Downloaded from the open IRD (ORSTOM) reprint mirror. ---
[[source]]
name = "calmant_1990_gji"
file = "calmant_1990_gji.pdf"
url = "https://horizon.documentation.ird.fr/exl-doc/pleins_textes/pleins_textes_5/b_fdi_31-32/34824.pdf"
archived_url = "https://web.archive.org/web/20260718153257/https://horizon.documentation.ird.fr/exl-doc/pleins_textes/pleins_textes_5/b_fdi_31-32/34824.pdf"
sha256 = "ce4990077613c00453cb228e2143a4fad031b938a234ed9cbed47ecf8abf1fdc"
bytes = 938097
citation = "Calmant, S., Francheteau, J., Cazenave, A. (1990), Elastic layer thickening with age of the oceanic lithosphere: a tool for prediction of the age of volcanoes or oceanic crust, Geophys. J. Int. 100, 59-67. DOI 10.1111/j.1365-246X.1990.tb04567.x."
recipe = "GET the open IRD/ORSTOM reprint mirror PDF (Fonds Documentaire ORSTOM 34.824)"
grade = "measured"
anchor = "Table 2 (p.62): the measured oceanic-interior T_e with age of plate tp and age of volcano tv, per seamount/island; source of every oceanic_interior row. Relationship (6) T_e = 2.70 sqrt(dt), sigma = 0.15 (p.62). The isochron-versus-thermal age convention and its isotherms 350-450 C (isochron) versus 550-600 C (thermal), McNutt 1984 via this paper (pp.62-63). Table 3 (inferred ages) deliberately NOT transcribed (circular). Table 1 (p.60) lists Calmant's flexure constants (E stated as 10^12 in a mixed cgs/SI table, Poisson ratio 0.5, crust 6 km), context only, not transcribed as physics."

