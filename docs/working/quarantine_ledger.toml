# QUARANTINE LEDGER: the parked living-world substrate's reserved values with no or deprecated provenance.
#
# These are authored world-content values in the parked biology / creature / plant / entity / cognition
# substrate (crates/sim/src) that do not clear the current value-authoring line: they carry no basis at all,
# or a basis that no longer suffices (a magnitude with no citation, a Terran-tuned or Terran-assuming number,
# a placeholder, or a value a built substrate could now derive). They are NOT removed: the parked world still
# runs on them, byte-identical. They are QUARANTINED, named here in one register and frozen, so active
# development does not build on them as if they were derived or cited. Each owes a derive-or-cite before it
# can leave the ledger. This is debt isolation, not an immediate fix; nothing here is scheduled to merge up.
#
# Surfaced by a nine-agent living-world sweep (2026-07-15), each finding verified to resolve in its file.
# The gate scripts/quarantine_gate.py keeps this register honest: when a quarantined site is edited or the
# value is derived away, its anchor stops resolving and CI fails until the entry is updated or retired.
#
# verdict: no-provenance | deprecated-provenance
# defect_class: bare-literal-no-basis | basis-without-citation | earth-or-terran-tuned |
#               interim-placeholder-label | authored-should-derive-from-body-or-floor | terran-biology-assumption

[[entry]]
id = "q-absence-01"
file = "crates/sim/src/absence.rs"
anchor = "AbsenceScheduleDef"
value = "Fixed::ONE, Fixed::from_int(2), Fixed::from_int(4) (dev_default fixture; the reserved field is AbsenceStage::multiplier)"
shapes = "The presumed-dead absence window per stage: window = base_check_interval * (stage.multiplier / visibility). The multiplier sets how much longer a deeper absence stage runs before a being is presumed dead, a magnitude driving the evidence/death subsystem's treatment of an absent entity."
verdict = "deprecated-provenance"
defect_class = "basis-without-citation"
owed = "cite-owner-source: a per-world reserved escalation must carry a cited/owner-set basis (in reserved.toml) for the specific magnitudes, not only a monotonicity constraint; the current basis states direction only, no source for the 2x/4x steps."

