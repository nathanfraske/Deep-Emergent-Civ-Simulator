# Arcanum: the high-magic stress test, minimally grounded. As much magic as the engine
# can carry. See docs/working/TEST_WORLDS.md. Directions are tokens; magnitudes stay
# reserved. Carries the most placeholders, since the magic systems (Part 34) are least built.

[scenario]
id = "arcanum"
name = "Arcanum"
summary = "Minimally grounded, maximally magical: a potent MagicLaws, most races magically disposed, the fantasy systems exercised as hard as possible."
grounding = "minimal"

[races]
count = "many"
diversity = "high"

[magic]
laws = true
potency = "high"                # becomes reserved MagicLaws ids as Part 34 is built
cost = "low"                    # cheap to work magic
limit_looseness = "high"        # loose limits: magic can do much
affinity_fraction = "most"      # most or all races carry the imbued magic-affinity channel
affinity_weight = "high"        # weighted high in the genome (Part 25 imbued channel)

[dials]
# Set to keep magical traditions arising, drifting, spreading, and being lost rather than
# to realism (Part 23, Part 9).
"genome.mutation_rates" = "high"
"genome.point_mutation_rate" = "high"
"genome.mutation_step" = "high"
"genome.selection_scaling" = "real"
"genome.effective_population_size" = "real"
"genome.speciation_distance" = "real"
"genome.speciation_incompatibilities" = "real"
"language.sound_change_rate" = "high"
"lang.drift_operator_rates" = "high"
"language.innovation_rate" = "high"
"axiom.calcification_rate" = "high"
"axiom.conformity_prestige_strengths" = "high"
"value_metric.conflict_coefficient" = "high"
"being.life_event_impulse" = "high"
"biosphere.predawn_generations" = "real"   # deep enough to support the magical economy under test
