# Tempest: grounded, no magic, every change-and-extremes dial cranked high. The stress
# test of the change engines. See docs/working/TEST_WORLDS.md. Directions are tokens;
# magnitudes stay reserved.

[scenario]
id = "tempest"
name = "Tempest"
summary = "Our physics, no magic, but everything that drives change and produces extremes pushed high; the results are meant to be wild."
grounding = "real"

[races]
count = "several"
diversity = "high"

[magic]
laws = false
affinity_fraction = "none"

[dials]
"genome.mutation_rates" = "high"
"genome.point_mutation_rate" = "high"
"genome.mutation_step" = "high"
"genome.selection_scaling" = "high"
"genome.effective_population_size" = "low"   # small Ne drifts harder: chance fixation, divergence
"genome.speciation_distance" = "low"          # speciate sooner: fast radiation and extinction
"genome.speciation_incompatibilities" = "low"
"language.sound_change_rate" = "high"
"lang.drift_operator_rates" = "high"
"language.innovation_rate" = "high"
"axiom.calcification_rate" = "high"
"axiom.conformity_prestige_strengths" = "high"
"value_metric.conflict_coefficient" = "high"
"being.life_event_impulse" = "high"
"biosphere.predawn_generations" = "high"      # a long, churned, boom-and-bust inherited web
