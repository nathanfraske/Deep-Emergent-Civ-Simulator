# Venus: a uniformly super-hot world under a dense, toxic, crushing atmosphere. A
# runaway-greenhouse surface lethal everywhere; life banded high in the cooler cloud
# decks, buoyant in the dense air, breathing a medium thin in anything respirable and
# laced with harm. A thin thread of magic. The world the medium substrate (R-MEDIUM)
# stresses hardest: lethal-hot in-medium thermal exchange, toxic-poor respiration, and
# dense-medium buoyancy at once. See docs/working/RESERVED_VALUES_WORKSHEET.md. Directions
# are tokens; magnitudes stay reserved. The environment (field, thermal band, medium) is
# proposed for §3 promotion to manifest dials and is not yet a [dials] entry.

[scenario]
id = "venus"
name = "Venus"
summary = "A uniformly super-hot world under a dense, toxic, crushing atmosphere: the surface lethal everywhere, life banded high in the cooler cloud decks, buoyant in the dense air and breathing a medium thin in anything respirable and laced with harm. A scarce, costly magic is a survival edge, not an ambient utility."
grounding = "real"

[races]
count = "few"
diversity = "moderate"
magical_mix = true

[magic]
laws = true
potency = "low_to_moderate"     # present but scarce, a survival edge not an ambient utility
cost = "real"
limit_looseness = "low"
affinity_fraction = "few"
affinity_weight = "moderate"

[dials]
# The extremity is environmental (the hot toxic dense medium, §3), not baked into the
# genetic or linguistic clocks. What the dials crank is the harsh selection on small
# cloud-deck pools and the belief-and-cohesion sharpening a constant threat produces.
"genome.mutation_rates" = "real"
"genome.point_mutation_rate" = "real"
"genome.mutation_step" = "real"
"genome.selection_scaling" = "high"           # a lethal world selects hard
"genome.effective_population_size" = "low"    # small, isolated cloud-deck pools drift
"genome.speciation_distance" = "real"
"genome.speciation_incompatibilities" = "real"
"language.sound_change_rate" = "real"
"lang.drift_operator_rates" = "real"
"language.innovation_rate" = "real"
"axiom.calcification_rate" = "high"           # constant threat hardens belief and cohesion
"axiom.conformity_prestige_strengths" = "high"
"value_metric.conflict_coefficient" = "high"  # scarce habitable band, contested
"being.life_event_impulse" = "high"
"biosphere.predawn_generations" = "real"
