name: ci

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  stone0:
    name: Stone 0 gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install the pinned Rust toolchain
        run: rustup show
      - name: Prove the declarative gate authority
        run: python3 scripts/gate_runner.py --self-test
      - name: Print the ordered canonical gate ids
        run: python3 scripts/gate_runner.py list --tier canonical --ids-only
      - name: Prove the native Stone 0 detectors
        run: cargo test -p civsim-stone0 --all-targets
      - name: Run the authoritative canonical provenance suite
        if: always()
        run: cargo run -p civsim-stone0 --bin stone0-gate -- --ci
      - name: Scan pushed history for retired credentials
        if: always()
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: bash scripts/stone0-ci-tombstone-scan.sh

  canonical-planet:
    name: canonical planet gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install the pinned Rust toolchain
        run: rustup show
      - name: Install Just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Print the ordered pull-request gate ids
        if: github.event_name != 'schedule'
        run: just gates-list pr
      - name: Canonical local and CI parity tier
        if: github.event_name != 'schedule'
        run: just ci
      - name: Print the ordered nightly gate ids
        if: github.event_name == 'schedule'
        run: just gates-list nightly
      - name: Canonical nightly tier
        if: github.event_name == 'schedule'
        run: just check-nightly

  parked-legacy:
    name: parked legacy diagnostics
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned Rust toolchain
        run: rustup show
      - name: Install Just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Print the ordered legacy gate ids
        run: just gates-list legacy
      - name: Parked audit ratchets
        run: just audit-parked
      - name: Parked crate tests
        run: just test-legacy-routine
      - name: Mixed legacy compatibility compile
        run: cargo check --manifest-path parked/Cargo.toml --target-dir target/parked -p civsim-sim -p civsim-viewer-legacy

  parked-nightly:
    name: parked nightly test suite
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned Rust toolchain
        run: rustup show
      - name: Install Just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Parked crate tests
        run: just test-legacy-routine
      - name: Parked ignored and slow tests
        run: cargo test --manifest-path parked/Cargo.toml --target-dir target/parked --workspace --exclude civsim-gpu-legacy --all-targets -- --ignored
