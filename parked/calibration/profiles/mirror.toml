# RETIRED (authoring-defect cleanup, derive-vs-author): `hydrology.saturation_slope` (was 0.0131 index/K)
# and `hydrology.saturation_e_ref` (was 0.20) are NO LONGER authored here. Both encoded the SAME
# Clausius-Clapeyron relation, so authoring both authored it twice; they now DERIVE (environ.rs
# derive_saturation_index_tangent) from the volatile's measured specific latent heat (the floor
# therm.latent_heat), its molar mass (the periodic table over its formula), the derived molar gas constant
# R = N_A*k_B, and the two reference temperatures below: e_ref = e_s(T_ref)/e_s(T_source) =
# exp((L/Rv)(1/T_source - 1/T_ref)), slope = L*e_ref/(Rv*T_ref^2). The ONE surviving input is the warm
# vapour-source temperature (the moisture-index normalization AND the Kelvin-path opt-in signal).

