# --- the DERIVED photosynthesis productivity (#156, the Mirror-standup arc): the measured Earth-C3 per-producer
# constants the carbon-fixation derivation reads, OWNER-AUTHORIZED graduation from dev fixtures to sourced values
# (PR #156). Each is converted into the derivation's OWN units (an energy fraction of incident total shortwave; a
# total-shortwave W/m^2 flux; Kelvin; a linear-tent zero-crossing half-width; the evaporative-coupling coefficient),
# the conversion arithmetic and citation shown in each basis. The absolute scale cross-checks: p_max =
# quantum_yield * light_saturation = 0.0429 * 486 ~ 21 W/m^2, the real C3 light-saturated gross fixation rate.
[[reserved]]
id = "photosynthesis.quantum_yield"
basis = "the photosynthetic quantum yield as the energy fraction of INCIDENT total-shortwave radiant energy fixed at the light-limited initial slope (p_max = quantum_yield * light_saturation). CONVERTED from the sourced molar yield 0.052 mol CO2 per mol absorbed PAR photon: * (470 kJ per mol CO2 fixed / 218 kJ per mol PAR photon) = 0.112 energy-per-absorbed-PAR, * 0.45 PAR fraction of shortwave * 0.85 canopy absorptance = 0.043. Owner-authorized; Ehleringer and Bjorkman 1977 for the molar yield, the glucose combustion enthalpy and PAR photon energy the conversion physics"
status = "set"
value = "0.0429"
unit = "fixed_energy_per_incident_energy"
source = "owner-authorized Earth-C3 graduation, PR #156; Ehleringer and Bjorkman 1977, Plant Physiol; crates/sim/src/environ.rs carbon_fixation_rate"

[[reserved]]
id = "photosynthesis.light_saturation"
basis = "the light-saturation irradiance in the derivation's total-shortwave flux units (the same units as insolation * solar_constant), where fixation stops rising with light. CONVERTED from the sourced 1000 micromol PAR m^-2 s^-1: / 4.57 micromol per J = 219 W/m^2 PAR, / 0.45 PAR fraction of shortwave = 486 W/m^2 total shortwave. Owner-authorized; Larcher 2003 for the C3 saturation, the PAR energy conversion the physics"
status = "set"
value = "486.3"
unit = "watt_per_square_metre"
source = "owner-authorized Earth-C3 graduation, PR #156; Larcher 2003 / Plants in Action; crates/sim/src/environ.rs carbon_fixation_rate"

[[reserved]]
id = "photosynthesis.temperature_optimum"
basis = "the carbon-fixing enzyme's thermal optimum where net photosynthesis peaks, in KELVIN (the temperature field's units, freeze at 273.15 K). The sourced 25 C net-photosynthesis optimum = 298.15 K. Owner-authorized; Kumarathunge 2019, New Phytol"
status = "set"
value = "298.15"
unit = "kelvin"
source = "owner-authorized Earth-C3 graduation, PR #156; Kumarathunge 2019, New Phytol; crates/sim/src/environ.rs carbon_fixation_rate"

[[reserved]]
id = "photosynthesis.temperature_breadth"
basis = "the linear-tent zero-crossing half-width, the offset from the optimum at which the tent factor reaches ZERO (temp_factor = 1 - |T - Topt| / breadth). CONVERTED from the sourced Gaussian Omega = 17.5 C (the 1/e half-width) so the tent passes through 1/e exactly at Omega: breadth = 17.5 / (1 - 1/e) = 27.68 K. FLAGGED as the one under-pinned value (fit-or-lift reserved from June, Evans and Farquhar 2004; the Johnson-Lewin exp form reserved for R-GPU-CANON-PIN). Owner-authorized interim"
status = "set"
value = "27.68"
unit = "kelvin"
source = "owner-authorized Earth-C3 interim, PR #156; June, Evans and Farquhar 2004, Funct Plant Biol; crates/sim/src/environ.rs carbon_fixation_rate"

[[reserved]]
id = "photosynthesis.water_use_efficiency"
basis = "the evaporative-coupling coefficient that turns a cell's evaporative demand into the producer's water requirement (water_req = water_use_efficiency * evaporative_demand, compared to water_supply). NOTE the units-reconciliation seam: the sourced agronomic WUE ~2 g CO2 per kg H2O (Lambers et al. 2008) is fixation-per-water, the INVERSE dimension of this coupling coefficient, so this is set to 2 as instructed but flagged, and water was shown NON-limiting in the #141 evaporation re-run so it is unlikely to bind. Owner-authorized interim; the clean transpiration-coupling derivation the follow-on"
status = "set"
value = "2"
unit = "transpiration_per_fixation"
source = "owner-authorized Earth-C3 interim, PR #156; Lambers et al. 2008; crates/sim/src/environ.rs carbon_fixation_rate"

[[reserved]]
id = "photosynthesis.cell_area_m2"
basis = "the cell AREA in square metres, the spatial scale over which the carbon-fixation FLUX is integrated to yield a cell's per-tick fixed-carbon ENERGY (the a-prime joules bridge #42, E_food = fixation_flux * cell_area * tick), so the standing food a grazer eats and its Kleiber drain compare in the same joules. A per-world SPATIAL datum: the tile edge squared, where the tile edge is fixed by one real creature's walking speed and the tick (tile_edge = real_speed 1.4 m/s / base_speed 1 tile-per-tick at the 1 s base tick ~= 1.4 m, so a cell ~= 1.96 m^2, rounded to 2). The tick is the 1 s base folded as unity; a different-tick world carries the tick separately (the flagged follow-on)"
status = "set"
value = "2"
unit = "square_metre"
source = "derived from the locomotion tile-edge basis (real walking speed / base speed at the 1 s tick), PR #42; crates/sim/src/environ.rs step_productivity a-prime joules bridge"

# --- the ABIOTIC mineral-weathering floor (#156, the matter-cycle completion): the base rate at which rock
# weathers to soil nutrient, so the soil is fertile from geology before any biomass (the owner's super-fertile
# marsh). Map-wide, scaled per-cell by the cell's own WETNESS (weather_minerals), so a wet marsh weathers
# strongly. Mineral-agnostic INTERIM (the worldgen carries no per-cell lithology yet), pending the geology arc.
[[reserved]]
id = "weathering.mineral_dissolution_rate"
basis = "the base mineral-dissolution rate (the soil nutrient a cell's parent rock weathers per tick at full wetness), the ABIOTIC floor that seeds the soil from geology before any biomass. Set to soil_requirement / fertility_scale (0.5 / 0.001 = 500) so a fully-wet marsh cell reaches soil-non-limiting (fertility >= soil_requirement) from dawn, the owner's super-fertile marsh; soil_factor caps at 1 so a higher rate does not over-fix. MINERAL-AGNOSTIC interim: the worldgen carries no per-cell lithology, so the parent-rock composition cannot be read yet (the geology-arc lithology derivation the flagged follow-on); the wetness coupling DERIVES from the cell's water and the temperature-Arrhenius coupling is the deferred follow-on. The wetness scaling is derived, only this base is reserved"
