# Legacy organism-facing ground substances. This file extends the parked combined registry after the
# abiotic ground floor and biology floor have loaded. Canonical physics does not read it.

[[substance]]
id = "carrion"
participates_in = []
real = "USDA / Greenfield and Southgate food-composition data (mammalian soft tissue density ~1000 to 1050 kg/m^3; whole-carcass mineral ash mass fraction ~0.05 including bone). The decomposition barrier is the freezing point of the tissue water (~273 K), below which a carcass is preserved (CRC Handbook water fusion)"
values = [
  { axis = "mat.density", value = "1000" },
  { axis = "bio.mineral_ash_fraction", value = "0.05" },
  { axis = "bio.decomposition_barrier", value = "273" },
]

# An oil-rich hard-shelled seed: energy-dense food locked inside a lignified shell a forager must BREAK to
# reach, the substance the viability world uses to close the discovery loop (ideation viability arc). It is
# at once FRACTURABLE (a mat.fracture_strength an ordinary actor's contact stress can overwhelm, so its
# FracturePotential reads positive and the discovery loop proposes acting on it) and ENERGY-DENSE
# (bio.energy_density, the kernel's assimilable energy). Depositing it in a world is authored environment
# (Principle 9); the technique of extracting and eating it is DISCOVERED, never authored. Carried nowhere by
# default, so every existing world is unchanged.
[[substance]]
id = "oilseed"
participates_in = ["law.fracture_onset", "law.contact_pressure"]
real = "USDA FoodData Central (tree-nut and oilseed kernels ~2500 to 2900 kJ per 100 g, about 25 to 29 kJ/g, lipid-dominated; kernel bulk density ~1.0 to 1.1 g/cm^3). Koyuncu et al. (2004) and Braga et al. (1999) on nut-shell mechanics (lignified nut-shell rupture stress on the order of 5 to 20 MPa, an ordinary forager can crack it)"
values = [
  { axis = "mat.density", value = "1050" },
  { axis = "mat.fracture_strength", value = "10" },
  { axis = "bio.energy_density", value = "25" },
]

# The spent hull: the lignified shell fragments LEFT BEHIND when a forager cracks and eats an oilseed, the
# durable physical residue of the extract-and-eat technique. It is the world's own record that the technique
# happened here, deposited into the material field by the enact and perceivable by a being that comes later
# (the physical-trace cultural-persistence substrate, the lifetime/demography keystone pillar 2). It carries
# no belief and no energy: it is HARD (a mat.fracture_strength of lignified shell material, so a being can
# sense it the way it senses any fracturable matter) and it WEATHERS SLOWLY (a low mineral-ash fraction and a
# freezing-point decomposition barrier, so the matter cycle fades it over time and an unvisited trace does not
# persist forever, falsifiability by physics). Its physics is authored environment (Principle 9); that a being
# re-earns "eating here pays off" from perceiving it is DISCOVERED. Deposited nowhere by default, so every
# existing world is unchanged.
[[substance]]
id = "spent_hull"
participates_in = ["law.fracture_onset", "law.contact_pressure"]
real = "Nut-shell and lignified pericarp material (walnut, hazel, macadamia): dry bulk density ~1.1 to 1.3 g/cm^3 (lignin ~1.3, cellulose ~1.5, with shell porosity), Koyuncu et al. (2004) and Braga et al. (1999) rupture stress on the order of 5 to 20 MPa for the intact shell. Nut-shell ash mass fraction ~0.01 to 0.02 (lignin-and-cellulose dominated, low mineral), Demirbas (2002) biomass ash. The decomposition barrier is the freezing point of the residual shell water (~273 K), below which decay is arrested (CRC Handbook water fusion); lignified shell is recalcitrant, so it weathers slowly above it"
values = [
  { axis = "mat.density", value = "1200" },
  { axis = "mat.fracture_strength", value = "12" },
  { axis = "bio.mineral_ash_fraction", value = "0.015" },
  { axis = "bio.decomposition_barrier", value = "273" },
]

# A starch-rich tuber: a SOFT, energy-dense root a forager eats without cracking (unlike the hard-shelled
# oilseed), the SECOND food a mixed-material world needs to make "several foods, some inert matter" real
# (social-learning arc, the payoff world). Its low fracture strength is a DISTINCT hardness, so the granular
# discovery loop tells eating a soft thing from cracking a hard one, and its own energy density is a distinct
# nutrition signature. Its physics is authored environment (Principle 9); which foods nourish and how to get
# them is DISCOVERED, never authored. Deposited nowhere by default, so every existing world is unchanged.
[[substance]]
id = "tuber"
participates_in = ["law.fracture_onset", "law.contact_pressure"]
real = "USDA FoodData Central (starchy tubers, cassava and potato dry-matter energy ~15 to 17 kJ/g, starch-dominated; potato flesh bulk density ~1080 kg/m^3). Alvarez and Canet (1998) and food-texture literature on tuber mechanics (raw potato flesh compressive fracture stress on the order of 1 to 2 MPa, far softer than a lignified nut shell)"
values = [
  { axis = "mat.density", value = "1080" },
  { axis = "mat.fracture_strength", value = "2" },
  { axis = "bio.energy_density", value = "17" },
]
