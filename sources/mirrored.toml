anchor = "Theorem 4.1: Rc = 1100.6496068876767846274918888472711957506710554524140, kc = 2.6823217576934142448438929301107059823340014414401993 (error at most one digit in the last decimal place, by interval analysis). Table 1 (historical rigid-free approximations, original notation verbatim): Low 1929 'nearly 1108'; Pellew & Southwell 1940 '17,610.5/16 = 1100.65'; Reid & Harris 1958 'no decimal given, 16*Rc = 17,610.39'; Chandrasekhar 1961 '17,610.39/16 = 1100.65' (cites Reid & Harris); Koschmieder 1993 1100.7; Getling 1998 1100.657; Drazin & Reid 2004 '17,610.39/24 = 1101' (cites Reid & Harris). Footnote: Reid & Harris print no explicit decimal, which is why two different values are each attributed to them."

