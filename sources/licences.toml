[[licence]]
id = "byerlee_1978"
licence = "US Government work, 17 USC 105 (USGS-authored). Byerlee is affiliated on the article as U.S. Geological Survey, Menlo Park. USGS SM 1100.4: work submitted to outside publication is in the public domain and may not be copyrighted. CENDI interagency FAQ 3.2.1: a republisher cannot assert copyright unless it added original protected material."
redistributable = true
licence_evidence = "https://www.usgs.gov/information-policies-and-instructions/copyrights-and-credits"
free_route = "https://earthquake.usgs.gov/static/lfs/research/rockphysics/Friction_of_rocks.pdf"
free_route_kind = "gov-work"
reviewed = "2026-07-18"
caveat = "Two residual limits, recorded rather than resolved. Nothing documents that this specific manuscript was official duty rather than personal volition. And 17 USC 105 disclaims US copyright only, leaving Swiss and EU rights untested for a globally distributed repo. The held bytes are a USGS re-keying (pdfinfo Creator 'Microsoft Word: AdobePS 8.7.3', CreationDate 2002-10-11) rather than Birkhauser's typesetting, and carry no copyright notice, which supports the reading."

