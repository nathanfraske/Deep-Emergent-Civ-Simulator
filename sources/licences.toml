licence = "The chapter is in copyright (AGU/Wiley, book DOI 10.1029/RF002). The bytes were fetched from geokniga.org, which is a SHADOW LIBRARY: it disclaims all rights in its own words ('All rights to these materials belong to their legal rights holders'), materials are posted by users without moderation, available 'exclusively for familiarization', with a takedown address in place of any licence."
redistributable = false
licence_evidence = "https://www.geokniga.org/geowiki/geokniga"
reviewed = "2026-07-18"
remediation = "No bytes are tracked in the repo (verified), so no removal is required. The defect is a PROVENANCE WORDING error: the gruneisen manifest describes the fetch as 'the open GeoKniga DjVu', and labelling a shadow library open is a false provenance claim that a future reader would rely on. Correcting that sentence is a one-line fix in a file this lane does not own. No free legitimate route to this chapter was found."
