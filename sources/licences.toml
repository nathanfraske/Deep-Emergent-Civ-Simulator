# THE LICENCE OVERLAY: the redistribution finding for each vendored source.
#
# An OVERLAY rather than an edit to the per-directory manifests, for two reasons. The manifests are the
# fetch record and are owned by whichever lane made the fetch, so writing licence findings into eighteen of
# them would collide with concurrent work for no gain. And the licence finding has a different lifetime
# from the fetch: bytes and checksums are immutable forever, while a licence finding is dated, revisable,
# and may be superseded by a permission grant. Keeping them apart lets each be corrected without touching
# the other. The gate merges this file onto the matching registry id at load time, so a finding here is as
# enforceable as a field written inline.
#
# This is NOT a diamond: the manifests record no licence, so nothing here can disagree with anything there.
#
# THE TEST, in the owner's terms. Not "is it paywalled" but "does the licence permit THIS use": an
# open-source, educational, non-profit project redistributing the bytes. Free to READ and free to
# REDISTRIBUTE are different questions, and IOP Publishing states the distinction in its own words:
# "Free to view is not the same as free to reuse."
#
# PROVENANCE OF THESE FINDINGS. Researched 2026-07-18 against the publishers' own licence pages, each with
# a quoted term and an evidence URL. Every locally-checkable claim was re-verified against this tree before
# being recorded here (the tracked-PDF list, the absence of tracked .djvu bytes, the JANAF table count, and
# the repo's Apache-2.0 licence all confirmed). The LEGAL READING IS NOT VERIFIED BY THIS AGENT and is not
# a lawyer's opinion. Where a finding says bytes should not be held, the remediation is an OWNER RULING
# (docs/working/FETCH_PIPELINE_PLAN.md, decision D6), and nothing has been deleted on the strength of it.

