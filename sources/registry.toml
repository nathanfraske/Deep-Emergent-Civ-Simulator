# THE SOURCE REGISTRY: where a new fetch lands.
#
# Hand-maintained, and the landing place for every source vendored from here on. Its generated sibling
# sources/mirrored.toml carries the 27 sources that already lived in the per-directory manifests; the gate
# and the bibliography read the two as ONE namespace, so there is one lookup and one bibliography
# (docs/SOURCES.md, generated by scripts/gen_sources.py).
#
# WHY TWO FILES AND WHY THAT IS NOT A DIAMOND. The repo's diamond gate states the predicate: two providers
# are not a defect, an UNARBITRATED two providers is. The arbitration is registered and one-directional.
# A mirrored entry's AUTHORITY is the manifest it names in `mirrors`, and it is regenerated from it, so it
# cannot drift. A registry entry has no manifest and is its own authority. Every id lives in exactly one
# half, and the gate fails on an id in both.
#
# REQUIRED OF EVERY NEW ENTRY (scripts/sources_gate.py enforces all of it, and grandfathers none of it for
# a new source):
#
#   id            stable; referenced from manifest rows as `source_id`, from code as `// @sources:`,
#                 and from floor_provenance.toml as `sources`
#   citation      the full primary citation, verified at the primary
#   sha256        the receipt. md5 alone does not pass: a collision-forgeable receipt is not tamper-evident
#   archived_url  an Internet Archive snapshot, or `archive_pending` with a stated reason when a host
#                 bot-walls the crawler. `archive_url` is accepted as an alias (PR #201's spelling)
#   scope         the regime the source's values hold in, so a number is not used outside it
#   slim          what was KEPT and what was DROPPED, so a slim is never mistaken for the whole document.
#                 A `witness` entry carries `extract` instead: the load-bearing passage verbatim
#   licence       the terms, and whether they permit redistribution by an open-source, educational,
#                 non-profit project. This is a LICENCE question, not a paywall question: a gold
#                 open-access paper behind a publisher page but carrying CC-BY is fine to hold, and a
#                 free-to-download paper reserving all rights is not
#   custody       in_repo (bytes in-tree) | witness (no bytes, receipt plus public archive) | external
#                 (bytes in local custody outside the repo)
#
# A fetch should cover a PRIMARY and at least one SECONDARY for the same claim, both through this pipeline,
# so the two cross-check and so an erratum has two independent witnesses. The claim record lives beside the
# value it is about, in the per-directory manifest, as a `[[claim]]` block with `primary` and `secondary`
# lists of ids from here.

# ---------------------------------------------------------------------------------------------------
# Migrated from docs/working/VENDORING_CHECKLIST.md, which held this as its single prose entry and is the
# fullest-discipline record the repo had. Every field of that entry is carried here verbatim, including
# both checksums and the kept-versus-dropped slim record. The checklist's recorded slim sha256 and byte
# count were re-verified against the held bytes during this migration and both match exactly.
# ---------------------------------------------------------------------------------------------------

[[source]]
id = "flexure_tafi"
citation = "Jha, S., Harry, D. L. and Schutt, D. L., 2017, Toolbox for Analysis of Flexural Isostasy (TAFI): A MATLAB toolbox for modeling flexural deformation of the lithosphere, Geosphere 13(5), 1555-1565, DOI 10.1130/GES01421.1."
url = "https://derekschutt.wordpress.com/wp-content/uploads/2018/01/flexural_modeling_geosphere_2017.pdf"
archived_url = "https://web.archive.org/web/20260718230721/https://derekschutt.wordpress.com/wp-content/uploads/2018/01/flexural_modeling_geosphere_2017.pdf"

# The receipt is the HELD bytes (the slim). The full-document fetch receipt rides beside it, so the slim is
# traceable back to the document it was cut from.
sha256 = "b0733092524e96ce209b564725855deda9493eba31035b2ad8e710e0371a9240"
bytes = 942728
pages = 4
sha256_fetched = "4abc31ee08633de676313a600f4d4bf1a34b70ce131dd20dee2d1a078bc8f009"
bytes_fetched = 2210652
pages_fetched = 11

recipe = "curl -L https://derekschutt.wordpress.com/wp-content/uploads/2018/01/flexural_modeling_geosphere_2017.pdf (HTTP 200, application/pdf), then keep PDF pages 1, 2, 3 and 10 (zero-based 0, 1, 2, 9) with pypdf.PdfWriter. Both checksums are reproducible from that pair of steps."
grade = "theory (published analytic equations, transcribed rather than measured; single-grade)"
scope = "Lithospheric flexure under the thin-elastic-plate approximation: equations (1) to (7) and Table 1's four load-model rows, with the flexural rigidity and flexural parameter definitions."

custody = "external"
external_path = "~/.claude/vendored-sources/flexure_tafi/jha_harry_schutt_2017_tafi_geosphere_SLIM_p1555-1557_p1564.pdf"

licence = "Gold open access (GSA Geosphere). The specific licence instrument is NOT stated in the source entry and has not been verified, so redistribution is unconfirmed and `redistributable` is deliberately absent rather than assumed from open-access status. Free-to-read is not free-to-redistribute."
free_route = "https://derekschutt.wordpress.com/wp-content/uploads/2018/01/flexural_modeling_geosphere_2017.pdf"
free_route_kind = "author-copy"

slim = "KEPT: printed p.1555 (PDF 1), the identification (title, three authors, Colorado State University affiliation, journal, volume, issue, page range, DOI, citation block, open-access statement, submission and posting dates); p.1556 (PDF 2), governing equations (1) and (2) in Cartesian and radial form and the flexural rigidity (3); p.1557 (PDF 3), THE load-bearing page, equations (4) to (7) and Table 1 with its four load-model rows, column headings, variable note and two source footnotes; p.1564 (PDF 10), the reference list, so Table 1's footnote citations to Brotchie and Silvester (1969) and Turcotte and Schubert (2002) can be cashed inside the held witness. DROPPED: printed pp.1558-1563 (PDF 4-9), the program design, GUI description, function tables, worked Aleutian trench example and Parker gravity algorithm; and p.1565 (PDF 11), the closing matter. None carries a flexure equation or a flexural-parameter definition. The full document is recoverable from the archived URL and checkable against the full-fetch receipt above."

read_channels = "Text extraction (pdftotext -layout) and a visual render (pdftoppm) of printed p.1557 at 450 dpi, with the Table 1 point-load flexural-parameter cell re-rendered at 900 dpi. Dual channel is the standard here because the load-bearing content is a table cell whose exponent and denominator decide a length scale."

note = "Version of record: the PDF is the GSA typeset final (Adobe InDesign CC 2017, created 11 September 2017, matching the paper's printed 'Final version posted 11 September 2017'), rather than an accepted manuscript. The DOI itself resolves to a Cloudflare 403 at pubs.geoscienceworld.org, so the bytes came from the third author's site, which is the same typeset document. SECONDARY, cited rather than held: the toolbox source at github.com/sumantjha/TAFI_v1.0, whose TAFI_v1.0/Geodynamic_functions/Geodynamic_Utilities/flexparam.m is the authors' own machine-readable statement of the same quantity. It is a separate artifact under separate terms. Under the primary-plus-secondary rule this secondary should itself come through the pipeline; it predates the rule and is baselined."
