[[source]]
id = "bstar2006_lanz_hubeny"
citation = "Lanz, T. and Hubeny, I., 2007, A Grid of NLTE Line-Blanketed Model Atmospheres of Early B-Type Stars (BSTAR2006), ApJS 169, 83-104, DOI 10.1086/511270 (verified at the primary: doi.org/10.1086/511270 resolves to this title at IOP; the repository's earlier 10.1086/511268 fetch seed resolves to a different paper). arXiv astro-ph/0611891."
url = "https://arxiv.org/pdf/astro-ph/0611891"
archived_url = "https://web.archive.org/web/20260719182515/https://arxiv.org/pdf/astro-ph/0611891"
sha256 = "e5435bab670315a6611c2e7b252de9b8c6f88f12ce8a26d1c1c28906c0e24e10"
bytes = 910893
pages = 50
recipe = "curl -L https://arxiv.org/pdf/astro-ph/0611891 (HTTP 200, application/pdf). ID VERIFIED AT THE PRIMARY: the repository's plausible fetch seed astro-ph/0701761 resolves to a different paper (an intergalactic C IV absorbers study), so the intended id was confirmed from the arXiv abstract title before the bytes were read."
grade = "model (NLTE line-blanketed model-atmosphere grid, theory)"
scope = "NLTE, plane-parallel, hydrostatic B-star model atmospheres over Teff 15,000 to 30,000 K (1000 K steps, 16 values), log g 1.75 to 4.75, six compositions from twice to one-tenth solar plus metal-free; the emergent model.flux spans the soft X-ray to the far-infrared, so the Lyman continuum (>13.6 eV) IS computed. This grid extends the Sternberg/OSTAR2002 O and early-B coverage DOWN into the Herbig regime (below the Sternberg 25 kK floor), the regime the radiative-envelope EUV wind (astro::nlte_departed_ionizing_spectrum) currently leaves unconstrained. SCOPE LIMIT that governs use: the paper's Fig. 6 EUV statement is an NLTE-versus-LTE(Kurucz) comparison, NOT the model-versus-blackbody departure the EUV code consumes, so it does NOT supply that departure; the model-versus-blackbody Herbig departure is DERIVABLE from the grid's model.flux SEDs (a data fetch), a named deeper rung, and must not be conflated with the Fig. 6 factor."
custody = "witness"
licence = "NOT ESTABLISHED AS REDISTRIBUTABLE, so no bytes are held. This is the author's arXiv preprint of an AAS-copyright ApJS paper; the arXiv non-exclusive distribution licence grants arXiv the right to distribute but does not by itself grant third-party redistribution, and no CC licence is stated on the record, so redistribution is unconfirmed. The byte-identical Wayback snapshot stands as the held witness behind the receipt. The values read (a grid's parameter ranges and a figure's qualitative direction) are facts and are citable either way, which is what is done here."
redistributable = false
licence_evidence = "arXiv default non-exclusive distribution licence (grants arXiv, not third parties); AAS copyright on the ApJS version of record; no CC statement found on the arXiv record"
free_route = "https://arxiv.org/pdf/astro-ph/0611891"
free_route_kind = "preprint"
extract = "GRID PARAMETERS (Abstract, printed p.1, verbatim): '16 values of effective temperatures, 15 000 K <= Teff <= 30 000 K with 1 000 K steps, 13 surface gravities, 1.75 <= log g <= 4.75 with 0.25 dex steps, 6 chemical compositions ... This new grid complements our earlier Ostar2002 grid of O-type stars (Lanz & Hubeny, 2003, ApJS, 146, 417).' COVERAGE (Sec. 1, verbatim): the new grid extends OSTAR2002 'to cooler temperatures (15 000 <= Teff <= 30 000 K)'. THE EUV-INCLUSIVE OUTPUT (Sec. 4, the grid data description, verbatim): 'model.flux: Model flux distribution from the soft X-ray to the far-infrared', so the emergent >13.6 eV Lyman continuum is computed per model. THE LOAD-BEARING EUV STATEMENT (Sec. 5.1, printed p.15, Fig. 6, verbatim, dual-channel text+visual confirmed): 'Fig. 6 displays a comparison of the predicted LTE and NLTE spectral energy distributions for 3 solar composition models with log g = 3.0 ... we use the spectra directly calculated by TLUSTY (files model.flux described earlier) ... To conserve the total flux, the LTE models show a lower flux in the far and extreme ultraviolet. In the hottest model shown (Teff = 25 000 K), the LTE prediction in the Lyman continuum [is] a factor of 2 lower than the NLTE flux. In the cooler models, the LTE flux is lower at wavelengths shorter than Ly alpha.' CRITICAL READ, the finding that governs how this may be used: this factor-of-2 is NLTE relative to the LTE KURUCZ model, NOT relative to a BLACKBODY. The EUV photoevaporation code's departure is defined model-over-blackbody (Sternberg), a different reference. So this paper does NOT supply the P0-A Herbig-regime model-over-blackbody departure; it supplies the grid's existence and Herbig coverage and the NLTE-over-LTE direction. Extracting the model-over-blackbody Herbig departure requires processing the grid's model.flux SEDs against the blackbody Wien-tail integral, a data fetch named as a deeper rung and NOT done here."
read_channels = "Text extraction (pdftotext -layout) and a visual render (pdftoppm at 130 to 140 dpi) of the abstract (PDF p.1) and the Sec. 5.1 Fig. 6 discussion (printed p.15, PDF p.15). Dual channel confirmed: the text layer and the visual render agree verbatim on the grid parameters and on the Fig. 6 'factor of 2 lower ... at Teff = 25 000 K' statement, including its NLTE-versus-LTE (not versus-blackbody) framing."
note = "Vendored for the disk-evolution EUV arc (PR #212, #1b) to close the Herbig-regime flag that astro::nlte_departed_ionizing_spectrum and the P0-A/P0-B EUV code carry. The honest outcome of reading the primary: the grid is the RIGHT source and is now held as a byte-identical witness, but the paper does not tabulate the model-over-blackbody departure the code consumes (that lives in the grid SEDs), and its Fig. 6 factor is a different comparison. So this entry documents the source of the future constraint and, by stating the NLTE-vs-LTE-vs-blackbody distinction, prevents a later agent from grabbing the factor-2 as the departure (the spot-check-certifies-a-mapping error). No load-bearing number enters the code from this source yet."

