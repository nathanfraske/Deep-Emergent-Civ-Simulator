extract = "THE LOAD-BEARING EQUATION, printed page 831, read from a 300 dpi render and headed by the compound rather than inferred from position, so the hematite branch cannot be confused with the magnetite branch beside it. Under 'Fe2O3;' with the column head 'Temperature range in K': 'k = 1/(1.844 * 10^-4 T)   298 < T < 912' and 'k = 1/(8.319 * 10^-5 T + 9.243 * 10^-2)   912 <= T < 1500', numbered equation (2). The next block, under 'Fe3O4;', reads 'k = 1/(1.693 * 10^-4 T)   298 < T < 906', which is the value a careless read would have taken instead. SPECIMEN, Table 1, printed page 830, 'Chemical composition of pure samples used in this work', hematite row read verbatim: Density (10^3 kg/m^3) 5.20, Purity (%) 99.9, Impurity analysis (ppm) 'Al 200, Co 20, Cr 40, Mn 400, Ni 100, Si 100'. METHOD AND POROSITY, printed page 830: 'The samples were formed to disk-shaped compacts by Hot Isostatic Pressing (HIP) method from fine materials of the average particle size of 1 micrometre. The pressing condition was 1173 K in temperature, 150 MPa in pressure, 7.2 ks in holding time and pure argon in atmosphere. The porosity of samples was found to be less than 0.1 % which was calculated from the apparent and ture [sic] densities. The thermal conductivities of dense pure hematite, magnetite, wustite and iron were measured in the temperature range from room temperature to 1 553 K with the temperature interval of 50 K.' FIT BASIS, printed page 831: 'The straight lines were drawn by a least squares method and empirical expressions for the variation of thermal resistivity of dense materials are summarized as follows'. NO MEASUREMENT ACCURACY IS STATED ANYWHERE IN THE PAPER, which is why the banked row carries no band."
read_channels = "Text extraction (pdftotext -layout) to locate, then a 300 dpi pdftoppm render for every value taken, because the load-bearing content is a pair of adjacent fitted equations whose leading coefficients differ in the third digit and whose compound headings are what tell them apart. DUAL CHANNEL on the value itself: the equation evaluated at 298 K gives 18.198 W/(m*K), and Fig. 3 (thermal resistivity against temperature, dense pure hematite plotted as open circles) reads about 0.055 m*K/W at 300 K, whose reciprocal is about 18. The printed equation and the plotted data agree, so the transcription is confirmed rather than asserted."
note = "The measurement primary for the dense-oxide values is the same group's earlier Japanese-language paper, registered beside this one as akiyama_1991_tetsu_dense_iron_oxides and cited by this paper as its reference 4). The two are ONE determination published twice, not two witnesses, and the hematite claim says so rather than naming them as primary and secondary. A DISCREPANCY INSIDE THE SOURCE, recorded rather than smoothed: the paper states porosity below 0.1 percent, yet its own Table 1 density of 5.20 g/cm3 sits 1.3 percent under the crystallographic 5.271 that this repo's hematite row derives from COD 1011267, so either the tabulated density is the material's true density rather than the compact's apparent density, or the two statements disagree. The paper does not say which, and the banked scope carries both numbers rather than choosing."

