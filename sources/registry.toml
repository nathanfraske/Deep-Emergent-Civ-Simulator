# THE SOURCE REGISTRY: where a new fetch lands.
#
# Hand-maintained, and the landing place for every source vendored from here on. Its generated sibling
# sources/mirrored.toml carries the 27 sources that already lived in the per-directory manifests; the gate
# and the bibliography read the two as ONE namespace, so there is one lookup and one bibliography
# (docs/SOURCES.md, generated by scripts/gen_sources.py).
#
# WHY TWO FILES AND WHY THAT IS NOT A DIAMOND. The repo's diamond gate states the predicate: two providers
# are not a defect, an UNARBITRATED two providers is. The arbitration is registered and one-directional.
# A mirrored entry's AUTHORITY is the manifest it names in `mirrors`, and it is regenerated from it, so it
# cannot drift. A registry entry has no manifest and is its own authority. Every id lives in exactly one
# half, and the gate fails on an id in both.
#
# REQUIRED OF EVERY NEW ENTRY (scripts/sources_gate.py enforces all of it, and grandfathers none of it for
# a new source):
#
#   id            stable; referenced from manifest rows as `source_id`, from code as `// @sources:`,
#                 and from floor_provenance.toml as `sources`
#   citation      the full primary citation, verified at the primary
#   sha256        the receipt. md5 alone does not pass: a collision-forgeable receipt is not tamper-evident
#   archived_url  an Internet Archive snapshot, or `archive_pending` with a stated reason when a host
#                 bot-walls the crawler. `archive_url` is accepted as an alias (PR #201's spelling)
#   scope         the regime the source's values hold in, so a number is not used outside it
#   slim          what was KEPT and what was DROPPED, so a slim is never mistaken for the whole document.
#                 A `witness` entry carries `extract` instead: the load-bearing passage verbatim
#   licence       the terms, and whether they permit redistribution by an open-source, educational,
#                 non-profit project. This is a LICENCE question, not a paywall question: a gold
#                 open-access paper behind a publisher page but carrying CC-BY is fine to hold, and a
#                 free-to-download paper reserving all rights is not
#   custody       in_repo (bytes in-tree) | witness (no bytes, receipt plus public archive) | external
#                 (bytes in local custody outside the repo)
#
# A fetch should cover a PRIMARY and at least one SECONDARY for the same claim, both through this pipeline,
# so the two cross-check and so an erratum has two independent witnesses. The claim record lives beside the
# value it is about, in the per-directory manifest, as a `[[claim]]` block with `primary` and `secondary`
# lists of ids from here.

# ---------------------------------------------------------------------------------------------------
