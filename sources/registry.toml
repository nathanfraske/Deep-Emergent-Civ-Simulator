recipe = "curl -L https://derekschutt.wordpress.com/wp-content/uploads/2018/01/flexural_modeling_geosphere_2017.pdf (HTTP 200, application/pdf), then keep PDF pages 1, 2, 3 and 10 (zero-based 0, 1, 2, 9) with pypdf.PdfWriter. Both checksums are reproducible from that pair of steps."
grade = "theory (published analytic equations, transcribed rather than measured; single-grade)"
scope = "Lithospheric flexure under the thin-elastic-plate approximation: equations (1) to (7) and Table 1's four load-model rows, with the flexural rigidity and flexural parameter definitions."

