archived_url = "https://web.archive.org/web/20260115015117/http://www.minsocam.org/ammin/AM51/AM51_123.pdf"
sha256 = "b083336fbde0d3aef7daa0da926a1e8582961fcfd3030067d1b81214545e6ff5"
bytes = 459675
sha256_set = "Re-fetch receipts for all five papers, none held: AM51_123.pdf (hematite, Blake 1966) b083336fbde0d3aef7daa0da926a1e8582961fcfd3030067d1b81214545e6ff5, 459675 bytes; AM53_807.pdf (olivines, Birle 1968) d6c87e56de69e14b9d2dd48105f7253651153550462562918f94a66cd7bebc2f, 1170263 bytes; AM61_266.pdf (periclase, Hazen 1976) 905a260202939b4e987fd7050e77fd58e815d5ff3553366146f3dfb5cfbf1220, 643306 bytes; AM65_920.pdf (quartz, Levien 1980) 9f496e89e95eed7498162662a40805a1f71ba5169c93dd047af7bcfba6bd3b85, 1177432 bytes; AM79_405.pdf (orthoenstatite, Hugh-Jones & Angel 1994) 09fb2e8c6e9ac64b4b7f4169fefc120c3968d7d637849b474e9a8c90f42a9a33, 776792 bytes. The `sha256` field above is the hematite paper, the one whose `url` this entry names; the rest are here because one entry covers five documents and a receipt per document is what makes each re-fetchable."
recipe = "curl -L http://www.minsocam.org/ammin/AM<vol>/AM<vol>_<page>.pdf over PLAIN HTTP for each paper. minsocam.org refuses HTTPS, which matters for automation: a fetcher that force-upgrades to HTTPS will always fail on this host."
grade = "measured (published single-crystal structure refinements)"
scope = "Ambient and high-pressure crystal structures of hematite, the natural olivines, periclase, quartz and orthoenstatite: space groups, cell parameters and refined atomic coordinates. Used here ONLY for the space-group and cell statements each paper actually prints."
custody = "witness"
licence = "NOT REDISTRIBUTABLE, and the finding points at an explicit assertion rather than at an inference. The Mineralogical Society of America's copyright notice states: 'All rights are reserved by the Mineralogical Society of America (MSA) and content may not be reproduced, downloaded, disseminated, published, or transferred in any form or by any means, except with the prior written permission of MSA, or as indicated below. Members of MSA and nonmembers may download pages or other content for their own use ... on a single computer. However, no part of such content may be otherwise or subsequently reproduced, downloaded, disseminated, published, or transferred, in any form or by any means, except with the prior written permission of, and with the express attribution to MSA.' Reading is permitted and redistributing is not, so these are held as citation plus witness with no bytes, matching the existing MSA findings in this registry for fan_2019 and jackson_1999_enstatite."
redistributable = false
licence_evidence = "http://www.minsocam.org/msa/Copyright.html"
free_route = "http://www.minsocam.org/ammin/AM51/AM51_123.pdf"
free_route_kind = "publisher-open"
extract = "WHAT EACH PAPER ACTUALLY PRINTS, quoted, because three of the five print LESS than a reader would assume and the difference decides what may be cited to them. Blake et al. 1966 prints BOTH: the text records that 'the space group R3c of Pauling and Hendricks was confirmed', and Table I heads 'Hexagonal unit cell: a = 5.038 +/- 0.002 A, c = 13.772 +/- .012 A, c/a = 2.733 +/- 0.015, Z = 6' with 'Space Group = R3c' beneath it (read from a 400 dpi render; the text layer drops the overbar and mangles the Z). Birle et al. 1968 prints the space group only, 'it seems safe to assume that all olivine crystals obey the symmetry of Pbnm and have the normal cell size', and NO Z. Hugh-Jones & Angel 1994 prints the space group only, 'confirming that the crystal used in our experiments has Pbca symmetry', and NO Z. Hazen 1976 prints NEITHER symbol NOR Z, only the structure type and the cell: 'The cubic NaCl-type structure of periclase was first suggested by Hull (1919)', with a refined a = 4.2121 +/- 0.0001 A. Levien et al. 1980 prints NEITHER: it gives the cell parameters 'a = 4.916(1) and c = 5.4054(4) A at 1 atm' and no space-group symbol anywhere. So for periclase and quartz the space group is cited to the COD records and the structure type to these papers, and Z is cited to COD throughout except for hematite."
note = "This entry exists so that a reader can tell which crystallographic claim rests on which document. The Z values in Column 1 come from the COD records for seven of the eight phases; hematite is the one phase whose Z is printed in a published paper this project has read."

