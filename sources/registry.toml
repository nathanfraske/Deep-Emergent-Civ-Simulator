grade = "measured (selected values from experimental data)"
scope = "Recommended thermophysical properties of eight alloys, their major constituents and the corresponding oxides. The value read here is the single-crystal MgO thermal conductivity at 300 K, on a specimen of stated impurity concentration 2e19 atoms per cubic centimetre."
custody = "witness"
licence = "NOT ESTABLISHED AS REDISTRIBUTABLE, so no bytes are held. The document is openly served by NASA's Technical Reports Server and carries a DTIC Distribution Statement A on its sibling volume, but it was prepared by Purdue's Thermophysical Properties Research Center under contract, and the SIBLING TPRC volume prints an explicit 'Copyright 1970, Purdue Research Foundation'. A copyright asserted by the same preparing institution over the same data series is enough to withhold the bytes rather than assume the absence of a notice in this volume settles it. The values themselves are facts and are uncopyrightable, so reading and citing them is safe either way, which is what is done here."
redistributable = false
licence_evidence = "the printed 'Copyright 1970, Purdue Research Foundation' notice in the sibling volume TPRC Data Series Volume 2 (DTIC ADA951936), read at line 395 of its extracted text"
free_route = "https://ntrs.nasa.gov/api/citations/19660014513/downloads/19660014513.pdf"
free_route_kind = "gov-work"
extract = "Table I-27, printed page 66: 'THERMAL CONDUCTIVITY OF MAGNESIUM OXIDE (single crystal) MgO. Selected Values for MgO Single Crystal with Impurity Concentration 2 x 10^19 atoms cm^-3'. The 300 K row reads k = 0.60 Watt cm^-1 K^-1, which is 60.0 W/(m*K), and it carries NO asterisk (the table's footnote reserves the asterisk for extrapolated values, and only the 0.1, 0.5 and 1 K entries carry one). Neighbouring rows: 273 K 0.66, 350 K 0.50, 400 K 0.43. The section's own remark: 'Five sets of experimental data are available. Selected values from 2 to 320 K are taken from the data of Slack (1962), and values from 423 to 483 K from the data of Makarounis and Jenkins'. So this value traces to Slack (1962), Physical Review 126, 427, the single-crystal study that remains paywalled at the publisher."
read_channels = "A 250 dpi pdftoppm render of PDF page 78 (printed page 66). The text layer of this scan is degraded and was not relied on for any value."
note = "This is the INDEPENDENT SECOND DETERMINATION that sets the periclase band. Against the NSRDS-NBS 8 recommendation of 48.4 W/(m*K) for a 98 percent dense polycrystal, this single-crystal value of 60.0 is 24 percent higher, and the direction and rough size are what porosity plus grain-boundary resistance predict. The band on the periclase row is set to that gap rather than to the narrower stated accuracy, because a width that excluded a second measured determination would claim more than the evidence supports."

