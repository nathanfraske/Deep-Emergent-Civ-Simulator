# ---------------------------------------------------------------------------------------------------
# JANAF, the collection-level entry (owner ruling consequence 2, and the D7 coverage hole).
#
# Recorded HERE rather than in crates/physics/data/janaf/manifest.toml deliberately. That manifest is
# `include_str!`d by crates/physics/src/janaf.rs, so editing it changes the compiled binary, and the byte
# pins cannot be verified on this branch (the inherited constructor-gate block, plan D5). A registry entry
# touches no compiled input and carries the same facts.
#
# THE CITATION-PLUS-WITNESS RULING CANNOT BE EXECUTED ON THESE BYTES AS A DATA CHANGE, and that is the
# finding that matters. The 34 tables are not inert document witnesses like the six PDFs converted above:
# they are `include_str!`d into the physics crate, 35 sites in janaf.rs. Deleting them does not convert an
# entry, it fails the build. See `remediation` for the path and its cost.
# ---------------------------------------------------------------------------------------------------

[[source]]
id = "janaf"
citation = "Chase, M.W. Jr., 1998, NIST-JANAF Thermochemical Tables, 4th ed., Journal of Physical and Chemical Reference Data, Monograph 9, 1-1951. American Chemical Society and American Institute of Physics for the National Institute of Standards and Technology."
url = "https://janaf.nist.gov/"
archived_url = "https://web.archive.org/web/20260101000000*/janaf.nist.gov/tables/*"
sha256_manifest = "crates/physics/data/janaf/manifest.toml"
# was: prose in the sha256 field, which is not a checksum. The per-table receipts now exist and live there.
_sha256_note = "per-table, recorded row by row in crates/physics/data/janaf/manifest.toml (34 tables, md5 receipts)"
scope = "Standard-state thermochemistry, 0 to 6000 K at 1 bar: the Gibbs energy function, standard entropy, enthalpy increment, and formation enthalpy and Gibbs energy, for the 34 gas and reference species the condensation and thermochemistry work consumes."
grade = "measured (critically-evaluated compilation)"

custody = "in_repo"
holding_collection = "crates/physics/data/janaf/"
collection_files = 34

licence = "UNRESOLVED, not a restriction (owner challenge 2026-07-19). The earlier entry read this as NOT the usual NIST public domain because the Standard Reference Data Act (15 USC 290e) AUTHORIZES the Secretary to secure copyright in Standard Reference Data compilations and JANAF is SRD 13. That inferred a restriction from the existence of the authority to restrict, which is a different claim. No assertion by NIST over these tables was ever found, our own manifest captured no terms at fetch time (34 janaf.nist.gov URLs, no licence statement), and the owner reports finding nothing stating anything other than the NIST open licence. Closing this needs the actual terms on the distribution page captured and held like any other licence finding. Individual numeric values are facts and uncopyrightable regardless, so citing values is safe either way."
redistributable = "unresolved"
licence_evidence = "none captured; 15 USC 290e is the AUTHORITY, not an assertion over these tables"
free_route = "https://janaf.nist.gov/tables/"
free_route_kind = "publisher-open"
reviewed = "2026-07-18"

slim = "Not slimmed. Each table is the artifact-native machine-readable form fetched verbatim from janaf.nist.gov/tables/<code>.txt, because the loader parses the full temperature grid rather than a page range."

remediation = "THE RULING CANNOT BE APPLIED AS A DATA CHANGE. The 34 tables are compile-time dependencies (35 `include_str!` sites in crates/physics/src/janaf.rs), so removing them is a compile error rather than a conversion, and it is load-bearing for the condensation and thermochemistry work. The legal nuance offers the path: values are facts and the compilation is what is restricted, so the principled fix is to replace the verbatim NIST table files with a DERIVED data file carrying only the numeric columns the loader consumes, cited to Chase 1998 with the statute noted. That is an engineering arc, not a deletion: it changes a compiled input, so it must be done against a buildable tree with the byte pins verified before and after, and any transcription difference would move them. Surfaced for the owner (plan D6) rather than attempted here. The cheaper alternative the statute itself names is a written permission request to NIST, which would settle it with no code change at all."

