free_route = "http://www.minsocam.org/ammin/AM51/AM51_123.pdf"
free_route_kind = "publisher-open"
extract = "WHAT EACH PAPER ACTUALLY PRINTS, quoted, because three of the five print LESS than a reader would assume and the difference decides what may be cited to them. Blake et al. 1966 prints BOTH: the text records that 'the space group R3c of Pauling and Hendricks was confirmed', and Table I heads 'Hexagonal unit cell: a = 5.038 +/- 0.002 A, c = 13.772 +/- .012 A, c/a = 2.733 +/- 0.015, Z = 6' with 'Space Group = R3c' beneath it (read from a 400 dpi render; the text layer drops the overbar and mangles the Z). Birle et al. 1968 prints the space group only, 'it seems safe to assume that all olivine crystals obey the symmetry of Pbnm and have the normal cell size', and NO Z. Hugh-Jones & Angel 1994 prints the space group only, 'confirming that the crystal used in our experiments has Pbca symmetry', and NO Z. Hazen 1976 prints NEITHER symbol NOR Z, only the structure type and the cell: 'The cubic NaCl-type structure of periclase was first suggested by Hull (1919)', with a refined a = 4.2121 +/- 0.0001 A. Levien et al. 1980 prints NEITHER: it gives the cell parameters 'a = 4.916(1) and c = 5.4054(4) A at 1 atm' and no space-group symbol anywhere. So for periclase and quartz the space group is cited to the COD records and the structure type to these papers, and Z is cited to COD throughout except for hematite."
note = "This entry exists so that a reader can tell which crystallographic claim rests on which document. The Z values in Column 1 come from the COD records for seven of the eight phases; hematite is the one phase whose Z is printed in a published paper this project has read."

