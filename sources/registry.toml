licence = "NOT REDISTRIBUTABLE, and the finding is inherited rather than newly made: the sibling TPRC volume prints 'Copyright 1970, Purdue Research Foundation', and this repository's touloukian_1966_oxides entry already withholds bytes on exactly that ground. Distribution Statement A governs onward distribution by the Government, not a grant of copyright licence to this project. The numeric values are facts and are uncopyrightable, so reading and citing them is safe, which is what is done here. At 85 MB it would in any case be the largest artifact in the tree by an order of magnitude."
