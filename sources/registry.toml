citation = "Five published structure determinations in American Mineralogist, read as the primary crystallographic witnesses for Column 1: Blake, R.L., Hessevick, R.E., Zoltai, T. & Finger, L.W., 1966, Refinement of the hematite structure, Am. Min. 51, 123-129; Birle, J.D., Gibbs, G.V., Moore, P.B. & Smith, J.V., 1968, Crystal structures of natural olivines, Am. Min. 53, 807-824; Hazen, R.M., 1976, Effects of temperature and pressure on the cell dimension and X-ray temperature factors of periclase, Am. Min. 61, 266-271; Levien, L., Prewitt, C.T. & Weidner, D.J., 1980, Structure and elastic properties of quartz at pressure, Am. Min. 65, 920-930; Hugh-Jones, D.A. & Angel, R.J., 1994, A compressional study of MgSiO3 orthoenstatite up to 8.5 GPa, Am. Min. 79, 405-410."
