extract = "English synopsis, printed page 231, verbatim: 'Thermal conductivities of dense pure hematite, magnetite, wustite and iron have been measured by the laser flash method in the temperature range from room temperature to 1 553 K. The relatively high thermal conductivities of dense pure hematite, magnetite and wustite at low temperature were found and these values decreased with increase of temperature. The thermal conductivity of wustite was half to fifth as large as that of hematite or magnetite. The results obtained were summarized in the form of an empirical equation k = 1/(A T + B). Thermal resistivities, defined by reciprocal thermal conductivity, of three iron oxides change linearly as a function of temperature up to Tammann temperature which is about half of melting temperature.' The paper carries Table 1 (chemical composition of the samples), Fig. 2 (temperature dependence of thermal diffusivity), Fig. 3 (temperature dependence of thermal conductivity) and Fig. 6 (temperature dependence of thermal resistivity of hematite). HONEST LIMIT ON THIS EXTRACT: the body, the table cells and the figure annotations are in Japanese and are set in Adobe-Japan1 fonts that neither extract as text nor render without a language pack in this environment, so no numeric value is read from this paper. Every number banked comes from the English 1992 companion, and this entry stands as the lineage record and the re-fetchable witness."
