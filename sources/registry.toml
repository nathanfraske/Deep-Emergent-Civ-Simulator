# The receipt is the HELD bytes (the slim). The full-document fetch receipt rides beside it, so the slim is
# traceable back to the document it was cut from.
sha256 = "b0733092524e96ce209b564725855deda9493eba31035b2ad8e710e0371a9240"
bytes = 942728
