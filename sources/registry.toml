licence = "NOT REDISTRIBUTABLE, and the finding points at an explicit assertion rather than at an inference. The Mineralogical Society of America's copyright notice states: 'All rights are reserved by the Mineralogical Society of America (MSA) and content may not be reproduced, downloaded, disseminated, published, or transferred in any form or by any means, except with the prior written permission of MSA, or as indicated below. Members of MSA and nonmembers may download pages or other content for their own use ... on a single computer. However, no part of such content may be otherwise or subsequently reproduced, downloaded, disseminated, published, or transferred, in any form or by any means, except with the prior written permission of, and with the express attribution to MSA.' Reading is permitted and redistributing is not, so these are held as citation plus witness with no bytes, matching the existing MSA findings in this registry for fan_2019 and jackson_1999_enstatite."
redistributable = false
