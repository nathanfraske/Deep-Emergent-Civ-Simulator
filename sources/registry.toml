free_route = "https://web.archive.org/web/20250202023422/https://apps.dtic.mil/sti/tr/pdf/ADA951936.pdf"
free_route_kind = "gov-work"
extract = "WHY SPINEL STAYS UNANCHORED, and it is a correction to this repository's own record rather than a restatement of it. TPRC carries spinel in two places and NEITHER is stoichiometric MgAl2O4. (1) SPECIFICATION TABLE NO. 58 and DATA TABLE NO. 58, printed pages 287 and 288, are headed 'THERMAL CONDUCTIVITY OF MAGNESIUM ALUMINATE   MgO . 3.5 Al2O3', an ALUMINA-RICH composition rather than the 1:1 MgO.Al2O3 of the phase. Its single curve reads: 'Curve 1, Ref. No. 300, Method L, Year 1962, Temp. Range 3.6-301 K, Synthetic Spinel R-53, Single synthetic crystal; made with the Verneuil process by Linde Air Products Co. N.Y.; ... specimen 1.12 cm long and 0.40 cm avg dia; lattice constant 7.979 A.' Data Table 58's last row is 'T 300.67, k 0.133' in Watt cm^-1 K^-1, so 13.3 W/(m*K). THE LATTICE CONSTANT IS THE INTERNAL CONFIRMATION OF THE NON-STOICHIOMETRY: 7.979 A against the 8.084 A that this repo's own spinel row cites from COD 9001364, and excess Al2O3 contracting the cell is the expected direction. (2) SPECIFICATION TABLE NO. 282 and DATA TABLE NO. 282, printed pages 849 and 850, headed 'THERMAL CONDUCTIVITY OF SPINEL', carry seven curves and not one is the pure phase: Curve 1 (Ref. 407, 1949, 322-406 K) records 'No details reported.'; Curves 2, 3 and 4 (Ref. 463, 1961) are POWDER beds of bulk density 1.51, 1.2 and 0.92 g cm^-3; Curve 5 is that powder pressed and fired at 1650 C to bulk density 1.79 g cm^-3; Curves 6 and 7 (Ref. 300, 1962) are IRON-BEARING natural pleonaste single crystals from Queensland, '(Ti0.02Mg0.75Fe0.41Al1.85)O4' with lattice constant 8.128 A and '(Ti0.01Mg0.13Fe0.33Al1.93)O4' with lattice constant 8.117 A, reading 0.059 and 0.064 Watt cm^-1 K^-1 at 300 K, so 5.9 and 6.4 W/(m*K). (3) THE REFERENCE THAT TIES IT TOGETHER, read from the numbered source list: 'Ref. 300 = Slack, G.A., Phys. Rev., 126(2), 427-41, 1962.' So all three of Slack's spinel specimens are here with their compositions, and all three are off-composition. THE TWO ABSENCES, established by reading the contents lists rather than by failing to find them: the SINGLE OXIDES group (tables 15 to 42) runs Al2O3 through ZrO2 and contains (tri)Iron Tetraoxide Fe3O4 but NO Fe2O3, and the MINERALS group (tables 264 to 285) runs Basalt through Tourmaline with no hematite entry, so TPRC Volume 2 carries no hematite determination at all."
read_channels = "Text extraction (pdftotext -layout) for the contents lists, the index and the numbered reference list, then 200 to 220 dpi pdftoppm renders of PDF pages 372, 373, 922 and 923 for every specimen description and every data value quoted above. THE VISUAL CHANNEL IS MANDATORY FOR THIS ARTIFACT: the scan's text layer is degraded to the point that the word SPINEL does not extract from its own figure pages, and the specification tables are rotated landscape. The printed-to-PDF page offset is not constant across the volume (85 in the oxides section, 73 in the minerals section), so pages were located by rendering rather than by arithmetic."
note = "Fetched to answer one question and it answered it in the negative, which is the useful outcome: the previous phase-conductivity fetch recorded Slack (1962) as 'the named follow-up for spinel', the paywalled paper that would close the row once retrieved. It would not. Slack measured one alumina-rich Verneuil crystal and two iron-bearing natural pleonastes, so retrieving Slack would yield a value for a composition the phase registry does not carry. Closing spinel needs a determination on stoichiometric MgAl2O4 that no source reached in this fetch provides. THE EARLIER JUDGEMENT NOT TO USE THIS VOLUME IS UPHELD ON ITS OWN TERMS AND NARROWED: the previous fetch set it aside as copyright-encumbered and text-degraded, both true; what it adds here is that for the spinel question the volume is not merely hard to read, it does not contain the number."
