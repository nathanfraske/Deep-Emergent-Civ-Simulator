sha256_set = "Re-fetch receipts for all five papers, none held: AM51_123.pdf (hematite, Blake 1966) b083336fbde0d3aef7daa0da926a1e8582961fcfd3030067d1b81214545e6ff5, 459675 bytes; AM53_807.pdf (olivines, Birle 1968) d6c87e56de69e14b9d2dd48105f7253651153550462562918f94a66cd7bebc2f, 1170263 bytes; AM61_266.pdf (periclase, Hazen 1976) 905a260202939b4e987fd7050e77fd58e815d5ff3553366146f3dfb5cfbf1220, 643306 bytes; AM65_920.pdf (quartz, Levien 1980) 9f496e89e95eed7498162662a40805a1f71ba5169c93dd047af7bcfba6bd3b85, 1177432 bytes; AM79_405.pdf (orthoenstatite, Hugh-Jones & Angel 1994) 09fb2e8c6e9ac64b4b7f4169fefc120c3968d7d637849b474e9a8c90f42a9a33, 776792 bytes. The `sha256` field above is the hematite paper, the one whose `url` this entry names; the rest are here because one entry covers five documents and a receipt per document is what makes each re-fetchable."
