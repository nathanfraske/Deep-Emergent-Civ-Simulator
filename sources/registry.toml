note = "PREVIOUSLY VENDORED for the multiphase mixing rule (docs/working/VENDORING_CHECKLIST.md) and REGISTERED HERE for the first time, because this fetch depends on it for three of the six kappa_298 anchors and an unregistered dependency is a dependency the gate cannot check. Table 2 read verbatim: 'forsterite Mg2SiO4, A 140.69, rho 3.22, K 5.158'; 'fayalite Fe2SiO4, A 203.78, rho 4.66, K 3.161'; 'enstatite MgSiO3, A 100.39, rho 3.20, K 4.961'; all three carrying note (a) = Horai & Simmons (1969), which is the measurement primary. A DEFECT IN THE SOURCE, recorded rather than smoothed: the fayalite density 4.66 g/cm3 in that table sits well above the accepted 4.39, so that column of that row is wrong; the conductivity is the quantity read and the density is not taken from here."
