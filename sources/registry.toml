grade = "theory (the analytic fixed-Q tidal dissipation rate, a textbook derivation reprinted verbatim by this paper)"
scope = "The degree-2, fixed-Q, homogeneous, spin-synchronous, small-eccentricity leading-term tidal heat production rate E_dot = (21/2)(k2/Q) G M_pri^2 R_sec^5 n e^2 / a^6 (watts), with k2, Q and R the tidally deformed SECONDARY's (the moon's) and M_pri the PRIMARY's (the planet's). Holds for a moon at or near synchronous rotation and small eccentricity; the frequency- and temperature-dependent viscoelastic regime this paper develops PAST Equation (1) is out of scope for this leading analytic form."
custody = "witness"
licence = "arXiv non-exclusive distribution licence (arxiv.org/licenses/nonexclusive-distrib/1.0), read from the abstract page for this submission on 2026-07-20: it grants arXiv the right to distribute and does NOT grant this project third-party redistribution rights, so no bytes are held in-tree. redistributable = false is the conservative and correct reading. The equation itself is an uncopyrightable analytic fact, so reading and citing it is safe independently of the redistribution question, which is why it is held as citation-plus-witness against the durable public archive rather than in-repo."
redistributable = false
licence_evidence = "https://arxiv.org/abs/0912.1907 displays a 'view license' link to http://arxiv.org/licenses/nonexclusive-distrib/1.0/ (the arXiv non-exclusive distribution licence); no alternative Creative Commons licence is shown for this submission."
free_route = "https://arxiv.org/abs/0912.1907"
