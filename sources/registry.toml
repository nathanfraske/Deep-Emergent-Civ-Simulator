extract = "Equation (1), printed page 4, read dual-channel from the rendered equation image: 'E_dot_tidal = (21/2) (k2/Q) (G M_pri^2 R_sec^5 n e^2) / a^6', with the paper's own variable key printed beneath it verbatim: 'E_dot_tidal: Tidal heat production rate, watts; a: Semi-major axis; e: Eccentricity; G: The gravitational constant; M_pri: Mass of the primary; R_sec: Radius of the secondary; k2: Second-order Love number of the secondary; Q: Quality factor of the secondary.' Section 3 (page 4): 'For a homogeneous spin-synchronous body whose stiffness and viscous dissipation are both assumed to be constant and uniform, the global tidal heat rate can be expressed following the detailed derivation in Murray & Dermott (2005).' Footnote 2 fixes the convention: 'we adopt primary to refer to the central mass ... and consider tides generated inside an orbiting secondary.'"
read_channels = "The arXiv v1 PDF read directly (pages 1 to 4); Equation (1) on page 4 read as the rendered equation image, not from a text layer."
note = "Grounds crates/planet-substrate/src/moons.rs::tidal_heating_power_log10: the 21/2 coefficient and the which-body assignments (k2/Q/R the moon's, M the planet's, squared) are read from this witness. It is the heating counterpart of the section-8 tidal recession form in docs/working/PIPELINE_FETCHES.md; the two are siblings (recession dissipates in the planet, heating in the moon) and a caller must not cross their k2/Q. The primary derivation (Murray & Dermott chapter 4) is a book and is not held; this open arXiv paper is the byte-held witness that reprints the equation."

