id = "henning_2009_tidal_heating"
citation = "Henning, W.G., O'Connell, R.J. & Sasselov, D.D., 2009, Tidally Heated Terrestrial Exoplanets: Viscoelastic Response Models, Astrophysical Journal 707, 1000-1015, DOI 10.1088/0004-637X/707/2/1000, arXiv:0912.1907. Their Equation (1) is the standard fixed-Q synchronous-eccentric tidal heating rate, derived in Murray, C.D. & Dermott, S.F., 1999, Solar System Dynamics, Cambridge University Press, ISBN 978-0-521-57597-4, chapter 4, and Peale, S.J. & Cassen, P., 1978, Contribution of tidal dissipation to lunar thermal history, Icarus 36, 245-269, DOI 10.1016/0019-1035(78)90109-4, with the Io application in Peale, Cassen & Reynolds 1979, Science 203, 892-894, DOI 10.1126/science.203.4383.892."
